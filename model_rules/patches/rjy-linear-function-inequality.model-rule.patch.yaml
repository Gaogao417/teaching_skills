  model_family_id: linear_function_inequality_and_axes_area
  topic_tags:
  - 一次函数
  - 截距
  - 面积
  propositions:
  - id: P1
    statement: 一次函数与坐标轴的交点可由令 x=0 或 y=0 得到。
  - id: P2
    statement: 两个截距和原点围成的直角三角形面积为 |x_intercept * y_intercept|/2。
  - id: P3
    statement: 截距面积可反向约束直线参数。
  constraints:
  - 一次函数不能与某坐标轴重合导致面积退化，除非题目显式讨论零面积。
  - x 截距和 y 截距必须都存在且可求。
  relation:
    given:
    - LinearFunction
    derive:
    - Area
    constraints:
    - 坐标轴截距三角形不得退化
    - 坐标轴截距三角形面积公式
  ports:
    inputs:
      linear_function: LinearFunction
    outputs:
      axes_triangle_area: Area
      intercept_points: Point2D[]
  generation_notes:
  - 可与 一次函数与坐标轴交点关系 串联：先求截距，再求坐标轴三角形面积。
  - 设计参数题时用面积反向筛选 k 或 b，但要避免截距为 0 的退化。
  non_examples:
  - 直线过原点时仍按两个非零截距构造三角形面积。
