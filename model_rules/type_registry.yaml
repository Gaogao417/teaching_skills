version: 1
description: 模型规则检索与组合使用的轻量语义类型表。
types:
  Point2D:
    category: coordinate
    aliases:
    - 点
    - 坐标点
    - 点坐标
    - 动点
    - 待求点
    - 候选点
    - 第三点
    description: 坐标平面中的一个点。
  CandidateSet<Point2D>:
    category: collection
    aliases:
    - 候选点集
    - 多解点
    - 满足条件的点
    - 所有可能点
    - 点集
    - 面积方程候选点
    can_feed:
    - Point2D
    requires:
    - 筛选或分支
    description: 有限个候选坐标点；接到单个坐标点时必须先说明筛选、过滤或分支。
  LinearFunction:
    category: function
    aliases:
    - 一次函数
    - 一次函数解析式
    - y=kx+b
    - 非竖直直线
    - 动点轨迹
    - P所在直线
    - 直线解析式
    can_feed:
    - Line2D
    constraints:
    - 非竖直
    description: 可写成 y=kx+b 的非竖直一次函数。
  CandidateSet<LinearFunction>:
    category: collection
    aliases:
    - 候选直线集
    - 候选一次函数
    - 两条候选直线
    - 45度候选直线
    can_feed:
    - LinearFunction
    requires:
    - 筛选或分支
    description: 有限个候选一次函数；接到单个一次函数时必须先说明筛选、过滤或分支。
  InverseProportionalFunction:
    category: function
    aliases:
    - 反比例函数
    - 双曲线
    - y=k/x
    - 反比例函数解析式
    - 反比例函数图像
    - k/x图像
    description: 可写成 y=k/x 且 x 不等于 0 的反比例函数。
  Line2D:
    category: coordinate
    aliases:
    - 直线
    - 平面直线
    - 坐标直线
    description: 坐标平面中的直线，包含竖直直线。
  PointPair2D:
    category: coordinate
    aliases:
    - 点对
    - 坐标点对
    - C和D
    - 候选点对
    description: 一组相关坐标点，通常表示 (C,D) 这样的待求点对。
  CandidateSet<PointPair2D>:
    category: collection
    aliases:
    - 候选点对集
    - 多组点对
    - 所有可能的C和D
    - 候选C和D
    - 矩形菱形候选点对
    - 存在性候选点对
    can_feed:
    - PointPair2D
    requires:
    - 筛选或分支
    description: 有限个候选点对；接到单个点对时必须先说明筛选、过滤或分支。
  Area:
    category: measure
    aliases:
    - 面积
    - 三角形面积
    - 目标面积
    - 矩形面积
    - 坐标轴三角形面积
    - 坐标轴围成三角形面积
    description: 非负面积量。
  IntervalSet:
    category: set
    aliases:
    - 解集
    - 区间
    - 自变量取值范围
    - x取值范围
    - 不等式解集
    description: 数轴上的区间集合。
  Equation:
    category: algebra
    aliases:
    - 方程
    - 关系式
    - 等量关系
    description: 代数方程或等量关系。
  Constraint:
    category: rule
    aliases:
    - 约束
    - 筛选条件
    - 条件
    - 题设条件
    - 象限筛选
    - k的符号
    description: 限制关系、参数或候选结果的条件。
  PositionConstraint:
    category: rule
    aliases:
    - 位置条件
    - 象限条件
    - 在线段上
    - 在第一象限
    - 横坐标范围
    - 动点筛选
    can_feed:
    - Constraint
    description: 几何位置或坐标位置筛选条件。
  QuadrilateralConstraint:
    category: rule
    aliases:
    - 四边形条件
    - 平行四边形条件
    - 固定顺序
    - 四点构成
    - 矩形条件
    - 菱形条件
    can_feed:
    - Constraint
    description: 描述四边形关系或顶点顺序约定的条件。
compatibility:
- from: LinearFunction
  to: Line2D
  requires:
  - 非竖直
- from: CandidateSet<Point2D>
  to: Point2D
  requires:
  - 筛选或分支
- from: CandidateSet<LinearFunction>
  to: LinearFunction
  requires:
  - 筛选或分支
- from: CandidateSet<PointPair2D>
  to: PointPair2D
  requires:
  - 筛选或分支
- from: PositionConstraint
  to: Constraint
  requires: []
- from: QuadrilateralConstraint
  to: Constraint
  requires: []
construction_rules:
- output: LinearFunction
  from:
  - Point2D
  - Point2D
  requires:
  - 两个点的横坐标不同
