meta:
  title: "一次函数过两点求解析式 · 专题练习（教师版）"
  subtitle: "待定系数法 · 代入检验 · 坐标轴面积"
  grade: "八年级"
  subject: "数学"
  duration: "25分钟"
  total_points: 54
  version: "teacher"
  source_artifacts:
    structure_analysis: "examples/linear-function/01-structure-analysis.md"
    explanation: "examples/linear-function/02-explanation.assignment.yaml"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "choice"
    title: "一、选择题（每题 4 分，共 12 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "choice"
        id: "c1"
        points: 4
        stem: "一次函数 $y = kx + b$ 的图像经过点 $(2, 7)$，则下列等式成立的是"
        choices:
          A: "$k + b = 7$"
          B: "$2k + b = 7$"
          C: "$2b + k = 7$"
          D: "$k \\cdot 2 \\cdot b = 7$"
        answer: "B"
        explanation: "将 $x = 2, y = 7$ 代入 $y = kx + b$，得 $2k + b = 7$。"
        teaching:
          teaching_goal: "理解「经过点 = 坐标满足解析式」"
          expected_blocker: "混淆 $x$ 和 $y$ 的位置"
          mastery_band: "A"
          complexity_note: "纯代入，不涉及方程组"

      - type: "choice"
        id: "c2"
        points: 4
        stem: "一次函数 $y = kx + b$ 的图像经过点 $(1, 5)$ 和 $(-1, 1)$，则 $k$ 的值为"
        choices:
          A: "$1$"
          B: "$2$"
          C: "$3$"
          D: "$4$"
        answer: "B"
        explanation: |
          代入 $(1,5)$：$k + b = 5$；代入 $(-1,1)$：$-k + b = 1$。
          两式相减：$2k = 4$，$k = 2$。
        teaching:
          teaching_goal: "待定系数法消元求 $k$"
          expected_blocker: "消元时符号出错"
          mastery_band: "B"
          complexity_note: "二元一次方程组，整数消元"

      - type: "choice"
        id: "c3"
        points: 4
        stem: "直线 $y = 4x$ 与坐标轴围成的三角形面积为"
        choices:
          A: "$4$"
          B: "$8$"
          C: "$16$"
          D: "$0$"
        answer: "D"
        explanation: "$y = 4x$ 是正比例函数，$b = 0$，过原点。与两轴交点均为 $(0,0)$，围不成三角形，面积为 $0$。"
        teaching:
          teaching_goal: "识别 $b = 0$ 的退化情形"
          expected_blocker: "机械套用面积公式"
          mastery_band: "C"
          complexity_note: "退化识别，与原题核心陷阱一致"

  - id: "fillin"
    title: "二、填空题（每题 4 分，共 12 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "fillin"
        id: "f1"
        points: 4
        stem: "一次函数 $y = -x + 5$ 的图像经过点 $(3, \\underline{\\quad\\quad})$。"
        answer: "$2$"
        explanation: "$y = -3 + 5 = 2$。"
        teaching:
          teaching_goal: "已知 $x$ 代入求 $y$"
          mastery_band: "A"

      - type: "fillin"
        id: "f2"
        points: 4
        stem: "一次函数 $y = kx + b$ 过点 $(0, 1)$ 和 $(1, 4)$，则 $k = $ \\underline{\\quad\\quad}，$b = $ \\underline{\\quad\\quad}。"
        answer: "$k = 3, b = 1$"
        explanation: "$(0,1)$ 代入得 $b = 1$；$(1,4)$ 代入得 $k + 1 = 4$，$k = 3$。"
        teaching:
          teaching_goal: "利用 $(0, b)$ 直接得截距"
          mastery_band: "B"

      - type: "fillin"
        id: "f3"
        points: 4
        stem: "直线 $y = -3x + 6$ 与坐标轴围成的三角形面积为 \\underline{\\quad\\quad}。"
        answer: "$6$"
        explanation: |
          令 $y = 0$：$-3x + 6 = 0$，$x = 2$；令 $x = 0$：$y = 6$。
          $S = \frac{1}{2} \times 2 \times 6 = 6$。
        teaching:
          teaching_goal: "标准面积计算（$b \\neq 0$）"
          mastery_band: "B"

  - id: "problems"
    title: "三、解答题（每题 10 分，共 30 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "p1"
        points: 10
        label: "第 1 题"
        stem_latex: "已知一次函数 $y = kx + b$ 的图像经过点 $A(2, 7)$ 和点 $B(-1, 1)$。\\begin{enumerate}[label=(\\arabic*)] \\item 求这个一次函数的解析式； \\item 判断点 $C(3, 9)$ 是否在该函数的图像上。 \\end{enumerate}"
        subquestions:
          - latex: "求这个一次函数的解析式；"
          - latex: "判断点 $C(3, 9)$ 是否在该函数的图像上。"
        answer: "(1) $y = 2x + 3$；(2) 在图像上。"
        explanation: |
          (1) 代入 $A(2,7)$：$2k + b = 7$。代入 $B(-1,1)$：$-k + b = 1$。
          两式相减：$3k = 6$，$k = 2$，$b = 3$。解析式 $y = 2x + 3$。
          (2) $x = 3$ 时 $y = 2 \times 3 + 3 = 9$，与点 $C$ 的纵坐标一致，在图像上。
        solution_steps:
          - title: "代入列方程组"
            content: "代入 $(2,7)$ 得 $2k + b = 7$，代入 $(-1,1)$ 得 $-k + b = 1$。"
          - title: "消元求解"
            content: "两式相减：$3k = 6$，$k = 2$。回代：$b = 3$。"
          - title: "检验点 C"
            content: "将 $x = 3$ 代入 $y = 2x + 3 = 9$，等于 $C$ 的纵坐标，在图像上。"
        teaching:
          teaching_goal: "完整待定系数法 + 代入检验"
          expected_blocker: "消元时符号出错"
          mastery_band: "B"
        layout:
          avoid_break: true

      - type: "problem"
        id: "p2"
        points: 10
        label: "第 2 题"
        stem_latex: "已知一次函数 $y = kx + b$ 的图像经过点 $A(0, 4)$ 和点 $B(3, -2)$。\\begin{enumerate}[label=(\\arabic*)] \\item 求解析式； \\item 求该函数图像与 $x$ 轴的交点坐标。 \\end{enumerate}"
        subquestions:
          - latex: "求解析式；"
          - latex: "求该函数图像与 $x$ 轴的交点坐标。"
        answer: "(1) $y = -2x + 4$；(2) $(2, 0)$。"
        explanation: |
          (1) $(0,4)$ 在 $y$ 轴上，直接得 $b = 4$。$(3,-2)$ 代入：$3k + 4 = -2$，$k = -2$。
          解析式 $y = -2x + 4$。
          (2) 令 $y = 0$：$-2x + 4 = 0$，$x = 2$。交点 $(2, 0)$。
        solution_steps:
          - title: "利用 $y$ 轴上的点得 $b$"
            content: "$(0, 4)$ 代入得 $b = 4$。"
          - title: "求 $k$"
            content: "$(3, -2)$ 代入：$3k + 4 = -2$，$k = -2$。"
          - title: "求 $x$ 轴交点"
            content: "令 $y = 0$：$-2x + 4 = 0$，$x = 2$。"
        teaching:
          teaching_goal: "利用 $y$ 轴上的点简化计算"
          expected_blocker: "不利用 $(0, b)$ 的特殊性"
          mastery_band: "B"
        layout:
          avoid_break: true

      - type: "problem"
        id: "p3"
        points: 10
        label: "第 3 题"
        stem_latex: "已知一次函数 $y = kx + b$ 的图像经过点 $A(1, 2)$ 和点 $B(-2, -4)$。\\begin{enumerate}[label=(\\arabic*)] \\item 求解析式； \\item 求该函数图像与坐标轴的交点坐标； \\item 求图像与坐标轴围成的三角形面积。 \\end{enumerate}"
        subquestions:
          - latex: "求解析式；"
          - latex: "求该函数图像与坐标轴的交点坐标；"
          - latex: "求图像与坐标轴围成的三角形面积。"
        answer: "(1) $y = 2x$；(2) 与两轴交点均为 $(0, 0)$；(3) 面积为 $0$。"
        explanation: |
          (1) 代入得 $k + b = 2$，$-2k + b = -4$。相减：$3k = 6$，$k = 2$，$b = 0$。
          解析式 $y = 2x$（正比例函数，过原点）。
          (2) 令 $y = 0$：$x = 0$；令 $x = 0$：$y = 0$。两交点重合于原点。
          (3) 两个交点重合，不围成三角形，面积为 $0$。
        solution_steps:
          - title: "求解析式"
            content: "$k = 2, b = 0$，$y = 2x$。注意 $b = 0$！"
          - title: "求交点"
            content: "与 $x$ 轴交点 $(0, 0)$，与 $y$ 轴交点 $(0, 0)$，重合。"
          - title: "判断面积"
            content: "两交点重合，围不成三角形，$S = 0$。"
        teaching:
          teaching_goal: "含退化情形的完整流程"
          expected_blocker: "第(3)问机械套面积公式"
          mastery_band: "C"
        layout:
          avoid_break: true

  - id: "answer-key"
    title: "参考答案"
    type: "answer_key"
    visibility: "teacher"
    layout:
      break_before: true
    blocks:
      - type: "step"
        id: "ak-choice"
        title: "选择题"
        content: |
          1. B（$2k + b = 7$）
          2. B（$k = 2$）
          3. D（$b = 0$，面积为 $0$）

      - type: "step"
        id: "ak-fillin"
        title: "填空题"
        content: |
          1. $2$
          2. $k = 3, b = 1$
          3. $6$

      - type: "step"
        id: "ak-problem"
        title: "解答题"
        content: |
          第 1 题：(1) $y = 2x + 3$；(2) $x = 3$ 时 $y = 9$，点 $C$ 在图像上。
          第 2 题：(1) $y = -2x + 4$；(2) $(2, 0)$。
          第 3 题：(1) $y = 2x$；(2) 两交点均为 $(0, 0)$；(3) $S = 0$。
