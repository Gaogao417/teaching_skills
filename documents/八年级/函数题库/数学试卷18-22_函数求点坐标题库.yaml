  - id: T20-Q22
    source_ref: {task: 20, rendered_page: 6, printed_page: 4, question_no: 22}
    type: 解答题
    topic_tags: [一次函数, 数据建模, 分段决策, 交通流量]
    stem: 某条东西方向道路双向共有三条车道，在早晚高峰经常会拥堵。数学研究小组希望改善道路拥堵情况，他们对该路段的交通量（辆/分钟）和时间进行统计分析，得到表格，并发现时间和交通量的变化规律符合一次函数的特征。
    given_data:
      time_x: [8时, 11时, 14时, 17时, 20时]
      y1_自西向东交通量_辆每分钟: [10, 16, 22, 28, 34]
      y2_自东向西交通量_辆每分钟: [25, 22, 19, 16, 13]
    subquestions:
      - 请用一次函数分别表示 y1 与 x、y2 与 x 之间的函数关系（不写定义域）。
      - 如图，同学们希望设置可变车道来改善拥堵情况，根据车流量情况改变可变车道的行车方向。单位时间内东西向交通总量为 y0=y1+y2，车流量大的方向交通量为 vm；当 vm≥2/3y0，需使可变车道行车方向与拥挤方向相同。该路段从 8 时至 20 时，何时设置可变车道行车方向以缓解交通拥堵，并说明理由。
    difficulty: hard
    difficulty_reason: 需要由表格建一次函数模型，再比较不同时段方向流量并作决策。
    review_flags: [condition_text_review]

