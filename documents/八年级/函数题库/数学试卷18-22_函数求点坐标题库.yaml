  - id: T19-Q22
    source_ref: {task: 19, rendered_page: 4, printed_page: 4, question_no: 22}
    type: 解答题
    topic_tags: [一次函数, 实际问题, 函数解析式, 速率问题, 输液模型]
    stem: 为提高控制输液从而减少因差异导致的药效不良事件，医疗输液器中的滴壶调节器从滚轮式改进为掣扣式的控制式。小明发现，在相同挡位下，不同粘度的液体流速存在差异，于是展开实验研究。（实验假设：对于掣扣式输液器设定的任意一个挡位，同样液体的输液速度保持恒定。）
    subquestions:
      - 小明用掣扣式输液器设定每小时 120 毫升的档位测试液体 A 的流速，输液段内初始药液量为 250 毫升，得到输液段剩余药液量 y（毫升）和时间 x（分钟）之间的关系如图 3 所示。求 y 关于 x 的函数解析式（不写定义域）。
      - 判断液体 A 的实际流速是否与设定流速（120 毫升/小时）一致；若不一致，假设实际流速与设定流速成正比，求要达到每小时 120 毫升的流速应设定为多少毫升/小时。
      - 用相同档位测试液体 B 和液体 C 的实际流速，发现液体 B 的流速比液体 C 每小时快 60 毫升，且输完 250 毫升液体 C 所需时间是输完 200 毫升液体 B 所需时间的 2 倍，求该档位下液体 B 和液体 C 的实际流速。
    difficulty: hard
    difficulty_reason: 需要从图像建立一次函数，再结合单位换算、比例和方程解决实际速率问题。
    review_flags: [device_name_review]

