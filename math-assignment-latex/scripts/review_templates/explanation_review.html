<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Explanation Review</title>
    <link rel="stylesheet" href="/static/review.css">
  </head>
  <body>
    <main class="app-shell explanation-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Explanation Review</p>
          <h1 id="doc-title">讲义审核</h1>
          <p id="doc-path" class="muted"></p>
        </div>
        <div class="toolbar">
          <button id="save-reviewed" class="btn primary" type="button">保存 reviewed YAML</button>
          <button id="validate-yaml" class="btn" type="button">验证 YAML</button>
          <button id="render-latex" class="btn" type="button">渲染 LaTeX</button>
        </div>
      </header>

      <section class="workspace three-pane">
        <aside class="panel section-panel">
          <div class="panel-title">
            <h2>讲义单元</h2>
          </div>
          <div id="section-list" class="card-list"></div>
        </aside>

        <section class="panel flow-panel">
          <div class="panel-title">
            <h2 id="section-title">教学流</h2>
            <span id="section-meta" class="muted"></span>
          </div>
          <div id="block-flow" class="block-flow"></div>
        </section>

        <section class="panel editor-panel">
          <div class="panel-title">
            <h2 id="editor-title">块编辑</h2>
            <span id="editor-meta" class="muted"></span>
          </div>
          <div id="editor" class="editor-body"></div>
        </section>
      </section>

      <section class="bottom-grid">
        <section class="panel agent-panel">
          <div class="panel-title">
            <h2>给 agent 修改讲义</h2>
          </div>
          <textarea id="agent-instruction" rows="4" placeholder="写清楚希望 agent 改哪个讲义单元或 block。"></textarea>
          <button id="save-agent-request" class="btn" type="button">保存修改指令</button>
        </section>

        <section class="panel output-panel">
          <div class="panel-title">
            <h2>输出</h2>
            <button id="compile-pdf" class="btn small" type="button" disabled>编译 PDF</button>
          </div>
          <pre id="result-output"></pre>
        </section>
      </section>
    </main>
    <script src="/static/explanation_review.js"></script>
  </body>
</html>
