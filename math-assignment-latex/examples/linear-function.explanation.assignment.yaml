meta:
  title: "一次函数概念辨析"
  subtitle: "图像与解析式 · 讲解"
  grade: "八年级"
  subject: "数学"
  version: "teacher"
  show_answers: true
  source_artifacts:
    structure_analysis: "artifacts/structure-analysis/一次函数概念辨析-01-structure-analysis.md"

render:
  template: "exam-zh-explanation"
  paper_size: "a4paper"

sections:
  - id: "original"
    title: "原题"
    type: "explanation"
    visibility: "both"
    layout:
      break_before: false
    blocks:
      - type: "key_idea"
        id: "orig"
        title: "原题"
        content: "已知一次函数 $y=kx+b$ 的图像经过点 $(2,5)$ 和点 $(-1,-1)$，求 $k$ 和 $b$ 的值。"

  - id: "breakdown"
    title: "一、先把题目拆开"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "route"
        id: "task"
        steps:
          - "已知：两个点的坐标 $(2,5)$ 和 $(-1,-1)$"
          - "要求：求 $k$ 和 $b$"
          - "关键词：一次函数、经过点、待定系数法"
          - "忽略：无"

  - id: "route-section"
    title: "二、解题路线"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "route"
        id: "route"
        steps:
          - "将两个点代入 $y=kx+b$，列方程组"
          - "解方程组，求出 $k$ 和 $b$"
          - "写出最终解析式并检验"

  - id: "key-idea"
    title: "三、关键想法"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "key_idea"
        id: "ki"
        content: "一次函数有两个未知系数 $k$ 和 $b$，两个独立条件可以确定它们。将点的坐标代入，得到关于 $k, b$ 的二元一次方程组。"

  - id: "solution"
    title: "四、标准解法"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "step"
        id: "s1"
        title: "代入列方程"
        content: "将 $(2,5)$ 代入：$5 = 2k + b$。将 $(-1,-1)$ 代入：$-1 = -k + b$。"
      - type: "step"
        id: "s2"
        title: "解方程组"
        content: "两式相减：$6 = 3k$，所以 $k = 2$。代回：$5 = 4 + b$，所以 $b = 1$。"
        why: "待定系数法的核心是：用已知条件确定未知系数。"
      - type: "step"
        id: "s3"
        title: "写出答案"
        content: "$k = 2, b = 1$，即 $y = 2x + 1$。"
        substeps:
          - "检验：$(2, 2\\times2+1) = (2,5)$ ✓"
          - "检验：$(-1, 2\\times(-1)+1) = (-1,-1)$ ✓"

  - id: "mistakes"
    title: "五、易错提醒"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "mistake"
        id: "m1"
        title: "代入时符号出错"
        content: "将 $(-1,-1)$ 代入 $y=kx+b$ 时，容易写成 $-1 = k + b$（漏掉负号）。正确应为 $-1 = -k + b$。"
      - type: "mistake"
        id: "m2"
        title: "忘记检验"
        content: "求出 $k, b$ 后应代回原点检验，避免计算错误。"

  - id: "questions"
    title: "六、边讲边问"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "hint"
        id: "q1"
        content: "如果有三个点都满足 $y=2x+1$，还需要全部代入吗？"
        level: 1
      - type: "hint"
        id: "q2"
        content: "如果只给你一个点，能唯一确定 $k$ 和 $b$ 吗？"
        level: 1

  - id: "summary"
    title: "七、一句话总结"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "key_idea"
        id: "sum"
        content: "待定系数法 = 代入已知点 → 列方程组 → 解出系数 → 写出解析式。"

  - id: "teacher-notes"
    title: "教师备注"
    type: "explanation"
    visibility: "teacher"
    layout:
      break_before: true
    blocks:
      - type: "key_idea"
        id: "tn1"
        content: "教学目标：让学生理解待定系数法的基本思路，能独立完成两点求解析式。"
        teaching:
          teaching_goal: "待定系数法两点求解析式"
          expected_blocker: "方程组求解出错，负号代入出错"
          mastery_band: "B"
