meta:
  title: "一次函数专题练习"
  subtitle: "图像与解析式"
  grade: "八年级"
  subject: "数学"
  duration: "20分钟"
  total_points: 24
  version: "student"
  show_answers: false
  source_artifacts:
    structure_analysis: "artifacts/structure-analysis/一次函数概念辨析-01-structure-analysis.md"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  show_seal_line: false
  answer_key_position: "after_page_break"

sections:
  - id: "practice-main"
    title: "一、核心练习"
    type: "practice"
    visibility: "student"
    layout:
      break_before: false
      avoid_break: false
    blocks:
      - type: "choice"
        id: "q1"
        points: 4
        title: "第 1 题"
        stem: "函数 $y=2x-1$ 的图像经过下列哪个点？"
        choices:
          A: "$(0,1)$"
          B: "$(1,1)$"
          C: "$(1,0)$"
          D: "$(-1,1)$"
        answer: "B"
        explanation: "代入 $x=1$，得 $y=2\\times1-1=1$，所以 $(1,1)$ 在图像上。"
        hints:
          - content: "先把点的横坐标代入解析式。"
          - content: "算出的 $y$ 值要和点的纵坐标一致。"
        answer_space:
          type: "blank"
          height: "0mm"
        teaching:
          teaching_goal: "检查学生是否会用代入法验证点在函数图像上。"
          expected_blocker: "学生可能把横坐标和纵坐标代反。"
          mastery_band: "B"
          upgrade_rule: "若能独立代入并解释原因，进入换问法练习。"
          downgrade_rule: "若仍代错坐标，回到坐标点识别。"

      - type: "fillin"
        id: "q2"
        points: 4
        title: "第 2 题"
        stem: "一次函数 $y=-x+3$ 与 $x$ 轴的交点坐标是 \\underline{\\hspace{2cm}}。"
        answer: "$(3,0)$"
        fillin_type: "line"
        teaching:
          teaching_goal: "检查学生是否会求函数与坐标轴交点。"
          expected_blocker: "可能忘记令 $y=0$。"
          mastery_band: "B"
          upgrade_rule: "若正确，练习两直线交点。"
          downgrade_rule: "若不会，回到一次函数与坐标轴交点的专项训练。"

      - type: "problem"
        id: "q3"
        points: 8
        title: "第 3 题"
        stem: "已知一次函数 $y=kx+b$ 的图像经过点 $(2,5)$ 和点 $(-1,-1)$，求 $k$ 和 $b$ 的值。"
        answer: "$k=2, b=1$"
        explanation: "将两个点代入 $y=kx+b$ 得方程组。"
        solution_steps:
          - title: "列方程组"
            content: "将 $(2,5)$ 代入得 $5=2k+b$；将 $(-1,-1)$ 代入得 $-1=-k+b$。"
          - title: "解方程组"
            content: "两式相减得 $6=3k$，所以 $k=2$。代回得 $b=1$。"
          - title: "写出答案"
            content: "$k=2, b=1$，即 $y=2x+1$。"
            why: "待定系数法求一次函数解析式是核心方法。"
        answer_space:
          type: "lines"
          height: "45mm"
        teaching:
          teaching_goal: "检查待定系数法掌握情况。"
          expected_blocker: "列方程组时符号出错，尤其第二个点代入时 $-1$ 的处理。"
          mastery_band: "C"
          upgrade_rule: "若正确且步骤清晰，给含参数的变式。"
          downgrade_rule: "若方程组解错，先复习二元一次方程组。"

      - type: "choice"
        id: "q4"
        points: 4
        title: "第 4 题"
        stem: "一次函数 $y=-2x+4$ 的图像不经过第 \\underline{\\hspace{1cm}} 象限。"
        choices:
          A: "一"
          B: "二"
          C: "三"
          D: "四"
        answer: "C"
        explanation: "$k=-2<0, b=4>0$，图像过一、二、四象限，不过三象限。"
        teaching:
          teaching_goal: "检查学生对 $k, b$ 符号与象限关系的理解。"
          expected_blocker: "混淆 $k$ 的正负与象限的对应关系。"
          mastery_band: "C"
          upgrade_rule: "若能快速判断，给 $k, b$ 含参数的讨论题。"
          downgrade_rule: "若判断错误，先画 $k$ 正/负、$b$ 正/负的四组典型图像。"

  - id: "answer-key"
    title: "二、参考答案"
    type: "answer_key"
    visibility: "student"
    layout:
      break_before: true
    blocks:
      - type: "step"
        id: "ak1"
        title: "第 1 题"
        content: "选 B。代入 $x=1$，得 $y=2\\times1-1=1$，即点 $(1,1)$ 在图像上。"
      - type: "step"
        id: "ak2"
        title: "第 2 题"
        content: "$(3,0)$。令 $y=0$，则 $-x+3=0$，$x=3$。"
      - type: "step"
        id: "ak3"
        title: "第 3 题"
        content: "$k=2, b=1$。由方程组 $\\begin{cases}2k+b=5\\\\-k+b=-1\\end{cases}$ 解得。"
      - type: "step"
        id: "ak4"
        title: "第 4 题"
        content: "选 C。$k=-2<0, b=4>0$，图像过一、二、四象限。"
