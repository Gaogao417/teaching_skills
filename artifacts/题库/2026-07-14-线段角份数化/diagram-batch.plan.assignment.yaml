  blocks:
  - type: problem
    id: Q001
    points: 10
    label: 直接比例求第一部分
    stem_latex: '点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $AB:BC=3:5$，且 $AC=32$，求 $AB$。


      完成三格填空：


      ① 在图上把 $AB$ 标为 \underline{\qquad} 份，把 $BC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 3，5；② $\dfrac{AB}{AC}=\dfrac{3}{8}$；③ $12$。
    explanation: 先把两部分标成 3 份和 5 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 3 份，第二部分标 5 份，总份数为 8。
    - title: 写目标比例
      content: $\dfrac{AB}{AC}=\dfrac{3}{8}$。
    - title: 填答案
      content: 所求为 $12$。
    teaching:
      teaching_goal: 由部分比得到总份数，再求第一部分
      source_relations:
      - segment_angle_share_with_proportion_tool
      expected_blocker: 没有先看目标量，或把方程系数直接抄成份数。
      entry_point: mark_shares_then_ratio
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 每题只求一个量，只用一层份数或一次反向转换。
      upgrade_rule: 能在图上正确标份数，并写出目标量对已知对应量的比例。
      fallback_move: 先圈出整体，再确认两个部分是否组成这个整体。
    diagram_slot:
      slot_id: question_bank.segment_angle.q001.prompt
      diagram_ref: question_bank.segment.angle.q001.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: Q001 学生图：先确认整体，再在图上自行标份数。
      engine: geometric_scene
      diagram_kind: synthetic_geometry
      engine_options:
        scene_payload:
          scene_code: GeometricScene[{A, B, C}, {A == {-5.25, -0.2}, C == {5.2, -0.166667}, Element[B, Line[{A, C}]], 5 EuclideanDistance[A, B] == 3 EuclideanDistance[B, C], EuclideanDistance[A, B] > 0, EuclideanDistance[B, C] > 0}]
          points:
          - A
          - B
          - C
          point_roles:
            anchors:
            - A
            - C
            constructed:
            - B
            auxiliary: []
          diagram_spec:
            type: synthetic_geometry
            segments:
            - from: A
              to: C
            labels:
              A:
                text: A
                placement: below left
              B:
                text: B
                placement: below
              C:
                text: C
                placement: below right
            constraints:
            - B lies strictly between A and C
            teaching_focus:
            - identify the whole AC and its two parts AB, BC
          rationale: 题干已知对象构成独立 prompt 场景；不显示份数、推导或答案。
          model_used: deterministic-segment-angle-question-bank
          model_attempts: []
        seed: 31001
      teaching_intent: practice_prompt
      problem_context:
        stem_latex: 点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $AB:BC=3:5$，且 $AC=32$，求 $AB$。
