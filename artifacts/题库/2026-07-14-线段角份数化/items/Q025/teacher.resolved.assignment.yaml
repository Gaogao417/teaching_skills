  - type: problem
    id: Q025
    points: 10
    label: 辨析份数标反
    stem_latex: '点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。已知 $AB:BC=4:5$，$AC=45$。小明把 $AB$ 标成 $5$ 份、$BC$ 标成 $4$ 份。判断他的标法并求 $AB$。


      完成三格填空：


      ① 在图上把 $AB$ 标为 \underline{\qquad} 份，把 $BC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 4，5；小明的标法错误；② $\dfrac{AB}{AC}=\dfrac{4}{9}$；③ $20$。
    explanation: 先把两部分标成 4 份和 5 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 4 份，第二部分标 5 份，总份数为 9。
    - title: 写目标比例
      content: $\dfrac{AB}{AC}=\dfrac{4}{9}$。
    - title: 填答案
      content: 所求为 $20$。
    teaching:
      teaching_goal: 辨析比例份数是否被交换
      source_relations:
      - segment_angle_share_with_proportion_tool
      expected_blocker: 没有先看目标量，或把方程系数直接抄成份数。
      entry_point: mark_shares_then_ratio
      scaffold_level: medium
      variation_depth: non_example_discrimination
      complexity_note: 每题只求一个量，只用一层份数或一次反向转换。
      upgrade_rule: 能在图上正确标份数，并写出目标量对已知对应量的比例。
      fallback_move: 先圈出整体，再确认两个部分是否组成这个整体。
