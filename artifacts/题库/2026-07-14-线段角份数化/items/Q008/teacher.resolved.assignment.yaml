  - type: problem
    id: Q008
    points: 10
    label: 角的倍数关系转份数
    stem_latex: '射线 $OB$ 在 $\angle AOC$ 内部。若 $\angle AOB=2\angle BOC$，且 $\angle AOC=96^\circ$，求 $\angle BOC$。


      完成三格填空：


      ① 在图上把 $\angle AOB$ 标为 \underline{\qquad} 份，把 $\angle BOC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 2，1；② $\dfrac{\angle BOC}{\angle AOC}=\dfrac{1}{3}$；③ $32^\circ$。
    explanation: 先把两部分标成 2 份和 1 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 2 份，第二部分标 1 份，总份数为 3。
    - title: 写目标比例
      content: $\dfrac{\angle BOC}{\angle AOC}=\dfrac{1}{3}$。
    - title: 填答案
      content: 所求为 $32^\circ$。
    teaching:
      teaching_goal: 把角的倍数关系翻译成份数
      source_relations:
