    id: Q020
    points: 10
    label: 第二部分对整体补份数
    stem_latex: '射线 $OB$ 在 $\angle AOC$ 内部。若 $\angle BOC:\angle AOC=5:9$，且 $\angle AOC=162^\circ$，求 $\angle AOB$。


      完成三格填空：


      ① 在图上把 $\angle AOB$ 标为 \underline{\qquad} 份，把 $\angle BOC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 4，5；② $\dfrac{\angle AOB}{\angle AOC}=\dfrac{4}{9}$；③ $72^\circ$。
    explanation: 先把两部分标成 4 份和 5 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 4 份，第二部分标 5 份，总份数为 9。
    - title: 写目标比例
      content: $\dfrac{\angle AOB}{\angle AOC}=\dfrac{4}{9}$。
    - title: 填答案
      content: 所求为 $72^\circ$。
    teaching:
      teaching_goal: 从第二部分对整体的比例补出第一部分
