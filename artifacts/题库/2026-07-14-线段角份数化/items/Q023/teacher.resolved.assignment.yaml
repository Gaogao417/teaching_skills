  - type: problem
    id: Q023
    points: 10
    label: 复杂系数仍先交叉
    stem_latex: '点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $7AB-5BC=0$，且 $AC=72$，求 $BC$。


      完成三格填空：


      ① 在图上把 $AB$ 标为 \underline{\qquad} 份，把 $BC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 5，7；② $\dfrac{BC}{AC}=\dfrac{7}{12}$；③ $42$。
    explanation: 先把两部分标成 5 份和 7 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 5 份，第二部分标 7 份，总份数为 12。
    - title: 写目标比例
      content: $\dfrac{BC}{AC}=\dfrac{7}{12}$。
    - title: 填答案
      content: 所求为 $42$。
    teaching:
      teaching_goal: 在较大系数中保持交叉对应
      source_relations:
      - segment_angle_share_with_proportion_tool
      expected_blocker: 没有先看目标量，或把方程系数直接抄成份数。
      entry_point: mark_shares_then_ratio
