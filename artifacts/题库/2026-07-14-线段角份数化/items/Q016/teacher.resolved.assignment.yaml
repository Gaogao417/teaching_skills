    label: 已知部分角反求总角
    stem_latex: '射线 $OB$ 在 $\angle AOC$ 内部。若 $\angle AOB:\angle BOC=3:4$，且 $\angle AOB=42^\circ$，求 $\angle AOC$。


      完成三格填空：


      ① 在图上把 $\angle AOB$ 标为 \underline{\qquad} 份，把 $\angle BOC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 3，4；② $\dfrac{\angle AOC}{\angle AOB}=\dfrac{7}{3}$；③ $98^\circ$。
    explanation: 先把两部分标成 3 份和 4 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 3 份，第二部分标 4 份，总份数为 7。
    - title: 写目标比例
      content: $\dfrac{\angle AOC}{\angle AOB}=\dfrac{7}{3}$。
    - title: 填答案
      content: 所求为 $98^\circ$。
    teaching:
      teaching_goal: 已知一个部分角，反向求总角
      source_relations:
      - segment_angle_share_with_proportion_tool
      expected_blocker: 没有先看目标量，或把方程系数直接抄成份数。
