    points: 10
    label: 整体比例直接求部分
    stem_latex: '点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $AB:AC=7:12$，且 $AC=60$，求 $AB$。


      完成三格填空：


      ① 在图上把 $AB$ 标为 \underline{\qquad} 份，把 $BC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 7，5；② $\dfrac{AB}{AC}=\dfrac{7}{12}$；③ $35$。
    explanation: 先把两部分标成 7 份和 5 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 7 份，第二部分标 5 份，总份数为 12。
    - title: 写目标比例
      content: $\dfrac{AB}{AC}=\dfrac{7}{12}$。
    - title: 填答案
      content: 所求为 $35$。
