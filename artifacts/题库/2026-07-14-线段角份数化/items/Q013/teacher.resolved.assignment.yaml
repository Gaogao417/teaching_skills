  - type: problem
    id: Q013
    points: 10
    label: 移项后再转份数
    stem_latex: '点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $4AB-3BC=0$，且 $AC=35$，求 $BC$。


      完成三格填空：


      ① 在图上把 $AB$ 标为 \underline{\qquad} 份，把 $BC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 3，4；② $\dfrac{BC}{AC}=\dfrac{4}{7}$；③ $20$。
    explanation: 先把两部分标成 3 份和 4 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 3 份，第二部分标 4 份，总份数为 7。
    - title: 写目标比例
      content: $\dfrac{BC}{AC}=\dfrac{4}{7}$。
    - title: 填答案
      content: 所求为 $20$。
    teaching:
      teaching_goal: 先移项，再把系数交叉翻译成份数
      source_relations:
