  - type: problem
    id: Q002
    points: 10
    label: 直接比例求第二部分
    stem_latex: '点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $AB:BC=2:7$，且 $AC=45$，求 $BC$。


      完成三格填空：


      ① 在图上把 $AB$ 标为 \underline{\qquad} 份，把 $BC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 2，7；② $\dfrac{BC}{AC}=\dfrac{7}{9}$；③ $35$。
    explanation: 先把两部分标成 2 份和 7 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 2 份，第二部分标 7 份，总份数为 9。
    - title: 写目标比例
      content: $\dfrac{BC}{AC}=\dfrac{7}{9}$。
    - title: 填答案
      content: 所求为 $35$。
    teaching:
      teaching_goal: 看清目标量，把第二部分份数放在分子
      source_relations:
      - segment_angle_share_with_proportion_tool
      expected_blocker: 没有先看目标量，或把方程系数直接抄成份数。
