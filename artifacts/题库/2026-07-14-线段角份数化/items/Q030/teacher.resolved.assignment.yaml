    id: Q030
    points: 10
    label: 由已知角反写份数比
    stem_latex: '射线 $OB$ 在 $\angle AOC$ 内部。若 $\angle AOC=150^\circ$，$\angle AOB=60^\circ$，求 $\angle AOB:\angle BOC$。


      完成三格填空：


      ① 在图上把 $\angle AOB$ 标为 \underline{\qquad} 份，把 $\angle BOC$ 标为 \underline{\qquad} 份；


      ② 目标比例：\underline{\qquad\qquad\qquad}；\n\n③ 答案：\underline{\qquad\qquad}。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 3
    answer: ① 2，3；② $\angle AOB:\angle BOC=2:3$；③ $2:3$。
    explanation: 先把两部分标成 2 份和 3 份，再写目标量对已知对应量的比例。
    solution_steps:
    - title: 标份数
      content: 第一部分标 2 份，第二部分标 3 份，总份数为 5。
    - title: 写目标比例
      content: $\angle AOB:\angle BOC=2:3$。
    - title: 填答案
      content: 所求为 $2:3$。
    teaching:
      teaching_goal: 由总角和一个部分角反写两部分份数比
      source_relations:
      - segment_angle_share_with_proportion_tool
      expected_blocker: 没有先看目标量，或把方程系数直接抄成份数。
      entry_point: mark_shares_then_ratio
      scaffold_level: medium
      variation_depth: reverse_construct
      complexity_note: 每题只求一个量，只用一层份数或一次反向转换。
      upgrade_rule: 能在图上正确标份数，并写出目标量对已知对应量的比例。
      fallback_move: 先圈出整体，再确认两个部分是否组成这个整体。
