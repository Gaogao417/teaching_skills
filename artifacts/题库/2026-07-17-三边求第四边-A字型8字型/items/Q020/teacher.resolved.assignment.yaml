    id: Q020
    points: 10
    label: 已知三边求第四边
    stem_latex: '如图，$A,P,C$ 三点共线，$B,P,D$ 三点共线，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。

      已知 $BP=12$，$PD=14$，$AB=36$，求 $CD$。'
    hints: []
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $CD=42$。
    explanation: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。先算 $\dfrac{BP}{PD}=\dfrac{12}{14}=\dfrac{6}{7}$。约分后，$CD$ 对应 7 份，$AB$ 对应 6 份。$CD=AB\times\dfrac{7}{6}=36\times\dfrac{7}{6}=42$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{BP}{PD}=\dfrac{12}{14}=\dfrac{6}{7}$。
    - title: 标份数
      content: 约分后，$CD$ 对应 7 份，$AB$ 对应 6 份。
    - title: 按份数公式求边
      content: $CD=AB\times\dfrac{7}{6}=36\times\dfrac{7}{6}=42$。
