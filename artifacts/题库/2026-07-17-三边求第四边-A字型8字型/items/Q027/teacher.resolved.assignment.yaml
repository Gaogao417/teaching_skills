    id: Q027
    points: 10
    label: 已知三边求第四边
    stem_latex: '如图，$P,A,C$ 三点共线，$P,B,D$ 三点共线，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。

      已知 $PB=16$，$PD=30$，$PC=30$，求 $PA$。'
    hints: []
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $PA=16$。
    explanation: 已知边与未知边都不在平行线段 $AB,CD$ 上，求两侧对应线段的比。先算 $\dfrac{PB}{PD}=\dfrac{16}{30}=\dfrac{8}{15}$。约分后，$PA$ 对应 8 份，$PC$ 对应 15 份。$PA=PC\times\dfrac{8}{15}=30\times\dfrac{8}{15}=16$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边都不在平行线段 $AB,CD$ 上，求两侧对应线段的比。
    - title: 计算并约分
      content: $\dfrac{PB}{PD}=\dfrac{16}{30}=\dfrac{8}{15}$。
    - title: 标份数
      content: 约分后，$PA$ 对应 8 份，$PC$ 对应 15 份。
    - title: 按份数公式求边
      content: $PA=PC\times\dfrac{8}{15}=30\times\dfrac{8}{15}=16$。
    teaching:
      teaching_goal: 已知三条对应边，先判断比例类型，再标份数求第四边
