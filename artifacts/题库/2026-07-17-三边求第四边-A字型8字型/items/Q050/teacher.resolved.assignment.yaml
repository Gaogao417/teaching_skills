    label: 已知三边求第四边
    stem_latex: |-
      如图，$A,P,C$ 三点共线，$B,P,D$ 三点共线，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。
      已知 $BP=\sqrt{10}$，$PD=2\sqrt{10}$，$AB=2\sqrt{10}$，求 $CD$。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $CD=4\sqrt{10}$。
    explanation: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。先算 $\dfrac{BP}{PD}=\dfrac{\sqrt{10}}{2\sqrt{10}}=\dfrac{1}{2}$。约分后，$CD$
      对应 $2$ 份，$AB$ 对应 $1$ 份。$CD=AB\times\dfrac{2}{1}=2\sqrt{10}\times\dfrac{2}{1}=4\sqrt{10}$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{BP}{PD}=\dfrac{\sqrt{10}}{2\sqrt{10}}=\dfrac{1}{2}$。
    - title: 标份数
      content: 约分后，$CD$ 对应 $2$ 份，$AB$ 对应 $1$ 份。
    - title: 按份数公式求边
      content: $CD=AB\times\dfrac{2}{1}=2\sqrt{10}\times\dfrac{2}{1}=4\sqrt{10}$。
