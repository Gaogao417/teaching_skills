  - type: problem
    id: Q030
    points: 10
    label: 已知三边求第四边
    stem_latex: '如图，$A,P,C$ 三点共线，$B,P,D$ 三点共线，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。

      已知 $AP=22$，$PC=36$，$BP=22$，求 $PD$。'
    hints: []
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $PD=36$。
    explanation: 已知边与未知边都不在平行线段 $AB,CD$ 上，求两侧对应线段的比。先算 $\dfrac{AP}{PC}=\dfrac{22}{36}=\dfrac{11}{18}$。约分后，$PD$ 对应 18 份，$BP$ 对应 11 份。$PD=BP\times\dfrac{18}{11}=22\times\dfrac{18}{11}=36$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边都不在平行线段 $AB,CD$ 上，求两侧对应线段的比。
    - title: 计算并约分
      content: $\dfrac{AP}{PC}=\dfrac{22}{36}=\dfrac{11}{18}$。
    - title: 标份数
      content: 约分后，$PD$ 对应 18 份，$BP$ 对应 11 份。
    - title: 按份数公式求边
      content: $PD=BP\times\dfrac{18}{11}=22\times\dfrac{18}{11}=36$。
    teaching:
      teaching_goal: 已知三条对应边，先判断比例类型，再标份数求第四边
