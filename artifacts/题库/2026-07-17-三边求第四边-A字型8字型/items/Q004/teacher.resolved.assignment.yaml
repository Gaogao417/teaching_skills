    id: Q004
    points: 10
    label: 已知三边求第四边
    stem_latex: '如图，$A,P,C$ 三点共线，$B,P,D$ 三点共线，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。

      已知 $BP=6$，$PD=15$，$AB=4$，求 $CD$。'
    hints:
    - title: 起步提示
      content_latex: 先计算并约分 $\dfrac{BP}{PD}=\dfrac{6}{15}=\dfrac{2}{5}$；再按对应关系，把约分后的两份数分别标到未知边 $CD$ 和它对应的已知边 $AB$ 上。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $CD=10$。
    explanation: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。先算 $\dfrac{BP}{PD}=\dfrac{6}{15}=\dfrac{2}{5}$。约分后，$CD$ 对应 5 份，$AB$ 对应 2 份。$CD=AB\times\dfrac{5}{2}=4\times\dfrac{5}{2}=10$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{BP}{PD}=\dfrac{6}{15}=\dfrac{2}{5}$。
    - title: 标份数
      content: 约分后，$CD$ 对应 5 份，$AB$ 对应 2 份。
    - title: 按份数公式求边
      content: $CD=AB\times\dfrac{5}{2}=4\times\dfrac{5}{2}=10$。
    teaching:
      teaching_goal: 已知三条对应边，先判断比例类型，再标份数求第四边
