    points: 10
    label: 已知三边求第四边
    stem_latex: '如图，$P,A,C$ 三点共线，$P,B,D$ 三点共线，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。

      已知 $PA=3$，$PC=6$，$CD=8$，求 $AB$。'
    hints:
    - title: 起步提示
      content_latex: 先计算并约分 $\dfrac{PA}{PC}=\dfrac{3}{6}=\dfrac{1}{2}$；再按对应关系，把约分后的两份数分别标到未知边 $AB$ 和它对应的已知边 $CD$ 上。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $AB=4$。
    explanation: 已知边与未知边中出现平行线段 $CD$、$AB$，先求两个相似三角形的比。先算 $\dfrac{PA}{PC}=\dfrac{3}{6}=\dfrac{1}{2}$。约分后，$AB$ 对应 1 份，$CD$ 对应 2 份。$AB=CD\times\dfrac{1}{2}=8\times\dfrac{1}{2}=4$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $CD$、$AB$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{PA}{PC}=\dfrac{3}{6}=\dfrac{1}{2}$。
    - title: 标份数
      content: 约分后，$AB$ 对应 1 份，$CD$ 对应 2 份。
    - title: 按份数公式求边
      content: $AB=CD\times\dfrac{1}{2}=8\times\dfrac{1}{2}=4$。
    teaching:
      teaching_goal: 已知三条对应边，先判断比例类型，再标份数求第四边
      source_relations:
      - fallback:approved_2026_07_12_explanation
      expected_blocker: 没有先判断是否涉及平行线段，直接乱配比例。
      entry_point: classify_ratio_then_mark_shares
      scaffold_level: high
      variation_depth: changed_numbers
      complexity_note: 恰好给三条线段长度，只求第四条；比例可约分且答案为整数。
      fallback_move: 圈出未知边及其对应的已知边，再标约分后的份数。
