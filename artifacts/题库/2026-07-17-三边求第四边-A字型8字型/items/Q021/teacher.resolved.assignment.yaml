    id: Q021
    points: 10
    label: 已知三边求第四边
    stem_latex: '如图，$P,A,C$ 三点共线，$P,B,D$ 三点共线，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。

      已知 $PA=16$，$PC=36$，$AB=20$，求 $CD$。'
    hints: []
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $CD=45$。
    explanation: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。先算 $\dfrac{PA}{PC}=\dfrac{16}{36}=\dfrac{4}{9}$。约分后，$CD$ 对应 9 份，$AB$ 对应 4 份。$CD=AB\times\dfrac{9}{4}=20\times\dfrac{9}{4}=45$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{PA}{PC}=\dfrac{16}{36}=\dfrac{4}{9}$。
    - title: 标份数
      content: 约分后，$CD$ 对应 9 份，$AB$ 对应 4 份。
    - title: 按份数公式求边
      content: $CD=AB\times\dfrac{9}{4}=20\times\dfrac{9}{4}=45$。
