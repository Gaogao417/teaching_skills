    id: Q010
    points: 10
    label: 已知三边求第四边
    stem_latex: '如图，$A,P,C$ 三点共线，$B,P,D$ 三点共线，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。

      已知 $AP=10$，$PC=18$，$PD=18$，求 $BP$。'
    hints:
    - title: 起步提示
      content_latex: 先计算并约分 $\dfrac{AP}{PC}=\dfrac{10}{18}=\dfrac{5}{9}$；再按对应关系，把约分后的两份数分别标到未知边 $BP$ 和它对应的已知边 $PD$ 上。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $BP=10$。
    explanation: 已知边与未知边都不在平行线段 $AB,CD$ 上，求两侧对应线段的比。先算 $\dfrac{AP}{PC}=\dfrac{10}{18}=\dfrac{5}{9}$。约分后，$BP$ 对应 5 份，$PD$ 对应 9 份。$BP=PD\times\dfrac{5}{9}=18\times\dfrac{5}{9}=10$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边都不在平行线段 $AB,CD$ 上，求两侧对应线段的比。
    - title: 计算并约分
      content: $\dfrac{AP}{PC}=\dfrac{10}{18}=\dfrac{5}{9}$。
    - title: 标份数
      content: 约分后，$BP$ 对应 5 份，$PD$ 对应 9 份。
    - title: 按份数公式求边
      content: $BP=PD\times\dfrac{5}{9}=18\times\dfrac{5}{9}=10$。
    teaching:
      teaching_goal: 已知三条对应边，先判断比例类型，再标份数求第四边
      source_relations:
