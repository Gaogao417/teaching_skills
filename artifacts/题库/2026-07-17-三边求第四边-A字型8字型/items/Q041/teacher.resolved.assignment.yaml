    points: 10
    label: 已知三边求第四边
    stem_latex: |-
      如图，$P,A,C$ 三点共线，$P,B,D$ 三点共线，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。
      已知 $PB=\frac{1}{8}$，$PD=\frac{5}{8}$，$PC=\frac{15}{8}$，求 $PA$。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $PA=\frac{3}{8}$。
    explanation: 已知边与未知边都不在平行线段 $AB,CD$ 上，先求两侧对应线段的比。先算 $\dfrac{PB}{PD}=\dfrac{\frac{1}{8}}{\frac{5}{8}}=\dfrac{1}{5}$。约分后，$PA$
      对应 $1$ 份，$PC$ 对应 $5$ 份。$PA=PC\times\dfrac{1}{5}=\frac{15}{8}\times\dfrac{1}{5}=\frac{3}{8}$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边都不在平行线段 $AB,CD$ 上，先求两侧对应线段的比。
    - title: 计算并约分
      content: $\dfrac{PB}{PD}=\dfrac{\frac{1}{8}}{\frac{5}{8}}=\dfrac{1}{5}$。
    - title: 标份数
      content: 约分后，$PA$ 对应 $1$ 份，$PC$ 对应 $5$ 份。
    - title: 按份数公式求边
      content: $PA=PC\times\dfrac{1}{5}=\frac{15}{8}\times\dfrac{1}{5}=\frac{3}{8}$。
