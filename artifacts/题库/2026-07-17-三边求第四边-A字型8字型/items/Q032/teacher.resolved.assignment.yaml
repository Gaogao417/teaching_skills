    id: Q032
    points: 10
    label: 已知三边求第四边
    stem_latex: |-
      如图，$A,P,C$ 三点共线，$B,P,D$ 三点共线，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。
      已知 $AP=\sqrt{2}$，$PC=2\sqrt{2}$，$PD=6\sqrt{2}$，求 $BP$。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $BP=3\sqrt{2}$。
    explanation: 已知边与未知边都不在平行线段 $AB,CD$ 上，先求两侧对应线段的比。先算 $\dfrac{AP}{PC}=\dfrac{\sqrt{2}}{2\sqrt{2}}=\dfrac{1}{2}$。约分后，$BP$
      对应 $1$ 份，$PD$ 对应 $2$ 份。$BP=PD\times\dfrac{1}{2}=6\sqrt{2}\times\dfrac{1}{2}=3\sqrt{2}$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边都不在平行线段 $AB,CD$ 上，先求两侧对应线段的比。
    - title: 计算并约分
      content: $\dfrac{AP}{PC}=\dfrac{\sqrt{2}}{2\sqrt{2}}=\dfrac{1}{2}$。
    - title: 标份数
      content: 约分后，$BP$ 对应 $1$ 份，$PD$ 对应 $2$ 份。
    - title: 按份数公式求边
      content: $BP=PD\times\dfrac{1}{2}=6\sqrt{2}\times\dfrac{1}{2}=3\sqrt{2}$。
