    id: Q044
    points: 10
    label: 已知三边求第四边
    stem_latex: |-
      如图，$A,P,C$ 三点共线，$B,P,D$ 三点共线，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。
      已知 $AP=\frac{7}{4}$，$PC=\frac{21}{2}$，$BP=\frac{7}{2}$，求 $PD$。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $PD=21$。
    explanation: 已知边与未知边都不在平行线段 $AB,CD$ 上，先求两侧对应线段的比。先算 $\dfrac{AP}{PC}=\dfrac{\frac{7}{4}}{\frac{21}{2}}=\dfrac{1}{6}$。约分后，$PD$
      对应 $6$ 份，$BP$ 对应 $1$ 份。$PD=BP\times\dfrac{6}{1}=\frac{7}{2}\times\dfrac{6}{1}=21$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边都不在平行线段 $AB,CD$ 上，先求两侧对应线段的比。
    - title: 计算并约分
      content: $\dfrac{AP}{PC}=\dfrac{\frac{7}{4}}{\frac{21}{2}}=\dfrac{1}{6}$。
    - title: 标份数
      content: 约分后，$PD$ 对应 $6$ 份，$BP$ 对应 $1$ 份。
    - title: 按份数公式求边
      content: $PD=BP\times\dfrac{6}{1}=\frac{7}{2}\times\dfrac{6}{1}=21$。
