    points: 10
    label: 已知三边求第四边
    stem_latex: '如图，$A,P,C$ 三点共线，$B,P,D$ 三点共线，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。

      已知 $AP=8$，$PC=10$，$BP=8$，求 $PD$。'
    hints:
    - title: 起步提示
      content_latex: 先计算并约分 $\dfrac{AP}{PC}=\dfrac{8}{10}=\dfrac{4}{5}$；再按对应关系，把约分后的两份数分别标到未知边 $PD$ 和它对应的已知边 $BP$ 上。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $PD=10$。
    explanation: 已知边与未知边都不在平行线段 $AB,CD$ 上，求两侧对应线段的比。先算 $\dfrac{AP}{PC}=\dfrac{8}{10}=\dfrac{4}{5}$。约分后，$PD$ 对应 5 份，$BP$ 对应 4 份。$PD=BP\times\dfrac{5}{4}=8\times\dfrac{5}{4}=10$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边都不在平行线段 $AB,CD$ 上，求两侧对应线段的比。
    - title: 计算并约分
      content: $\dfrac{AP}{PC}=\dfrac{8}{10}=\dfrac{4}{5}$。
    - title: 标份数
      content: 约分后，$PD$ 对应 5 份，$BP$ 对应 4 份。
    - title: 按份数公式求边
      content: $PD=BP\times\dfrac{5}{4}=8\times\dfrac{5}{4}=10$。
    teaching:
      teaching_goal: 已知三条对应边，先判断比例类型，再标份数求第四边
      source_relations:
      - fallback:approved_2026_07_12_explanation
      expected_blocker: 没有先判断是否涉及平行线段，直接乱配比例。
      entry_point: classify_ratio_then_mark_shares
      scaffold_level: high
      variation_depth: changed_numbers
      complexity_note: 恰好给三条线段长度，只求第四条；比例可约分且答案为整数。
      fallback_move: 圈出未知边及其对应的已知边，再标约分后的份数。
