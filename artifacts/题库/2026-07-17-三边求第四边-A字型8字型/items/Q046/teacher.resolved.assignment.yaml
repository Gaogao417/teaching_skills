    label: 已知三边求第四边
    stem_latex: |-
      如图，$A,P,C$ 三点共线，$B,P,D$ 三点共线，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。
      已知 $BP=\sqrt{3}$，$PD=3$，$CD=12$，求 $AB$。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $AB=4\sqrt{3}$。
    explanation: 已知边与未知边中出现平行线段 $CD$、$AB$，先求两个相似三角形的比。先算 $\dfrac{BP}{PD}=\dfrac{\sqrt{3}}{3}=\dfrac{1}{\sqrt{3}}$。约分后，$AB$
      对应 $1$ 份，$CD$ 对应 $\sqrt{3}$ 份。$AB=CD\times\dfrac{1}{\sqrt{3}}=12\times\dfrac{1}{\sqrt{3}}=4\sqrt{3}$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $CD$、$AB$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{BP}{PD}=\dfrac{\sqrt{3}}{3}=\dfrac{1}{\sqrt{3}}$。
    - title: 标份数
      content: 约分后，$AB$ 对应 $1$ 份，$CD$ 对应 $\sqrt{3}$ 份。
    - title: 按份数公式求边
      content: $AB=CD\times\dfrac{1}{\sqrt{3}}=12\times\dfrac{1}{\sqrt{3}}=4\sqrt{3}$。
