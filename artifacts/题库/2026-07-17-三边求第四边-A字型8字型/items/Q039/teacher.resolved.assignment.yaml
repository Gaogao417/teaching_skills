    label: 已知三边求第四边
    stem_latex: |-
      如图，$P,A,C$ 三点共线，$P,B,D$ 三点共线，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。
      已知 $PA=\frac{7}{6}$，$PC=\frac{14}{3}$，$CD=\frac{28}{3}$，求 $AB$。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $AB=\frac{7}{3}$。
    explanation: 已知边与未知边中出现平行线段 $CD$、$AB$，先求两个相似三角形的比。先算 $\dfrac{PA}{PC}=\dfrac{\frac{7}{6}}{\frac{14}{3}}=\dfrac{1}{4}$。约分后，$AB$
      对应 $1$ 份，$CD$ 对应 $4$ 份。$AB=CD\times\dfrac{1}{4}=\frac{28}{3}\times\dfrac{1}{4}=\frac{7}{3}$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $CD$、$AB$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{PA}{PC}=\dfrac{\frac{7}{6}}{\frac{14}{3}}=\dfrac{1}{4}$。
    - title: 标份数
      content: 约分后，$AB$ 对应 $1$ 份，$CD$ 对应 $4$ 份。
    - title: 按份数公式求边
      content: $AB=CD\times\dfrac{1}{4}=\frac{28}{3}\times\dfrac{1}{4}=\frac{7}{3}$。
