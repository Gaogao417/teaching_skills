    id: Q005
    points: 10
    label: 已知三边求第四边
    stem_latex: |-
      如图，$P,A,C$ 三点共线，$P,B,D$ 三点共线，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。
      已知 $PA=6$，$PC=10$，$AB=15$，求 $CD$。
    hints:
    - title: 起步提示
      content_latex: 先计算并约分 $\dfrac{PA}{PC}=\dfrac{6}{10}=\dfrac{3}{5}$；再按对应关系，把约分后的两份数分别标到未知边
        $CD$ 和它对应的已知边 $AB$ 上。
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $CD=25$。
    explanation: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。先算 $\dfrac{PA}{PC}=\dfrac{6}{10}=\dfrac{3}{5}$。约分后，$CD$
      对应 5 份，$AB$ 对应 3 份。$CD=AB\times\dfrac{5}{3}=15\times\dfrac{5}{3}=25$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{PA}{PC}=\dfrac{6}{10}=\dfrac{3}{5}$。
    - title: 标份数
      content: 约分后，$CD$ 对应 5 份，$AB$ 对应 3 份。
    - title: 按份数公式求边
      content: $CD=AB\times\dfrac{5}{3}=15\times\dfrac{5}{3}=25$。
    teaching:
      teaching_goal: 已知三条对应边，先判断比例类型，再标份数求第四边
      source_relations:
