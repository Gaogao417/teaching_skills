    id: Q013
    points: 10
    label: 已知三边求第四边
    stem_latex: '如图，$P,A,C$ 三点共线，$P,B,D$ 三点共线，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。

      已知 $PA=8$，$PC=20$，$AB=6$，求 $CD$。'
    hints: []
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $CD=15$。
    explanation: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。先算 $\dfrac{PA}{PC}=\dfrac{8}{20}=\dfrac{2}{5}$。约分后，$CD$ 对应 5 份，$AB$ 对应 2 份。$CD=AB\times\dfrac{5}{2}=6\times\dfrac{5}{2}=15$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{PA}{PC}=\dfrac{8}{20}=\dfrac{2}{5}$。
    - title: 标份数
      content: 约分后，$CD$ 对应 5 份，$AB$ 对应 2 份。
    - title: 按份数公式求边
      content: $CD=AB\times\dfrac{5}{2}=6\times\dfrac{5}{2}=15$。
