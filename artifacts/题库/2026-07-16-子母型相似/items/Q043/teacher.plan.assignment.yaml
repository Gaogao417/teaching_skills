    points: 10
    label: 先证相似再求边
    stem_latex: '如图，在 $\triangle ABC$ 中，$\angle ABD=\angle ACB$。


      已知 $AB=\frac{7}{8}$，$AC=\frac{21}{8}$，$BC=\frac{21}{8}$。求证 $\triangle ABD\sim\triangle ACB$，并求 $BD$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    answer: $BD=\frac{7}{8}$。
    explanation: 先由等角判相似，再按同序顶点确定对应边；本题所用数值对来自 rational_multiple_pairs。
    solution_steps:
    - title: 见等角，找相似
      content: 由题设等角和构型自带的第二组等角，得 $\triangle ABD\sim\triangle ACB$。
    - title: 按顶点写对应边
      content: 三组小边与大边依次为：$AB\leftrightarrow AC$，$AD\leftrightarrow AB$，$BD\leftrightarrow BC$。
    - title: 保持比例方向一致
      content: 取 大三角形边与小三角形对应边之比，可列 $\dfrac{AC}{AB}=\dfrac{BC}{BD}$。
    - title: 代入并验算
      content: 代入已知量解得 $BD=\frac{7}{8}$；两组对应边的比均等于同一相似比。
    teaching:
      teaching_goal: 先补出第二组等角并证明相似，再求边
      source_relations:
      - explanation:nested
      - similar_triangles_corresponding_sides
      expected_blocker: 没有先锁定等角顶点，或两组比例的大小方向不一致。
      entry_point: equal_angles_to_similarity_to_correspondence
      scaffold_level: low
      variation_depth: partially_hidden
      complexity_note: 只训练 AA 判定、对应边和一层比例；不引入面积、周长或额外辅助线。
      upgrade_rule: 能独立写出同序相似式并用另一组对应边验算。
      fallback_move: 先标出两个相等角的顶点，再逐个写出对应点。
      number_selection:
        database_id: question-bank-training-numbers
        family_id: rational_multiple_pairs
        entry_id: rational-7-over-8-x-3
        selection_class: fraction_pair
