    id: Q030
    points: 10
    label: 完整判定与计算
    stem_latex: '如图，在 $\triangle ABC$ 中，$\angle ABD=\angle ACB$。


      已知 $BD=\sqrt{5}$，$BC=\sqrt{30}$，$AB=\sqrt{5}$。先证明 $\triangle ABD\sim\triangle
      ACB$，再写出对应关系并求 $AC$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    answer: $AC=\sqrt{30}$。
    explanation: 先由等角判相似，再按同序顶点确定对应边；本题所用数值对来自 radical_multiple_pairs。
    solution_steps:
    - title: 见等角，找相似
      content: 由题设等角和构型自带的第二组等角，得 $\triangle ABD\sim\triangle ACB$。
    - title: 按顶点写对应边
      content: 三组小边与大边依次为：$AB\leftrightarrow AC$，$AD\leftrightarrow AB$，$BD\leftrightarrow
        BC$。
    - title: 保持比例方向一致
      content: 取 小三角形边与大三角形对应边之比，可列 $\dfrac{BD}{BC}=\dfrac{AB}{AC}$。
    - title: 代入并验算
      content: 代入已知量解得 $AC=\sqrt{30}$；两组对应边的比均等于同一相似比。
