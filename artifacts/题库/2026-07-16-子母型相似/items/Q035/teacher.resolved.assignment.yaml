    id: Q035
    points: 10
    label: 三边求第四边
    stem_latex: '如图，在 $\triangle ABC$ 中，$\angle ABD=\angle ACB$。


      已知 $AB=\frac{1}{8}$，$AC=\frac{5}{8}$，$BC=\frac{5}{8}$，求 $BD$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    answer: $BD=\frac{1}{8}$。
    explanation: 先由等角判相似，再按同序顶点确定对应边；本题所用数值对来自 rational_multiple_pairs。
    solution_steps:
    - title: 见等角，找相似
      content: 由题设等角和构型自带的第二组等角，得 $\triangle ABD\sim\triangle ACB$。
    - title: 按顶点写对应边
      content: 三组小边与大边依次为：$AB\leftrightarrow AC$，$AD\leftrightarrow AB$，$BD\leftrightarrow
        BC$。
    - title: 保持比例方向一致
      content: 取 大三角形边与小三角形对应边之比，可列 $\dfrac{AC}{AB}=\dfrac{BC}{BD}$。
    - title: 代入并验算
      content: 代入已知量解得 $BD=\frac{1}{8}$；两组对应边的比均等于同一相似比。
