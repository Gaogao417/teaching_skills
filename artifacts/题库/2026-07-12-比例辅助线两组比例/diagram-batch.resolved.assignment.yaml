    id: Q001
    points: 10
    label: 由两组比例求 AP:PD
    stem_latex: '如图，在 $\triangle ABC$ 中，$D$ 在线段 $BC$ 上，$E$ 在线段 $AC$ 上，$AD$ 与 $BE$
      交于点 $P$。已知

      \[

      AE:EC=1:2，\qquad BD:DC=2:1，

      \]

      求 $AP:PD$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/question_bank-auxiliary-q001-solution/rendered/solution.fragment.tex
        diagram_ref: question_bank.auxiliary.q001.solution
        diagram_job_id: question_bank-auxiliary-q001-solution
        width: 60mm
        caption: Q001 教师图：过 C 作 CF 平行 AD，交 BE 于 F。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:cf706a535e9d5787c03832577679805ed6d0605bd6453c78f65a53e630114465
        packages:
        - tikz
        libraries: []
    answer: $AP:PD=3:4$。
    explanation: 代入已知比例，得 $AP:PD=3:4$。
    solution_steps:
    - title: 围三角形并作辅助线
      content: 已知比和所求比分别位于三条比例线上；按讲解中的统一动作作平行辅助线，得到两组相似三角形。
    - title: 写出比例关系
      content: 记 $x=AE/EC$，$y=AP/PD$，$z=BP/PE$，$w=BD/DC$。由两组相似消去共同的中间线段，得到 $ \dfrac{AP}{PD}=\dfrac{AE}{EC}\cdot\dfrac{BC}{BD}
        $。
    - title: 代入并化简
      content: 代入已知比例，得 $AP:PD=3:4$。
    teaching:
      teaching_goal: 根据两条已知比例线和所求比例线现场选择辅助线
      source_relations:
      - fallback:approved_2026_07_12_explanation
      expected_blocker: 只使用一组相似，或者没有把两组比例统一到同一条中间线段。
      entry_point: solve_and_check
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 只使用小整数比例、一次整段转换或一次比例方程。
      upgrade_rule: 能先写出点序或两组相似导出的比例关系，再计算。
      fallback_move: 先标出两条已知比例线和所求比例线，再围出它们形成的三角形。
