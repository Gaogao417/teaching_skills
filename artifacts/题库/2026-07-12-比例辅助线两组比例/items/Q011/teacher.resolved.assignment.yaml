    label: 由两组比例求 BP:PE
    stem_latex: '如图，在 $\triangle ABC$ 中，$D$ 在线段 $BC$ 上，$E$ 在线段 $AC$ 上，$AD$ 与 $BE$
      交于点 $P$。已知

      \[

      AE:EC=4:3，\qquad AP:PD=2:1，

      \]

      求 $BP:PE$。'
    answer_space:
