    id: Q009
    points: 10
    label: 由两组比例求 AE:EC
    stem_latex: '如图，在 $\triangle ABC$ 中，$D$ 在线段 $BC$ 上，$E$ 在线段 $AC$ 上，$AD$ 与 $BE$
      交于点 $P$。已知

      \[

      AP:PD=3:1，\qquad BD:DC=2:1，

      \]

      求 $AE:EC$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: ../../build/diagram/jobs/question_bank-auxiliary-q009-solution/rendered/solution.fragment.tex
        diagram_ref: question_bank.auxiliary.q009.solution
        diagram_job_id: question_bank-auxiliary-q009-solution
        width: 60mm
        caption: Q009 教师图：过 E 作 EF 平行 CB，交 AD 于 F。
        variant: solution
        disclosure_policy: annotated
