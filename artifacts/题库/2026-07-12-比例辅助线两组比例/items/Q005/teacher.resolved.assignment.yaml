    id: Q005
    points: 10
    label: 由两组比例求 BD:DC
    stem_latex: '如图，在 $\triangle ABC$ 中，$D$ 在线段 $BC$ 上，$E$ 在线段 $AC$ 上，$AD$ 与 $BE$
      交于点 $P$。已知

      \[

      AE:EC=3:2，\qquad AP:PD=2:1，

      \]

      求 $BD:DC$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: ../../build/diagram/jobs/question_bank-auxiliary-q005-solution/rendered/solution.fragment.tex
