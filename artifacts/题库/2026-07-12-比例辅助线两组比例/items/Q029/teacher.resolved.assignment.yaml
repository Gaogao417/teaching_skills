    label: 由两个内部比反求边上两比
    stem_latex: 如图，在 $\triangle ABC$ 中，$D\in BC$，$E\in AC$，$P=AD\cap BE$。已知 $AP:PD=3:2$、$BP:PE=3:2$，求
      $AE:EC$ 与 $BD:DC$。
