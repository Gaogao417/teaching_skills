    answer: $AE:EC=1:2$，$BD:DC=1:2$。
    explanation: 两式相除得 $x=w$，代回得 $x=w=1/2$，所以两比分别为 $1:2$。
    solution_steps:
    - title: 设未知比
      content: 设 $x=AE/EC$，$w=BD/DC$，则 $3/2=x(w+1)/w$，$3/2=w(x+1)/x$。
    - title: 利用对称性并验算
      content: 两式相除得 $x=w$，代回得 $x=w=1/2$，所以两比分别为 $1:2$。
