    label: 判断三组比例是否一致
    stem_latex: 如图，在 $\triangle ABC$ 中，$D\in BC$，$E\in AC$，$P=AD\cap BE$。给出 $AE:EC=1:2$、$AP:PD=3:4$、$BP:PE=5:1$。判断三组比例能否同时成立。
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
