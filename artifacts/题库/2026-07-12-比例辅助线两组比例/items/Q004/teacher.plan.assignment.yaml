    answer: $BP:PE=5:1$。
    explanation: 代入已知比例，得 $BP:PE=5:1$。
    solution_steps:
    - title: 围三角形并作辅助线
      content: 已知比和所求比分别位于三条比例线上；按讲解中的统一动作作平行辅助线，得到两组相似三角形。
    - title: 写出比例关系
      content: 记 $x=AE/EC$，$y=AP/PD$，$z=BP/PE$，$w=BD/DC$。由两组相似消去共同的中间线段，得到 $ \dfrac{BP}{PE}=\dfrac{BD}{DC}\cdot\dfrac{AC}{AE}
        $。
    - title: 代入并化简
      content: 代入已知比例，得 $BP:PE=5:1$。
    teaching:
