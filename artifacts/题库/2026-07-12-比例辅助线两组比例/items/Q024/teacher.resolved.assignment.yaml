        packages:
        - tikz
        libraries: []
    answer: $BD:DC=3:2$。
    explanation: 代入已知比例，得 $BD:DC=3:2$。
    solution_steps:
    - title: 围三角形并作辅助线
      content: 已知比和所求比分别位于三条比例线上；按讲解中的统一动作作平行辅助线，得到两组相似三角形。
    - title: 写出比例关系
      content: 记 $x=AE/EC$，$y=AP/PD$，$z=BP/PE$，$w=BD/DC$。由两组相似消去共同的中间线段，得到 $ w=\dfrac{zy-1}{y+1}
        $。
    - title: 代入并化简
      content: 代入已知比例，得 $BD:DC=3:2$。
    teaching:
      teaching_goal: 根据两条已知比例线和所求比例线现场选择辅助线
      source_relations:
      - fallback:approved_2026_07_12_explanation
      expected_blocker: 只使用一组相似，或者没有把两组比例统一到同一条中间线段。
      entry_point: solve_and_check
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 只使用小整数比例、一次整段转换或一次比例方程。
      upgrade_rule: 能先写出点序或两组相似导出的比例关系，再计算。
      fallback_move: 先标出两条已知比例线和所求比例线，再围出它们形成的三角形。
