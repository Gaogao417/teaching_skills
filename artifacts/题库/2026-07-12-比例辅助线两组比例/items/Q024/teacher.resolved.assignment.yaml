    id: Q024
    points: 10
    label: 由两组比例求 BD:DC
    stem_latex: '如图，在 $\triangle ABC$ 中，$D$ 在线段 $BC$ 上，$E$ 在线段 $AC$ 上，$AD$ 与 $BE$
      交于点 $P$。已知

      \[

      AP:PD=2:3，\qquad BP:PE=21:4，

      \]

      求 $BD:DC$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: ../../build/diagram/jobs/question_bank-auxiliary-q024-solution/rendered/solution.fragment.tex
        diagram_ref: question_bank.auxiliary.q024.solution
        diagram_job_id: question_bank-auxiliary-q024-solution
        width: 60mm
        caption: Q024 教师图：过 P 作 PF 平行 DB，交 AC 于 F。
        variant: solution
