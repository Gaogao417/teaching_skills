    answer: $t=1/2$。
    explanation: 联立得 $t=w=1/2$，且均为正，符合点在线段内部的条件。
    solution_steps:
    - title: 由两条关系消去底边比
      content: 设 $w=BD/DC$，则 $3/2=t(w+1)/w$ 且 $3/2=w(t+1)/t$。
    - title: 求解并验算
      content: 联立得 $t=w=1/2$，且均为正，符合点在线段内部的条件。
