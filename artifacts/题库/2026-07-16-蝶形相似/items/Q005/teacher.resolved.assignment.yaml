    id: Q005
    points: 10
    label: 三边求第四边
    stem_latex: '如图，$\angle OAC=\angle ODB$。


      已知 $AO=\frac{7}{9}$，$OD=\frac{14}{3}$，$AC=\frac{28}{9}$，求 $DB$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    answer: $DB=\frac{56}{3}$。
    explanation: 先由等角判相似，再按同序顶点确定对应边；本题所用数值对来自 rational_multiple_pairs。
    solution_steps:
    - title: 见等角，找相似
      content: 由题设等角和构型自带的第二组等角，得 $\triangle AOC\sim\triangle DOB$。
    - title: 按顶点写对应边
      content: 三组小边与大边依次为：$AO\leftrightarrow OD$，$OC\leftrightarrow OB$，$AC\leftrightarrow
        DB$。
    - title: 保持比例方向一致
      content: 取 小三角形边与大三角形对应边之比，可列 $\dfrac{AO}{OD}=\dfrac{AC}{DB}$。
    - title: 代入并验算
      content: 代入已知量解得 $DB=\frac{56}{3}$；两组对应边的比均等于同一相似比。
