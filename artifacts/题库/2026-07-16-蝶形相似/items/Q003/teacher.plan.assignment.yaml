            A}] >= 8 Degree, TriangleMeasurement[{A, O, C}, {"InteriorAngle", O}] >= 8 Degree, TriangleMeasurement[{A, O,
            C}, {"InteriorAngle", C}] >= 8 Degree, GeometricAssertion[Line[{A, B}], "Horizontal"], GeometricAssertion[Line[{A,
            B}], "Rightward"], GeometricAssertion[{A, B, C}, "Counterclockwise"], EuclideanDistance[A, O] == 2, EuclideanDistance[O,
