  - type: problem
    id: Q032
    points: 10
    label: 先证相似再求边
    stem_latex: '如图，$\angle OAC=\angle ODB$。


      已知 $AO=\sqrt{10}$，$OD=5\sqrt{2}$，$DB=10\sqrt{2}$。求证 $\triangle AOC\sim\triangle
      DOB$，并求 $AC$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    answer: $AC=2\sqrt{10}$。
    explanation: 先由等角判相似，再按同序顶点确定对应边；本题所用数值对来自 radical_multiple_pairs。
    solution_steps:
    - title: 见等角，找相似
      content: 由题设等角和构型自带的第二组等角，得 $\triangle AOC\sim\triangle DOB$。
    - title: 按顶点写对应边
      content: 三组小边与大边依次为：$AO\leftrightarrow OD$，$OC\leftrightarrow OB$，$AC\leftrightarrow
        DB$。
    - title: 保持比例方向一致
      content: 取 大三角形边与小三角形对应边之比，可列 $\dfrac{OD}{AO}=\dfrac{DB}{AC}$。
    - title: 代入并验算
      content: 代入已知量解得 $AC=2\sqrt{10}$；两组对应边的比均等于同一相似比。
    teaching:
      teaching_goal: 先补出第二组等角并证明相似，再求边
