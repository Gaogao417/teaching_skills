  - type: problem
    id: Q049
    points: 10
    label: 先写对应关系再求边
    stem_latex: '如图，$\angle OAC=\angle ODB$。


      已知 $AO=\frac{4}{5}$，$OD=\frac{24}{5}$，$OC=\frac{6}{5}$。写出三组对应边及相似比，并求 $OB$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    answer: $OB=\frac{36}{5}$。
    explanation: 先由等角判相似，再按同序顶点确定对应边；本题所用数值对来自 rational_multiple_pairs。
    solution_steps:
    - title: 见等角，找相似
      content: 由题设等角和构型自带的第二组等角，得 $\triangle AOC\sim\triangle DOB$。
    - title: 按顶点写对应边
      content: 三组小边与大边依次为：$AO\leftrightarrow OD$，$OC\leftrightarrow OB$，$AC\leftrightarrow
        DB$。
    - title: 保持比例方向一致
      content: 取 小三角形边与大三角形对应边之比，可列 $\dfrac{AO}{OD}=\dfrac{OC}{OB}$。
    - title: 代入并验算
      content: 代入已知量解得 $OB=\frac{36}{5}$；两组对应边的比均等于同一相似比。
    teaching:
      teaching_goal: 先写三组对应边和相似比，再求边
