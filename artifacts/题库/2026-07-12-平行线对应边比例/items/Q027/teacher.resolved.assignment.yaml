    answer: 错误，$AB:CD=2:5$。
    explanation: $PC$ 占 $7-2=5$ 份，所以 $AB:CD=AP:PC=2:5$。
    solution_steps:
    - title: 指出点序
      content: $P$ 在 $A,C$ 之间，$AC=AP+PC$，应使用减法求 $PC$。
    - title: 改正
      content: $PC$ 占 $7-2=5$ 份，所以 $AB:CD=AP:PC=2:5$。
