    answer: $PD=21$。
    explanation: $PB:PD=2:7$，所以 $PD=6\times\frac72=21$。
    solution_steps:
    - title: 求相似比
      content: $PA:PC=2:(2+5)=2:7$。
    - title: 转移并求长
      content: $PB:PD=2:7$，所以 $PD=6\times\frac72=21$。
