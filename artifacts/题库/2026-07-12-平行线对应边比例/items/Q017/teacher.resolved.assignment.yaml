    answer: $AB:CD=2:3$。
    explanation: $AB:CD=AP:PC=2:3$。
    solution_steps:
    - title: 拆整段
      content: $PC$ 占 $5-2=3$ 份，故 $AP:PC=2:3$。
    - title: 转到平行边
      content: $AB:CD=AP:PC=2:3$。
