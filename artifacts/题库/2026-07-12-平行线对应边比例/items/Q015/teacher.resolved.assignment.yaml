    label: 判断两组条件能否共存
    stem_latex: '如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。


      已知 $PA:AC=2:3$，同时又给出 $PB:PD=3:7$。判断这两组条件能否同时成立。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: ../../build/diagram/jobs/question_bank-parallel-q015-solution/rendered/solution.fragment.tex
        diagram_ref: question_bank.parallel.q015.solution
        diagram_job_id: question_bank-parallel-q015-solution
        width: 60mm
        caption: Q015 教师图：标出本题实际使用的对应边和整段关系。
        variant: solution
