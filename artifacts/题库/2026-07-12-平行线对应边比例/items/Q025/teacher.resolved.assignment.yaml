    answer: $PC=21$，$AC=33$。
    explanation: $AC=AP+PC=33$。
    solution_steps:
    - title: 求对应段
      content: $AP:PC=4:7$，所以 $PC=12\times\frac74=21$。
    - title: 求整段
      content: $AC=AP+PC=33$。
