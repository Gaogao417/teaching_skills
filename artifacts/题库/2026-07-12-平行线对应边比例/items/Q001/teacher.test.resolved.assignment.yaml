    answer: $PB:PD=2:5$。
    explanation: $PA:PC=PB:PD$，所以 $PB:PD=2:5$。
    solution_steps:
    - title: 找相似
      content: 由 $AB\parallel CD$，$\triangle PAB\sim\triangle PCD$。
    - title: 按对应边转移
      content: $PA:PC=PB:PD$，所以 $PB:PD=2:5$。
