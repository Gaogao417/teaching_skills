    answer: 错误，$AB:CD=2:5$。
    explanation: $PC=PA+AC$，故 $AB:CD=PA:PC=2:5$。
    solution_steps:
    - title: 指出错误
      content: $AC$ 不是与 $PA$ 对应的整段，不能直接把 $PA:AC$ 转到平行边。
    - title: 改正
      content: $PC=PA+AC$，故 $AB:CD=PA:PC=2:5$。
    teaching:
      teaching_goal: A 字型中先补整段，再写对应边比
      source_relations:
      - fallback:approved_2026_07_12_explanation
      expected_blocker: 把分段比直接当成对应边比，没有先判断整段关系。
      entry_point: solve_and_check
      scaffold_level: medium
      variation_depth: non_example_discrimination
      complexity_note: 只使用小整数比例、一次整段转换或一次比例方程。
      upgrade_rule: 能先写出点序或两组相似导出的比例关系，再计算。
      fallback_move: 先按点序写出整段等于哪两段之和。
