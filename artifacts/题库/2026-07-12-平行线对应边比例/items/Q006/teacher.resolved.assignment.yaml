    label: 由相似比反求外段
    stem_latex: '如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。


      已知 $AB:CD=2:5$，且 $PA=6$，求 $AC$。'
