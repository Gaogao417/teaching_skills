    answer: $AC=9$。
    explanation: $AC=PC-PA=15-6=9$。
    solution_steps:
    - title: 求整段
      content: $PA:PC=2:5$，由 $PA=6$ 得 $PC=15$。
    - title: 求外段
      content: $AC=PC-PA=15-6=9$。
