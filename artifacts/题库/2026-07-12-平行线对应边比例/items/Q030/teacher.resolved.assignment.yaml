    label: 检验交叉图条件一致性
    stem_latex: '如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。


      已知 $AP:AC=2:5$，同时又给出 $BP:PD=3:5$。判断能否同时成立。'
