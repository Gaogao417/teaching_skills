              - - C
                - D
            labels:
              P:
                text: P
                placement: above
              A:
                text: A
                placement: left
              B:
                text: B
                placement: right
              C:
                text: C
                placement: below left
              D:
                text: D
                placement: below right
            constraints:
            - AB parallel CD
            - A,P,C collinear
            - B,P,D collinear
            teaching_focus:
            - 读取本题点序和已知线段
          rationale: 少量版面锚点固定；截线构造点及平行关系由 Wolfram GeometricScene 原生约束求解。
          model_used: deterministic-question-bank-template
          model_attempts: []
        seed: 12001
      teaching_intent: practice_prompt
      problem_context:
        stem_latex: '如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。


          已知 $PA:PC=2:5$，求 $PB:PD$。'
        source_problem_text: 为题库 Q001 单独绘制 A 字型嵌套三角形，P 在两条平行线同侧。严格保持 P-A-C、P-B-D，AB 平行 CD。根据本题题干，仅突出已知比涉及的线段和所求线段；不同题必须生成独立构图和独立预览。学生图只写点名、平行符号和题干明确给出的数值或比例，不写相似结论、推导或答案。
