      type: steps
      height: 48mm
      step_count: 4
      diagram_slot:
        slot_id: question_bank.parallel.q001.solution
        diagram_ref: question_bank.parallel.q001.solution
        variant: solution
        disclosure_policy: annotated
        required: true
        on_failure: fail_assignment
        placement: diagram_col
        layout_role: solution_annotation
        display_profile: worksheet_geometry_sidecar
        caption: Q001 教师图：标出本题实际使用的对应边和整段关系。
        engine: geometric_scene
        diagram_kind: synthetic_geometry
        engine_options:
          scene_payload:
            scene_code: GeometricScene[{P, A, B, C, D}, {P == {0, 7.12903255132}, A == {-1.62162188932, 4.27741955413}, B
              == {1.83414658832, 4.27741955813}, C == {-4.05405430545, 0}, D == {4.5853661101, 0}}]
            points: &id001
            - P
            - A
            - B
            - C
            - D
            point_roles:
              anchors: *id001
              constructed: []
              auxiliary: []
            diagram_spec:
              type: synthetic_geometry
              segments:
              - from: P
                to: C
              - from: P
                to: D
              - from: A
                to: B
              - from: C
                to: D
              polygons:
              - points:
                - P
                - A
                - B
                fill: '#dbeafe'
                opacity: 0.48
              - points:
                - P
                - C
                - D
                fill: '#fef3c7'
                opacity: 0.42
              markers:
              - type: parallel
                segments:
                - - A
                  - B
                - - C
                  - D
              labels:
                P:
                  text: P
                  placement: above
                A:
                  text: A
                  placement: left
                B:
                  text: B
                  placement: right
                C:
                  text: C
                  placement: below left
                D:
                  text: D
                  placement: below right
              constraints:
              - triangle PAB similar triangle PCD
              - PA corresponds PC
              - PB corresponds PD
              - AB corresponds CD
              teaching_focus:
              - A 字型中先补整段，再写对应边比
            rationale: 复用本题 Wolfram 已求出的 prompt 点位；仅新增辅助点继续由原生几何约束求解。
            model_used: deterministic-question-bank-template
            model_attempts: []
          seed: 22001
        teaching_intent: practice_solution
        reuse_geometry_from: question_bank.parallel.q001.prompt
        problem_context:
          stem_latex: '如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。


            已知 $PA:PC=2:5$，求 $PB:PD$。'
          source_problem_text: 只复用 Q001 自己的 prompt 点位。在原图上标出三角形 PAB 与 PCD 的对应关系，并按本题解法强调需要的整段加法或减法；允许教师标注，但不要改动原图点序。
        semantic_constraints:
          given_objects:
          - A
          - B
          - C
          - D
          - P
          given_constraints:
          - reuse the complete original geometry from question_bank.parallel.q001.prompt
          - triangle PAB is similar to triangle PCD
          - show PA corresponding to PC, PB corresponding to PD, and AB corresponding to CD
          - annotate only the whole-part relation used by this item's solution
    answer: $PB:PD=2:5$。
    explanation: $PA:PC=PB:PD$，所以 $PB:PD=2:5$。
    solution_steps:
    - title: 找相似
      content: 由 $AB\parallel CD$，$\triangle PAB\sim\triangle PCD$。
    - title: 按对应边转移
      content: $PA:PC=PB:PD$，所以 $PB:PD=2:5$。
