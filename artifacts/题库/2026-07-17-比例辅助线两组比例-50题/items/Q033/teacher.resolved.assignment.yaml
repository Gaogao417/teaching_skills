    id: Q033
    points: 10
    label: 由两组对应边比求 AE:EC
    stem_latex: 如图，在 $\triangle ABC$ 中，点 $D$ 在线段 $BC$ 上，点 $E$ 在线段 $AC$ 上，线段 $AD$ 与
      $BE$ 交于点 $P$。已知 $BD:DC=3:5$，$BP:PE=3:2$，求 $AE:EC$。
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
