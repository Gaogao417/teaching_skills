    answer: $BP:PE=4:3$。
    explanation: 两组已知整数比先统一为 x、w、y、z 的关系，再求第三组并写成最简整数比。
    solution_steps:
    - title: 找三条比例线并作辅助线
      content: 把两组已知条件与所求量所在的三条直线围成三角形，按讲解规则作唯一的平行辅助线，得到两组相似三角形。
    - title: 统一记号并列关系
      content: 记 $x=AE/EC$、$w=BD/DC$、$y=AP/PD$、$z=BP/PE$。本题可用 $w=\dfrac{x}{y-x},\quad
        z=\dfrac{x+1}{y-x}$。
    - title: 代入两个整数比
      content: 由题意得到 $x=1,\ y=\frac{5}{2}$，化简得 $z=\frac{4}{3}$。
    - title: 写成最简整数比
      content: 约去公因数，得到 $BP:PE=4:3$。
