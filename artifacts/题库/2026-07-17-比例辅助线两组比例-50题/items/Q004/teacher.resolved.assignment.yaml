    label: 由两组对应边比求 BP:PE
    stem_latex: 如图，在 $\triangle ABC$ 中，点 $D$ 在线段 $BC$ 上，点 $E$ 在线段 $AC$ 上，线段 $AD$ 与
      $BE$ 交于点 $P$。已知 $AE:EC=1:1$，$AP:PD=5:2$，求 $BP:PE$。
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
