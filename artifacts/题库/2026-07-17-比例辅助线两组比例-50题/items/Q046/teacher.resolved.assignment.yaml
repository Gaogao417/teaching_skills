  - type: problem
    id: Q046
    points: 10
    label: 由两组对应边比求 AP:PD
    stem_latex: 如图，在 $\triangle ABC$ 中，点 $D$ 在线段 $BC$ 上，点 $E$ 在线段 $AC$ 上，线段 $AD$ 与
      $BE$ 交于点 $P$。已知 $BD:DC=3:2$，$BP:PE=4:1$，求 $AP:PD$。
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/question_bank-auxiliary50-q046-solution/rendered/solution.fragment.tex
        diagram_ref: question_bank.auxiliary50.q046.solution
        diagram_job_id: question_bank-auxiliary50-q046-solution
        width: 60mm
        caption: Q046 解答图：过 P 作 PF 平行 DB，交直线 AC 于 F。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:3682f8d9cfd34e2d07a950a3d696c3f02f338060ea713922ef15542b2034455d
        packages:
        - tikz
        libraries: []
    answer: $AP:PD=1:1$。
    explanation: 两组已知整数比先统一为 x、w、y、z 的关系，再求第三组并写成最简整数比。
    solution_steps:
    - title: 找三条比例线并作辅助线
      content: 把两组已知条件与所求量所在的三条直线围成三角形，按讲解规则作唯一的平行辅助线，得到两组相似三角形。
    - title: 统一记号并列关系
      content: 记 $x=AE/EC$、$w=BD/DC$、$y=AP/PD$、$z=BP/PE$。本题可用 $x=\dfrac{w}{z-w},\quad
        y=\dfrac{w+1}{z-w}$。
    - title: 代入两个整数比
      content: 由题意得到 $w=\frac{3}{2},\ z=4$，化简得 $y=1$。
    - title: 写成最简整数比
      content: 约去公因数，得到 $AP:PD=1:1$。
    teaching:
      teaching_goal: 由两组对应边整数比求第三组整数比
