    id: Q003
    points: 10
    label: 由两组对应边比求 BD:DC
    stem_latex: 如图，在 $\triangle ABC$ 中，点 $D$ 在线段 $BC$ 上，点 $E$ 在线段 $AC$ 上，线段 $AD$ 与
      $BE$ 交于点 $P$。已知 $AE:EC=3:4$，$AP:PD=3:2$，求 $BD:DC$。
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/question_bank-auxiliary50-q003-solution/rendered/solution.fragment.tex
        diagram_ref: question_bank.auxiliary50.q003.solution
        diagram_job_id: question_bank-auxiliary50-q003-solution
        width: 60mm
        caption: Q003 解答图：过 C 作 CF 平行 AD，交直线 BE 于 F。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:6d1b6adbe570026ed6ac19a5b95d374d13a08c77572ef2e09dddab1eeb5e05a9
        packages:
        - tikz
        libraries: []
    answer: $BD:DC=1:1$。
    explanation: 两组已知整数比先统一为 x、w、y、z 的关系，再求第三组并写成最简整数比。
    solution_steps:
    - title: 找三条比例线并作辅助线
      content: 把两组已知条件与所求量所在的三条直线围成三角形，按讲解规则作唯一的平行辅助线，得到两组相似三角形。
    - title: 统一记号并列关系
      content: 记 $x=AE/EC$、$w=BD/DC$、$y=AP/PD$、$z=BP/PE$。本题可用 $w=\dfrac{x}{y-x},\quad
        z=\dfrac{x+1}{y-x}$。
    - title: 代入两个整数比
      content: 由题意得到 $x=\frac{3}{4},\ y=\frac{3}{2}$，化简得 $w=1$。
    - title: 写成最简整数比
      content: 约去公因数，得到 $BD:DC=1:1$。
    teaching:
      teaching_goal: 由两组对应边整数比求第三组整数比
