      upgrade_rule: 先写出两组相似中的共同中间边，再消元求第三组。
      fallback_move: 在 AC、AD、BE、BC 四条比例线上圈出两条已知线和一条所求线。
      number_policy: each given ratio uses coprime integers from 1 through 5
