    id: Q026
    points: 10
    label: 由两组对应边比求 BP:PE
    stem_latex: 如图，在 $\triangle ABC$ 中，点 $D$ 在线段 $BC$ 上，点 $E$ 在线段 $AC$ 上，线段 $AD$ 与
      $BE$ 交于点 $P$。已知 $AE:EC=1:1$，$BD:DC=3:5$，求 $BP:PE$。
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/question_bank-auxiliary50-q026-solution/rendered/solution.fragment.tex
        diagram_ref: question_bank.auxiliary50.q026.solution
        diagram_job_id: question_bank-auxiliary50-q026-solution
        width: 60mm
        caption: Q026 解答图：过 E 作 EF 平行 CB，交直线 AD 于 F。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:f0ea8e364ccdb47e4fe4f07016973ef7e2ab9950dd710af17fca76bc33e0a39c
        packages:
        - tikz
        libraries: []
    answer: $BP:PE=6:5$。
    explanation: 两组已知整数比先统一为 x、w、y、z 的关系，再求第三组并写成最简整数比。
    solution_steps:
    - title: 找三条比例线并作辅助线
      content: 把两组已知条件与所求量所在的三条直线围成三角形，按讲解规则作唯一的平行辅助线，得到两组相似三角形。
    - title: 统一记号并列关系
      content: 记 $x=AE/EC$、$w=BD/DC$、$y=AP/PD$、$z=BP/PE$。本题可用 $y=\dfrac{x(w+1)}{w},\quad
        z=\dfrac{w(x+1)}{x}$。
    - title: 代入两个整数比
      content: 由题意得到 $x=1,\ w=\frac{3}{5}$，化简得 $z=\frac{6}{5}$。
    - title: 写成最简整数比
      content: 约去公因数，得到 $BP:PE=6:5$。
    teaching:
      teaching_goal: 由两组对应边整数比求第三组整数比
