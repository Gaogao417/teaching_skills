    id: Q018
    points: 10
    label: 三边求第四边
    stem_latex: '如图，$\angle PAB=\angle PDC$。


      已知 $AB=\sqrt{2}$，$DC=\sqrt{6}$，$PA=\sqrt{2}$，求 $PD$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    answer: $PD=\sqrt{6}$。
    explanation: 先由等角判相似，再按同序顶点确定对应边；本题所用数值对来自 radical_multiple_pairs。
    solution_steps:
    - title: 见等角，找相似
      content: 由题设等角和构型自带的第二组等角，得 $\triangle PAB\sim\triangle PDC$。
    - title: 按顶点写对应边
      content: 三组小边与大边依次为：$PA\leftrightarrow PD$，$PB\leftrightarrow PC$，$AB\leftrightarrow
        DC$。
    - title: 保持比例方向一致
      content: 取 小三角形边与大三角形对应边之比，可列 $\dfrac{AB}{DC}=\dfrac{PA}{PD}$。
    - title: 代入并验算
      content: 代入已知量解得 $PD=\sqrt{6}$；两组对应边的比均等于同一相似比。
