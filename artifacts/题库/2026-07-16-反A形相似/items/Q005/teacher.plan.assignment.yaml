    id: Q005
    points: 10
    label: 三边求第四边
    stem_latex: '如图，$\angle PAB=\angle PDC$。


      已知 $PA=\frac{5}{3}$，$PD=10$，$AB=\frac{5}{3}$，求 $DC$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    answer: $DC=10$。
    explanation: 先由等角判相似，再按同序顶点确定对应边；本题所用数值对来自 rational_multiple_pairs。
    solution_steps:
    - title: 见等角，找相似
      content: 由题设等角和构型自带的第二组等角，得 $\triangle PAB\sim\triangle PDC$。
    - title: 按顶点写对应边
      content: 三组小边与大边依次为：$PA\leftrightarrow PD$，$PB\leftrightarrow PC$，$AB\leftrightarrow DC$。
    - title: 保持比例方向一致
      content: 取 小三角形边与大三角形对应边之比，可列 $\dfrac{PA}{PD}=\dfrac{AB}{DC}$。
    - title: 代入并验算
      content: 代入已知量解得 $DC=10$；两组对应边的比均等于同一相似比。
    teaching:
      teaching_goal: 由三条已知边求第四条对应边
      source_relations:
      - explanation:reverse_a
      - similar_triangles_corresponding_sides
      expected_blocker: 没有先锁定等角顶点，或两组比例的大小方向不一致。
      entry_point: equal_angles_to_similarity_to_correspondence
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 只训练 AA 判定、对应边和一层比例；不引入面积、周长或额外辅助线。
      upgrade_rule: 能独立写出同序相似式并用另一组对应边验算。
      fallback_move: 先标出两个相等角的顶点，再逐个写出对应点。
      number_selection:
        database_id: question-bank-training-numbers
        family_id: rational_multiple_pairs
        entry_id: rational-5-over-3-x-6
        selection_class: fraction_pair
