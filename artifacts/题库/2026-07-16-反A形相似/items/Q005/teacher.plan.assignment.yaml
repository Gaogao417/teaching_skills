            P}] >= 8 Degree, TriangleMeasurement[{P, A, B}, {"InteriorAngle", A}] >= 8 Degree, TriangleMeasurement[{P, A,
            B}, {"InteriorAngle", B}] >= 8 Degree, GeometricAssertion[Line[{P, D}], "Horizontal"], GeometricAssertion[Line[{P,
            D}], "Rightward"], GeometricAssertion[{P, D, C}, "Counterclockwise"], EuclideanDistance[P, A] == 1, EuclideanDistance[P,
