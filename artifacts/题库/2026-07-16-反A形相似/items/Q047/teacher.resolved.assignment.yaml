    id: Q047
    points: 10
    label: 先证相似再求边
    stem_latex: '如图，$\angle PAB=\angle PDC$。


      已知 $AB=\frac{2}{7}$，$DC=\frac{6}{7}$，$PC=\frac{6}{7}$。求证 $\triangle PAB\sim\triangle
      PDC$，并求 $PB$。'
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    answer: $PB=\frac{2}{7}$。
    explanation: 先由等角判相似，再按同序顶点确定对应边；本题所用数值对来自 rational_multiple_pairs。
    solution_steps:
    - title: 见等角，找相似
      content: 由题设等角和构型自带的第二组等角，得 $\triangle PAB\sim\triangle PDC$。
    - title: 按顶点写对应边
      content: 三组小边与大边依次为：$PA\leftrightarrow PD$，$PB\leftrightarrow PC$，$AB\leftrightarrow
        DC$。
    - title: 保持比例方向一致
      content: 取 大三角形边与小三角形对应边之比，可列 $\dfrac{DC}{AB}=\dfrac{PC}{PB}$。
    - title: 代入并验算
      content: 代入已知量解得 $PB=\frac{2}{7}$；两组对应边的比均等于同一相似比。
    teaching:
      teaching_goal: 先补出第二组等角并证明相似，再求边
      source_relations:
