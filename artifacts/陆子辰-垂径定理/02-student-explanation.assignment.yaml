meta:
  title: 垂径定理——平行弦的距离
  example_label: 例题 10(1)
  subtitle: 弦心距 · 平行弦共垂线 · 分类讨论 · 讲解
  grade: 八年级
  subject: 数学
  version: teacher
  show_answers: true
  source_artifacts:
    structure_analysis: artifacts/陆子辰-垂径定理/01-structure-analysis.md
  student:
    name: 陆子辰
render:
  template: exam-zh-explanation
  paper_size: a4paper
sections:
- id: original
  title: 原题
  type: explanation
  visibility: both
  layout:
    break_before: false
  blocks:
  - type: problemcard
    id: orig
    label: 题目
    stem_latex: 已知 $\odot O$ 半径 $OB=13$，$AB$、$CD$ 是弦，$AB\parallel CD$，$AB=10$，$CD=24$，则 $AB$ 与 $CD$ 的距离是\_\_\_\_。
- id: breakdown
  title: 一、先把题目拆开
  type: explanation
  visibility: student
  blocks:
  - type: reading_tip
    id: rt1
    items:
    - latex: 题目里有「两条平行弦」和一个「半径」——这是垂径定理+平行弦的典型结构。
    - latex: 求两弦距离，但两条弦可以分别在圆心的两侧或同侧——不要漏掉情况！
    - latex: 这道题的核心就三件事：作弦心距 $\to$ 勾股定理求距离 $\to$ 分同侧/异侧讨论。
- id: route-section
  title: 二、解题路线
  type: explanation
  visibility: student
  blocks:
  - type: route
    id: route
    steps:
    - latex: 过 $O$ 作 $OM \perp AB$ 于 $M$，$ON \perp CD$ 于 $N$
    - latex: 证明 $OM$ 与 $ON$ 共线（平行弦公垂线）
    - latex: 垂径定理+勾股定理求 $OM$ 和 $ON$
    - latex: 分同侧/异侧求距离
- id: key-idea
  title: 三、关键想法
  type: explanation
  visibility: student
  blocks:
  - type: key_idea
    id: ki
    content: "圆中两弦 $AB \\parallel CD$，过圆心 $O$ 分别作它们的垂线段 $OM$ 和 $ON$。\n因为 $AB \\parallel CD$，两条垂线段实际上是同一条直线（公垂线）！\n所以两弦之间的距离就等于 $OM$ 与 $ON$ 的「差」或「和」：\n\\begin{itemize}\n  \\item 两弦在圆心同侧 $\\Rightarrow$ 距离 $= OM - ON$\n  \\item 两弦在圆心异侧 $\\Rightarrow$ 距离 $= OM + ON$\n\\end{itemize}\n而 $OM$、$ON$ 可以分别由垂径定理+勾股定理轻松求出。"
- id: solution
  title: 四、标准解法
  type: explanation
  visibility: student
  blocks:
  - type: dual_explanation
    id: sol-part1
    label: 第一步
    stem_latex: 求弦心距 $OM$ 和 $ON$。
    left_title: 思考引导
    left_items:
    - latex: 圆中有弦，过圆心作弦的垂线段——这是垂径定理的标准操作。
    - latex: $AB \parallel CD$，那么 $OM \perp AB$ 和 $ON \perp CD$ 这两条垂线段有什么关系？
    - latex: 想象一下：两条平行线，从同一点分别向它们作垂线，两条垂线当然在同一条直线上！
    - latex: 垂径定理告诉我们 $M$ 是 $AB$ 的中点、$N$ 是 $CD$ 的中点。半弦长是多少？
    right_title: 规范讲解
    right_steps:
    - latex: 过圆心 $O$ 作 $OM \perp AB$ 于 $M$，$ON \perp CD$ 于 $N$。
    - latex: $\because AB \parallel CD$，$OM \perp AB$，$ON \perp CD$，
    - latex: $\therefore$ 点 $M$、$O$、$N$ 三点共线（$OM$ 与 $ON$ 在同一条直线上）。
    - latex: 由垂径定理：$AM = \dfrac{1}{2}AB = 5$，$CN = \dfrac{1}{2}CD = 12$。
    - latex: 在 $\mathrm{Rt}\triangle OAM$ 中：$OM = \sqrt{OA^2 - AM^2} = \sqrt{13^2 - 5^2} = \sqrt{144} = 12$。
    - latex: 在 $\mathrm{Rt}\triangle OCN$ 中：$ON = \sqrt{OC^2 - CN^2} = \sqrt{13^2 - 12^2} = \sqrt{25} = 5$。
    connection_title: 发现
    connection_items:
    - latex: 注意 $13$、$5$、$12$ 是勾股数！$\sqrt{13^2 - 5^2}$ 和 $\sqrt{13^2 - 12^2}$ 都是整数，计算非常干净。
    - latex: 弦越长，离圆心越近——$CD=24$ 的弦心距 $ON=5$ 比 $AB=10$ 的弦心距 $OM=12$ 小。
  - type: dual_explanation
    id: sol-part2
    label: 第二步
    stem_latex: 求 $AB$ 与 $CD$ 的距离。
    left_title: 思考引导
    left_items:
    - latex: 画个图看看：两弦可以在圆心的同一侧，也可以分居两侧。
    - latex: 如果两弦在圆心同侧，距离应该怎么算？——看看 $OM$ 和 $ON$ 在图中的位置。
    - latex: 如果两弦在圆心异侧呢？距离又是怎么算的？
    - latex: 这道题没有说两弦在圆心的哪一侧，所以两个答案都要算！
    right_title: 规范讲解
    right_steps:
    - latex: 因为 $M$、$O$、$N$ 共线，$AB$ 与 $CD$ 的距离就等于 $MN$ 的长。
    - latex: 情形一：$AB$、$CD$ 在圆心同侧。
    - latex: $MN = OM - ON = 12 - 5 = 7$。
    - latex: 情形二：$AB$、$CD$ 在圆心异侧。
    - latex: $MN = OM + ON = 12 + 5 = 17$。
    - latex: $\therefore AB$ 与 $CD$ 的距离为 $7$ 或 $17$。
    connection_title: 关键
    connection_items:
    - latex: 同侧 $\Rightarrow$ 减；异侧 $\Rightarrow$ 加。在图上指一下就清楚了，不需要死记。
    - latex: 两个答案都要写！题目没有限制两弦的位置，所以两种情形都是合法的。
- id: summary
  title: 五、总结
  type: explanation
  visibility: student
  blocks:
  - type: summary_dual
    id: summary-block
    left_title: 答案
    left_items:
    - latex: $AB$ 与 $CD$ 的距离为 $7$ 或 $17$
    right_title: 方法提醒
    right_items:
    - latex: 看到「平行弦」$\Rightarrow$ 过圆心作两条弦心距，它们共线
    - latex: 弦心距 $=$ 勾股定理（半径、半弦、弦心距构成直角三角形）
    - latex: 两弦在圆心同侧 $\Rightarrow$ 距离 $= |OM - ON|$；异侧 $\Rightarrow$ 距离 $= OM + ON$
- id: mistakes
  title: 六、易错提醒
  type: explanation
  visibility: student
  blocks:
  - type: mistake
    id: m1
    title: 忘记分类讨论，只算一种情形
    content: '题目说「$AB \parallel CD$」但没说两弦在圆心的哪一侧。所以同侧和异侧都要算。

      只写 $7$ 或只写 $17$ 都要扣分。养成习惯：圆中平行弦，先画两幅图。'
  - type: mistake
    id: m2
    title: 不说明 $OM$ 与 $ON$ 共线
    content: '有些同学直接写「$MN = OM - ON$」，但没有先说明为什么 $M$、$O$、$N$ 三点共线。

      证明共线并不难：$AB \parallel CD$，且 $OM \perp AB$，$ON \perp CD$，

      所以 $OM$ 和 $ON$ 是同一条直线（平行线的公垂线）。这一步不能跳过。'
  - type: mistake
    id: m3
    title: 把同侧和异侧搞反
    content: '画图就不会搞反：在纸上画一个圆，画两条平行弦在圆心同侧——看图就知道距离是 $OM - ON$（短的那段）。

      不画图、光靠想就容易把加法和减法弄混。'
  - type: mistake
    id: m4
    title: 计算失误
    content: '$\sqrt{13^2 - 12^2} = \sqrt{169 - 144} = \sqrt{25} = 5$，不是 $\sqrt{169} - \sqrt{144} = 13 - 12 = 1$。

      要先平方再相减，再开方。这是一个非常常见的计算错误。'
- id: questions
  title: 七、边讲边问
  type: explanation
  visibility: student
  blocks:
  - type: hint
    id: q1
    level: 1
    content: 如果把 $AB$ 改成 $CD$ 的长度（即 $AB = 24$，$CD = 10$），弦心距 $OM$ 和 $ON$ 会交换吗？最终答案会变吗？
  - type: hint
    id: q2
    level: 2
    content: 如果 $AB = CD = 10$（两弦等长），同侧时距离等于多少？这个结果在几何上意味着什么？
  - type: hint
    id: q3
    level: 2
    content: 如果这道题反过来：已知 $\odot O$ 半径 $13$，$AB \parallel CD$，$AB = 10$，两弦距离 $= 7$，你能求出 $CD$ 的长吗？
- id: teacher-notes
  title: 教师备注
  type: explanation
  visibility: teacher
  layout:
    break_before: true
  blocks:
  - type: key_idea
    id: tn1
    content: '学生画像：陆子辰，八年级，学而思自招班。默认预测 L2-L3（能识别垂径定理，能作辅助线，但分类讨论意识弱）。

      本题核心卡点：（1）不说明 $OM$ 与 $ON$ 共线；（2）忘记分类讨论或搞反同侧/异侧；（3）计算错误。

      教学节奏：先画两幅图（同侧/异侧），让学生直观看到「差」和「和」的区别，再进入计算。'
    teaching:
      teaching_goal: 掌握垂径定理辅助线作法，理解平行弦公垂线共线性质，建立分类讨论的几何直觉
      expected_blocker: 忘记分类讨论只算一种情形；不理解为什么 OM 与 ON 共线；同侧异侧搞反
      mastery_band: B
      upgrade_rule: 能独立说明共线证明，完整写出两种情形并正确计算
      downgrade_rule: 不会作弦心距辅助线，或完全不知道要分类讨论
