- id: choice
  title: 一、选择题（每题 4 分，共 12 分）
  type: practice
  visibility: both
  blocks:
  - type: choice
    id: c1
    points: 4
    stem: 在 $\odot O$ 中，半径为 $5$，弦 $AB \parallel CD$，$AB = 8$，$CD = 6$，则 $AB$ 与 $CD$ 的距离是
    choices:
      A: $1$
      B: $7$
      C: $1$ 或 $7$
      D: $2$ 或 $8$
    answer: C
    explanation: '过 $O$ 作 $OM \perp AB$ 于 $M$，$ON \perp CD$ 于 $N$。

      半弦长：$AM = 4$，$CN = 3$。

      弦心距：$OM = \sqrt{5^2 - 4^2} = 3$，$ON = \sqrt{5^2 - 3^2} = 4$。

      同侧：$|OM - ON| = |3 - 4| = 1$；异侧：$OM + ON = 3 + 4 = 7$。

      答案为 $1$ 或 $7$。'
    teaching:
      teaching_goal: 同结构换数：勾股数组 3-4-5，训练基本分类讨论流程
      expected_blocker: 忘记分类讨论只算一种；根号内计算错误
      mastery_band: B
      complexity_note: 两次整数勾股+分类讨论，与原题同量级
  - type: choice
    id: c2
    points: 4
    stem: 在 $\odot O$ 中，$AB \parallel CD$，$AB = 10$，$CD = 24$，圆心到 $AB$ 的距离为 $12$，到 $CD$ 的距离为 $5$。下列说法正确的是
    choices:
      A: $AB$ 离圆心更近
      B: $CD$ 离圆心更近
      C: $AB$ 和 $CD$ 离圆心一样近
      D: 无法判断
    answer: B
    explanation: '弦心距越小，弦离圆心越近。$ON = 5 < OM = 12$，所以 $CD$ 离圆心更近。

      弦越长，越靠近圆心（因为更接近直径）。'
    teaching:
      teaching_goal: 建立「弦长与弦心距反比」的直觉，不涉及计算
      expected_blocker: 直觉认为弦越短越近圆心（方向搞反）
      mastery_band: A
      complexity_note: 零计算，纯概念理解
  - type: choice
    id: c3
    points: 4
    stem: 在 $\odot O$ 中，半径为 $10$，$AB \parallel CD$，$AB = 16$，$CD = 12$，则 $AB$ 与 $CD$ 的距离是
    choices:
      A: $2$
      B: $14$
      C: $2$ 或 $14$
      D: $4$ 或 $16$
    answer: C
    explanation: '过 $O$ 作 $OM \perp AB$ 于 $M$，$ON \perp CD$ 于 $N$。

      半弦长：$AM = 8$，$CN = 6$。

      弦心距：$OM = \sqrt{10^2 - 8^2} = 6$，$ON = \sqrt{10^2 - 6^2} = 8$。

      同侧：$|OM - ON| = |6 - 8| = 2$；异侧：$OM + ON = 6 + 8 = 14$。

      答案为 $2$ 或 $14$。'
    teaching:
      teaching_goal: 同结构换数：6-8-10 勾股数组，注意 OM 和 ON 的相对大小交换
      expected_blocker: 同侧算成 8-6=2 但不确定正负号；忘记取绝对值
      mastery_band: B
      complexity_note: 两次整数勾股+分类讨论，与原题同量级
- id: fillin
  title: 二、填空题（每题 4 分，共 12 分）
  type: practice
  visibility: both
  blocks:
  - type: fillin
    id: f1
    points: 4
    stem: 已知 $\odot O$ 半径为 $13$，$AB \parallel CD$，$AB = 10$，$CD = 24$。若 $AB$、$CD$ 在圆心同侧，则两弦距离为 $\underline{\quad\quad}$。
    answer: $7$
    explanation: '$OM = \sqrt{13^2 - 5^2} = 12$，$ON = \sqrt{13^2 - 12^2} = 5$。

      同侧距离 $= OM - ON = 12 - 5 = 7$。'
    teaching:
      teaching_goal: 原题数据但指定同侧，训练条件限制下的单答案计算
      mastery_band: A
  - type: fillin
    id: f2
    points: 4
    stem: 已知 $\odot O$ 半径为 $13$，$AB \parallel CD$，$AB = 10$，$AB$ 与 $CD$ 的距离为 $17$，则弦 $CD$ 的长为 $\underline{\quad\quad}$。
    answer: $24$
    explanation: '$OM = \sqrt{13^2 - 5^2} = 12$。

      距离 $17 > OM = 12$，所以两弦在异侧：$17 = OM + ON$，$ON = 17 - 12 = 5$。

      半弦 $CN = \sqrt{13^2 - 5^2} = 12$，$CD = 2 \times 12 = 24$。'
    teaching:
      teaching_goal: 同结构换问法：已知距离求弦长，需要先判断同侧还是异侧
      expected_blocker: 不知道先判断同侧/异侧
      mastery_band: B
  - type: fillin
    id: f3
    points: 4
    stem: 已知 $\odot O$ 半径为 $5$，$AB \parallel CD$，$AB = CD = 8$，$AB$、$CD$ 在圆心异侧，则两弦距离为 $\underline{\quad\quad}$。
    answer: $6$
    explanation: '两弦等长，弦心距相等：$OM = ON = \sqrt{5^2 - 4^2} = 3$。

      异侧距离 $= OM + ON = 3 + 3 = 6$。'
    teaching:
      teaching_goal: 等长平行弦的特殊情形：弦心距相等，计算更简单
      mastery_band: A
- id: problems
  title: 三、解答题（每题 10 分，共 20 分）
  type: practice
  visibility: both
  blocks:
  - type: problem
    id: p1
    points: 10
    label: 第 1 题
    stem_latex: 已知 $\odot O$ 的半径为 $10$，$AB$、$CD$ 是弦，$AB \parallel CD$，$AB = 16$，$CD = 12$。求 $AB$ 与 $CD$ 的距离。
    answer: $AB$ 与 $CD$ 的距离为 $2$ 或 $14$
    layout:
      avoid_break: true
    explanation: '过 $O$ 作 $OM \perp AB$ 于 $M$，$ON \perp CD$ 于 $N$。

      由 $AB \parallel CD$ 且 $OM \perp AB$，$ON \perp CD$，知 $M$、$O$、$N$ 共线。

      由垂径定理：$AM = 8$，$CN = 6$。

      $OM = \sqrt{10^2 - 8^2} = 6$，$ON = \sqrt{10^2 - 6^2} = 8$。

      情形一（同侧）：$MN = |6 - 8| = 2$。

      情形二（异侧）：$MN = 6 + 8 = 14$。'
    solution_steps:
    - title: 作辅助线
      content: 过 $O$ 作 $OM \perp AB$ 于 $M$，$ON \perp CD$ 于 $N$。由 $AB \parallel CD$ 知 $M$、$O$、$N$ 共线。
    - title: 垂径定理求半弦
      content: $AM = \dfrac{1}{2}AB = 8$，$CN = \dfrac{1}{2}CD = 6$。
    - title: 勾股定理求弦心距
      content: $OM = \sqrt{10^2 - 8^2} = 6$。$ON = \sqrt{10^2 - 6^2} = 8$。
    - title: 分类讨论
      content: 情形一（同侧）：$MN = |6 - 8| = 2$。情形二（异侧）：$MN = 6 + 8 = 14$。
    - title: 结论
      content: $\therefore AB$ 与 $CD$ 的距离为 $2$ 或 $14$。
    teaching:
      teaching_goal: 同结构换数：完整书写分类讨论的标准解法
      expected_blocker: 忘记写共线证明；同侧异侧搞反；忘记绝对值
      mastery_band: B
      complexity_note: 6-8-10 勾股数组，整数结果
  - type: problem
    id: p2
    points: 10
    label: 第 2 题
    stem_latex: 等腰梯形 $ABCD$ 内接于 $\odot O$（$A$、$B$、$C$、$D$ 依次在圆上），$AD \parallel BC$，$\odot O$ 的半径为 $10$，$AD = 16$，$BC = 12$。求梯形 $ABCD$ 的高。
    answer: 梯形 $ABCD$ 的高为 $14$
    layout:
      avoid_break: true
    explanation: '梯形 $ABCD$ 内接于 $\odot O$，$AD \parallel BC$。

      $AD$ 和 $BC$ 就是圆的两条平行弦！梯形的高就是两弦的距离。

      因为是梯形（上底和下底在圆心两侧），所以两弦在圆心异侧。

      过 $O$ 作 $OM \perp AD$ 于 $M$，$ON \perp BC$ 于 $N$。

      $AM = 8$，$BN = 6$。$OM = 6$，$ON = 8$。

      梯形高 $= OM + ON = 6 + 8 = 14$（异侧，取和）。'
    solution_steps:
    - title: 识别结构
      content: $AD \parallel BC$，$AD$ 和 $BC$ 是圆的两条平行弦。梯形的高 $=$ 两弦的距离。两底在圆心异侧。
    - title: 作辅助线
      content: 过 $O$ 作 $OM \perp AD$ 于 $M$，$ON \perp BC$ 于 $N$。由 $AD \parallel BC$ 知 $M$、$O$、$N$ 共线。
    - title: 垂径定理+勾股定理
      content: $AM = 8$，$BN = 6$。$OM = 6$，$ON = 8$。
    - title: 求梯形高
      content: 两弦在圆心异侧，梯形高 $= OM + ON = 6 + 8 = 14$。
    teaching:
      teaching_goal: 远迁移：识别「圆内接梯形」的本质是「圆中平行弦」
      expected_blocker: 看不出梯形和平行弦的等价关系
      mastery_band: C
      complexity_note: 计算与第 1 题完全相同，增加了识别结构的认知负担
