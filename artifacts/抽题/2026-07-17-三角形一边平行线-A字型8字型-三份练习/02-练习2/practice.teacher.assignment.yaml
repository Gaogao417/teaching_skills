  - type: problem
    id: Q031
    points: 10
    label: 第 1 题
    stem_latex: '如图，$P,A,C$ 三点共线，$P,B,D$ 三点共线，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。

      已知 $PA=\frac{6}{7}$，$PC=\frac{36}{7}$，$CD=\frac{72}{7}$，求 $AB$。'
    answer_space:
      type: steps
      height: 42mm
      step_count: 4
    answer: $AB=\frac{12}{7}$。
    explanation: 已知边与未知边中出现平行线段 $CD$、$AB$，先求两个相似三角形的比。先算 $\dfrac{PA}{PC}=\dfrac{\frac{6}{7}}{\frac{36}{7}}=\dfrac{1}{6}$。约分后，$AB$ 对应 $1$ 份，$CD$ 对应 $6$ 份。$AB=CD\times\dfrac{1}{6}=\frac{72}{7}\times\dfrac{1}{6}=\frac{12}{7}$。
    solution_steps:
    - title: 先判断
      content: 已知边与未知边中出现平行线段 $CD$、$AB$，先求两个相似三角形的比。
    - title: 计算并约分
      content: $\dfrac{PA}{PC}=\dfrac{\frac{6}{7}}{\frac{36}{7}}=\dfrac{1}{6}$。
    - title: 标份数
      content: 约分后，$AB$ 对应 $1$ 份，$CD$ 对应 $6$ 份。
    - title: 按份数公式求边
      content: $AB=CD\times\dfrac{1}{6}=\frac{72}{7}\times\dfrac{1}{6}=\frac{12}{7}$。
    teaching:
      teaching_goal: 已知三条对应边，先判断比例类型，再标份数求第四边
