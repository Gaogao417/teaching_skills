    answer: $CD=14$。
    explanation: 已知边与未知边中出现平行线段 $AB$、$CD$，先求两个相似三角形的比。先算 $\dfrac{BP}{PD}=\dfrac{\sqrt{7}}{7}=\dfrac{1}{\sqrt{7}}$。约分后，$CD$ 对应 $\sqrt{7}$ 份，$AB$ 对应 $1$ 份。$CD=AB\times\dfrac{\sqrt{7}}{1}=2\sqrt{7}\times\dfrac{\sqrt{7}}{1}=14$。
