  version: teacher
  assignment_id: 2026-06-08-note-midpoint-midline-explanation
  show_answers: true
  source_artifacts:
    structure_analysis: artifacts/笔记/2026-06-08-矩形中点中位线求线段/01-structure-analysis.md
render:
  template: exam-zh-explanation
  paper_size: a4paper
sections:
- id: original
  title: 原题
  type: explanation
  visibility: both
  blocks:
  - type: problemcard
    id: orig
    label: 题目
    stem_latex: '如图，在矩形 $ABCD$ 中，$AB=6$，$BD=10$，$O$ 为对角线 $BD$ 的中点，

      $E$ 为边 $BC$ 上一点，连接 $AE$，取 $AE$ 的中点 $F$，连接 $OF$。

      若 $BE=2$，则 $OF$ 的长为多少？

      '
    diagram_col:
      image_path: build/diagram/jobs/explanation-orig-prompt/rendered/prompt.png
      diagram_ref: explanation.orig.prompt
      diagram_job_id: explanation-orig-prompt
      width: 0.30\linewidth
      caption: 原题图：看清 $O,F$。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:cbaea5f3d50f7c3e0dc12a39a876e8b4cb47cf702c2531f9fdd7c98bc2d07ffc
- id: route-section
  title: 一、解题路线
  type: explanation
  visibility: student
  blocks:
  - type: route
    id: route
    steps:
    - id: route-find-width
      latex: 先求矩形的另一条边
      content_latex: '在直角三角形 $BCD$ 中，$BD=10$，$CD=AB=6$，所以

        $$

        BC=\sqrt{10^2-6^2}=8.

        $$

        因此 $AD=BC=8$。

        '
    - id: route-add-midpoint
      latex: 在 $AB$ 上补取中点 $M$
      content_latex: '题目已经给了两个中点：$O$ 是 $BD$ 的中点，$F$ 是 $AE$ 的中点。

        为了让它们进入中位线，补取 $M$ 为 $AB$ 的中点。

        '
    - id: route-big-midline
      latex: "看 $\triangle ABD$ 中的中位线"
      content_latex: '在 $\triangle ABD$ 中，$M$ 是 $AB$ 的中点，$O$ 是 $BD$ 的中点，

        所以 $MO$ 是中位线，且

        $$

        MO=\frac12 AD=\frac12\times 8=4.

        $$

        '
    - id: route-small-midline
      latex: "看 $\triangle ABE$ 中的中位线"
      content_latex: '在 $\triangle ABE$ 中，$M$ 是 $AB$ 的中点，$F$ 是 $AE$ 的中点，

        所以 $MF$ 是中位线，且

        $$

        MF=\frac12 BE=\frac12\times 2=1.

        $$

        '
    - id: route-subtract
      latex: 用同一直线上的两段相减
      content_latex: '$MO\parallel AD$，$MF\parallel BE$，且 $AD\parallel BE$，所以 $M,F,O$
        共线。

        图中 $F$ 在 $M$ 与 $O$ 之间，因此

        $$

        OF=MO-MF=4-1=3.

        $$

        '
- id: solution
  title: 二、标准讲解
  type: explanation
  visibility: student
  blocks:
  - type: problemcard
    id: midpoint-figure
    label: 辅助图
    stem_latex: '关键动作：在 $AB$ 上取中点 $M$。

      这样 $M,O$ 进入 $\triangle ABD$，$M,F$ 进入 $\triangle ABE$。

      '
    diagram_col:
      image_path: build/diagram/jobs/explanation-solution-annotated/rendered/solution.png
      diagram_ref: explanation.solution.annotated
      diagram_job_id: explanation-solution-annotated
      width: 0.30\linewidth
      caption: 补 $M$：$MO=4$，$MF=1$。
      variant: solution
      disclosure_policy: annotated
      artifact_hash: sha256:2a74814b3bbba62ce4bbd560c35a25c230eac90500cabaa760487675dde86871
  - type: dual_explanation
    id: sol-main
    label: 本题
    stem_latex: 求 $OF$ 的长。
    side_title: 提示与易错
    side_items:
    - kind: hint
      title: 入口
      content_latex: $O,F$ 已经是中点，但还不能直接组成一条中位线；补取 $AB$ 的中点 $M$。
    - kind: mistake
      title: 点序
      content_latex: 求出 $MO=4$、$MF=1$ 后要相减，不要相加，因为 $F$ 在 $M,O$ 之间。
    solution_title: 解答
    solution_step_ids:
    - route-find-width
    - route-add-midpoint
    - route-big-midline
    - route-small-midline
    - route-subtract
    connection_title: 这一步为什么自然
    connection_items:
    - latex: $O$ 和 $F$ 已经是两个中点，但它们不在同一个三角形里；补 $AB$ 的中点 $M$，就是为了让 $O$、$F$ 各自进入一个中位线。
    - latex: 最后不是 $4+1$，而是 $4-1$，因为 $MF$ 是从 $M$ 到 $F$，$MO$ 是从 $M$ 到 $O$，$F$ 在 $M,O$
        之间。
- id: summary
  title: 三、方法收束
  type: explanation
  visibility: student
  blocks:
  - type: summary_dual
    id: summary-block
    left_title: 答案
    left_items:
    - latex: $OF=3$
    right_title: 方法提醒
    right_items:
    - latex: 看到两个中点但套不上中位线时，先想：能不能补一个中点。
    - latex: 平行线间的中点连线，常常等于两条对应底边的一半之差。
