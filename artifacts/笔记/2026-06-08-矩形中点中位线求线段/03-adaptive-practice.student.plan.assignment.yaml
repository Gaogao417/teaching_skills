  grade: "八年级"
  subject: "数学"
  duration: "20分钟"
  total_points: 30
  version: "student"
  assignment_id: "2026-06-12-note-midpoint-midline-far-transfer-student"
  source_artifacts:
    structure_analysis: "artifacts/笔记/2026-06-08-矩形中点中位线求线段/01-structure-analysis.md"
