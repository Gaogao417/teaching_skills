sections:
  - id: "far-transfer"
    title: "一、远迁移练习"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "p1"
        points: 10
        label: "第1题"
        stem_latex: |
          如图，在梯形 $ABCD$ 中，$AB\parallel CD$，$AB=7$，$CD=19$。
          点 $E,F$ 分别是对角线 $AC,BD$ 的中点。求 $EF$ 的长。
        hints:
          - content: "不要只看梯形名称，先想能不能补一条经过中点的辅助线。"
          - content: "可以取 $AD$ 的中点 $M$，分别在两个三角形中看中位线。"
        answer_space:
          type: "steps"
          height: "38mm"
          diagram_slot:
            slot_id: "practice.student.trap1.prompt"
            diagram_ref: "practice.student.trap1.prompt"
            variant: "prompt"
            disclosure_policy: "clean"
            required: true
            on_failure: "fail_assignment"
            placement: "answer_space.diagram_col"
            layout_role: "answer_area_sidecar"
            width_hint: "0.32\\linewidth"
            caption: "第1题图"
            engine: "coordinate_renderer"
            diagram_kind: "coordinate_geometry"
            teaching_intent: "practice_prompt"
            semantic_constraints:
              given_objects: ["梯形 ABCD", "AB parallel CD", "E 是 AC 的中点", "F 是 BD 的中点"]
              given_constraints: ["AB=7", "CD=19"]
              clean_forbidden: ["不要画辅助点 M", "不要标注 EF 的长度"]
            visual_requirements: {show_labels: true, show_given_markers: true, show_axes: false, preferred_orientation: "landscape"}
            analytic_requirements:
              viewport: {x_min: -1, x_max: 20, y_min: -1, y_max: 5, preserve_aspect: true}
              axes: {x: false, y: false, grid: false, show_ticks: false, x_label: "", y_label: ""}
              objects:
                - type: "polygon"
                  id: "trap"
                  points: ["A", "B", "C", "D"]
                  style: {fill: "#f8fafc", stroke: "#111827", stroke_width: 2.4}
