sections:
- id: far-transfer
  title: 一、远迁移练习
  type: practice
  visibility: student
  blocks:
  - type: problem
    id: p1
    points: 10
    label: 第1题
    stem_latex: '如图，在梯形 $ABCD$ 中，$AB\parallel CD$，$AB=7$，$CD=19$。

      点 $E,F$ 分别是对角线 $AC,BD$ 的中点。求 $EF$ 的长。

      '
    hints:
    - content: 不要只看梯形名称，先想能不能补一条经过中点的辅助线。
    - content: 可以取 $AD$ 的中点 $M$，分别在两个三角形中看中位线。
    answer_space:
      type: steps
      height: 38mm
      diagram_col:
        image_path: build/diagram/jobs/practice-teacher-trap1-prompt/rendered/prompt.png
        diagram_ref: practice.teacher.trap1.prompt
        diagram_job_id: practice-teacher-trap1-prompt
        width: 0.32\linewidth
        caption: 第1题图
        variant: prompt
        disclosure_policy: clean
        artifact_hash: sha256:c499b6dfa5560e90c6cea33d01eba52a9f278c8f995fc350f718e377326312a7
    answer: $EF=6$。
    explanation: 取 $M$ 为 $AD$ 的中点。在 $\triangle ACD$ 中，$ME=\frac12CD=9.5$；在 $\triangle
      ABD$ 中，$MF=\frac12AB=3.5$。两段同向且 $F$ 在 $M,E$ 之间，所以 $EF=ME-MF=6$。
    solution_steps:
    - title: 补辅助中点
      content: 取 $M$ 为 $AD$ 的中点，使 $M,E$ 和 $M,F$ 分别进入两个三角形的中位线。
    - title: 两次中位线
      content: 在 $\triangle ACD$ 中，$ME=\frac12CD=9.5$；在 $\triangle ABD$ 中，$MF=\frac12AB=3.5$。
    - title: 比较两段
      content: $AB\parallel CD$，所以 $ME$ 与 $MF$ 同向共线，$EF=9.5-3.5=6$。
    teaching:
      teaching_goal: 把原题的补中点结构迁移到梯形对角线中点
      expected_blocker: 只想套梯形中位线公式，忽略对角线中点需要补点
      entry_point: hidden_structure
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 不增加计算难度，只换几何包装
      upgrade_rule: 能主动补 $AD$ 中点，并说出两个三角形
      fallback_move: 提示学生先找 E 和 F 分别在哪条线段的中点
  - type: problem
    id: p2
    points: 10
    label: 第2题
    stem_latex: '如图，在梯形 $ABCD$ 中，$AB\parallel CD$，$AB=8$。

      点 $E,F$ 分别是对角线 $AC,BD$ 的中点，且 $EF=5$。求 $CD$ 的长。

      '
    hints:
    - content: 先把第1题的结论写成底边差的一半。
    - content: 注意这题反求的是较长的下底。
    answer_space:
      type: steps
      height: 38mm
      diagram_col:
        image_path: build/diagram/jobs/practice-teacher-trap2-prompt/rendered/prompt.png
        diagram_ref: practice.teacher.trap2.prompt
        diagram_job_id: practice-teacher-trap2-prompt
        width: 0.32\linewidth
        caption: 第2题图
        variant: prompt
        disclosure_policy: clean
        artifact_hash: sha256:d11bf074e73b2666abc1b1437080780c6f330de9aff30639ab78ebd048b2ab90
    answer: $CD=18$。
    explanation: 由第1题结构可得 $EF=\frac12(CD-AB)$。所以 $5=\frac12(CD-8)$，解得 $CD=18$。
    solution_steps:
    - title: 写出结构关系
      content: 对角线中点连线等于两底差的一半：$EF=\frac12(CD-AB)$。
    - title: 代入反求
      content: $5=\frac12(CD-8)$，所以 $CD-8=10$，$CD=18$。
    teaching:
      teaching_goal: 训练把远迁移结论反向使用
      expected_blocker: 把 $EF$ 误写成两底和的一半
      entry_point: reverse_construct
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 只反求底边，不引入新计算
      upgrade_rule: 能解释为什么是底边差而不是底边和
      fallback_move: 回到第1题的补点图，重新比较两条半底
  - type: problem
    id: p3
    points: 10
    label: 第3题
    stem_latex: '如图，两条直线 $l_1\parallel l_2$。点 $A,B$ 在 $l_1$ 上，$AB=10$；

      点 $C,D$ 在 $l_2$ 上，$CD=24$。连接 $AC$ 与 $BD$，点 $M,N$

      分别是 $AC,BD$ 的中点。求 $MN$ 的长，并说明它和梯形题有什么共同结构。

      '
    hints:
    - content: 可以把 $ABCD$ 看成一个没有强调名称的梯形。
    - content: 目标不是套矩形，而是比较两条平行线上的对应端点距离。
    answer_space:
      type: steps
      height: 42mm
      diagram_col:
        image_path: build/diagram/jobs/practice-teacher-parallel1-prompt/rendered/prompt.png
        diagram_ref: practice.teacher.parallel1.prompt
        diagram_job_id: practice-teacher-parallel1-prompt
        width: 0.32\linewidth
        caption: 第3题图
        variant: prompt
        disclosure_policy: clean
        artifact_hash: sha256:4d5dee6233367d5fc0e3d2febd2a624e2e84affa5f5027d3d405693d0a8ea860
    answer: $MN=7$。共同结构：两条平行线之间有两条交叉截线，连接截线中点，长度等于两条平行端点距离之差的一半。
    explanation: 把 $ABCD$ 看作 $AB\parallel CD$ 的梯形，$M,N$ 是两条对角线的中点，所以 $MN=\frac12(CD-AB)=\frac12(24-10)=7$。
    solution_steps:
    - title: 识别包装
      content: 虽然题目没有说梯形，但 $AB\parallel CD$，连接 $AC,BD$ 后就是同一类结构。
    - title: 使用中点连线关系
      content: $M,N$ 是两条交叉截线的中点，因此 $MN=\frac12(CD-AB)$。
    - title: 代入计算
      content: $MN=\frac12(24-10)=7$。
    teaching:
      teaching_goal: 训练去掉梯形名称后的结构识别
      expected_blocker: 看不到平行线间截线与梯形对角线中点是同一结构
      entry_point: hidden_structure
      scaffold_level: low
      variation_depth: packaged_condition
      complexity_note: 计算很轻，主要负荷放在识别包装
      upgrade_rule: 能主动把题目改说成梯形对角线中点连线
      fallback_move: 让学生用笔补出四边形 ABCD，再标出哪两条边平行
