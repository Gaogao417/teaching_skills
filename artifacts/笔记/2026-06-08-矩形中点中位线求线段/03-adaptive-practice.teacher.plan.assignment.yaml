    title: "答案与讲评"
    type: "answer_key"
    visibility: "teacher"
    blocks:
      - type: "answer"
        id: "ak-p1"
        title: "第1题"
        content_latex: "答案：$EF=6$。补 $AD$ 中点 $M$，比较 $\\frac12CD$ 与 $\\frac12AB$。"
      - type: "answer"
        id: "ak-p2"
        title: "第2题"
        content_latex: "答案：$CD=18$。由 $5=\\frac12(CD-8)$ 得出。"
      - type: "answer"
        id: "ak-p3"
        title: "第3题"
        content_latex: "答案：$MN=7$。本题是去掉“梯形”名称后的同结构远迁移。"
