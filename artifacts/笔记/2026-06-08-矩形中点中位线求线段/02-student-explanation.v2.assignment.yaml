sections:
- id: original
  title: 原题
  type: explanation
  visibility: both
  blocks:
  - type: problemcard
    id: orig
    label: 题目
    stem_latex: '如图，在矩形 $ABCD$ 中，$AB=6$，$BD=10$，$O$ 为对角线 $BD$ 的中点，

      $E$ 为边 $BC$ 上一点，连接 $AE$，取 $AE$ 的中点 $F$，连接 $OF$。

      若 $BE=2$，则 $OF$ 的长为多少？

      '
    diagram_col:
      image_path: build/diagram/jobs/explanation-v2-orig-prompt/rendered/prompt.png
      diagram_ref: explanation.v2.orig.prompt
      diagram_job_id: explanation-v2-orig-prompt
      width: 0.30\linewidth
      caption: 原题图：看清 $O,F$。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:cbaea5f3d50f7c3e0dc12a39a876e8b4cb47cf702c2531f9fdd7c98bc2d07ffc
- id: route-section
  title: 一、解题路线
  type: explanation
  visibility: student
  blocks:
  - type: route
    id: route
    steps:
    - id: route-find-width
      latex: 先求矩形的另一条边
      content_latex: '由矩形得 $CD=AB=6$，在 $\triangle BCD$ 中，

        $$

        BC=\sqrt{BD^2-CD^2}=\sqrt{10^2-6^2}=8.

        $$

        所以 $AD=BC=8$。

        '
    - id: route-add-midpoint
      latex: 在 $AB$ 上补取中点 $M$
      content_latex: '取 $M$ 为 $AB$ 的中点。

        '
      diagram_col:
        image_path: build/diagram/jobs/explanation-v2-solution-annotated/rendered/solution.png
        diagram_ref: explanation.v2.solution.annotated
        diagram_job_id: explanation-v2-solution-annotated
        width: 0.58\linewidth
        caption: 补 $M$：$MO=4$，$MF=1$。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:2a74814b3bbba62ce4bbd560c35a25c230eac90500cabaa760487675dde86871
    - id: route-big-midline
      latex: "看 $\triangle ABD$ 中的中位线"
      content_latex: '在 $\triangle ABD$ 中，由中位线定理得

        $$

        MO=\frac12AD=4.

        $$

        '
    - id: route-small-midline
      latex: "看 $\triangle ABE$ 中的中位线"
      content_latex: '在 $\triangle ABE$ 中，由中位线定理得

        $$

        MF=\frac12BE=1.

        $$

        '
    - id: route-subtract
      latex: 用同一直线上的两段相减
      content_latex: '$MO\parallel AD$，$MF\parallel BE$，且 $AD\parallel BE$，所以 $M,F,O$
        共线。

        因此

        $$

        OF=MO-MF=4-1=3.

        $$

        '
- id: solution
  title: 二、标准讲解
  type: explanation
  visibility: student
  blocks:
  - type: dual_explanation
    id: sol-main
    label: 本题
    stem_latex: 求 $OF$ 的长。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 为什么补 $M$
      content_latex: "$O$ 在 $BD$ 上，$F$ 在 $AE$ 上；补 $AB$ 的中点 $M$，才能分别组成 $\triangle ABD$\
        \ 和 $\triangle ABE$ 的中位线。"
    - kind: hint
      title: 看哪两个三角形
      content_latex: "先看大三角形 $\triangle ABD$ 得 $MO$，再看小三角形 $\triangle ABE$ 得 $MF$。"
    - kind: mistake
      title: 为什么相减
      content_latex: $M,F,O$ 共线，且 $F$ 在 $M$ 与 $O$ 之间，所以 $OF=MO-MF$，不是 $MO+MF$。
    solution_title: 解答
    solution_step_ids:
    - route-find-width
    - route-add-midpoint
    - route-big-midline
    - route-small-midline
    - route-subtract
    connection_title: 一句话收束
    connection_items:
    - latex: 本题的关键不是硬算 $O,F$ 的坐标，而是补一个中点，把两个已有中点接进中位线。
- id: summary
  title: 三、方法收束
  type: explanation
  visibility: student
  blocks:
  - type: summary_dual
    id: summary-block
    left_title: 答案
    left_items:
    - latex: $OF=3$
    right_title: 方法提醒
    right_items:
    - latex: 看到两个中点但套不上中位线时，先想：能不能补一个中点。
    - latex: 平行线间的中点连线，常常等于两条对应底边的一半之差。
