sections:
  - id: "chain-entry"
    title: "一、图象中的关键点（每题 8 分，共 24 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "choice"
        id: "q1"
        points: 8
        stem_latex: |
          点 $P$ 在第一象限，过 $P$ 分别作两坐标轴的垂线，所得矩形面积为 $8$。若 $P$ 又在直线 $y=x+2$ 上，则 $P$ 的坐标与该矩形面积分别为（\quad）。
        choices:
          A: "$P(2,4)$，面积 $8$"
          B: "$P(4,2)$，面积 $8$"
          C: "$P(2,4)$，面积 $4$"
          D: "$P(-4,-2)$，面积 $8$"
        answer: "A"
      - type: "fillin"
        id: "q2"
        points: 8
        fillin_type: "line"
        stem_latex: |
          点 $P$ 在第一象限，过 $P$ 分别作两坐标轴的垂线，所得矩形面积为 $12$。若 $P$ 还在直线 $y=x+1$ 上，以 $A(0,0)$，$B(3,0)$，$C=P$ 为相邻顶点作矩形 $ABCD$，则 $D=$ \underline{\hspace{2cm}}。
        answer: "$(0,4)$"
      - type: "fillin"
        id: "q3"
        points: 8
        fillin_type: "line"
        stem_latex: |
          已知 $A(0,0)$，$B(6,0)$，点 $C$ 在直线 $y=x$ 上。若以 $A,B,C,D$ 为四个顶点可以组成一个面积为 $18$ 的矩形，且点 $C$ 在反比例函数 $y=\dfrac{k}{x}$ 上，则 $k=$ \underline{\hspace{2cm}}。
        answer: "$9$"

  - id: "two-step-chain"
    title: "二、函数条件下的矩形与菱形（每题 12 分，共 36 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "q4"
        points: 12
        stem_latex: |
          点 $P$ 在反比例函数 $y=\dfrac{k}{x}$ 的第一象限图象上。过 $P$ 分别作两坐标轴的垂线，所得矩形面积为 $20$，且 $x_P=4$。设 $A(0,0)$，$B(4,0)$，$C=P$，点 $D$ 在 $y$ 轴上，使四边形 $ABCD$ 为矩形。求 $k$、直线 $OP$ 的解析式以及点 $C,D$。
        hints:
          - content: "先由矩形面积确定点 $P$ 的纵坐标。"
        answer_space:
          type: "steps"
          height: "55mm"
          step_count: 5
      - type: "problem"
        id: "q5"
        points: 12
        stem_latex: |
          在直线 $y=x+2$ 上取点 $C$，使 $A(0,0)$，$B(2,0)$，$C,D$ 能构成矩形。若还要求点 $C$ 所在的位置满足 $x_C+2\ge\dfrac{8}{x_C}$，求所有可能的 $C,D$。
        hints:
          - content: "先判断直线上的哪些位置符合不等式，再检查矩形条件。"
        answer_space:
          type: "steps"
          height: "65mm"
          step_count: 6
      - type: "problem"
        id: "q6"
        points: 12
        stem_latex: |
          已知 $A(0,0)$，$B(4,0)$，点 $C$ 在直线 $y=x$ 上。若四边形 $ABCD$ 是菱形，求点 $C,D$；并判断所得菱形是否也是矩形。
        hints:
          - content: "先利用邻边相等确定点 $C$，再检验是否有直角。"
        answer_space:
          type: "steps"
          height: "55mm"
          step_count: 5

  - id: "three-step-chain"
    title: "三、综合应用（每题 10 分，共 40 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "q7"
        points: 10
        stem_latex: |
          已知 $A(0,0)$，$B(8,0)$。矩形 $ABCD$ 的面积为 $16$，点 $C$ 在第一象限。若点 $C$ 同时在直线 $y=mx$ 与反比例函数 $y=\dfrac{k}{x}$ 上，求点 $C,D$ 以及 $m,k$ 的值。
        hints:
          - content: "先由矩形面积确定点 $C$，再分别代入两个函数。"
        answer_space:
          type: "steps"
          height: "58mm"
          step_count: 6
      - type: "problem"
        id: "q8"
        points: 10
        stem_latex: |
          已知 $A(0,0)$，$B(4,0)$，点 $C$ 在直线 $y=2x$ 上。是否存在点 $C,D$，使四边形 $ABCD$ 既是矩形又是菱形？请说明理由。
        hints:
          - content: "可以先按矩形条件确定可能的点，再检查邻边是否相等。"
        answer_space:
          type: "steps"
          height: "52mm"
          step_count: 5
      - type: "problem"
        id: "q9"
        points: 10
        stem_latex: |
          点 $P$ 在第一象限，过 $P$ 分别作两坐标轴的垂线，所得矩形面积为 $18$。若点 $P$ 又在直线 $y=x+3$ 上，连接 $O(0,0)$ 与 $P$ 得直线 $OP$。现有 $A(0,0)$，$B(6,0)$，在直线 $OP$ 上取点 $E$，使四边形 $ABEF$ 为菱形。求点 $P$、直线 $OP$ 的解析式以及点 $E,F$。
        hints:
          - content: "先确定点 $P$，再用直线 $OP$ 上的点表示 $E$。"
        answer_space:
          type: "steps"
          height: "75mm"
          step_count: 8
      - type: "problem"
        id: "q10"
        points: 10
        stem_latex: |
          点 $P$ 在反比例函数 $y=\dfrac{k}{x}$ 的第一象限图象上。过 $P$ 分别作两坐标轴的垂线，所得矩形面积为 $12$。若点 $P$ 又在直线 $y=x+1$ 上，设 $A(0,0)$，$B(x_P,0)$，$C=P$，四边形 $ABCD$ 为矩形。若直线 $OC$ 的解析式为 $y=mx$，求 $k$、点 $P,D$ 以及 $m$ 的值。
        hints:
          - content: "先确定 $P$，再利用 $P$ 的横、纵坐标处理矩形和直线。"
        answer_space:
          type: "steps"
          height: "75mm"
          step_count: 8
