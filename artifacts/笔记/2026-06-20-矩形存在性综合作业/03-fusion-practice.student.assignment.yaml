sections:
  - id: "model-discrimination"
    title: "一、模型辨析与关键量（每题 8 分，共 24 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "choice"
        id: "q1"
        points: 8
        stem_latex: |
          已知 $A(0,0)$，$B(4,0)$，点 $C$ 在直线 $y=2x$ 上。比较“矩形 $ABCD$”与“菱形 $ABCD$”两种固定顺序条件，下列说法正确的是（\quad）。
        choices:
          A: "两种条件都得到 $C(4,8)$"
          B: "矩形得到 $C(4,8)$，菱形得到 $C\\left(\\dfrac85,\\dfrac{16}{5}\\right)$"
          C: "矩形得到 $C\\left(\\dfrac85,\\dfrac{16}{5}\\right)$，菱形得到 $C(4,8)$"
          D: "两种条件都无解"
        answer: "B"
      - type: "fillin"
        id: "q2"
        points: 8
        fillin_type: "line"
        stem_latex: |
          点 $P$ 在第一象限，且在反比例函数 $y=\dfrac{k}{x}$ 的图像上。以 $O(0,0)$、$P$ 以及两条坐标轴上的垂足为顶点的矩形面积为 $24$，则 $k=$ \underline{\hspace{2cm}}。
        answer: "$24$"
      - type: "problem"
        id: "q3"
        points: 8
        stem_latex: |
          一次函数 $y=x+2$ 与反比例函数 $y=\dfrac{8}{x}$ 相交。求使 $x+2\ge \dfrac{8}{x}$ 的 $x$ 的取值范围。
        answer_space:
          type: "steps"
          height: "28mm"
          step_count: 3

  - id: "two-model-fusion"
    title: "二、两模型融合：存在性 + 面积/辨析（每题 12 分，共 36 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "q4"
        points: 12
        stem_latex: |
          已知 $A(0,0)$，$B(6,0)$，点 $C$ 在第一象限，且在反比例函数 $y=\dfrac{k}{x}$ 的图像上。若四边形 $ABCD$ 是矩形，且矩形面积为 $18$，求 $k$ 的值以及点 $C,D$ 的坐标。
        hints:
          - content: "固定顺序先确定 $x_C$，面积再确定 $y_C$。"
        answer_space:
          type: "steps"
          height: "48mm"
          step_count: 5
      - type: "problem"
        id: "q5"
        points: 12
        stem_latex: |
          已知 $A(0,0)$，$B(4,0)$，点 $C$ 在直线 $y=2x$ 上。
          \begin{enumerate}[label=(\arabic*)]
            \item 若四边形 $ABCD$ 是矩形，求 $C,D$；
            \item 若四边形 $ABCD$ 是菱形，求 $C,D$。
          \end{enumerate}
        hints:
          - content: "矩形看直角；菱形看邻边相等。"
        answer_space:
          type: "steps"
          height: "62mm"
          step_count: 6
      - type: "problem"
        id: "q6"
        points: 12
        stem_latex: |
          已知 $A(0,0)$，$B(6,0)$，点 $C$ 在直线 $y=x$ 上。若 $A,B,C,D$ 构成矩形，且矩形面积为 $18$，求所有可能的点 $C,D$。
        hints:
          - content: "先做无固定顺序分类，再用面积筛选。"
        answer_space:
          type: "steps"
          height: "58mm"
          step_count: 6

  - id: "three-model-fusion"
    title: "三、三模型融合与压轴（每题 10 分，共 40 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "q7"
        points: 10
        stem_latex: |
          已知 $A(0,0)$，$B(4,0)$，点 $C$ 在第一象限，同时在直线 $y=mx$ 与反比例函数 $y=\dfrac{k}{x}$ 的图像上。若四边形 $ABCD$ 是矩形，且矩形面积为 $20$，求 $m,k$ 的值以及点 $C,D$ 的坐标。
        hints:
          - content: "矩形定点，面积定高，再回到两条函数图像。"
        answer_space:
          type: "steps"
          height: "58mm"
          step_count: 6
      - type: "problem"
        id: "q8"
        points: 10
        stem_latex: |
          已知 $A(0,0)$，$B(4,0)$，点 $C$ 在直线 $y=2x$ 上。是否存在点 $C,D$，使四边形 $ABCD$ 同时是矩形和菱形？请说明理由。
        hints:
          - content: "同时是矩形和菱形就是正方形，但点 $C$ 还必须在给定直线上。"
        answer_space:
          type: "steps"
          height: "50mm"
          step_count: 5
      - type: "problem"
        id: "q9"
        points: 10
        stem_latex: |
          一次函数 $y=x+2$ 与反比例函数 $y=\dfrac{8}{x}$ 交于两点。
          \begin{enumerate}[label=(\arabic*)]
            \item 求两个交点；
            \item 取第一象限交点 $P$，以 $O(0,0)$、$P$ 及两条坐标轴上的垂足为顶点作矩形，求矩形面积；
            \item 解不等式 $x+2\ge\dfrac{8}{x}$。
          \end{enumerate}
        hints:
          - content: "交点、面积、不等式都来自同一组函数图像。"
        answer_space:
          type: "steps"
          height: "70mm"
          step_count: 7
      - type: "problem"
        id: "q10"
        points: 10
        stem_latex: |
          已知 $A(0,0)$，$B(6,0)$。
          \begin{enumerate}[label=(\arabic*)]
            \item 点 $C$ 在第一象限的反比例函数 $y=\dfrac{k}{x}$ 上，四边形 $ABCD$ 是矩形，且面积为 $24$。求 $k,C,D$；
            \item 点 $E$ 在直线 $y=2x$ 上，四边形 $ABEF$ 是菱形。求 $E,F$；
            \item 比较两个四边形的面积。
          \end{enumerate}
        hints:
          - content: "同一条底边 $AB$，分别接矩形面积模型和菱形存在性模型。"
        answer_space:
          type: "steps"
          height: "75mm"
          step_count: 8
