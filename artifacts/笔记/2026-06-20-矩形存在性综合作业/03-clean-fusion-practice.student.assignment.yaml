meta:
  title: "矩形存在性融合练习"
  subtitle: "学生版"
  grade: "八年级"
  subject: "数学"
  duration: "60分钟"
  total_points: 100
  version: "student"
  show_answers: false
  source_artifacts:
    structure_analysis: "artifacts/笔记/2026-06-20-矩形存在性综合作业/01-structure-analysis.md"
    explanation: "artifacts/笔记/2026-06-20-矩形存在性综合作业/02-student-explanation.assignment.yaml"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "basic"
    title: "一、关键点与参数（每题 8 分，共 24 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "choice"
        id: "q1"
        points: 8
        stem_latex: |
          点 $P(x,y)$ 在第一象限，满足 $xy=8$，且 $P$ 在直线 $y=x+2$ 上。点 $P$ 的坐标为（\quad）。
        choices:
          A: "$P(2,4)$"
          B: "$P(4,2)$"
          C: "$P(1,8)$"
          D: "$P(-4,-2)$"
        answer: "A"

      - type: "fillin"
        id: "q2"
        points: 8
        fillin_type: "line"
        stem_latex: |
          点 $P(x,y)$ 在第一象限，满足 $xy=12$，且 $P$ 在直线 $y=x+1$ 上。若 $A(0,0)$，$B(3,0)$，$C=P$，四边形 $ABCD$ 为矩形，则 $D=$ \underline{\hspace{2cm}}。
        answer: "$(0,4)$"

      - type: "fillin"
        id: "q3"
        points: 8
        fillin_type: "line"
        stem_latex: |
          $A(0,0)$，$B(6,0)$，点 $C$ 在直线 $y=x$ 上。若 $A,B,C,D$ 可组成面积为 $18$ 的矩形，且 $C$ 在 $y=k/x$ 上，则 $k=$ \underline{\hspace{2cm}}。
        answer: "$9$"

  - id: "filter"
    title: "二、条件筛选（每题 12 分，共 36 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "q4"
        points: 12
        stem_latex: |
          点 $P(4,y)$ 在 $y=k/x$ 的第一象限图象上，且 $4y=20$。设 $A(0,0)$，$B(4,0)$，$C=P$，四边形 $ABCD$ 为矩形。
          \begin{enumerate}[label=(\arabic*)]
            \item 求 $P,k$；
            \item 求直线 $OP$；
            \item 求 $D$。
          \end{enumerate}
        answer_space:
          type: "steps"
          height: "55mm"
          step_count: 5

      - type: "problem"
        id: "q5"
        points: 12
        stem_latex: |
          点 $C$ 在直线 $y=x+2$ 上，且满足 $x_C+2\ge 8/x_C$。已知 $A(0,0)$，$B(2,0)$，$A,B,C,D$ 可组成矩形。
          \begin{enumerate}[label=(\arabic*)]
            \item 求不等式的解集；
            \item 求所有 $C,D$。
          \end{enumerate}
        answer_space:
          type: "steps"
          height: "65mm"
          step_count: 6

      - type: "problem"
        id: "q6"
        points: 12
        stem_latex: |
          $A(0,0)$，$B(4,0)$，点 $C$ 在直线 $y=x$ 上。若四边形 $ABCD$ 为菱形，
          \begin{enumerate}[label=(\arabic*)]
            \item 求 $C,D$；
            \item 判断它是否为矩形。
          \end{enumerate}
        answer_space:
          type: "steps"
          height: "50mm"
          step_count: 5

  - id: "fusion"
    title: "三、综合应用（每题 10 分，共 40 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "q7"
        points: 10
        stem_latex: |
          $A(0,0)$，$B(8,0)$。矩形 $ABCD$ 面积为 $16$，点 $C$ 在第一象限，且 $C$ 同时在 $y=mx$ 与 $y=k/x$ 上。
          \begin{enumerate}[label=(\arabic*)]
            \item 求 $C,D$；
            \item 求 $m,k$。
          \end{enumerate}
        answer_space:
          type: "steps"
          height: "50mm"
          step_count: 5

      - type: "problem"
        id: "q8"
        points: 10
        stem_latex: |
          $A(0,0)$，$B(4,0)$，点 $C$ 在直线 $y=2x$ 上。
          \begin{enumerate}[label=(\arabic*)]
            \item 若 $ABCD$ 为矩形，求 $C,D$；
            \item 判断这个矩形是否为菱形。
          \end{enumerate}
        answer_space:
          type: "steps"
          height: "48mm"
          step_count: 5

      - type: "problem"
        id: "q9"
        points: 10
        stem_latex: |
          点 $P(x,y)$ 在第一象限，满足 $xy=18$，且 $P$ 在直线 $y=x+3$ 上。设 $A(0,0)$，$B(6,0)$，在直线 $OP$ 上取点 $E$，使 $ABEF$ 为菱形。
          \begin{enumerate}[label=(\arabic*)]
            \item 求 $P$；
            \item 求直线 $OP$；
            \item 求 $E,F$。
          \end{enumerate}
        answer_space:
          type: "steps"
          height: "68mm"
          step_count: 7

      - type: "problem"
        id: "q10"
        points: 10
        stem_latex: |
          点 $P(x,y)$ 在 $y=k/x$ 的第一象限图象上，满足 $xy=12$，且 $P$ 在直线 $y=x+1$ 上。设 $A(0,0)$，$B(x_P,0)$，$C=P$，四边形 $ABCD$ 为矩形，直线 $OC$ 为 $y=mx$。
          \begin{enumerate}[label=(\arabic*)]
            \item 求 $k,P$；
            \item 求 $D$；
            \item 求 $m$。
          \end{enumerate}
        answer_space:
          type: "steps"
          height: "62mm"
          step_count: 6
