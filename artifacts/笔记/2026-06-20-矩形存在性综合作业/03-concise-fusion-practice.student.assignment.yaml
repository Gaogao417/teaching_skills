sections:
  - id: "chain-entry"
    title: "一、图象中的关键点（每题 8 分，共 24 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "choice"
        id: "q1"
        points: 8
        stem_latex: |
          点 $P(x,y)$ 在第一象限，满足 $xy=8$，且 $P$ 在直线 $y=x+2$ 上。则 $P$ 的坐标为（\quad）。
        choices:
          A: "$P(2,4)$"
          B: "$P(4,2)$"
          C: "$P(1,8)$"
          D: "$P(-4,-2)$"
        answer: "A"
      - type: "fillin"
        id: "q2"
        points: 8
        fillin_type: "line"
        stem_latex: |
          点 $P(x,y)$ 在第一象限，满足 $xy=12$，且 $P$ 在直线 $y=x+1$ 上。若 $A(0,0)$，$B(3,0)$，$C=P$，四边形 $ABCD$ 为矩形，则 $D=$ \underline{\hspace{2cm}}。
        answer: "$(0,4)$"
      - type: "fillin"
        id: "q3"
        points: 8
        fillin_type: "line"
        stem_latex: |
          $A(0,0)$，$B(6,0)$，点 $C$ 在直线 $y=x$ 上。若 $A,B,C,D$ 可组成面积为 $18$ 的矩形，且 $C$ 在 $y=\dfrac{k}{x}$ 上，则 $k=$ \underline{\hspace{2cm}}。
        answer: "$9$"

  - id: "two-step-chain"
    title: "二、函数条件下的矩形与菱形（每题 12 分，共 36 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "q4"
        points: 12
        stem_latex: |
          点 $P(4,y)$ 在 $y=\dfrac{k}{x}$ 的第一象限图象上，且 $4y=20$。设 $A(0,0)$，$B(4,0)$，$C=P$，四边形 $ABCD$ 为矩形。求 $k$、直线 $OP$ 和点 $C,D$。
        hints:
          - content: "先求 $P$ 的纵坐标。"
        answer_space:
          type: "steps"
          height: "55mm"
          step_count: 5
      - type: "problem"
        id: "q5"
        points: 12
        stem_latex: |
          点 $C$ 在直线 $y=x+2$ 上，且满足 $x_C+2\ge\dfrac{8}{x_C}$。若 $A(0,0)$，$B(2,0)$，$C,D$ 可组成矩形，求所有 $C,D$。
        hints:
          - content: "先解不等式，再筛选矩形候选点。"
        answer_space:
          type: "steps"
          height: "65mm"
          step_count: 6
      - type: "problem"
        id: "q6"
        points: 12
        stem_latex: |
          $A(0,0)$，$B(4,0)$，点 $C$ 在直线 $y=x$ 上。若四边形 $ABCD$ 为菱形，求 $C,D$，并判断它是否为矩形。
        hints:
          - content: "先求菱形，再验直角。"
        answer_space:
          type: "steps"
          height: "55mm"
          step_count: 5

  - id: "three-step-chain"
    title: "三、综合应用（每题 10 分，共 40 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "q7"
        points: 10
        stem_latex: |
          $A(0,0)$，$B(8,0)$。矩形 $ABCD$ 面积为 $16$，点 $C$ 在第一象限，且 $C$ 同时在 $y=mx$ 与 $y=\dfrac{k}{x}$ 上。求 $C,D,m,k$。
        hints:
          - content: "先由面积求 $C$。"
        answer_space:
          type: "steps"
          height: "58mm"
          step_count: 6
      - type: "problem"
        id: "q8"
        points: 10
        stem_latex: |
          $A(0,0)$，$B(4,0)$，点 $C$ 在直线 $y=2x$ 上。是否存在 $C,D$，使 $ABCD$ 既是矩形又是菱形？说明理由。
        hints:
          - content: "先求矩形候选，再验邻边。"
        answer_space:
          type: "steps"
          height: "52mm"
          step_count: 5
      - type: "problem"
        id: "q9"
        points: 10
        stem_latex: |
          点 $P(x,y)$ 在第一象限，满足 $xy=18$，且 $P$ 在直线 $y=x+3$ 上。设 $A(0,0)$，$B(6,0)$，在直线 $OP$ 上取点 $E$，使 $ABEF$ 为菱形。求 $P$、直线 $OP$ 和 $E,F$。
        hints:
          - content: "先求 $P$ 和直线 $OP$。"
        answer_space:
          type: "steps"
          height: "75mm"
          step_count: 8
      - type: "problem"
        id: "q10"
        points: 10
        stem_latex: |
          点 $P(x,y)$ 在 $y=\dfrac{k}{x}$ 的第一象限图象上，满足 $xy=12$，且 $P$ 在直线 $y=x+1$ 上。设 $A(0,0)$，$B(x_P,0)$，$C=P$，四边形 $ABCD$ 为矩形，直线 $OC$ 为 $y=mx$。求 $k,P,D,m$。
        hints:
          - content: "先求 $P$。"
        answer_space:
          type: "steps"
          height: "75mm"
          step_count: 8
