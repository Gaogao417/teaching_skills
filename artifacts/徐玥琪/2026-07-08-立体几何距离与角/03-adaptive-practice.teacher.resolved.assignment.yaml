- id: problem
  title: 三、解答题（共 60 分）
  type: practice
  visibility: teacher
  blocks:
  - type: problem
    id: p3
    points: 12
    label: 第 3 题（基础，12 分）
    stem_latex: "正方体 $ABCD\\text{-}A_1B_1C_1D_1$ 的棱长为 $2$，$O$ 为 $AC$ 与 $BD$ 的交点。\n\
      \\begin{enumerate}[label=(\\arabic*)]\n  \\item 证明 $BD_1\\perp AC$；\n  \\item\
      \ 求截面 $AB_1C$ 与底面 $ABCD$ 所成二面角 $A\\text{-}AC\\text{-}B_1$ 的余弦值。\n\\end{enumerate}\n"
    hints:
    - content: （1）用三垂线定理：$BD\perp AC$，$D_1D\perp$ 底面，得 $BD_1\perp AC$。（2）$BD_1\perp
        AC$，$BD\perp AC$，$\angle D_1BD$ 是平面角。
    answer: (1) 见解析；(2) $\dfrac{\sqrt3}{3}$。
    solution_steps:
    - title: (1) 三垂线定理证 $BD_1\perp AC$
      content: 正方形对角线 $BD\perp AC$，$D_1D\perp$ 底面 $ABCD$，$BD$ 为 $BD_1$ 在底面射影，由三垂线定理得
        $BD_1\perp AC$。
    - title: (2) 定棱与平面角顶点
      content: 截面 $AB_1C$ 与底面 $ABCD$ 的棱为 $AC$。取 $AC$ 中点 $O$（$O$ 在棱上）。正方形中 $OB\perp
        AC$（对角线互相垂直平分）；$BB_1\perp$ 底面，$OB$ 为 $OB_1$ 在底面射影，由三垂线定理 $OB_1\perp AC$。故
        $\angle B_1OB$ 为平面角（两边 $OB$、$OB_1$ 都 $\perp$ 棱 $AC$，顶点 $O$ 在棱上）。
    - title: (2) 在直角三角形里算
      content: $OB=\dfrac12 BD=\dfrac12\cdot2\sqrt2=\sqrt2$；$\text{Rt}\triangle B_1OB$
        中 $B_1B=2$，$OB_1=\sqrt{B_1B^2+OB^2}=\sqrt{4+2}=\sqrt6$。
    - title: (2) 解余弦
      content: $\cos\angle B_1OB=\dfrac{OB}{OB_1}=\dfrac{\sqrt2}{\sqrt6}=\dfrac{\sqrt3}{3}$，即所求二面角余弦值为
        $\dfrac{\sqrt3}{3}$。
    teaching:
      teaching_goal: 二面角：垂线法作平面角 + 直角三角形计算
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 平面角两边不都垂直于棱，或取错棱
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 一次勾股 + 一次三角
      fallback_move: 平面角必须两边都 $\perp$ 棱
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-p3-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.p3.prompt
      diagram_job_id: practice-p3-prompt
      width: 70mm
      caption: 正方体，标出截面 $AB_1C$ 与对角线 $BD_1$。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:207c52152a93103980fe030ae0a9d280dfb9ab7eb2f6eedb2a2431e47e070c10
      packages:
      - tikz
      libraries: []
  - type: problem
    id: p5
    points: 14
    label: 第 5 题（中档，14 分）
    stem_latex: '在三棱锥 $P\text{-}ABC$ 中，$PA\perp$ 平面 $ABC$，$PA=2$，$AB=AC=2$，$\angle
      BAC=120^{\circ}$。求点 $A$ 到平面 $PBC$ 的距离。

      '
    hints:
    - content: 点 $A$ 到面 $PBC$ 的距离用等体积法：$V_{P\text{-}ABC}=V_{A\text{-}PBC}$。先算 $S_{\triangle
        ABC}$ 和 $S_{\triangle PBC}$。注意 $PA\perp$ 底面，可先算 $PB$、$PC$。
    answer: $\dfrac{2\sqrt5}{5}$
    solution_steps:
    - title: 算 $S_{\triangle ABC}$
      content: $S_{\triangle ABC}=\dfrac12\cdot AB\cdot AC\cdot\sin120^\circ=\dfrac12\cdot2\cdot2\cdot\dfrac{\sqrt3}{2}=\sqrt3$。
    - title: 算 $PB$、$PC$、$BC$
      content: $PA\perp$ 底面，$PB=PC=\sqrt{PA^2+AB^2}=\sqrt{4+4}=2\sqrt2$；$BC=\sqrt{AB^2+AC^2-2AB\cdot
        AC\cos120^\circ}=\sqrt{4+4+4}=2\sqrt3$。
    - title: 算 $S_{\triangle PBC}$
      content: $\triangle PBC$ 等腰（$PB=PC=2\sqrt2$），取 $BC$ 中点 $M$，$PM=\sqrt{PB^2-\left(\dfrac{BC}{2}\right)^2}=\sqrt{8-3}=\sqrt5$，$S_{\triangle
        PBC}=\dfrac12\cdot BC\cdot PM=\dfrac12\cdot2\sqrt3\cdot\sqrt5=\sqrt{15}$。
    - title: 等体积法列方程
      content: 设 $A$ 到面 $PBC$ 距离为 $d$。$V_{P\text{-}ABC}=\dfrac13 S_{\triangle ABC}\cdot
        PA=\dfrac13\cdot\sqrt3\cdot2=\dfrac{2\sqrt3}{3}$；$V_{A\text{-}PBC}=\dfrac13
        S_{\triangle PBC}\cdot d=\dfrac13\cdot\sqrt{15}\cdot d$。
    - title: 解 $d$
      content: 由 $\dfrac{2\sqrt3}{3}=\dfrac13\cdot\sqrt{15}\cdot d$，得 $d=\dfrac{2\sqrt3}{\sqrt{15}}=\dfrac{2}{\sqrt5}=\dfrac{2\sqrt5}{5}$。
    teaching:
      teaching_goal: 等体积法求点面距（核心基本元）
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 等积方程底—高配错，或硬作垂线段猜垂足
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 等体积一次，根式化简
      fallback_move: 点面距垂足不显然立刻转等体积
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-p5-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.p5.prompt
      diagram_job_id: practice-p5-prompt
      width: 70mm
      caption: 三棱锥，标出 $PA\perp$ 底面及点 $A$ 到面 $PBC$ 的距离。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:7c91afdaafb3a82d3cc313d159afac776ec3ed67606bd2ba24e17595eca59562
      packages:
      - tikz
      libraries: []
  - type: problem
    id: p6
    points: 12
    label: 第 6 题（中档，12 分）
    stem_latex: "在正三棱柱 $ABC\\text{-}A_1B_1C_1$ 中，底面边长为 $2$，侧棱 $AA_1=2$，$D$ 为 $BC$\
      \ 的中点。\n\\begin{enumerate}[label=(\\arabic*)]\n  \\item 证明 $A_1D\\perp BC$；\n\
      \  \\item 求直线 $A_1B$ 与底面 $ABC$ 所成角的正切值。\n\\end{enumerate}\n"
    hints:
    - content: （1）$AD\perp BC$（正三角形中线即高），$A_1A\perp$ 底面，由三垂线定理得 $A_1D\perp BC$。（2）$A_1B$
        与底面所成角 = $A_1B$ 与射影 $AB$ 的夹角，在 $\text{Rt}\triangle A_1AB$ 中算。
    answer: (1) 见解析；(2) $\tan=1$（即 $45^\circ$）。
    solution_steps:
    - title: (1) 三垂线定理证 $A_1D\perp BC$
      content: 正三角形中 $AD$ 为 $BC$ 边中线即高，$AD\perp BC$；侧棱 $AA_1\perp$ 底面 $ABC$，$AD$ 为
        $A_1D$ 在底面射影，由三垂线定理得 $A_1D\perp BC$。
    - title: (2) 定射影与线面角
      content: $AA_1\perp$ 底面，$B$ 为斜足，$AB$ 为 $A_1B$ 在底面射影，$\angle A_1BA$ 即直线 $A_1B$
        与底面所成角。
    - title: (2) 在直角三角形里算
      content: $\text{Rt}\triangle A_1AB$ 中 $A_1A=2$（对边）、$AB=2$（邻边）。
    - title: (2) 解正切
      content: $\tan\angle A_1BA=\dfrac{A_1A}{AB}=\dfrac{2}{2}=1$，即线面角为 $45^\circ$。
    teaching:
      teaching_goal: 线面角：射影法 + 三垂线定理证垂直
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 线面角取成 $A_1B$ 与 $AD$ 或其他棱的夹角
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 两小问，简单根式
      fallback_move: 先证侧棱⊥底面得射影
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-p6-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.p6.prompt
      diagram_job_id: practice-p6-prompt
      width: 70mm
      caption: 正三棱柱，标出 $A_1D$、$BC$ 及 $A_1B$ 与底面的线面角。
      variant: prompt
