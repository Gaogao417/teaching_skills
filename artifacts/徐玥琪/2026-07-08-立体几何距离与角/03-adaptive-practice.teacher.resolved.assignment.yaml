  - type: choice
    id: c7
    points: 8
    label: 第 7 题（提高）
    stem: 用余弦定理算得两条异面直线平移后的夹角 $\theta$ 满足 $\cos\theta=-\dfrac{\sqrt2}{2}$。则这两条异面直线所成角为（　　）。
    choices:
      A: $45^\circ$
      B: $135^\circ$
      C: $60^\circ$
      D: $120^\circ$
    hints:
    - content: 异面直线所成角范围是 $(0^\circ,90^\circ]$，算出钝角要取补角。
    answer: A
    explanation: 异面直线所成角规定为锐角或直角，范围 $(0^\circ,90^\circ]$。$\cos\theta=-\dfrac{\sqrt2}{2}$
      对应 $\theta=135^\circ$（钝角），须取补角 $180^\circ-135^\circ=45^\circ$（等价于对余弦取绝对值 $\left|-\dfrac{\sqrt2}{2}\right|=\dfrac{\sqrt2}{2}$）。故所成角为
      $45^\circ$，选 A。
    teaching:
      teaching_goal: 异面直线所成角取锐角/直角的补角规则
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 异面角取钝角没补角，直接选 135°
      entry_point: solve_and_check
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 单步判断
      fallback_move: 复习异面角范围 $(0^\circ,90^\circ]$
- id: fillin
  title: 二、填空题（每题 10 分，共 20 分）
  type: practice
  visibility: teacher
  blocks:
  - type: fillin
    id: f2
    points: 10
    label: 第 2 题（基础）
    stem: 正方体 $ABCD\text{-}A_1B_1C_1D_1$ 的棱长为 $2$。则顶点 $A_1$ 到对角面 $BDD_1B_1$ 的距离为 $\underline{\hspace{2em}}$。
    hints:
    - content: 点面距、垂足位置不显然时，用等体积法：选一个三棱锥列 $V$ 相等。可试 $V_{A_1\text{-}BDD_1}=V_{D\text{-}A_1BD_1}$。
    answer: $\sqrt{2}$
    explanation: 设正方体坐标为 $A(0,0,0)$，$B(2,0,0)$，$D(0,2,0)$，$A_1(0,0,2)$，$D_1(0,2,2)$。平面
      $BDD_1B_1$ 由 $B,D,D_1$ 确定，法向量可取 $(1,1,0)$，方程为 $x+y=2$。点 $A_1(0,0,2)$ 到该平面的距离为
      $\dfrac{|0+0-2|}{\sqrt{1^2+1^2}}=\sqrt2$。
    teaching:
      teaching_goal: 等体积法/坐标法求点面距
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 硬猜垂足位置，或等积方程底—高配错
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 等体积法一次，小整数
      fallback_move: 垂足不显然立刻转等体积
    solution_steps:
    - title: 建系写平面方程
      content: 取 $B(2,0,0)$，$D(0,2,0)$，$D_1(0,2,2)$，平面 $BDD_1B_1$ 的方程为 $x+y=2$。
    - title: 点面距离公式
      content: $A_1(0,0,2)$ 到 $x+y=2$ 的距离为 $\dfrac{2}{\sqrt2}=\sqrt2$。
