  - type: problem
    id: p9
    points: 12
    label: 第 9 题（提高，12 分）
    stem_latex: "在棱长为 $2$ 的正四面体 $P\\text{-}ABC$ 中，$O$ 为底面 $\\triangle ABC$ 的中心。\n\\\
      begin{enumerate}[label=(\\arabic*)]\n  \\item 求点 $P$ 到平面 $ABC$ 的距离；\n  \\item\
      \ 设 $E$、$F$ 分别为 $PA$、$BC$ 的中点，求异面直线 $PA$ 与 $BC$ 的距离。\n\\end{enumerate}\n"
    hints:
    - content: （1）$PO\perp$ 底面，在 $\text{Rt}\triangle PAM$（$M$ 为 $BC$ 中点）里算 $PO$。（2）$E$、$F$
        为 $PA$、$BC$ 中点，$EF$ 为异面直线 $PA$ 与 $BC$ 的公垂线段，在 $\triangle PAM$ 里求 $EF$。
    answer: (1) $\dfrac{2\sqrt6}{3}$；(2) $\sqrt2$。
    solution_steps:
    - title: (1) 找高 $PO$
      content: 正四面体顶点射影为底面中心 $O$，$PO\perp$ 底面。设 $M$ 为 $BC$ 中点，$AM=\dfrac{\sqrt3}{2}\cdot2=\sqrt3$，$AO=\dfrac23
        AM=\dfrac{2\sqrt3}{3}$。
    - title: (1) 在直角三角形里算
      content: $\text{Rt}\triangle PAO$ 中 $PO=\sqrt{PA^2-AO^2}=\sqrt{4-\dfrac{12}{9}}=\sqrt{4-\dfrac43}=\sqrt{\dfrac83}=\dfrac{2\sqrt6}{3}$。
    - title: (2) 证 $EF$ 为公垂线
      content: $AM\perp BC$（正三角形中线），$PM\perp BC$（$PM=\sqrt{PO^2+OM^2}$，$OM=\dfrac{\sqrt3}{3}$，$PM=\sqrt{\dfrac83+\dfrac13}=\sqrt3$），故
        $BC\perp$ 面 $PAM$。$E$ 为 $PA$ 中点，$M(=F)$ 在面 $PAM$ 内。$\triangle PAM$ 等腰（$PM=AM=\sqrt3$），$E$
        为底 $PA$ 中点，$EM\perp PA$；又 $EM\subset$ 面 $PAM$，$BC\perp EM$。故 $EF=EM$ 为 $PA$
        与 $BC$ 的公垂线段。
    - title: (2) 求 $EF$
      content: $\text{Rt}\triangle EAM$ 中 $AM=\sqrt3$，$AE=\dfrac12 PA=1$，$EF=EM=\sqrt{AM^2-AE^2}=\sqrt{3-1}=\sqrt2$。
