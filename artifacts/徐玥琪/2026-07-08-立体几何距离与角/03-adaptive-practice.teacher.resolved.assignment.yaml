  - type: fillin
    id: f4
    points: 10
    label: 第 4 题（中档）
    stem: 正四棱锥 $P\text{-}ABCD$ 的底面边长为 $2$，侧棱 $PA=3$，$O$ 为底面中心。则侧棱 $PA$ 与底面 $ABCD$
      所成角的正切值为 $\underline{\hspace{2em}}$。
    hints:
    - content: 侧棱与底面的线面角 = 斜线 $PA$ 与射影 $AO$ 的夹角。先求高 $PO$ 和 $AO$。
    answer: $\dfrac{\sqrt{14}}{2}$
    explanation: 正四棱锥顶点在底面射影为底面中心 $O$，$PO\perp$ 底面，$AO$ 为 $PA$ 在底面射影，$\angle PAO$
      即所求线面角。$AO=\dfrac12 AC=\dfrac12\cdot 2\sqrt2=\sqrt2$，$PO=\sqrt{PA^2-AO^2}=\sqrt{9-2}=\sqrt7$。故
      $\tan\angle PAO=\dfrac{PO}{AO}=\dfrac{\sqrt7}{\sqrt2}=\dfrac{\sqrt{14}}{2}$。
    teaching:
      teaching_goal: 线面角：找射影，直角三角形里算正切
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 线面角取成 $PA$ 与棱 $AB$ 的夹角，或把正余弦搞反
      entry_point: find_entry
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 一次勾股，简单根式
      fallback_move: 先写 $PO\perp$ 底面得射影 $AO$
