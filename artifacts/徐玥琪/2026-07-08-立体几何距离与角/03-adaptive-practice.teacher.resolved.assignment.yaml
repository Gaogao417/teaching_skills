      width: 70mm
      caption: 正方体，标出 $D_1$ 到 $AC$ 的垂线段 $D_1O$。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:e71c7b457427e3c9f704b074f872ec757184ca65655dccd1f0097ad0a226a2d7
      packages:
      - tikz
