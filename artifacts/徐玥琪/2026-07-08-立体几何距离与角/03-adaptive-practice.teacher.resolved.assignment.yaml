  - type: choice
    id: c1
    points: 8
    label: 第 1 题（基础）
    stem: 直线 $l$ 与平面 $\alpha$ 斜交，$l$ 上一点 $P$（斜足外）在 $\alpha$ 内的射影为 $P'$，斜足为 $A$。下列说法正确的是（　　）。
    choices:
      A: 直线 $l$ 与平面 $\alpha$ 所成的角是 $\angle PAP'$
      B: 直线 $l$ 与平面 $\alpha$ 所成的角是 $\angle lAA'$，其中 $AA'\perp\alpha$
      C: 直线 $l$ 与平面 $\alpha$ 所成的角是 $l$ 与 $\alpha$ 内任意一条直线的夹角
      D: 线面角可以大于 $90^\circ$
    hints:
    - content: 线面角 = 斜线与其在面内射影的夹角。先有垂线才有射影。
    answer: A
    explanation: 线面角定义为斜线与其在面内射影的夹角。$P$ 的射影为 $P'$，斜足为 $A$，射影即 $AP'$，故线面角为 $\angle
      PAP'$，选 A。B 误在再作垂线混淆对象；C 射影是唯一确定的，不是任意直线；D 线面角范围为 $[0^\circ,90^\circ]$。
    teaching:
      teaching_goal: 辨析线面角定义：斜线与射影的夹角
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 线面角取成斜线与面内某条棱的夹角
      entry_point: read_context
      scaffold_level: high
      variation_depth: changed_representation
      complexity_note: 概念辨析，无计算
      fallback_move: 回到"先有垂线才有射影"
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-c1-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.c1.prompt
      diagram_job_id: practice-c1-prompt
      width: 70mm
      caption: 斜线 $l$、斜足 $A$、射影 $AP'$。
      variant: prompt
