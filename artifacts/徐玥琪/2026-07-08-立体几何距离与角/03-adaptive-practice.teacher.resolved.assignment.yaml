  - type: problem
    id: p8
    points: 10
    label: 第 8 题（提高，10 分）
    stem_latex: '正方体 $ABCD\text{-}A_1B_1C_1D_1$ 的棱长为 $2$。求点 $D_1$ 到直线 $AC$ 的距离。

      '
    hints:
    - content: 连 $BD$ 交 $AC$ 于 $O$。$D_1D\perp$ 底面，$BD\perp AC$，由三垂线定理 $D_1O\perp AC$，$D_1O$
        即为所求。
    answer: $\sqrt{6}$
    solution_steps:
    - title: 找垂足 $O$
      content: 连 $BD$ 交 $AC$ 于 $O$（正方形对角线交点），则 $O$ 为 $AC$ 中点。
    - title: 三垂线定理定垂线
      content: $D_1D\perp$ 底面，$BD\perp AC$，$DO$ 为 $D_1O$ 在底面射影，由三垂线定理得 $D_1O\perp
        AC$，$D_1O$ 即 $D_1$ 到 $AC$ 的距离。
    - title: 在直角三角形里算
      content: $\text{Rt}\triangle D_1DO$ 中 $D_1D=2$，$DO=\dfrac12 BD=\dfrac12\cdot2\sqrt2=\sqrt2$，故
        $D_1O=\sqrt{D_1D^2+DO^2}=\sqrt{4+2}=\sqrt6$。
    teaching:
      teaching_goal: 点到线距离：三垂线定理找垂足
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 找不到垂足，或把 $D_1A$ 当距离
      entry_point: find_entry
      scaffold_level: low
      variation_depth: changed_representation
      complexity_note: 一次勾股
      fallback_move: 点到线距离用三垂线找垂足
