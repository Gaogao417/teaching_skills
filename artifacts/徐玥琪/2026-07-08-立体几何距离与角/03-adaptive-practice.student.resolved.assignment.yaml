  - type: problem
    id: p3
    points: 12
    label: 第 3 题（基础，12 分）
    stem_latex: "正方体 $ABCD\\text{-}A_1B_1C_1D_1$ 的棱长为 $2$，$O$ 为 $AC$ 与 $BD$ 的交点。\n\
      \\begin{enumerate}[label=(\\arabic*)]\n  \\item 证明 $BD_1\\perp AC$；\n  \\item\
      \ 求截面 $AB_1C$ 与底面 $ABCD$ 所成二面角 $A\\text{-}AC\\text{-}B_1$ 的余弦值。\n\\end{enumerate}\n"
    hints:
    - content: （1）用三垂线定理：$BD\perp AC$（正方形对角线互相垂直），$D_1D\perp$ 底面，得 $BD_1\perp AC$。（2）截面
        $AB_1C$ 与底面的棱为 $AC$，取 $AC$ 中点 $O$，$OB\perp AC$，由三垂线 $OB_1\perp AC$，$\angle
        B_1OB$ 是平面角。
    answer_space:
      type: steps
      height: 62mm
      step_count: 4
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-p3-prompt/rendered/prompt.fragment.tex
