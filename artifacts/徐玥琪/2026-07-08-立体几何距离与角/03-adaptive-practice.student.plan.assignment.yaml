  - type: choice
    id: c1
    points: 8
    label: 第 1 题（基础）
    stem: 直线 $l$ 与平面 $\alpha$ 斜交，$l$ 上一点 $P$（斜足外）在 $\alpha$ 内的射影为 $P'$，斜足为 $A$。下列说法正确的是（　　）。
    choices:
      A: 直线 $l$ 与平面 $\alpha$ 所成的角是 $\angle PAP'$
      B: 直线 $l$ 与平面 $\alpha$ 所成的角是 $\angle lAA'$，其中 $AA'\perp\alpha$
      C: 直线 $l$ 与平面 $\alpha$ 所成的角是 $l$ 与 $\alpha$ 内任意一条直线的夹角
      D: 线面角可以大于 $90^\circ$
    hints:
    - content: 线面角 = 斜线与其在面内射影的夹角。先有垂线才有射影。
    diagram_slot:
      slot_id: practice.c1.prompt
      diagram_ref: practice.c1.prompt
      variant: prompt
      disclosure_policy: clean
      required: false
      on_failure: omit_diagram
      placement: block_center
      layout_role: center_block
      display_profile: worksheet_geometry_center
      caption: 斜线 $l$、斜足 $A$、射影 $AP'$。
      engine: spatial_renderer
      diagram_kind: spatial_geometry
      teaching_intent: practice_prompt
      semantic_constraints:
        given_objects:
        - l
        - alpha
        - P
        - A
        given_constraints:
        - PA斜交alpha于A
        - PP'垂直alpha
