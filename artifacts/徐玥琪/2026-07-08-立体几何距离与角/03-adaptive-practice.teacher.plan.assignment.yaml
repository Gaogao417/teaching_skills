    answer: (1) 见解析；(2) $\dfrac{\sqrt3}{3}$。
    solution_steps:
    - title: (1) 三垂线定理证 $BD_1\perp AC$
      content: 正方形对角线 $BD\perp AC$，$D_1D\perp$ 底面 $ABCD$，$BD$ 为 $BD_1$ 在底面射影，由三垂线定理得 $BD_1\perp AC$。
    - title: (2) 定棱与平面角顶点
      content: 截面 $AB_1C$ 与底面 $ABCD$ 的棱为 $AC$。取 $AC$ 中点 $O$（$O$ 在棱上）。正方形中 $OB\perp AC$（对角线互相垂直平分）；$BB_1\perp$ 底面，$OB$ 为 $OB_1$ 在底面射影，由三垂线定理 $OB_1\perp AC$。故 $\angle B_1OB$ 为平面角（两边 $OB$、$OB_1$ 都 $\perp$ 棱 $AC$，顶点 $O$ 在棱上）。
    - title: (2) 在直角三角形里算
      content: $OB=\dfrac12 BD=\dfrac12\cdot2\sqrt2=\sqrt2$；$\text{Rt}\triangle B_1OB$ 中 $B_1B=2$，$OB_1=\sqrt{B_1B^2+OB^2}=\sqrt{4+2}=\sqrt6$。
    - title: (2) 解余弦
      content: $\cos\angle B_1OB=\dfrac{OB}{OB_1}=\dfrac{\sqrt2}{\sqrt6}=\dfrac{\sqrt3}{3}$，即所求二面角余弦值为 $\dfrac{\sqrt3}{3}$。
    teaching:
      teaching_goal: 二面角：垂线法作平面角 + 直角三角形计算
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 平面角两边不都垂直于棱，或取错棱
