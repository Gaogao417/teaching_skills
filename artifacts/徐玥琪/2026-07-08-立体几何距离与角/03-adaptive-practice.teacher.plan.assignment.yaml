  - type: choice
    id: c7
    points: 8
    label: 第 7 题（提高）
    stem: 用余弦定理算得两条异面直线平移后的夹角 $\theta$ 满足 $\cos\theta=-\dfrac{\sqrt2}{2}$。则这两条异面直线所成角为（　　）。
    choices:
      A: $45^\circ$
      B: $135^\circ$
      C: $60^\circ$
      D: $120^\circ$
    hints:
    - content: 异面直线所成角范围是 $(0^\circ,90^\circ]$，算出钝角要取补角。
    answer: A
    explanation: 异面直线所成角规定为锐角或直角，范围 $(0^\circ,90^\circ]$。$\cos\theta=-\dfrac{\sqrt2}{2}$ 对应 $\theta=135^\circ$（钝角），须取补角 $180^\circ-135^\circ=45^\circ$（等价于对余弦取绝对值 $\left|-\dfrac{\sqrt2}{2}\right|=\dfrac{\sqrt2}{2}$）。故所成角为 $45^\circ$，选 A。
    teaching:
      teaching_goal: 异面直线所成角取锐角/直角的补角规则
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 异面角取钝角没补角，直接选 135°
      entry_point: solve_and_check
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 单步判断
      fallback_move: 复习异面角范围 $(0^\circ,90^\circ]$
