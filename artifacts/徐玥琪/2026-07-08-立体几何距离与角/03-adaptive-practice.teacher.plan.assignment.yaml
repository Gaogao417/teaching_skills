    - title: 算 $S_{\triangle ABC}$
      content: $S_{\triangle ABC}=\dfrac12\cdot AB\cdot AC\cdot\sin120^\circ=\dfrac12\cdot2\cdot2\cdot\dfrac{\sqrt3}{2}=\sqrt3$。
    - title: 算 $PB$、$PC$、$BC$
      content: $PA\perp$ 底面，$PB=PC=\sqrt{PA^2+AB^2}=\sqrt{4+4}=2\sqrt2$；$BC=\sqrt{AB^2+AC^2-2AB\cdot AC\cos120^\circ}=\sqrt{4+4+4}=2\sqrt3$。
    - title: 算 $S_{\triangle PBC}$
      content: $\triangle PBC$ 等腰（$PB=PC=2\sqrt2$），取 $BC$ 中点 $M$，$PM=\sqrt{PB^2-\left(\dfrac{BC}{2}\right)^2}=\sqrt{8-3}=\sqrt5$，$S_{\triangle PBC}=\dfrac12\cdot BC\cdot PM=\dfrac12\cdot2\sqrt3\cdot\sqrt5=\sqrt{15}$。
