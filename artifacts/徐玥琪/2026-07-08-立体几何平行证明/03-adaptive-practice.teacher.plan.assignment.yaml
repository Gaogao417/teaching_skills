  blocks:
  - type: choice
    id: q1
    points: 5
    stem: 给出四个判断：① 若直线 $a\parallel b$，$b\subset$ 平面 $\alpha$，$a\not\subset\alpha$，则
      $a\parallel\alpha$；② 若直线 $a\parallel$ 平面 $\alpha$，则 $a$ 与 $\alpha$ 内任意一条直线都平行；③
      若 $a\parallel\alpha$，过 $a$ 作平面 $\beta$ 交 $\alpha$ 于直线 $b$，则 $a\parallel b$；④
      若 $a\parallel b$，$b\subset\alpha$，$a\subset\alpha$，则 $a\parallel\alpha$。其中正确的个数是（    ）。
    choices:
      A: '1'
      B: '2'
      C: '3'
      D: '4'
    hints:
    - content: 逐条对照判定与性质定理的前提；注意 $a$ 是否在平面内。
    answer: B
    explanation: ①是线面平行判定三件套（$a\not\subset\alpha$，$b\subset\alpha$，$a\parallel b$），正确；②漏了"过
      $a$ 作面找交线"这步，$a$ 只与 $\alpha$ 内过交线的直线平行，错；③是线面平行性质定理，正确；④$a\subset\alpha$ 时不能说
      $a\parallel\alpha$，错。故正确为①③，共 2 个，选 B。
    teaching:
      teaching_goal: 辨析线面平行判定与性质的方向和前提，区分'凑'与'用'。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 1
        models:
        - 线面平行判定/性质定理辨析
        fusion_role: single_model
      expected_blocker: 把性质当判定用——已知 $a\parallel\alpha$ 就说 $a$ 平行于 $\alpha$ 内任意直线；漏写交线。
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: same_structure
      complexity_note: 纯辨析，无计算。
      upgrade_rule: 能口头说出每条判的是'凑'还是'用'。
      fallback_move: 回到讲义转化链总图，逐条标方向。
  - type: fillin
    id: q2
    points: 6
    stem: 如图，在正方体 $ABCD$-$A_{1}B_{1}C_{1}D_{1}$ 中，$M$、$N$ 分别是 $A_{1}B_{1}$、$B_{1}C_{1}$
      的中点。线段 $MN$ 与面对角线 \underline{\hspace{3em}} 平行（填一条面对角线的字母）。
    hints:
    - content: $MN$ 是哪个三角形的中位线？再看它和哪条对角线共端点。
    answer: $A_{1}C_{1}$
    explanation: $M$、$N$ 分别是 $A_{1}B_{1}$、$B_{1}C_{1}$ 的中点，故 $MN$ 是 $\triangle A_{1}B_{1}C_{1}$
      的中位线，$MN\parallel A_{1}C_{1}$。
    teaching:
