  - type: problem
    id: q10
    points: 10
    label: 第 10 题
    stem_latex: "如图，在平行六面体 $ABCD$-$A_{1}B_{1}C_{1}D_{1}$ 中，$E$ 为棱 $AA_{1}$ 的中点，$O$\
      \ 为 $A_{1}C_{1}$ 与 $B_{1}D_{1}$ 的交点。求证：\n\\begin{enumerate}[label=(\\arabic*)]\n\
      \  \\item $EO\\parallel AC_{1}$；\n  \\item $AC_{1}\\parallel$ 平面 $EB_{1}D_{1}$。\n\
      \\end{enumerate}\n"
    hints:
    - content: (1) $E$、$O$ 分别是 $AA_{1}$、$A_{1}C_{1}$ 的中点，$EO$ 是 $\triangle AA_{1}C_{1}$
        的中位线；(2) 由 (1) 在面 $EB_{1}D_{1}$ 内找到平行线，套判定。
    answer: (1) $EO\parallel AC_{1}$；(2) $AC_{1}\parallel$ 平面 $EB_{1}D_{1}$。证明见解析。
    explanation: (1) $E$、$O$ 分别为 $AA_{1}$、$A_{1}C_{1}$ 中点，$EO$ 为 $\triangle AA_{1}C_{1}$
      中位线，$EO\parallel AC_{1}$。(2) 由 (1) $EO\parallel AC_{1}$，又 $EO\subset$ 平面 $EB_{1}D_{1}$（$E$、$O$
      均在该面内，$O$ 在 $B_{1}D_{1}$ 上），$AC_{1}\not\subset$ 平面 $EB_{1}D_{1}$，由线面平行判定定理得
      $AC_{1}\parallel$ 平面 $EB_{1}D_{1}$。
    solution_steps:
    - title: (1) 证 $EO\parallel AC_{1}$
      content: $E$、$O$ 分别是 $AA_{1}$、$A_{1}C_{1}$ 的中点，$EO$ 是 $\triangle AA_{1}C_{1}$
        的中位线，故 $EO\parallel AC_{1}$。
    - title: (2) 确认 $EO\subset$ 平面 $EB_{1}D_{1}$
      content: $E\in$ 平面 $EB_{1}D_{1}$，$O$ 在 $B_{1}D_{1}$ 上故 $O\in$ 平面 $EB_{1}D_{1}$，所以
        $EO\subset$ 平面 $EB_{1}D_{1}$。
    - title: (2) 套判定三件套
      content: $EO\parallel AC_{1}$，$EO\subset$ 平面 $EB_{1}D_{1}$，$AC_{1}\not\subset$
        平面 $EB_{1}D_{1}$，由线面平行判定定理得 $AC_{1}\parallel$ 平面 $EB_{1}D_{1}$。
    teaching:
      teaching_goal: 综合倒推：(1) 中位线造线线平行，(2) 接力前问套线面判定。练前后小问接力。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 2
        models:
        - 三角形中位线造线线平行
        - 线面平行判定（接力前问结论）
        fusion_role: prerequisite
      relation_chain:
      - step: 1
        relation_id: fallback:midline_parallel
        inputs:
          midpoints: E(mid AA1), O(mid A1C1)
        outputs:
          parallel_pair: EO parallel AC1
        constraints_checked:
        - E、O 分别是 AA1、A1C1 中点（中位线条件）
      - step: 2
        relation_id: fallback:line_plane_parallel_criterion
        consumes:
          parallel_pair: step1.outputs.parallel_pair
        inputs:
          contained_line: EO in plane EB1D1
          outside_line: AC1 not in plane EB1D1
        outputs:
          conclusion: AC1 parallel plane EB1D1
        constraints_checked:
        - EO⊂面 EB1D1（O 在 B1D1 上），AC1⊄面 EB1D1
      expected_blocker: (2) 不接力 (1) 的结论，从头找面内平行线；或没意识到 $O$ 在平面 $EB_{1}D_{1}$ 内。
      entry_point: build_relation
      scaffold_level: low
      variation_depth: changed_question
      complexity_note: 中位线给平行，无数值计算。
      upgrade_rule: 能主动用 (1) 的结论做 (2) 的桥。
      fallback_move: 先在 (2) 里把 $EO$ 画出来，确认它在面 $EB_{1}D_{1}$ 内。
    answer_space:
      type: steps
      height: 70mm
      step_count: 6
