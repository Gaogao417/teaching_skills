    items:
    - latex: 第 1 题：B（①③ 正确，共 2 个）
    - latex: 第 2 题：$A_{1}C_{1}$
    - latex: 第 3 题：连 $OE$（中位线，$OE\parallel BD_{1}$），套线面判定得 $BD_{1}\parallel$ 平面 $AEC$。
    - latex: 第 4 题：$AB_{1}$
    - latex: 第 5 题：取 $AB_{1}$ 中点 $H$，证 $EHC_{1}D$ 为平行四边形得 $DE\parallel HC_{1}$，套判定得
        $DE\parallel$ 平面 $AB_{1}C_{1}$。
    - latex: 第 6 题：连 $MO$（中位线，$MO\parallel AP$），得 $AP\parallel$ 平面 $BDM$；过 $AP$ 的面交平面
        $BDM$ 于 $l$，由性质得 $AP\parallel l$。
    - latex: 第 7 题：B（$MN\parallel PA$）
    - latex: 第 8 题：取 $AB$ 中点 $F$，证面 $CEF\parallel$ 面 $PAD$，$CE\subset$ 面 $CEF$，由面面平行其他性质得
        $CE\parallel$ 平面 $PAD$。
    - latex: 第 9 题：证面 $BCE\parallel$ 面 $AA_{1}D$，两面被面 $A_{1}DCE$ 截得 $EC\parallel A_{1}D$。
    - latex: 第 10 题：(1) $EO$ 是 $\triangle AA_{1}C_{1}$ 中位线，$EO\parallel AC_{1}$；(2)
        $EO\subset$ 面 $EB_{1}D_{1}$，$AC_{1}\not\subset$ 该面，套判定得 $AC_{1}\parallel$
        平面 $EB_{1}D_{1}$。
