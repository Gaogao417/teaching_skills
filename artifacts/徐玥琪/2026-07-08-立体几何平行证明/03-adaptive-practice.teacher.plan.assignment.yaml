  - type: problem
    id: q5
    points: 11
    label: 第 5 题
    stem_latex: '如图，在三棱柱 $ABC$-$A_{1}B_{1}C_{1}$ 中，$D$、$E$ 分别是棱 $CC_{1}$、$AB$ 的中点。求证：$DE\parallel$
      平面 $AB_{1}C_{1}$。

      '
    hints:
    - content: 取 $AB_{1}$ 的中点 $H$，连 $EH$、$HC_{1}$，先证四边形 $EHC_{1}D$ 是平行四边形。
    answer: 证明见解析：$DE\parallel HC_{1}$（平行四边形），套判定得 $DE\parallel$ 平面 $AB_{1}C_{1}$。
    explanation: 取 $AB_{1}$ 中点 $H$，连 $EH$、$HC_{1}$。$EH\parallel BB_{1}$ 且 $EH=\tfrac12
      BB_{1}$；$DC_{1}\parallel BB_{1}$ 且 $DC_{1}=\tfrac12 CC_{1}=\tfrac12 BB_{1}$，故
      $EH\parallel DC_{1}$ 且 $EH=DC_{1}$，四边形 $EHC_{1}D$ 为平行四边形，$DE\parallel HC_{1}$。$HC_{1}\subset$
      平面 $AB_{1}C_{1}$，$DE\not\subset$ 平面 $AB_{1}C_{1}$，由线面平行判定定理得 $DE\parallel$ 平面
      $AB_{1}C_{1}$。
    solution_steps:
    - title: 取 $AB_{1}$ 中点 $H$
      content: 取 $AB_{1}$ 中点 $H$，连 $EH$、$HC_{1}$。
    - title: 证 $EH\parallel DC_{1}$ 且 $EH=DC_{1}$
      content: $E$、$H$ 分别是 $AB$、$AB_{1}$ 中点，$EH\parallel BB_{1}$，$EH=\tfrac12 BB_{1}$；$D$
        是 $CC_{1}$ 中点，$DC_{1}=\tfrac12 CC_{1}$。棱柱中 $BB_{1}\parallel CC_{1}$ 且 $BB_{1}=CC_{1}$，故
        $DC_{1}\parallel BB_{1}$ 且 $DC_{1}=\tfrac12 BB_{1}$，得 $EH\parallel DC_{1}$
        且 $EH=DC_{1}$。
    - title: 证平行四边形
      content: $EH\parallel DC_{1}$ 且 $EH=DC_{1}$，四边形 $EHC_{1}D$ 为平行四边形，$DE\parallel
        HC_{1}$。
    - title: 套判定三件套
      content: $HC_{1}\subset$ 平面 $AB_{1}C_{1}$，$DE\not\subset$ 平面 $AB_{1}C_{1}$，$DE\parallel
        HC_{1}$，由线面平行判定定理得 $DE\parallel$ 平面 $AB_{1}C_{1}$。
    teaching:
      teaching_goal: 中档主力：自己造面内平行线（平行四边形），再套判定。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 2
        models:
        - 构造平行四边形造线线平行
        - 线面平行判定
        fusion_role: prerequisite
      relation_chain:
      - step: 1
        relation_id: fallback:parallelogram_midpoints
        inputs:
          midpoints: E(mid AB), H(mid AB1), D(mid CC1)
        outputs:
          parallel_pair: DE parallel HC1
        constraints_checked:
        - EH=DC1 且 EH∥DC1（中位线 + 棱柱侧棱平行）
      - step: 2
        relation_id: fallback:line_plane_parallel_criterion
        consumes:
          parallel_pair: step1.outputs.parallel_pair
        inputs:
          contained_line: HC1 in plane AB1C1
          outside_line: DE not in plane AB1C1
        outputs:
