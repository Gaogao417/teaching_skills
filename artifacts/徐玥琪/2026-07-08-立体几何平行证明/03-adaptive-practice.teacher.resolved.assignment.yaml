  - type: problem
    id: q9
    points: 10
    label: 第 9 题
    stem_latex: '如图，在四棱柱 $ABCD$-$A_{1}B_{1}C_{1}D_{1}$ 中，底面 $ABCD$ 为梯形且 $AD\parallel
      BC$。设过 $A_{1}$、$D$、$C$ 三点的平面与棱 $BB_{1}$ 交于点 $E$。求证：$EC\parallel A_{1}D$。

      '
    hints:
    - content: 用 $BE\parallel AA_{1}$、$BC\parallel AD$ 证面 $BCE\parallel$ 面 $AA_{1}D$（判定），再用面面平行性质。注意相交前提。
    answer: 证明见解析：证面 $BCE\parallel$ 面 $AA_{1}D$，两面被面 $A_{1}DCE$ 截得 $EC\parallel A_{1}D$。
    explanation: 棱柱中 $BE\parallel AA_{1}$，$AA_{1}\subset$ 平面 $AA_{1}D$，$BE\not\subset$
      平面 $AA_{1}D$，故 $BE\parallel$ 平面 $AA_{1}D$。又 $BC\parallel AD$，$AD\subset$ 平面
      $AA_{1}D$，$BC\not\subset$ 平面 $AA_{1}D$，故 $BC\parallel$ 平面 $AA_{1}D$。$BE\cap
      BC=B$，$BE$、$BC\subset$ 平面 $BCE$，由面面平行判定得平面 $BCE\parallel$ 平面 $AA_{1}D$。又平面 $A_{1}DCE\cap$
      平面 $BCE=EC$，平面 $A_{1}DCE\cap$ 平面 $AA_{1}D=A_{1}D$，由面面平行性质定理得 $EC\parallel A_{1}D$。
    solution_steps:
    - title: 证 $BE\parallel$ 平面 $AA_{1}D$
      content: 棱柱中 $BE\parallel AA_{1}$，$AA_{1}\subset$ 平面 $AA_{1}D$，$BE\not\subset$
        平面 $AA_{1}D$，故 $BE\parallel$ 平面 $AA_{1}D$。
    - title: 证 $BC\parallel$ 平面 $AA_{1}D$
      content: $BC\parallel AD$（梯形），$AD\subset$ 平面 $AA_{1}D$，$BC\not\subset$ 平面 $AA_{1}D$，故
        $BC\parallel$ 平面 $AA_{1}D$。
    - title: 套面面判定（相交前提）
      content: $BE\cap BC=B$，$BE$、$BC\subset$ 平面 $BCE$，$BE\parallel$ 平面 $AA_{1}D$，$BC\parallel$
        平面 $AA_{1}D$，由面面平行判定得平面 $BCE\parallel$ 平面 $AA_{1}D$。
    - title: 用面面平行性质
      content: 平面 $A_{1}DCE\cap$ 平面 $BCE=EC$，平面 $A_{1}DCE\cap$ 平面 $AA_{1}D=A_{1}D$，由面面平行性质定理得
        $EC\parallel A_{1}D$。
    teaching:
      teaching_goal: 提高档综合：面面判定凑出平行面，再用面面性质开成线线，判定⇒性质交替。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 3
        models:
        - 线面平行判定（凑 BE∥面、BC∥面）
        - 面面平行判定（相交前提）
        - 面面平行性质（两面被第三面截得平行交线）
        fusion_role: target_transform
      relation_chain:
      - step: 1
        relation_id: fallback:plane_plane_parallel_criterion
        inputs:
          intersecting_lines: BE, BC in plane BCE with BE∩BC=B
          parallel_to_target: BE∥面 AA1D, BC∥面 AA1D
        outputs:
          conclusion: plane BCE parallel plane AA1D
        constraints_checked:
        - BE∩BC=B（相交前提）
        - BE∥面 AA1D，BC∥面 AA1D
      - step: 2
        relation_id: fallback:plane_plane_parallel_property
        consumes:
          conclusion: step1.outputs.conclusion
        inputs:
          intersecting_plane: plane A1DCE cuts both parallel planes
        outputs:
          parallel_pair: EC parallel A1D
        constraints_checked:
        - 面 A1DCE∩面 BCE=EC，面 A1DCE∩面 AA1D=A1D
      expected_blocker: 漏相交前提 $BE\cap BC=B$；或性质定理里没写出两个交线 $EC$、$A_{1}D$。
      entry_point: build_relation
      scaffold_level: low
      variation_depth: changed_representation
      complexity_note: 无数值计算，纯论证链。
      upgrade_rule: 能独立规划'先凑面面、再用面面性质'的两步路径。
      fallback_move: 先只证面 $BCE\parallel$ 面 $AA_{1}D$，再问'面面平行能推出什么'。
    answer_space:
      type: steps
      height: 75mm
      step_count: 6
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q9-prompt/rendered/prompt.fragment.tex
      diagram_ref: q9.prompt
      diagram_job_id: q9-prompt
      width: 60mm
      caption: 证面 $BCE\parallel$ 面 $AA_{1}D$，两面被面 $A_{1}DCE$ 截出两条平行交线。
      variant: prompt
      disclosure_policy: clean
