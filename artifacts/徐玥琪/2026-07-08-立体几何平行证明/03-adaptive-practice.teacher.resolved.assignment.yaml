- id: advanced
  title: 三、提高档：面面与线面混用 + 中点比例（共 30 分）
  type: practice
  visibility: both
  layout:
    break_before: true
  blocks:
  - type: problem
    id: q8
    points: 10
    label: 第 8 题
    stem_latex: '如图，在四棱锥 $P$-$ABCD$ 中，底面四边形 $ABCD$ 满足 $AB\parallel CD$ 且 $AB=2CD$，$E$
      为 $PB$ 的中点。求证：$CE\parallel$ 平面 $PAD$。

      '
    hints:
    - content: 取 $AB$ 中点 $F$，连 $EF$、$CF$。证 $AD\parallel CF$、$EF\parallel PA$，凑出面面平行，再用面面平行的性质。
    answer: 证明见解析：证面 $CEF\parallel$ 面 $PAD$，$CE\subset$ 面 $CEF$，由面面平行其他性质得 $CE\parallel$
      面 $PAD$。
    explanation: 取 $AB$ 中点 $F$，连 $EF$、$CF$。$AF=\tfrac12 AB=CD$ 且 $AB\parallel CD$，故
      $AF\parallel CD$ 且 $AF=CD$，四边形 $ADCF$ 为平行四边形，$AD\parallel CF$。又 $E$、$F$ 分别为
      $PB$、$AB$ 中点，$EF\parallel PA$。$EF\cap CF=F$，$PA\cap AD=A$，由面面平行判定定理得平面 $CEF\parallel$
      平面 $PAD$。又 $CE\subset$ 平面 $CEF$，由面面平行的其他性质（一面内任一直线平行于另一平行面）得 $CE\parallel$ 平面
      $PAD$。
    solution_steps:
    - title: 取 $AB$ 中点 $F$
      content: 取 $AB$ 中点 $F$，连 $EF$、$CF$。
    - title: 证 $AD\parallel CF$
      content: $AF=\tfrac12 AB=CD$ 且 $AF\parallel CD$，四边形 $ADCF$ 为平行四边形，$AD\parallel
        CF$。
    - title: 证 $EF\parallel PA$
      content: $E$、$F$ 分别为 $PB$、$AB$ 中点，$EF$ 为 $\triangle PAB$ 中位线，$EF\parallel PA$。
    - title: 套面面判定（相交前提）
      content: $EF\cap CF=F$，$PA\cap AD=A$，$EF\parallel$ 平面 $PAD$，$CF\parallel$ 平面
        $PAD$，由面面平行判定得平面 $CEF\parallel$ 平面 $PAD$。
    - title: 用面面平行其他性质
      content: $CE\subset$ 平面 $CEF$，平面 $CEF\parallel$ 平面 $PAD$，故 $CE\parallel$ 平面
        $PAD$。
    teaching:
      teaching_goal: 提高档：面面判定（两相交线）+ 面面平行其他性质，走完'凑出面面再用性质'。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 3
        models:
        - 平行四边形造线线平行
        - 面面平行判定（相交前提）
        - 面面平行其他性质（面内线平行于平行面）
        fusion_role: target_transform
      relation_chain:
      - step: 1
        relation_id: fallback:plane_plane_parallel_criterion
        inputs:
          intersecting_lines: EF, CF in plane CEF with EF∩CF=F
          parallel_to_target: EF∥PA∥面 PAD, CF∥AD∥面 PAD
        outputs:
          conclusion: plane CEF parallel plane PAD
        constraints_checked:
        - EF∩CF=F（相交前提）
        - EF∥面 PAD，CF∥面 PAD
      - step: 2
        relation_id: fallback:plane_plane_other_property
        consumes:
          conclusion: step1.outputs.conclusion
        inputs:
          line_in_plane: CE in plane CEF
        outputs:
          conclusion: CE parallel plane PAD
        constraints_checked:
        - CE⊂面 CEF，面 CEF∥面 PAD
      expected_blocker: 漏写相交前提 $EF\cap CF=F$；或不会想到用面面平行其他性质，卡在最后一步。
      entry_point: build_relation
      scaffold_level: low
      variation_depth: changed_representation
      complexity_note: 比例 $AB=2CD$，手算。
      upgrade_rule: 能独立选择'凑面面再用性质'这条路径，而不是硬凑线面判定。
      fallback_move: 先只证 $AD\parallel CF$ 和 $EF\parallel PA$，再问'两条相交线分别平行于另一面能得什么'。
    answer_space:
      type: steps
      height: 75mm
      step_count: 6
