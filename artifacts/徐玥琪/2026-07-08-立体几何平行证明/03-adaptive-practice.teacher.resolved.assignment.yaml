  - type: problem
    id: q3
    points: 10
    label: 第 3 题
    stem_latex: '如图，在正方体 $ABCD$-$A_{1}B_{1}C_{1}D_{1}$ 中，$E$ 为棱 $DD_{1}$ 的中点。求证：$BD_{1}\parallel$
      平面 $AEC$。

      '
    hints:
    - content: 证线面平行用判定（凑）。在平面 $AEC$ 里找一条与 $BD_{1}$ 平行的线——取 $AC\cap BD=O$，连 $OE$。
    answer: 证明见解析：$OE\parallel BD_{1}$（中位线），套判定得 $BD_{1}\parallel$ 平面 $AEC$。
    explanation: 设 $AC\cap BD=O$，连 $OE$。$O$、$E$ 分别是 $BD$、$DD_{1}$ 的中点，$OE$ 是 $\triangle
      BDD_{1}$ 的中位线，$OE\parallel BD_{1}$。又 $OE\subset$ 平面 $AEC$，$BD_{1}\not\subset$
      平面 $AEC$，由线面平行判定定理得 $BD_{1}\parallel$ 平面 $AEC$。
    solution_steps:
    - title: 取中点连 $OE$
      content: 设 $AC\cap BD=O$（正方形对角线交点，$O$ 为 $BD$ 中点），连 $OE$。
    - title: 证 $OE\parallel BD_{1}$
      content: $O$、$E$ 分别是 $BD$、$DD_{1}$ 的中点，$OE$ 是 $\triangle BDD_{1}$ 的中位线，故 $OE\parallel
        BD_{1}$。
    - title: 套判定三件套
      content: $OE\subset$ 平面 $AEC$，$BD_{1}\not\subset$ 平面 $AEC$，$OE\parallel BD_{1}$，由线面平行判定定理得
        $BD_{1}\parallel$ 平面 $AEC$。
    teaching:
      teaching_goal: 正方体中位线 + 线面判定三件套，钉死书写格式。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 1
        models:
        - 线面平行判定（在面内找平行线）
        fusion_role: single_model
      expected_blocker: 辅助线 $OE$ 没落在目标平面 $AEC$ 内，或漏写 $BD_{1}\not\subset$ 面。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: same_structure
      complexity_note: 中位线直接给平行，无计算。
      upgrade_rule: 三件套（$a\not\subset\alpha$，$b\subset\alpha$，$a\parallel b$）一条不漏写出。
      fallback_move: 先在图上指认 $OE$ 确实在平面 $AEC$ 内。
    answer_space:
      type: steps
      height: 55mm
      step_count: 4
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q3-prompt/rendered/prompt.fragment.tex
      diagram_ref: q3.prompt
      diagram_job_id: q3-prompt
      width: 60mm
      caption: $O$ 是 $AC$ 与 $BD$ 的交点，连 $OE$ 看中位线。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:db6de26770f65fa5064a4924db7bed439ca2d08f77c339ccc24535f6e3767e0c
      packages:
      - tikz
      libraries: []
- id: medium
  title: 二、中档档：取中点连线，造面内平行线（共 39 分）
  type: practice
  visibility: both
  layout:
    break_before: true
  blocks:
  - type: fillin
    id: q4
    points: 7
    stem: 如图，在三棱柱 $ABC$-$A_{1}B_{1}C_{1}$ 中，$D$、$E$ 分别是棱 $CC_{1}$、$AB$ 的中点。要在平面 $AB_{1}C_{1}$
      内找到与 $DE$ 平行的直线，应取 \underline{\hspace{3em}} 的中点 $H$，再连 $HC_{1}$。
    hints:
    - content: 想平行四边形：$H$ 取好后，四边形 $EHC_{1}D$ 要能证成平行四边形。
    answer: $AB_{1}$
    explanation: 取 $AB_{1}$ 的中点 $H$。$E$、$H$ 分别是 $AB$、$AB_{1}$ 中点，$EH\parallel BB_{1}$
      且 $EH=\tfrac12 BB_{1}$；$D$ 是 $CC_{1}$ 中点，$DC_{1}=\tfrac12 CC_{1}=\tfrac12 BB_{1}$
      且 $DC_{1}\parallel BB_{1}$，故 $EH\parallel DC_{1}$ 且 $EH=DC_{1}$，四边形 $EHC_{1}D$
      为平行四边形，$DE\parallel HC_{1}$。
    teaching:
      teaching_goal: 训练'目标倒推'：知道要凑平行四边形，反推该取哪个中点。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 1
        models:
        - 构造平行四边形造面内平行线
        fusion_role: single_model
      expected_blocker: 取错中点——把 $H$ 取到不在平面 $AB_{1}C_{1}$ 内的位置。
      entry_point: find_entry
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 只填中点字母，无计算。
      upgrade_rule: 能独立说明为什么必须取 $AB_{1}$ 中点。
      fallback_move: 先在图上画出平面 $AB_{1}C_{1}$，再找哪个中点能让 $EHC_{1}D$ 共面。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q4-prompt/rendered/prompt.fragment.tex
      diagram_ref: q4.prompt
      diagram_job_id: q4-prompt
      width: 60mm
      caption: 三棱柱中 $D$、$E$ 为中点，构造平行四边形 $EHC_{1}D$。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:710a6e2a3653ec190da7910362f6a72ce3cb524db249da5c413401c1ff1696ba
      packages:
      - tikz
      libraries: []
  - type: problem
    id: q5
    points: 11
    label: 第 5 题
    stem_latex: '如图，在三棱柱 $ABC$-$A_{1}B_{1}C_{1}$ 中，$D$、$E$ 分别是棱 $CC_{1}$、$AB$ 的中点。求证：$DE\parallel$
      平面 $AB_{1}C_{1}$。

      '
    hints:
    - content: 取 $AB_{1}$ 的中点 $H$，连 $EH$、$HC_{1}$，先证四边形 $EHC_{1}D$ 是平行四边形。
    answer: 证明见解析：$DE\parallel HC_{1}$（平行四边形），套判定得 $DE\parallel$ 平面 $AB_{1}C_{1}$。
    explanation: 取 $AB_{1}$ 中点 $H$，连 $EH$、$HC_{1}$。$EH\parallel BB_{1}$ 且 $EH=\tfrac12
      BB_{1}$；$DC_{1}\parallel BB_{1}$ 且 $DC_{1}=\tfrac12 CC_{1}=\tfrac12 BB_{1}$，故
      $EH\parallel DC_{1}$ 且 $EH=DC_{1}$，四边形 $EHC_{1}D$ 为平行四边形，$DE\parallel HC_{1}$。$HC_{1}\subset$
      平面 $AB_{1}C_{1}$，$DE\not\subset$ 平面 $AB_{1}C_{1}$，由线面平行判定定理得 $DE\parallel$ 平面
      $AB_{1}C_{1}$。
    solution_steps:
    - title: 取 $AB_{1}$ 中点 $H$
      content: 取 $AB_{1}$ 中点 $H$，连 $EH$、$HC_{1}$。
    - title: 证 $EH\parallel DC_{1}$ 且 $EH=DC_{1}$
      content: $E$、$H$ 分别是 $AB$、$AB_{1}$ 中点，$EH\parallel BB_{1}$，$EH=\tfrac12 BB_{1}$；$D$
        是 $CC_{1}$ 中点，$DC_{1}=\tfrac12 CC_{1}$。棱柱中 $BB_{1}\parallel CC_{1}$ 且 $BB_{1}=CC_{1}$，故
        $DC_{1}\parallel BB_{1}$ 且 $DC_{1}=\tfrac12 BB_{1}$，得 $EH\parallel DC_{1}$
        且 $EH=DC_{1}$。
    - title: 证平行四边形
      content: $EH\parallel DC_{1}$ 且 $EH=DC_{1}$，四边形 $EHC_{1}D$ 为平行四边形，$DE\parallel
        HC_{1}$。
    - title: 套判定三件套
      content: $HC_{1}\subset$ 平面 $AB_{1}C_{1}$，$DE\not\subset$ 平面 $AB_{1}C_{1}$，$DE\parallel
        HC_{1}$，由线面平行判定定理得 $DE\parallel$ 平面 $AB_{1}C_{1}$。
    teaching:
      teaching_goal: 中档主力：自己造面内平行线（平行四边形），再套判定。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 2
        models:
        - 构造平行四边形造线线平行
        - 线面平行判定
        fusion_role: prerequisite
      relation_chain:
      - step: 1
        relation_id: fallback:parallelogram_midpoints
        inputs:
          midpoints: E(mid AB), H(mid AB1), D(mid CC1)
        outputs:
          parallel_pair: DE parallel HC1
        constraints_checked:
        - EH=DC1 且 EH∥DC1（中位线 + 棱柱侧棱平行）
      - step: 2
        relation_id: fallback:line_plane_parallel_criterion
        consumes:
          parallel_pair: step1.outputs.parallel_pair
        inputs:
          contained_line: HC1 in plane AB1C1
          outside_line: DE not in plane AB1C1
        outputs:
          conclusion: DE parallel plane AB1C1
        constraints_checked:
        - HC1⊂面 AB1C1，DE⊄面 AB1C1，DE∥HC1
      expected_blocker: 辅助线作错平面——把 $H$ 连到不在面 $AB_{1}C_{1}$ 的点；或证平行四边形时漏'且相等'。
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 比例均为 1/2，手算。
      upgrade_rule: 能独立选对中点并完整写出平行四边形证明。
      fallback_move: 先只连 $EH$、$HC_{1}$，在图上确认 $HC_{1}$ 在面 $AB_{1}C_{1}$ 内。
    answer_space:
      type: steps
      height: 65mm
      step_count: 5
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q5-prompt/rendered/prompt.fragment.tex
      diagram_ref: q5.prompt
      diagram_job_id: q5-prompt
      width: 60mm
      caption: 取 $H$ 为 $AB_{1}$ 中点，证 $EHC_{1}D$ 为平行四边形。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:5ac2e89119fd4af42aef50b43b0d6efe6e03759df220b8a5f043f1c40943db0c
      packages:
      - tikz
      libraries: []
  - type: problem
    id: q6
    points: 11
    label: 第 6 题
    stem_latex: '如图，在四棱锥 $P$-$ABCD$ 中，底面 $ABCD$ 为平行四边形，$O$ 为 $AC$ 与 $BD$ 的交点，$M$ 为
      $PC$ 的中点。已知 $AP\parallel$ 平面 $BDM$，过 $A$、$P$ 的平面交平面 $BDM$ 于直线 $l$。求证：$AP\parallel
      l$。

      '
    hints:
    - content: 这是性质定理（向下用）：连 $MO$ 看中位线，再写出两个平面的交线。
    answer: 证明见解析：$AP\parallel$ 平面 $BDM$，过 $AP$ 的面交平面 $BDM$ 于 $l$，由性质得 $AP\parallel
      l$。
    explanation: 连 $MO$。$M$、$O$ 分别是 $PC$、$AC$ 的中点，$MO$ 为 $\triangle PAC$ 中位线，$MO\parallel
      AP$。又 $MO\subset$ 平面 $BDM$，$AP\not\subset$ 平面 $BDM$，故 $AP\parallel$ 平面 $BDM$。设过
      $A$、$P$ 的平面为 $\beta$，则 $\beta\cap$ 平面 $BDM=l$，$AP\subset\beta$，由线面平行性质定理得 $AP\parallel
      l$。
    solution_steps:
    - title: 连 $MO$ 证中位线
      content: 连 $MO$。$M$、$O$ 分别是 $PC$、$AC$ 中点，$MO$ 为 $\triangle PAC$ 中位线，$MO\parallel
        AP$。
    - title: 确认 $AP\parallel$ 平面 $BDM$
      content: $MO\subset$ 平面 $BDM$，$AP\not\subset$ 平面 $BDM$，$AP\parallel MO$，故 $AP\parallel$
        平面 $BDM$。
    - title: 写出交线，套性质
      content: 设过 $A$、$P$ 的平面为 $\beta$，$\beta\cap$ 平面 $BDM=l$，$AP\subset\beta$，由线面平行性质定理得
        $AP\parallel l$。
    teaching:
      teaching_goal: 性质定理（向下用）的标准书写：必须写出交线这一步。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 2
        models:
        - 线面平行判定（凑出 AP∥面）
        - 线面平行性质（用掉 AP∥面得 AP∥l）
        fusion_role: target_transform
      relation_chain:
      - step: 1
        relation_id: fallback:line_plane_parallel_criterion
        inputs:
          parallel_pair: MO parallel AP
          contained_line: MO in plane BDM
          outside_line: AP not in plane BDM
        outputs:
          conclusion: AP parallel plane BDM
        constraints_checked:
        - MO⊂面 BDM，AP⊄面 BDM，MO∥AP
      - step: 2
        relation_id: fallback:line_plane_parallel_property
        consumes:
          conclusion: step1.outputs.conclusion
        inputs:
          intersecting_planes: beta meets plane BDM at line l
          line_in_beta: AP in beta
        outputs:
          parallel_pair: AP parallel l
        constraints_checked:
        - β∩面 BDM=l，AP⊂β
      expected_blocker: 判定性质方向搞反；或跳过交线 $l$ 这步，直接写 $AP\parallel l$。
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 中位线给平行，无计算。
      upgrade_rule: 能独立说明为什么必须写'交线'这一步。
      fallback_move: 在图上画出 $\beta\cap$ 面 $BDM=l$，指认 $l$。
    answer_space:
      type: steps
      height: 60mm
      step_count: 5
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q6-prompt/rendered/prompt.fragment.tex
      diagram_ref: q6.prompt
      diagram_job_id: q6-prompt
      width: 60mm
      caption: $MO$ 是 $\triangle PAC$ 的中位线，$MO\parallel AP$ 且在面 $BDM$ 内。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:8cd318cc0716cf8e2236b45a660cad22381a1200e2a079ab6aea6f0de0646d0a
      packages:
      - tikz
      libraries: []
  - type: choice
    id: q7
    points: 10
    stem: 如图，在四棱锥 $P$-$ABCD$ 中，$M$、$N$ 分别在 $AC$、$PC$ 上，且 $MN\parallel$ 平面 $PAD$，则
      $MN$ 与 $PA$ 的位置关系是（    ）。
    choices:
      A: $MN\parallel PD$
      B: $MN\parallel PA$
      C: $MN\parallel AD$
      D: 都有可能
    hints:
    - content: $MN\subset$ 平面 $PAC$，平面 $PAC\cap$ 平面 $PAD=PA$，由线面平行性质得结论。
    answer: B
    explanation: $M\in AC$、$N\in PC$，故 $MN\subset$ 平面 $PAC$。已知 $MN\parallel$ 平面 $PAD$，又平面
      $PAC\cap$ 平面 $PAD=PA$，由线面平行性质定理得 $MN\parallel PA$。故选 B。
    teaching:
      teaching_goal: 性质定理直接套：找含 $MN$ 的辅助面与目标面的交线。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 1
        models:
        - 线面平行性质（找交线）
        fusion_role: single_model
      expected_blocker: 找错交线——把平面 $PAC$ 与平面 $PAD$ 的交线写成 $AD$ 或 $PD$。
      entry_point: find_entry
      scaffold_level: medium
      variation_depth: same_structure
      complexity_note: 纯辨析，无计算。
      upgrade_rule: 能说出'交线是两面公共的过 $P$ 的直线 $PA$'。
      fallback_move: 在图上标出平面 $PAC$ 与平面 $PAD$ 的公共边。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q7-prompt/rendered/prompt.fragment.tex
      diagram_ref: q7.prompt
      diagram_job_id: q7-prompt
