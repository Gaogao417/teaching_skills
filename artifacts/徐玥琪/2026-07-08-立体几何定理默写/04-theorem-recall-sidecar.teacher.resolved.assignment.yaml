      artifact_hash: sha256:bc1acdb81125014c67225800e1b76274ea718246bb7a16041302f40d8b56b459
      packages:
      - tikz
      libraries: []
  - type: problem
    id: q12-plane-plane-perp-judge
    points: 5
    stem_latex: '如果一个平面经过另一个平面的一条垂线，那么这两个平面互相垂直。

      \[

      \left.

      \begin{aligned}

      a&\subset\beta\\

      a&\perp\alpha

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{24mm}}

      \]

      '
    answer: $\alpha\perp\beta$。
    solution_steps:
