      packages:
      - tikz
      libraries: []
  - type: problem
    id: q10-line-plane-perp-judge
    points: 5
    stem_latex: '如果一条直线垂直于一个平面内的两条相交直线，那么这条直线垂直于这个平面。

      \[

      \left.

      \begin{aligned}

      m,n&\subset\alpha\\

      m\cap n&=P\\

      l&\perp m,\quad l\perp n

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{22mm}}

      \]

      '
    answer: $l\perp\alpha$。
    solution_steps:
    - title: 默写答案
      content: $l\perp\alpha$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q10-line-plane-perp-judge-prompt/rendered/prompt.fragment.tex
