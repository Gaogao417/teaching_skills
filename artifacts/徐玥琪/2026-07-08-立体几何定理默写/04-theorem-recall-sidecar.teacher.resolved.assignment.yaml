- id: angle
  title: 四、角与距离
  type: practice
  visibility: teacher
  blocks:
  - type: problem
    id: q15-skew-angle
    points: 5
    stem_latex: '求异面直线所成的角，可以把其中一条直线平移到与另一条相交的位置，再取锐角或直角。

      \[

      \left.

      \begin{aligned}

      a''&\parallel a\\

      a''\cap b&=O

      \end{aligned}

      \right\}

      \Longrightarrow

      \angle(a,b)=\underline{\hspace{28mm}}

      \]

      '
    answer: $a'$ 与 $b$ 所成的锐角或直角。
    solution_steps:
    - title: 默写答案
      content: $a'$ 与 $b$ 所成的锐角或直角。
    diagram_col:
