- id: perpendicular
  title: 三、垂直关系定理
  type: practice
  visibility: teacher
  blocks:
  - type: problem
    id: q09-line-plane-perp-definition
    points: 5
    stem_latex: '如果一条直线垂直于一个平面，那么它垂直于这个平面内过垂足的任意直线。

      \[

      \left.

      \begin{aligned}

      l&\perp\alpha\\

      m&\subset\alpha,\quad P\in m\\

      l\cap\alpha&=P

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{20mm}}

      \]

      '
    answer: $l\perp m$。
    solution_steps:
    - title: 默写答案
      content: $l\perp m$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q09-line-plane-perp-definition-prompt/rendered/prompt.fragment.tex
