      packages:
      - tikz
      libraries: []
  - type: problem
    id: q11-line-plane-perp-property
    points: 5
    stem_latex: '垂直于同一个平面的两条直线互相平行。

      \[

      \left.

      \begin{aligned}

      l&\perp\alpha\\

      m&\perp\alpha

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{18mm}}

      \]

      '
    answer: $l\parallel m$。
    solution_steps:
    - title: 默写答案
      content: $l\parallel m$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q11-line-plane-perp-property-prompt/rendered/prompt.fragment.tex
