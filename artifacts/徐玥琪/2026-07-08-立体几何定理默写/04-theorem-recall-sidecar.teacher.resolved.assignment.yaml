  - type: problem
    id: q18-distance-projection
    points: 5
    stem_latex: '点到平面的距离是点到这个平面的垂线段长；平面图形在另一个平面上的射影面积满足 $S''=S\cos\theta$。

      \[

      \left.

      \begin{aligned}

      PH&\perp\alpha\\

      H&\in\alpha

      \end{aligned}

      \right\}

      \Longrightarrow

      d(P,\alpha)=\underline{\hspace{18mm}},\quad S''=\underline{\hspace{20mm}}

      \]

      '
    answer: $d(P,\alpha)=PH$，$S'=S\cos\theta$。
    solution_steps:
