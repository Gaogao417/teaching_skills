  - type: problem
    id: q02-three-points-plane
    points: 5
    stem_latex: '过不在同一直线上的三点，有且只有一个平面。

      \[

      \left.

      \begin{aligned}

      A,B,C&\ \underline{\hspace{30mm}}

      \end{aligned}

      \right\}

      \Longrightarrow

      \text{确定}\ \underline{\hspace{22mm}}

      \]

      '
    answer: $A,B,C$ 不共线；确定一个平面。
    solution_steps:
    - title: 默写答案
      content: $A,B,C$ 不共线；确定一个平面。
