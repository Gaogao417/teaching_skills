      artifact_hash: sha256:dd9d0e9a2b971e31afc6ac30456a52300b3694e4feb35b510adc953156d3e069
      packages:
      - tikz
      libraries: []
  - type: problem
    id: q08-intersection-line-parallel
    points: 5
    stem_latex: '两个平面相交，若两平面内各有一条直线互相平行，则这两条直线都平行于交线。

      \[

      \left.

      \begin{aligned}

      \alpha\cap\beta&=m\\

      l_1&\subset\alpha,\quad l_2\subset\beta\\

      l_1&\parallel l_2

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{34mm}}

      \]

      '
    answer: $l_1\parallel m$，$l_2\parallel m$。
    solution_steps:
    - title: 默写答案
      content: $l_1\parallel m$，$l_2\parallel m$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q08-intersection-line-parallel-prompt/rendered/prompt.fragment.tex
