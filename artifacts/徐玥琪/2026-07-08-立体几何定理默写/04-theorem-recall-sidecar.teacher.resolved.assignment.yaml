  - type: problem
    id: q17-dihedral-angle
    points: 5
    stem_latex: '在二面角的棱上取一点，在两个半平面内分别作垂直于棱的射线，这两条射线所成的角叫二面角的平面角。

      \[

      \left.

      \begin{aligned}

      O&\in l\\

      OA&\subset\alpha,\quad OA\perp l\\

      OB&\subset\beta,\quad OB\perp l

      \end{aligned}

      \right\}

      \Longrightarrow

      \angle AOB=\underline{\hspace{28mm}}

      \]

      '
    answer: 二面角 $\alpha-l-\beta$ 的平面角。
    solution_steps:
    - title: 默写答案
      content: 二面角 $\alpha-l-\beta$ 的平面角。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q17-dihedral-angle-prompt/rendered/prompt.fragment.tex
