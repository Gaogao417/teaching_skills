      packages:
      - tikz
      libraries: []
  - type: problem
    id: q13-plane-plane-perp-property
    points: 5
    stem_latex: '两个平面垂直，在一个平面内垂直于交线的直线，垂直于另一个平面。

      \[

      \left.

      \begin{aligned}

      \alpha&\perp\beta\\

      \alpha\cap\beta&=m\\

      a&\subset\alpha,\quad a\perp m

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{22mm}}

      \]

      '
    answer: $a\perp\beta$。
    solution_steps:
