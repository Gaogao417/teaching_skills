- id: parallel
  title: 二、平行关系定理
  type: practice
  visibility: teacher
  blocks:
  - type: problem
    id: q04-line-plane-parallel-judge
    points: 5
    stem_latex: '如果平面外一条直线与这个平面内的一条直线平行，那么这条直线与这个平面平行。

      \[

      \left.

      \begin{aligned}

      a&\parallel b\\

      b&\subset\alpha\\

      a&\not\subset\alpha

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{24mm}}

      \]

      '
    answer: $a\parallel\alpha$。
    solution_steps:
    - title: 默写答案
      content: $a\parallel\alpha$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q04-line-plane-parallel-judge-prompt/rendered/prompt.fragment.tex
      diagram_ref: q04-line-plane-parallel-judge.prompt
      diagram_job_id: q04-line-plane-parallel-judge-prompt
      width: 55mm
      caption: ''
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:bd5dd1b53ec3f24348847e853e48cc67443d18620f52031b926bfb9ad8c69cf2
      packages:
      - tikz
      libraries: []
  - type: problem
    id: q05-line-plane-parallel-property
    points: 5
    stem_latex: '一条直线与一个平面平行，过这条直线的平面与已知平面相交，则这条直线与交线平行。

      \[

      \left.

      \begin{aligned}

      a&\parallel\alpha\\

      a&\subset\beta\\

      \alpha\cap\beta&=b

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{22mm}}

      \]

      '
    answer: $a\parallel b$。
    solution_steps:
    - title: 默写答案
      content: $a\parallel b$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q05-line-plane-parallel-property-prompt/rendered/prompt.fragment.tex
      diagram_ref: q05-line-plane-parallel-property.prompt
      diagram_job_id: q05-line-plane-parallel-property-prompt
      width: 55mm
      caption: ''
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:0b88086edd0b2284d5938f02c72386e95a74b93024120982d1d1ad39a8667c2b
      packages:
      - tikz
      libraries: []
  - type: problem
    id: q06-plane-plane-parallel-judge
    points: 5
    stem_latex: '如果一个平面内两条相交直线分别平行于另一个平面内两条相交直线，那么这两个平面平行。

      \[

      \left.

      \begin{aligned}

      a,b&\subset\alpha,\quad a\cap b=P\\

      a'',b''&\subset\beta,\quad a''\cap b''=P''\\

      a&\parallel a'',\quad b\parallel b''

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{24mm}}

      \]

      '
    answer: $\alpha\parallel\beta$。
    solution_steps:
    - title: 默写答案
      content: $\alpha\parallel\beta$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q06-plane-plane-parallel-judge-prompt/rendered/prompt.fragment.tex
      diagram_ref: q06-plane-plane-parallel-judge.prompt
      diagram_job_id: q06-plane-plane-parallel-judge-prompt
      width: 55mm
      caption: ''
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:cd88b40e909356d5dea86b301b06b090ba3af61cefab14effa085cb103dc8b3a
      packages:
      - tikz
      libraries: []
  - type: problem
    id: q07-plane-plane-parallel-property
    points: 5
    stem_latex: '两个平行平面被第三个平面所截，所得两条交线平行。

      \[

      \left.

      \begin{aligned}

      \alpha&\parallel\beta\\

      \gamma\cap\alpha&=a\\

      \gamma\cap\beta&=b

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{20mm}}

      \]

      '
    answer: $a\parallel b$。
    solution_steps:
    - title: 默写答案
      content: $a\parallel b$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q07-plane-plane-parallel-property-prompt/rendered/prompt.fragment.tex
      diagram_ref: q07-plane-plane-parallel-property.prompt
      diagram_job_id: q07-plane-plane-parallel-property-prompt
      width: 55mm
