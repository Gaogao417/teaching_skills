  - type: problem
    id: q16-line-plane-angle
    points: 5
    stem_latex: '一条斜线和它在平面内的射影所成的锐角，叫做这条直线和平面所成的角。

      \[

      \left.

      \begin{aligned}

      AB&\text{ 是 }l\text{ 在 }\alpha\text{ 内的射影}

      \end{aligned}

      \right\}

      \Longrightarrow

      \angle(l,\alpha)=\underline{\hspace{24mm}}

      \]

      '
    answer: $l$ 与它在 $\alpha$ 内的射影所成的锐角。
    solution_steps:
    - title: 默写答案
      content: $l$ 与它在 $\alpha$ 内的射影所成的锐角。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/q16-line-plane-angle-prompt/rendered/prompt.fragment.tex
