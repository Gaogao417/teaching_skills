      libraries: []
  - type: problem
    id: q03-lines-plane
    points: 5
    stem_latex: '一条直线和这条直线外一点、两条相交直线、两条平行直线，都可以确定一个平面。

      \[

      \left.

      \begin{aligned}

      a&\parallel b\\

      a&\ne b

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{42mm}}

      \]

      '
    answer: 过两条平行直线有且只有一个平面。
    solution_steps:
    - title: 默写答案
      content: 过两条平行直线有且只有一个平面。
