  - type: problem
    id: q14-three-perpendicular
    points: 5
    stem_latex: '三垂线定理：平面内一条直线若垂直于斜线在这个平面内的射影，则它垂直于这条斜线。

      \[

      \left.

      \begin{aligned}

      PA&\perp\alpha\\

      AB&\text{ 是 }PB\text{ 在 }\alpha\text{ 内的射影}\\

      l&\subset\alpha,\quad l\perp AB

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{20mm}}

      \]

      '
    answer: $l\perp PB$。
    solution_steps:
    - title: 默写答案
      content: $l\perp PB$。
