    points: 5
    stem_latex: '若点在线上，线在面内，则点在这个平面内；符号语言也要能互译。

      \[

      \left.

      \begin{aligned}

      A&\in l\\

      l&\subset \alpha

      \end{aligned}

      \right\}

      \Longrightarrow

      A\ \underline{\hspace{10mm}}\ \alpha

      \]

      '
