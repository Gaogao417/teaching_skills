    stem_latex: '如果平面外一条直线与这个平面内的一条直线平行，那么这条直线与这个平面平行。

      \[

      \left.

      \begin{aligned}

      a&\parallel b\\

      b&\subset\alpha\\

      a&\not\subset\alpha

      \end{aligned}

      \right\}

      \Longrightarrow

      \underline{\hspace{24mm}}

      \]

      '
