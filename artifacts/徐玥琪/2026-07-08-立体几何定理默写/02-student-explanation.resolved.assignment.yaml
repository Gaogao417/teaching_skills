  - type: solution
    id: card-plane-plane-perp-prop
    title: 定理卡·面面垂直性质：四件套（面面垂直+交线+面内+垂直于棱）
    items:
    - latex: \textbf{几何语言：}$\alpha\perp\beta$，$\alpha\cap\beta=l$，$AB\subset\alpha$，$AB\perp
        l\Rightarrow AB\perp\beta$。
    - latex: \textbf{口令：}面面垂直 $\Rightarrow$ 线面垂直。一个面内垂直于交线（棱）的线，垂直另一个面。
    - latex: \textbf{易错前提（四件套缺一不可）：}①$\alpha\perp\beta$；②$\alpha\cap\beta=l$（交线/棱）；③$AB\subset\alpha$（线在面内）；④$AB\perp
        l$（垂直于棱）。
