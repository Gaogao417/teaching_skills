  - type: route
    id: route-dihedral
    steps:
    - id: dihedral-obj
      latex: 判对象
      content_latex: 这是二面角平面角的定义（三要素），属于填空型定义默写。
    - id: dihedral-bridge
      latex: 补垂直于棱
      content_latex: 补 $OA\perp l$，$OB\perp l$，即两边都垂直于棱。
    - id: dihedral-conclude
      latex: 写结论
      content_latex: $O\in l$，$OA\subset\alpha$，$OB\subset\beta$，$OA\perp l$，$OB\perp
        l\Rightarrow\angle AOB$ 为二面角 $\alpha\!-\!l\!-\!\beta$ 的平面角。
