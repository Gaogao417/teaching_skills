  - type: solution
    id: card-dihedral-angle
    title: 定理卡·二面角平面角定义：顶点在棱上、两边在两面内、两边垂直于棱
    items:
    - latex: \textbf{几何语言：}$\alpha\cap\beta=l$，$O\in l$，$OA\subset\alpha$，$OB\subset\beta$，$OA\perp
        l$，$OB\perp l\Rightarrow\angle AOB$ 为二面角 $\alpha\!-\!l\!-\!\beta$ 的平面角。
    - latex: \textbf{口令：}三要素——顶点在棱上、两边分别在两个半平面内、两边都垂直于棱。
    - latex: \textbf{易错点：}平面角的顶点 $O$ 必须在棱 $l$ 上；$OA,OB$ 必须都垂直于棱 $l$，且分别在两个面内。
