    - latex: 批改三秒归因：对象错（线线/线面/面面搞混，整题重做）＞中间漏（补一条交线或相交前提即可）＞符号错（只改 $\subset/\in/\cap$）。
    - latex: B 类每题一律按“判对象 $\to$ 补中间 $\to$ 写结论”三段；空白按这三段排版，绝不抄现成几何语言。
