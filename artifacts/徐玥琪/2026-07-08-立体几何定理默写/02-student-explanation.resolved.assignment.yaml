  - type: route
    id: route-lp-perp-prop
    steps:
    - id: lp-perp-prop-obj
      latex: 判对象
      content_latex: 线面垂直（$a\perp\alpha$，$b\perp\alpha$）$\to$ 线线平行（$a\parallel b$），用线面垂直性质。
    - id: lp-perp-prop-bridge
      latex: 确认同面
      content_latex: 两条线都垂直同一个平面 $\alpha$，这是结论成立的前提。
    - id: lp-perp-prop-conclude
      latex: 写结论
      content_latex: $a\perp\alpha$，$b\perp\alpha\Rightarrow a\parallel b$。
  - type: dual_explanation
    id: sol-lp-perp-prop
    label: 例6·线面垂直性质
    stem_latex: 已知 $a,b$ 都垂直 $\alpha$，证明 $a\parallel b$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 这是跨类结论
      content_latex: 由线面垂直推出线线平行，是垂直章节里少见的“推平行”。
    - kind: mistake
      title: 必须同面
      content_latex: 两条线要垂直同一个面；垂直不同面时结论不成立。
    solution_title: 解答
    solution_step_ids:
    - lp-perp-prop-obj
    - lp-perp-prop-bridge
    - lp-perp-prop-conclude
  - type: solution
    id: card-plane-plane-perp-judge
    title: 定理卡·面面垂直判定：一面过另一面的垂线
    items:
    - latex: \textbf{几何语言：}$l\perp\alpha$，$l\subset\beta\Rightarrow\alpha\perp\beta$。
    - latex: \textbf{口令：}线面垂直 $\Rightarrow$ 面面垂直。一个面内有一条线垂直另一个面。
    - latex: \textbf{易错前提：}垂线 $l$ 必须在某一面内（$l\subset\beta$），且垂直另一面（$l\perp\alpha$），两条缺一不可。
