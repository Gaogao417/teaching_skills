    - id: pp-perp-prop-bridge
      latex: 补垂直于棱
      content_latex: 补 $AB\perp l$，凑齐四件套（$\alpha\perp\beta$、$\alpha\cap\beta=l$、$AB\subset\alpha$、$AB\perp
        l$）。
    - id: pp-perp-prop-conclude
      latex: 写结论
      content_latex: $\alpha\perp\beta$，$\alpha\cap\beta=l$，$AB\subset\alpha$，$AB\perp
        l\Rightarrow AB\perp\beta$。
