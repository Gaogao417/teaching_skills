    side_title: 小贴士
    side_items:
    - kind: hint
      title: 找什么
      content_latex: 面面垂直判定要在一个面内找一条垂直另一个面的线。
    - kind: mistake
      title: 两条前提
      content_latex: $l\perp\alpha$ 和 $l\subset\beta$ 都要写，少一条结论不成立。
