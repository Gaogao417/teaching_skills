sections:
- id: category-a-arrange
  title: A 类整理：点线面关系的三条逻辑主线
  show_title: true
  type: explanation
  visibility: student
  blocks:
  - type: solution
    id: knowledge-map
    title: 结构图：立体几何定理库的三条主线
    items:
    - content_latex: '\begin{center}

        \begin{tikzpicture}[x=1cm,y=1cm,>=stealth, font=\small]

        \node[draw=edu-blue!80, fill=edu-blue!10, rounded corners=3pt, align=center,
        inner sep=5pt, font=\bfseries] (root) at (0,0) {立体几何定理库的三条主线};

        \node[draw=green!70, fill=green!8, rounded corners=2pt, align=center, inner
        sep=4pt, minimum width=28mm] (inc) at (-4,1.6) {从属\\点在线上\\两点在面内};

        \node[draw=orange!70, fill=orange!8, rounded corners=2pt, align=center, inner
        sep=4pt, minimum width=28mm] (plane) at (0,1.9) {定面\\不共线三点\\线+点/相交线/平行线};

        \node[draw=purple!70, fill=purple!8, rounded corners=2pt, align=center, inner
        sep=4pt, minimum width=28mm] (rel) at (4,1.6) {关系转化\\平行\\垂直};

        \node[draw=teal!70, fill=teal!8, rounded corners=2pt, align=center, inner
        sep=4pt, minimum width=28mm] (angle) at (0,-1.9) {角与距离\\射影\\垂线\\平面角};

        \draw[->, thick, edu-blue!70] (root) -- node[above, sloped, font=\scriptsize]
        {记符号} (inc);

        \draw[->, thick, edu-blue!70] (root) -- node[above, sloped, font=\scriptsize]
        {定对象} (plane);

        \draw[->, thick, edu-blue!70] (root) -- node[above, sloped, font=\scriptsize]
        {补条件} (rel);

        \draw[->, thick, edu-blue!70] (root) -- node[above, sloped, font=\scriptsize]
        {找垂线} (angle);

        \end{tikzpicture}

        \end{center}'
    - latex: \textbf{总口令：}先判对象，再补中间条件；写成“条件组 $\Rightarrow$ 结论”，不要写成长段解释。
  - type: solution
    id: a-main-lines
    title: 三条主线：从属关系（基本事实2是桥）／公共点→交线（基本事实3）／定面（基本事实1+推论①②③）
    items:
    - latex: \textbf{主线一·从属关系：}点属于线、线属于面，靠基本事实2搭桥。$A\in l$，$B\in l$，$A\in\alpha$，$B\in\alpha\Rightarrow
        l\subset\alpha$。即“点在线上 + 两点在面内 $\Rightarrow$ 整条线在面内”。
    - latex: \textbf{主线二·公共点$\to$交线：}两个不重合的平面有一个公共点 $\Rightarrow$ 有且只有一条过该点的交线。$P\in\alpha$，$P\in\beta\Rightarrow\alpha\cap\beta=l$，$P\in
        l$。这是“面和面怎么发生关系”的入口。
    - latex: \textbf{主线三·定面：}基本事实1（3 个不共线点$\Rightarrow$平面）+ 推论①（直线+外一点）、推论②（两条相交直线）、推论③（两条平行直线），四条都在回答“多少东西能确定一个平面”。
    - content_latex: '\begin{tabular}{p{0.20\linewidth}p{0.62\linewidth}}

        \textbf{符号} & \textbf{含义}\\

        $A\in l$ & 点 $A$ 在直线 $l$ 上\\

        $l\subset\alpha$ & 直线 $l$ 在平面 $\alpha$ 内（$\alpha$ 经过 $l$）\\

        $\alpha\cap\beta=l$ & 平面 $\alpha$ 与 $\beta$ 相交于直线 $l$\\

        \end{tabular}

        '
    - content_latex: '\begin{tabular}{p{0.18\linewidth}p{0.24\linewidth}p{0.40\linewidth}}

        \textbf{分类} & \textbf{对象} & \textbf{三类情况}\\

        线线 & 直线与直线 & 相交 / 平行 / 异面\\

        线面 & 直线与平面 & 在面内 / 相交 / 平行\\

        面面 & 平面与平面 & 平行 / 相交\\

        \end{tabular}

        '
  - type: mistake
    id: a-mistake
    title: 易错提醒
    content_latex: 别把“从属关系（$\in/\subset$，讲归属）”和“位置关系分类（相交/平行/异面，讲怎么摆）”混在一起。判断时先问一句：这条定理讲的是“谁属于谁”还是“怎么摆”？基本事实
      2 是从属关系的桥，基本事实 3 是交线的入口。
- id: category-b-parallel
  title: B 类定理卡·平行：给图、一步推理、补中间条件
  show_title: true
  type: explanation
  visibility: student
  layout:
    break_before: true
  blocks:
  - type: solution
    id: card-line-plane-parallel-judge
    title: 定理卡·线面平行判定：在面内找平行线
    items:
    - latex: \textbf{几何语言：}$a\not\subset\alpha$，$b\subset\alpha$，$a\parallel b\Rightarrow
        a\parallel\alpha$。
    - latex: \textbf{口令：}线线平行 $\Rightarrow$ 线面平行。在面内找一条与已知直线平行的线。
    - latex: \textbf{易错前提：}$a\not\subset\alpha$（线在面外）与 $b\subset\alpha$（线在面内）两条缺一不可；少写“平面内”判定不成立。
  - type: problemcard
    id: ex-lp-parallel-judge
    label: 例1·线面平行判定
    stem_latex: '如图，$a\parallel b$，$b\subset\alpha$。求证：$a\parallel\alpha$。

      \par\noindent 留空：中间需要补的前提条件是 \underline{\hspace{20mm}}。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-ex-lp-parallel-judge-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.ex-lp-parallel-judge.prompt
      diagram_job_id: explanation-ex-lp-parallel-judge-prompt
      width: 70mm
      caption: 直线 a 在平面外、b 在平面内，且 a 与 b 平行。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:2721c46af4fb0d2252a3edf7e654dd0faa1ec2818d2a5293c7d0aa9ebbd3b450
      packages:
      - tikz
      libraries: []
  - type: route
    id: route-lp-parallel-judge
    steps:
    - id: lp-judge-obj
      latex: 判对象
      content_latex: 线线（$a\parallel b$）$\to$ 线面（$a\parallel\alpha$），用线面平行判定。
    - id: lp-judge-bridge
      latex: 补中间前提
      content_latex: 补 $a\not\subset\alpha$（线在面外），与 $b\subset\alpha$、$a\parallel b$
        合起来。
    - id: lp-judge-conclude
      latex: 写结论
      content_latex: $a\not\subset\alpha$，$b\subset\alpha$，$a\parallel b\Rightarrow
        a\parallel\alpha$。
  - type: dual_explanation
    id: sol-lp-parallel-judge
    label: 例1·线面平行判定
    stem_latex: 已知 $a\parallel b$，$b\subset\alpha$，补出中间前提后证明 $a\parallel\alpha$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 先判对象
      content_latex: 这是由线线平行推线面平行，属于线面平行判定。
    - kind: mistake
      title: 最易漏
      content_latex: 最容易漏 $a\not\subset\alpha$，没写“线在面外”判定不成立。
    solution_title: 解答
    solution_step_ids:
    - lp-judge-obj
    - lp-judge-bridge
    - lp-judge-conclude
  - type: solution
    id: card-line-plane-parallel-prop
    title: 定理卡·线面平行性质：过线作面找交线
    items:
    - latex: \textbf{几何语言：}$a\parallel\alpha$，$a\subset\beta$，$\alpha\cap\beta=b\Rightarrow
        a\parallel b$。
    - latex: \textbf{口令：}线面平行 $\Rightarrow$ 线线平行。过该直线作辅助面，找它与已知面的交线。
    - latex: \textbf{易错前提：}$a\subset\beta$ 与 $\alpha\cap\beta=b$（交线）是最常漏的“桥”，不能直接由
        $a\parallel\alpha$ 跳到 $a\parallel b$。
  - type: problemcard
    id: ex-lp-parallel-prop
    label: 例2·线面平行性质
    stem_latex: '如图，$AB\parallel\alpha$，过 $AB$ 的平面 $\beta$ 交 $\alpha$ 于 $CD$。求证：$AB\parallel
      CD$。

      \par\noindent 留空：连接已知与结论的“桥”是 \underline{\hspace{20mm}}。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-ex-lp-parallel-prop-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.ex-lp-parallel-prop.prompt
      diagram_job_id: explanation-ex-lp-parallel-prop-prompt
      width: 70mm
      caption: AB 在面外平行于平面 α，过 AB 作平面 β 与 α 交于 CD。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:7f930b2845e07533e16aa9d2864b7142d4cf32ba60f65664df85c95d78ad0da7
      packages:
      - tikz
      libraries: []
  - type: route
    id: route-lp-parallel-prop
    steps:
    - id: lp-prop-obj
      latex: 判对象
      content_latex: 线面平行（$AB\parallel\alpha$）$\to$ 线线平行（$AB\parallel CD$），用线面平行性质。
    - id: lp-prop-bridge
      latex: 补交线（桥）
      content_latex: 补 $AB\subset\beta$，$\alpha\cap\beta=CD$，这一步是桥，不能跳。
    - id: lp-prop-conclude
      latex: 写结论
      content_latex: $AB\parallel\alpha$，$AB\subset\beta$，$\alpha\cap\beta=CD\Rightarrow
        AB\parallel CD$。
  - type: dual_explanation
    id: sol-lp-parallel-prop
    label: 例2·线面平行性质
    stem_latex: 已知 $AB\parallel\alpha$，过 $AB$ 的平面 $\beta$ 交 $\alpha$ 于 $CD$，补出桥后证明
      $AB\parallel CD$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 这步找什么
      content_latex: 线面平行要推出线线平行，必须靠“辅助面+交线”搭桥。
    - kind: mistake
      title: 别跳步
      content_latex: 不能直接由 $AB\parallel\alpha$ 写 $AB\parallel CD$，必须补 $\alpha\cap\beta=CD$。
    solution_title: 解答
    solution_step_ids:
    - lp-prop-obj
    - lp-prop-bridge
    - lp-prop-conclude
  - type: solution
    id: card-plane-plane-parallel-judge
    title: 定理卡·面面平行判定：一面内两条相交线都平行另一面
    items:
    - latex: \textbf{几何语言：}$a\subset\alpha$，$b\subset\alpha$，$a\cap b=A$，$a\parallel\beta$，$b\parallel\beta\Rightarrow\alpha\parallel\beta$。
    - latex: \textbf{口令：}线面平行 $\Rightarrow$ 面面平行。在一个面内找两条相交线，分别平行另一面。
    - latex: \textbf{易错前提：}“两条相交线”$a\cap b=A$ 是头号失分点，写两条平行线不行。
  - type: problemcard
    id: ex-pp-parallel-judge
    label: 例3·面面平行判定
    stem_latex: '如图，$a\subset\alpha$，$b\subset\alpha$，$a\parallel\beta$，$b\parallel\beta$。求证：$\alpha\parallel\beta$。

      \par\noindent 留空：还差的前提是 \underline{\hspace{20mm}}。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-ex-pp-parallel-judge-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.ex-pp-parallel-judge.prompt
      diagram_job_id: explanation-ex-pp-parallel-judge-prompt
      width: 70mm
      caption: 平面 α 内有直线 a、b，都平行于平面 β。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:f7290f395574deed3a4dc5bd1c5b4258760d29416cdefac77015bbc435259625
      packages:
      - tikz
      libraries: []
  - type: route
    id: route-pp-parallel-judge
    steps:
    - id: pp-judge-obj
      latex: 判对象
      content_latex: 线面平行 $\to$ 面面平行，用面面平行判定。
    - id: pp-judge-bridge
      latex: 补相交前提
      content_latex: 补 $a\cap b=A$，即这两条面内直线必须相交。
    - id: pp-judge-conclude
      latex: 写结论
      content_latex: $a\subset\alpha$，$b\subset\alpha$，$a\cap b=A$，$a\parallel\beta$，$b\parallel\beta\Rightarrow\alpha\parallel\beta$。
  - type: dual_explanation
    id: sol-pp-parallel-judge
    label: 例3·面面平行判定
    stem_latex: 已知 $\alpha$ 内直线 $a,b$ 都平行 $\beta$，补相交前提后证明 $\alpha\parallel\beta$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 一面内几条线
      content_latex: 面面平行判定要在一个面内找两条线，不是一条。
    - kind: mistake
      title: 相交不能漏
      content_latex: $a\cap b=A$ 是头号失分点，两条平行线推不出面面平行。
    solution_title: 解答
    solution_step_ids:
    - pp-judge-obj
    - pp-judge-bridge
    - pp-judge-conclude
  - type: solution
    id: card-plane-plane-parallel-prop
    title: 定理卡·面面平行性质：第三个面截出两条平行交线
    items:
    - latex: \textbf{几何语言：}$\alpha\parallel\beta$，$\alpha\cap\gamma=a$，$\beta\cap\gamma=b\Rightarrow
        a\parallel b$。
    - latex: \textbf{口令：}面面平行 $\Rightarrow$ 线线平行。两平行面被第三个面截，两条交线平行。
    - latex: \textbf{易错前提：}要写清第三个面 $\gamma$，以及 $\alpha\cap\gamma=a$、$\beta\cap\gamma=b$
        两条交线。
  - type: problemcard
    id: ex-pp-parallel-prop
    label: 例4·面面平行性质
    stem_latex: '如图，$\alpha\parallel\beta$，平面 $\gamma$ 分别交 $\alpha,\beta$ 于 $a,b$。求证：$a\parallel
      b$。

      \par\noindent 留空：用到的两条交线是 \underline{\hspace{20mm}}。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-ex-pp-parallel-prop-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.ex-pp-parallel-prop.prompt
      diagram_job_id: explanation-ex-pp-parallel-prop-prompt
      width: 70mm
      caption: 两平行平面 α、β 被第三个面 γ 截出交线 a、b。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:14b0890b8c41a5f3bca2fe69044adf9eaf4d80e12a79319a96a38fc6b34e75c0
      packages:
      - tikz
      libraries: []
  - type: route
    id: route-pp-parallel-prop
    steps:
    - id: pp-prop-obj
      latex: 判对象
      content_latex: 面面平行（$\alpha\parallel\beta$）$\to$ 线线平行（$a\parallel b$），用面面平行性质。
    - id: pp-prop-bridge
      latex: 补第三个面与交线
      content_latex: 补 $\alpha\cap\gamma=a$，$\beta\cap\gamma=b$，第三个面 $\gamma$ 截出两条交线。
    - id: pp-prop-conclude
      latex: 写结论
      content_latex: $\alpha\parallel\beta$，$\alpha\cap\gamma=a$，$\beta\cap\gamma=b\Rightarrow
        a\parallel b$。
  - type: dual_explanation
    id: sol-pp-parallel-prop
    label: 例4·面面平行性质
    stem_latex: 已知 $\alpha\parallel\beta$，$\gamma$ 截 $\alpha,\beta$ 于 $a,b$，补交线后证明
      $a\parallel b$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 关键动作
      content_latex: 面面平行推线线平行，靠的是“第三个面截出两条交线”。
    - kind: mistake
      title: 交线要写全
      content_latex: 两条交线 $\alpha\cap\gamma=a$、$\beta\cap\gamma=b$ 都要写，缺一条结论不成立。
    solution_title: 解答
    solution_step_ids:
    - pp-prop-obj
    - pp-prop-bridge
    - pp-prop-conclude
  - type: mistake
    id: b-parallel-mistake
    title: 平行定理易错提醒
    content_latex: 平行类最常漏两类前提：判定定理漏“相交”（$a\cap b=A$）或“平面内/面外”（$a\not\subset\alpha$、$b\subset\alpha$）；性质定理漏“辅助面+交线”。补中间条件时先问：这座桥是交线，还是面内/相交前提？
- id: category-b-perpendicular
  title: B 类定理卡·垂直：给图、一步推理、补中间条件
  show_title: true
  type: explanation
  visibility: student
  layout:
    break_before: true
  blocks:
  - type: solution
    id: card-line-plane-perp-judge
    title: 定理卡·线面垂直判定：面内两条相交线都垂直
    items:
    - latex: \textbf{几何语言：}$l\perp m$，$l\perp n$，$m\subset\alpha$，$n\subset\alpha$，$m\cap
        n=A\Rightarrow l\perp\alpha$。
    - latex: \textbf{口令：}线线垂直 $\Rightarrow$ 线面垂直。在面内找两条与已知直线都垂直的相交线。
    - latex: \textbf{易错前提：}$m\cap n=A$（两条相交线）是头号失分点；两条不相交的线垂直推不出线面垂直。
  - type: problemcard
    id: ex-lp-perp-judge
    label: 例5·线面垂直判定
    stem_latex: '如图，$l\perp m$，$l\perp n$，$m\subset\alpha$，$n\subset\alpha$。求证：$l\perp\alpha$。

      \par\noindent 留空：还差的前提是 \underline{\hspace{20mm}}。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-ex-lp-perp-judge-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.ex-lp-perp-judge.prompt
      diagram_job_id: explanation-ex-lp-perp-judge-prompt
      width: 70mm
      caption: 直线 l 与平面 α 内的直线 m、n 都垂直。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:19b495817b802246e25662d58cfa4b2f64b2e349850663f6941361293a4bdfb7
      packages:
      - tikz
      libraries: []
  - type: route
    id: route-lp-perp-judge
    steps:
    - id: lp-perp-judge-obj
      latex: 判对象
      content_latex: 线线垂直（$l\perp m$，$l\perp n$）$\to$ 线面垂直（$l\perp\alpha$），用线面垂直判定。
    - id: lp-perp-judge-bridge
      latex: 补相交前提
      content_latex: 补 $m\cap n=A$，两条面内垂线必须相交。
    - id: lp-perp-judge-conclude
      latex: 写结论
      content_latex: $l\perp m$，$l\perp n$，$m\subset\alpha$，$n\subset\alpha$，$m\cap
        n=A\Rightarrow l\perp\alpha$。
  - type: dual_explanation
    id: sol-lp-perp-judge
    label: 例5·线面垂直判定
    stem_latex: 已知 $l$ 与 $\alpha$ 内 $m,n$ 都垂直，补相交前提后证明 $l\perp\alpha$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 面内找几条
      content_latex: 线面垂直判定要在面内找两条与已知线都垂直的线。
    - kind: mistake
      title: 头号失分点
      content_latex: $m\cap n=A$ 最易漏，两条不相交的线推不出线面垂直。
    solution_title: 解答
    solution_step_ids:
    - lp-perp-judge-obj
    - lp-perp-judge-bridge
    - lp-perp-judge-conclude
  - type: solution
    id: card-line-plane-perp-prop
    title: 定理卡·线面垂直性质：同垂直一面则两线平行
    items:
    - latex: \textbf{几何语言：}$a\perp\alpha$，$b\perp\alpha\Rightarrow a\parallel b$。
    - latex: \textbf{口令：}线面垂直 $\Rightarrow$ 线线平行。两条都垂直同一个面的线互相平行（跨类结论）。
    - latex: \textbf{易错前提：}必须同一个平面 $\alpha$；若垂直不同的面，结论不成立。
  - type: problemcard
    id: ex-lp-perp-prop
    label: 例6·线面垂直性质
    stem_latex: '如图，$a\perp\alpha$，$b\perp\alpha$。求证：$a\parallel b$。

      \par\noindent 留空：两线共同的条件是 \underline{\hspace{20mm}}。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-ex-lp-perp-prop-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.ex-lp-perp-prop.prompt
      diagram_job_id: explanation-ex-lp-perp-prop-prompt
      width: 70mm
      caption: 直线 a、b 都垂直于平面 α。
      variant: prompt
      disclosure_policy: clean
