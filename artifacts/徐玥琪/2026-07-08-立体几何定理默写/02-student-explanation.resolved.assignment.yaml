    stem_latex: '如图，二面角 $\alpha\!-\!l\!-\!\beta$ 中，$O\in l$，$OA\subset\alpha$，$OB\subset\beta$。要使
      $\angle AOB$ 为该二面角的平面角，还需满足 \underline{\hspace{24mm}}。

      '
