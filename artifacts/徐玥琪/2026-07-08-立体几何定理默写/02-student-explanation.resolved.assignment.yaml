    id: sol-pp-perp-prop
    label: 例8·面面垂直性质
    stem_latex: 已知 $\alpha\perp\beta$，$\alpha\cap\beta=l$，$AB\subset\alpha$，补齐四件套后证明
      $AB\perp\beta$。
