    - dihedral-conclude
  - type: mistake
    id: b-perp-mistake
    title: 垂直定理易错提醒
    content_latex: 垂直类头号失分点是“相交/棱”前提：线面垂直判定漏 $m\cap n=A$，面面垂直性质漏“垂直于棱 $AB\perp l$”。补中间条件时先问：要凑的是相交，还是四件套里的某一件？
