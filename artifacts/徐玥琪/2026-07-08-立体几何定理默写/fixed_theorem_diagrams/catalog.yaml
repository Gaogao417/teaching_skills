version: fixed-theorem-diagrams/v3
scope: 立体几何定理默写
source: fixed_theorem_diagrams/specs.yaml
usage:
  diagram_field: diagram_col
  kind: tikz
  width: 55mm
  variant: prompt
  disclosure_policy: clean
  path_base: artifact_dir
rules:
- 左侧竖式条件组是标准，固定图必须从同一条件对象生成。
- 每张图先声明立体几何条件，再声明三维坐标，最后由脚本生成 tikz-3dplot。
- renderer 必须在 3D 层校验平行、垂直、共面、交线和从属关系。
- 已入库定理直接引用生成后的 tikz_path，不再声明 diagram_slot。
diagrams:
- theorem_id: a01-symbols
  title: 符号约定
  tikz_path: fixed_theorem_diagrams/tikz/a01-symbols.fragment.tex
  spec_source: fixed_theorem_diagrams/specs.yaml
  renderer: tikz-3dplot
  condition_count: 3
  diagram_labels:
  - A
  - l
  - alpha
  - beta
  - m
