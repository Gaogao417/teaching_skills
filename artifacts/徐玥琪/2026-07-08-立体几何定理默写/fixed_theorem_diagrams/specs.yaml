version: fixed-theorem-diagram-specs/v1
scope: 立体几何定理默写
rules:
  - 左侧竖式条件组是标准，固定图必须从同一条件对象生成。
  - 每张图先声明立体几何条件，再声明三维坐标，最后由脚本生成 tikz-3dplot。
  - renderer 必须在 3D 层校验平行、垂直、共面、交线和从属关系。
  - 已入库定理直接引用生成后的 tikz_path，不再声明 diagram_slot。
diagrams:
  - theorem_id: a01-symbols
    title: 符号约定
    tikz_path: fixed_theorem_diagrams/tikz/a01-symbols.fragment.tex
    diagram_labels: [A, l, alpha, beta, m]
    points:
      _a1: [0.4, 0.7, 0]
      _a2: [3.1, 0.7, 0]
      _b1: [0.0, 0.0, -0.4]
      _b2: [3.4, 0.0, -0.4]
      _b3: [3.4, 0.0, 1.0]
      _b4: [0.0, 0.0, 1.0]
      _p1: [0.0, 0.0, 0]
      _p2: [3.6, 0.0, 0]
      _p3: [3.6, 1.4, 0]
      _p4: [0.0, 1.4, 0]
      A: [1.5, 0.7, 0]
    planes:
      alpha: {polygon: [_p1, _p2, _p3, _p4], style: plane, label: {at: _p3}}
      beta: {polygon: [_b1, _b2, _b3, _b4], style: planeB, label: {at: _b3}}
    lines:
      l: {through: [_a1, _a2], style: main, label: {at: _a2, pos: right}}
      m: {through: [_b1, _b2], style: third, label: {at: _b2, pos: right}}
    visible_points: [A]
    point_labels:
      A: {pos: above}
    conditions:
      - {relation: symbol_example, objects: [A, l, alpha, beta, m]}
      - {relation: point_on_line, objects: [A, l]}
      - {relation: line_in_plane, objects: [l, alpha]}

