    items:
    - latex: \textbf{几何语言：}$a\subset\alpha$，$b\subset\alpha$，$a\cap b=A$，$a\parallel\beta$，$b\parallel\beta\Rightarrow\alpha\parallel\beta$。
    - latex: \textbf{口令：}线面平行 $\Rightarrow$ 面面平行。在一个面内找两条相交线，分别平行另一面。
    - latex: \textbf{易错前提：}“两条相交线”$a\cap b=A$ 是头号失分点，写两条平行线不行。
  - type: problemcard
    id: ex-pp-parallel-judge
    label: 例3·面面平行判定
    stem_latex: '如图，$a\subset\alpha$，$b\subset\alpha$，$a\parallel\beta$，$b\parallel\beta$。求证：$\alpha\parallel\beta$。

      \par\noindent 留空：还差的前提是 \underline{\hspace{20mm}}。

