  - type: solution
    id: card-plane-plane-parallel-prop
    title: 定理卡·面面平行性质：第三个面截出两条平行交线
    items:
    - latex: \textbf{几何语言：}$\alpha\parallel\beta$，$\alpha\cap\gamma=a$，$\beta\cap\gamma=b\Rightarrow a\parallel b$。
    - latex: \textbf{口令：}面面平行 $\Rightarrow$ 线线平行。两平行面被第三个面截，两条交线平行。
    - latex: \textbf{易错前提：}要写清第三个面 $\gamma$，以及 $\alpha\cap\gamma=a$、$\beta\cap\gamma=b$ 两条交线。
  - type: problemcard
    id: ex-pp-parallel-prop
