sections:
- id: category-a-arrange
  title: A 类整理：点线面关系的三条逻辑主线
  show_title: true
  type: explanation
  visibility: student
  blocks:
  - type: solution
    id: knowledge-map
    title: 结构图：立体几何定理库的三条主线
    items:
    - content_latex: '\begin{center}

        \begin{tikzpicture}[x=1cm,y=1cm,>=stealth, font=\small]

        \node[draw=edu-blue!80, fill=edu-blue!10, rounded corners=3pt, align=center, inner sep=5pt, font=\bfseries] (root) at (0,0) {立体几何定理库的三条主线};

        \node[draw=green!70, fill=green!8, rounded corners=2pt, align=center, inner sep=4pt, minimum width=28mm] (inc) at (-4,1.6) {从属\\点在线上\\两点在面内};

        \node[draw=orange!70, fill=orange!8, rounded corners=2pt, align=center, inner sep=4pt, minimum width=28mm] (plane) at (0,1.9) {定面\\不共线三点\\线+点/相交线/平行线};

        \node[draw=purple!70, fill=purple!8, rounded corners=2pt, align=center, inner sep=4pt, minimum width=28mm] (rel) at (4,1.6) {关系转化\\平行\\垂直};

        \node[draw=teal!70, fill=teal!8, rounded corners=2pt, align=center, inner sep=4pt, minimum width=28mm] (angle) at (0,-1.9) {角与距离\\射影\\垂线\\平面角};

        \draw[->, thick, edu-blue!70] (root) -- node[above, sloped, font=\scriptsize] {记符号} (inc);

        \draw[->, thick, edu-blue!70] (root) -- node[above, sloped, font=\scriptsize] {定对象} (plane);

        \draw[->, thick, edu-blue!70] (root) -- node[above, sloped, font=\scriptsize] {补条件} (rel);

        \draw[->, thick, edu-blue!70] (root) -- node[above, sloped, font=\scriptsize] {找垂线} (angle);

        \end{tikzpicture}

        \end{center}'
    - latex: \textbf{总口令：}先判对象，再补中间条件；写成“条件组 $\Rightarrow$ 结论”，不要写成长段解释。
  - type: solution
    id: a-main-lines
    title: 三条主线：从属关系（基本事实2是桥）／公共点→交线（基本事实3）／定面（基本事实1+推论①②③）
    items:
    - latex: \textbf{主线一·从属关系：}点属于线、线属于面，靠基本事实2搭桥。$A\in l$，$B\in l$，$A\in\alpha$，$B\in\alpha\Rightarrow l\subset\alpha$。即“点在线上 + 两点在面内 $\Rightarrow$ 整条线在面内”。
    - latex: \textbf{主线二·公共点$\to$交线：}两个不重合的平面有一个公共点 $\Rightarrow$ 有且只有一条过该点的交线。$P\in\alpha$，$P\in\beta\Rightarrow\alpha\cap\beta=l$，$P\in l$。这是“面和面怎么发生关系”的入口。
    - latex: \textbf{主线三·定面：}基本事实1（3 个不共线点$\Rightarrow$平面）+ 推论①（直线+外一点）、推论②（两条相交直线）、推论③（两条平行直线），四条都在回答“多少东西能确定一个平面”。
    - content_latex: '\begin{tabular}{p{0.20\linewidth}p{0.62\linewidth}}

        \textbf{符号} & \textbf{含义}\\

        $A\in l$ & 点 $A$ 在直线 $l$ 上\\

        $l\subset\alpha$ & 直线 $l$ 在平面 $\alpha$ 内（$\alpha$ 经过 $l$）\\

        $\alpha\cap\beta=l$ & 平面 $\alpha$ 与 $\beta$ 相交于直线 $l$\\

        \end{tabular}

        '
    - content_latex: '\begin{tabular}{p{0.18\linewidth}p{0.24\linewidth}p{0.40\linewidth}}

        \textbf{分类} & \textbf{对象} & \textbf{三类情况}\\

        线线 & 直线与直线 & 相交 / 平行 / 异面\\

        线面 & 直线与平面 & 在面内 / 相交 / 平行\\

        面面 & 平面与平面 & 平行 / 相交\\

        \end{tabular}

        '
  - type: mistake
    id: a-mistake
    title: 易错提醒
    content_latex: 别把“从属关系（$\in/\subset$，讲归属）”和“位置关系分类（相交/平行/异面，讲怎么摆）”混在一起。判断时先问一句：这条定理讲的是“谁属于谁”还是“怎么摆”？基本事实 2 是从属关系的桥，基本事实 3 是交线的入口。
- id: category-b-parallel
  title: B 类定理卡·平行：给图、一步推理、补中间条件
  show_title: true
  type: explanation
  visibility: student
  layout:
    break_before: true
  blocks:
  - type: solution
    id: card-line-plane-parallel-judge
    title: 定理卡·线面平行判定：在面内找平行线
    items:
    - latex: \textbf{几何语言：}$a\not\subset\alpha$，$b\subset\alpha$，$a\parallel b\Rightarrow a\parallel\alpha$。
    - latex: \textbf{口令：}线线平行 $\Rightarrow$ 线面平行。在面内找一条与已知直线平行的线。
    - latex: \textbf{易错前提：}$a\not\subset\alpha$（线在面外）与 $b\subset\alpha$（线在面内）两条缺一不可；少写“平面内”判定不成立。
  - type: problemcard
    id: ex-lp-parallel-judge
    label: 例1·线面平行判定
    stem_latex: '如图，$a\parallel b$，$b\subset\alpha$。求证：$a\parallel\alpha$。

      \par\noindent 留空：中间需要补的前提条件是 \underline{\hspace{20mm}}。

      '
