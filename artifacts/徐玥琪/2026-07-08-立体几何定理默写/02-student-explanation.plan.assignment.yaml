  - type: route
    id: route-lp-parallel-judge
    steps:
    - id: lp-judge-obj
      latex: 判对象
      content_latex: 线线（$a\parallel b$）$\to$ 线面（$a\parallel\alpha$），用线面平行判定。
    - id: lp-judge-bridge
      latex: 补中间前提
      content_latex: 补 $a\not\subset\alpha$（线在面外），与 $b\subset\alpha$、$a\parallel b$ 合起来。
    - id: lp-judge-conclude
      latex: 写结论
      content_latex: $a\not\subset\alpha$，$b\subset\alpha$，$a\parallel b\Rightarrow a\parallel\alpha$。
  - type: dual_explanation
    id: sol-lp-parallel-judge
    label: 例1·线面平行判定
    stem_latex: 已知 $a\parallel b$，$b\subset\alpha$，补出中间前提后证明 $a\parallel\alpha$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 先判对象
      content_latex: 这是由线线平行推线面平行，属于线面平行判定。
    - kind: mistake
      title: 最易漏
      content_latex: 最容易漏 $a\not\subset\alpha$，没写“线在面外”判定不成立。
    solution_title: 解答
    solution_step_ids:
    - lp-judge-obj
    - lp-judge-bridge
    - lp-judge-conclude
  - type: solution
    id: card-line-plane-parallel-prop
    title: 定理卡·线面平行性质：过线作面找交线
    items:
    - latex: \textbf{几何语言：}$a\parallel\alpha$，$a\subset\beta$，$\alpha\cap\beta=b\Rightarrow a\parallel b$。
    - latex: \textbf{口令：}线面平行 $\Rightarrow$ 线线平行。过该直线作辅助面，找它与已知面的交线。
    - latex: \textbf{易错前提：}$a\subset\beta$ 与 $\alpha\cap\beta=b$（交线）是最常漏的“桥”，不能直接由 $a\parallel\alpha$ 跳到 $a\parallel b$。
  - type: problemcard
    id: ex-lp-parallel-prop
    label: 例2·线面平行性质
    stem_latex: '如图，$AB\parallel\alpha$，过 $AB$ 的平面 $\beta$ 交 $\alpha$ 于 $CD$。求证：$AB\parallel CD$。

