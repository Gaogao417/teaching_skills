  - type: problem
    id: q5
    points: 10
    label: 第 5 题
    stem_latex: '如图，在长方体 $ABCD\text{-}A_1B_1C_1D_1$ 中，$E$、$F$ 分别为棱 $DD_1$、$C_1D_1$ 的中点。画出平面 $AEF$ 与底面 $ABCD$ 的交线。（要求：画出必要的延长线，并标出辅助交点。）

      '
    answer_space:
      type: steps
      height: 60mm
      step_count: 5
    answer: '在侧面 $CDD_1C_1$ 所在平面内延长 $EF$，与底面棱 $CD$ 的延长线交于点 $M$（$M$ 在 $D$ 的一侧，$DM=\tfrac12 CD$）；

      连接 $AM$，则直线 $AM$ 即平面 $AEF$ 与底面 $ABCD$ 的交线。'
    explanation: '$A$ 在截面（过 $A$）又在底面 $ABCD$，是第一个公共点；

      $E,F$ 都在侧面 $CDD_1C_1$ 所在平面内，在该平面内延长 $EF$，与 $CD$ 所在直线交于 $M$。

      因 $M\in EF\subset$ 平面 $AEF$，且 $M\in CD\subset$ 底面 $ABCD$，故 $M$ 是第二个公共点；

      由基本事实3，过 $A,M$ 的直线即两面的交线，故交线为 $AM$。'
    solution_steps:
    - title: 找第一个公共点
      content: $A$ 同时在截面（过 $A$）和底面 $ABCD$ 上，是第一个公共点。
    - title: 选延长所在的侧面平面
      content: $E,F$ 都在侧面 $CDD_1C_1$ 所在平面内，在该平面内可延长 $EF$ 找交点。
    - title: 延长找第二个公共点
      content: 在侧面 $CDD_1C_1$ 所在平面内延长 $EF$，交 $CD$ 的延长线于 $M$；$M\in$ 底面 $ABCD$。
    - title: 核验 M 是公共点
      content: $M\in EF\subset$ 平面 $AEF$，且 $M\in CD\subset$ 底面 $ABCD$，故 $M$ 是第二个公共点。
    - title: 两点连线即交线
      content: 由基本事实3，连接 $AM$，直线 $AM$ 即平面 $AEF$ 与底面 $ABCD$ 的交线。
    teaching:
      teaching_goal: 训练"同一平面内延长找交点"——截面与底面只有一个公共点时，在某个表面所在平面内延长两条线把交点逼到底面上。
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 漏画延长线直接连两个不该连的点；或截面画到几何体外；或延长线画错所在平面。
      entry_point: build_relation
      scaffold_level: low
      variation_depth: changed_representation
      complexity_note: 改写自题集第 25 题，换长方体载体、字母与点位，保留"侧面内延长找底面棱交点"骨架。
      upgrade_rule: 能独立说出延长线必须画在哪个表面所在平面内、落点在哪条棱上。
      fallback_move: 回到"两个公共点定交线"——先找一个公共点，再想延长哪条线能把第二个点逼到底面。
    hints:
    - content_latex: 截面和底面已有一个公共点 $A$；要找第二个公共点，注意 $E,F$ 都在侧面 $CDD_1C_1$ 所在平面内——在该平面内延长 $EF$，交点会落在哪条底面棱（或其延长线）上？
    diagram_slot:
