- id: advanced
  title: 三、提高档（证明两线共面）
  type: practice
  visibility: both
  blocks:
  - type: problem
    id: q7
    points: 10
    label: 第 7 题
    stem_latex: '如图，在正方体 $ABCD\text{-}A_1B_1C_1D_1$ 中，$E$、$F$ 分别为棱 $AB$、$AA_1$ 的中点。

      求证：$E,F,D_1,C$ 四点共面。

      '
    answer_space:
      type: steps
      height: 56mm
      step_count: 5
    answer: 见解析，结论成立（$EF\parallel D_1C$，由推论③共面）。
    explanation: '连 $EF$、$D_1C$。在 $\triangle AA_1B$ 中，$E,F$ 分别为 $AB,AA_1$ 的中点，

      故 $EF\parallel A_1B$（中位线）；

      又正方体中 $A_1B\parallel D_1C$（面 $ABB_1A_1\parallel$ 面 $DCC_1D_1$ 的对应线），

      故 $EF\parallel D_1C$。

      由推论③，两条平行直线确定一个平面，故 $E,F,D_1,C$ 四点共面。'
    solution_steps:
    - title: 把四点配成两条线
      content: 连 $EF$ 与 $D_1C$，目标证 $EF\parallel D_1C$。
    - title: 用中位线证 EF 平行
      content: 在 $\triangle AA_1B$ 中，$E,F$ 为 $AB,AA_1$ 中点，故 $EF\parallel A_1B$。
    - title: 桥接到 D1C
      content: 正方体中面 $ABB_1A_1\parallel$ 面 $DCC_1D_1$，对应线 $A_1B\parallel D_1C$。
    - title: 传递得平行
      content: 由 $EF\parallel A_1B\parallel D_1C$，得 $EF\parallel D_1C$。
    - title: 由推论③定面
      content: $EF\parallel D_1C$，由推论③确定一个平面，故 $E,F,D_1,C$ 共面。
    teaching:
      teaching_goal: 训练共面证明主路二——平行定面（推论③），配中位线+对应线平行桥接。
      source_relations:
