  - type: fillin
    id: q2
    points: 6
    stem: 已知直线 $l$ 和 $l$ 外不共线的三点 $A,B,C$。由 $l$ 与这三个点最多能确定 \underline{\quad\quad} 个平面；其中 $l$ 与每个点各确定 \underline{\quad} 个，三点本身还能再确定 \underline{\quad} 个。
    fillin_type: blank
    answer: 4；1；1
    explanation: '由推论①，直线 $l$ 与线外一点确定一个平面，$A,B,C$ 各与 $l$ 最多各定 $1$ 个面，共 $3$ 个；

      又 $A,B,C$ 不共线，由基本事实1还能再确定 $1$ 个面（且该面不过 $l$）。

      最多 $3+1=4$ 个。关键判据：哪个点能与 $l$ 落在同一面里就少算一个。'
    teaching:
      teaching_goal: 训练定面枚举——先用"线+点"主路数，再单独看点之间能否凑面。
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 漏算三点本身定的那 $1$ 个面，或把"最多"算成"恰好"。
      entry_point: find_entry
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 枚举计数，无坐标计算。
      upgrade_rule: 能说清"为什么最多要加 1"的前提条件。
      fallback_move: 固定一条主路（线+点）先数，再单独数点之间。
    hints:
    - content: 先固定"线+点"这条主路数（推论①），再单独看三点之间能不能再凑出平面（三点不共线）。
  - type: fillin
    id: q3
    points: 6
    stem: '已知点 $M$ 在直线 $a$ 上，直线 $a$ 在平面 $\alpha$ 内，则 $M,a,\alpha$ 的关系记作 $M$ \underline{\quad} $a$ \underline{\quad} $\alpha$；

      若直线 $a\subset$ 平面 $\alpha$，直线 $b\subset$ 平面 $\alpha$，$M\in a$，$N\in b$，且 $M,N$ 都在直线 $l$ 上，则 $l$ 与 $\alpha$ 的关系是 $l$ \underline{\quad} $\alpha$。（填 $\in$ 或 $\subset$）'
    fillin_type: blank
    answer: $\in$；$\subset$；$\subset$
    explanation: '点 $M$ 在直线 $a$ 上写 $M\in a$；直线 $a$ 在面 $\alpha$ 内写 $a\subset\alpha$，故 $M\in a\subset\alpha$。

      第二问：$M\in a\subset\alpha\Rightarrow M\in\alpha$，同理 $N\in\alpha$；$M,N$ 都在直线 $l$ 上且都在 $\alpha$ 内，由基本事实2得 $l\subset\alpha$。'
    teaching:
      teaching_goal: 训练从属关系链——点用 $\in$、线面用 $\subset$，线上两点都在面内则整条线在面内。
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 把 $M\in a$ 误写成 $M\subset a$（点不是集合），或把 $l\subset\alpha$ 漏证两点都在面内。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: changed_representation
      complexity_note: 符号翻译，无计算。
      upgrade_rule: 能独立把"线在面内"的判据写成"线上两点都在面内"。
      fallback_move: 回到基本事实2的符号定义逐字翻译。
    hints:
    - content: 点用 $\in$、线面用 $\subset$；线上两点都在面内，整条线在面内。
- id: medium
  title: 二、中档档（画简单截面 + 延长线找交点）
  type: practice
  visibility: both
  blocks:
  - type: problem
    id: q4
    points: 9
    label: 第 4 题
    stem_latex: '如图，在正方体 $ABCD\text{-}A_1B_1C_1D_1$ 中，$E$ 为棱 $B_1C_1$ 的中点。画出过 $A,C,E$ 三点的平面与正方体表面相交所得到的截面，并简述每条边分别落在哪个表面上。

      '
    answer_space:
      type: steps
      height: 52mm
      step_count: 4
    answer: '截面为四边形 $ACEF$，其中 $F$ 为 $A_1B_1$ 的中点（满足 $EF\parallel AC$）。

      四条边分别落在：$AC$ 落在底面 $ABCD$；$CE$ 落在侧面 $BCC_1B_1$；$EF$ 落在上底面 $A_1B_1C_1D_1$；$FA$ 落在侧面 $ABB_1A_1$。'
    explanation: '$A,C$ 都在底面 $ABCD$，连线 $AC$ 是截面与底面的交边；

      $C,E$ 都在侧面 $BCC_1B_1$，连线 $CE$ 是截面与该侧面的交边；

      截面与上底面 $A_1B_1C_1D_1$ 的交线过 $E$，又 $AC\parallel A_1C_1$（上下底面平行），故该交线 $\parallel AC$，过 $E$ 作 $EF\parallel A_1C_1$ 交 $A_1B_1$ 于中点 $F$；

      $A,F$ 都在侧面 $ABB_1A_1$，连线 $AF$ 是截面与该侧面的交边。

      截面边都落在表面上，得四边形 $ACEF$。'
    solution_steps:
    - title: 找底面上的边
      content: $A,C\in$ 底面 $ABCD$，连 $AC$，是截面与底面的交边。
    - title: 找含 E 的侧面边
      content: $C,E\in$ 侧面 $BCC_1B_1$，连 $CE$，是截面与该侧面的交边。
    - title: 定上底面交线
      content: 截面与上底面交线过 $E$ 且 $\parallel AC$，过 $E$ 作 $EF\parallel A_1C_1$ 交 $A_1B_1$ 于中点 $F$。
    - title: 补第四条边并核验
      content: $A,F\in$ 侧面 $ABB_1A_1$，连 $AF$；截面四边形 $ACEF$ 四条边分别落在四个表面上。
    teaching:
      teaching_goal: 训练"截面边落在表面上"——同在一个面内的两个公共点直接连线即一条边。
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 截面画到几何体外，或漏掉"交线与平行面平行"这一步只画三角形。
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 纯作图，无计算。
      upgrade_rule: 能主动说出每条边落在哪个表面、为什么这样连。
      fallback_move: 回到"两个公共点定交线"，逐个面找公共点。
    hints:
    - content_latex: 先找截面与每个表面已有的公共点：$A,C$ 在底面，$E$ 在上底面；同在一个面内的两个公共点直接连线即一条边。截面边必须落在表面上。
    diagram_slot:
      slot_id: practice.teacher.q4.prompt
