      expected_blocker: 共面证明没走相交/平行两条主路，凭直觉说"在一个面里"；或漏写中位线前提。
      entry_point: build_relation
      scaffold_level: low
      variation_depth: changed_numbers
      complexity_note: 改写自经典例题3(1)，换点位，保留"中位线→对应线平行→推论③"骨架。
      upgrade_rule: 能独立判断该走平行定面还是相交定面，并写出完整依据链。
      fallback_move: 回到"把四点配成两条线，证相交或平行"。
    hints:
