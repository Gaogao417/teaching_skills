  - type: choice
    id: q6
    points: 6
    stem: 用一个平面去截一个四棱锥，截面形状不可能是（    ）
    choices:
      A: 三角形
      B: 四边形
      C: 五边形
      D: 六边形
    answer: D
    explanation: '四棱锥共有 $5$ 个面（$1$ 个底面 $+4$ 个侧面）。截面与几何体表面的交线（截面边）最多等于截面能切到的面数，故截面边数最多为 $5$（五边形）。

