- id: basic
  title: 一、基础档（判定确定平面）
  type: practice
  visibility: both
  blocks:
  - type: choice
    id: q1
    points: 6
    stem: 下列条件中，能够确定一个平面的是（    ）
    choices:
      A: 空间中的三个点
      B: 一条直线和直线外的一个点
      C: 空间中两两相交的三条直线
      D: 两个公共点
    answer: B
    explanation: 'A 错：三点共线时不能确定平面（有无数个面过该直线）；

      B 对：由推论①，一条直线与直线外一点确定唯一平面；

      C 错：三条直线若交于同一点（共点），可确定 $1$ 个或 $3$ 个平面，不唯一；

      D 错：两个点只能确定一条直线，不能确定平面。

      故选 B。'
    teaching:
      teaching_goal: 训练"定面四主路"的判定——三条推论+基本事实1的前提条件辨析。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 1
        models:
        - 平面确定推论辨析
        fusion_role: single_model
      expected_blocker: 把"三点定面"记成"任意三点定面"，漏掉不共线前提；或把"两条相交直线定面"扩大到"任意两条相交直线"。
      entry_point: find_entry
      scaffold_level: high
      variation_depth: changed_question
      complexity_note: 纯判定辨析，无计算。
      upgrade_rule: 能主动写出每个错误选项的反例。
      fallback_move: 回到基本事实1"不共线三点"前提逐条排查。
    hints:
    - content: 先看每个选项缺哪个前提——三点是否不共线？点是否在线外？三条线是否共面？两个点能不能定面？
