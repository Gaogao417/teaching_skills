  - type: problem
    id: q8
    points: 13
    label: 第 8 题
    stem_latex: "如图，在空间四边形 $ABCD$ 中，$E$、$F$ 分别是 $AB$、$AD$ 的中点，$G$、$H$ 分别是 $BC$、$CD$ 上的点，且 $CG:GB=CH:HD=1:2$。\n\\begin{enumerate}[label=(\\arabic*)]\n  \\item 求证：$E,F,H,G$ 四点共面；\n  \\item 设直线 $EH$ 与 $FG$ 所确定的平面为 $\\alpha$，判断直线 $BD$ 与平面 $\\alpha$ 的位置关系（相交、平行或在平面内），并说明理由。\n\\end{enumerate}\n"
    answer_space:
      type: steps
      height: 68mm
      step_count: 6
    answer: '(1) $E,F,H,G$ 四点共面（证明见解析）。

      (2) 直线 $BD$ 与平面 $\alpha$ 平行（$BD\parallel\alpha$）。'
    explanation: '(1) 在 $\triangle ABD$ 中，$E,F$ 分别为 $AB,AD$ 的中点，故 $EF\parallel BD$ 且 $EF=\tfrac12 BD$。

      又在 $\triangle BCD$ 中，$\dfrac{CG}{CB}=\dfrac{CH}{CD}=\dfrac13$，故 $GH\parallel BD$。

      于是 $EF\parallel GH$，由推论③，$EF$ 与 $GH$ 确定一个平面，故 $E,F,H,G$ 四点共面。

      (2) 由 (1) 知 $EF\parallel BD$ 且 $EF\subset\alpha$；又 $E$ 为 $AB$ 中点，$E\notin BD$，故 $BD$ 与 $EF$ 不重合，

      即 $BD$ 上没有点落在 $\alpha$ 内，故 $BD\not\subset\alpha$。

      由线面平行的判定（$EF\subset\alpha$，$BD\parallel EF$，$BD\not\subset\alpha$），得 $BD\parallel\alpha$。'
    solution_steps:
    - title: (1) 证 EF∥BD
      content: 在 $\triangle ABD$ 中，$E,F$ 为 $AB,AD$ 中点，故 $EF\parallel BD$。
    - title: (1) 证 GH∥BD
      content: 在 $\triangle BCD$ 中，$\tfrac{CG}{CB}=\tfrac{CH}{CD}=\tfrac13$，故 $GH\parallel BD$。
    - title: (1) 传递平行并定面
      content: $EF\parallel BD\parallel GH$，故 $EF\parallel GH$，由推论③ $E,F,H,G$ 共面。
    - title: (2) 找面内的平行线
      content: 由 (1) $EF\subset\alpha$ 且 $BD\parallel EF$。
    - title: (2) 排除 BD 在面内
      content: $E$ 为 $AB$ 中点，$E\notin BD$，故 $BD$ 与 $EF$ 不重合，$BD\not\subset\alpha$。
    - title: (2) 下结论
      content: 由线面平行判定（$EF\subset\alpha$，$BD\parallel EF$，$BD\not\subset\alpha$），得 $BD\parallel\alpha$。
    teaching:
      teaching_goal: 训练共面证明平行主路 + 线面平行判定的承接——平行定面后再判线面位置。
      source_relations:
      - fallback:structure_analysis
      model_fusion:
        model_count: 2
        models:
        - 平行定面（推论③）
        - 线面平行判定
        fusion_role: prerequisite
      relation_chain:
      - step: 1
        relation_id: parallel_determination_coplanar
        inputs:
          four_points: E,F,G,H
          line_a: EF
          line_b: GH
        outputs:
          coplanar_plane: alpha (含 E,F,H,G)
        constraints_checked:
        - EF∥BD（中位线）
        - GH∥BD（同比分点）
      - step: 2
        relation_id: line_plane_parallel_criterion
        consumes:
          coplanar_plane: step1.outputs.coplanar_plane
        inputs:
          line: BD
          in_plane_line: EF
        selector: EF∥BD 且 BD 与 EF 不重合
        outputs:
          position: BD∥alpha
        constraints_checked:
        - EF⊂alpha
        - BD∥EF
        - BD⊄alpha
      expected_blocker: 第 (2) 问漏判"BD 是否在面内"，直接说平行；或第 (1) 问 GH∥BD 的比例写反。
      entry_point: hidden_structure
      scaffold_level: low
      variation_depth: partially_hidden
      complexity_note: 共面证明主路 + 线面平行判定承接，无坐标计算。
      upgrade_rule: 能独立完成"平行定面→线面位置判断"的完整链条并写清排除理由。
      fallback_move: 第 (2) 问回到线面平行判定三前提（面内一条线、线外平行、不在面内）。
    hints:
    - content_latex: (1) $E,F$ 是中点 ⇒ $EF\parallel BD$ 且 $EF=\tfrac12BD$；$G,H$ 按同比取点 ⇒ $GH\parallel BD$。两条线都平行于 $BD$ ⇒ 它们互相平行 ⇒ 共面（推论③）。(2) $EH$（或 $FG$）和 $BD$ 在 $\triangle ABD$（或相关）所在平面内，它们会不会相交？
