  - type: fillin
    id: q2
    points: 6
    stem: 已知直线 $l$ 和 $l$ 外不共线的三点 $A,B,C$。由 $l$ 与这三个点最多能确定 \underline{\quad\quad} 个平面；其中 $l$ 与每个点各确定 \underline{\quad} 个，三点本身还能再确定 \underline{\quad} 个。
    fillin_type: blank
    answer: ''
    hints:
    - content: 先固定"线+点"这条主路数（推论①），再单独看三点之间能不能再凑出平面（三点不共线）。
  - type: fillin
    id: q3
    points: 6
    stem: '已知点 $M$ 在直线 $a$ 上，直线 $a$ 在平面 $\alpha$ 内，则 $M,a,\alpha$ 的关系记作 $M$ \underline{\quad} $a$ \underline{\quad} $\alpha$；

      若直线 $a\subset$ 平面 $\alpha$，直线 $b\subset$ 平面 $\alpha$，$M\in a$，$N\in b$，且 $M,N$ 都在直线 $l$ 上，则 $l$ 与 $\alpha$ 的关系是 $l$ \underline{\quad} $\alpha$。（填 $\in$ 或 $\subset$）'
    fillin_type: blank
    answer: ''
    hints:
    - content: 点用 $\in$、线面用 $\subset$；线上两点都在面内，整条线在面内。
