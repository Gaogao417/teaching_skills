  - type: choice
    id: q1
    points: 6
    stem: 下列条件中，能够确定一个平面的是（    ）
    choices:
      A: 空间中的三个点
      B: 一条直线和直线外的一个点
      C: 空间中两两相交的三条直线
      D: 两个公共点
    answer: ''
    hints:
    - content: 先看每个选项缺哪个前提——三点是否不共线？点是否在线外？三条线是否共面？两个点能不能定面？
    diagram_col:
