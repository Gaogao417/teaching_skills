    stem_latex: "如图，在空间四边形 $ABCD$ 中，$E$、$F$ 分别是 $AB$、$AD$ 的中点，$G$、$H$ 分别是 $BC$、$CD$\
      \ 上的点，且 $CG:GB=CH:HD=1:2$。\n\\begin{enumerate}[label=(\\arabic*)]\n  \\item\
      \ 求证：$E,F,H,G$ 四点共面；\n  \\item 设直线 $EH$ 与 $FG$ 所确定的平面为 $\\alpha$，判断直线 $BD$ 与平面\
      \ $\\alpha$ 的位置关系（相交、平行或在平面内），并说明理由。\n\\end{enumerate}\n"
    answer_space:
      type: steps
      height: 68mm
      step_count: 6
    hints:
