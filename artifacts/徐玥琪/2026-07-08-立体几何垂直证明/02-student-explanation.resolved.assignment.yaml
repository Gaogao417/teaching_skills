        width: 70mm
        caption: BC⊥面 PAC，垂足 C；CP、CA 分别在两半平面且都⊥BC，∠PCA 为平面角。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:3ab8d662d7eca735990af883e4f6621d5c39f89060074027e79af5d1bc63fd34
        packages:
