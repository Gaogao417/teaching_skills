  - type: route
    id: dihedral-example1-route
    steps:
    - id: dh-step1-edge
      latex: 认棱：二面角的棱是 $BC$
      content_latex: 二面角 $P\text{-}BC\text{-}A$ 的棱为 $BC$，两个半平面是 $PBC$ 与 $ABC$。平面角顶点要在
        $BC$ 上。
    - id: dh-step2-perp-plane
      latex: 证棱 $BC\perp$ 面 $PAC$
      content_latex: 由 $PA\perp$ 圆面 $ABC$，$BC\subset$ 圆面，据定义得 $PA\perp BC$；又 $AB$
        为直径，$C$ 在圆上，由直径所对圆周角为 $90^{\circ}$ 得 $AC\perp BC$。$PA\cap AC=A$，$PA,AC\subset$
        面 $PAC$，由线面垂直判定得 $BC\perp$ 面 $PAC$。
    - id: dh-step3-locate
      latex: 定平面角顶点与两边
      content_latex: 棱 $BC\perp$ 面 $PAC$，垂足为 $C$（$C\in BC$ 且 $C\in$ 面 $PAC$）。面 $PAC$
        与两个半平面的交线分别为 $PC$、$AC$，故 $\angle PCA$ 为二面角 $P\text{-}BC\text{-}A$ 的平面角。
    - id: dh-step4-check
      latex: 核验三要素
      content_latex: \textcircled{1} 顶点 $C$ 在棱 $BC$ 上；\textcircled{2} $CP\subset$
        半平面 $PBC$，$CA\subset$ 半平面 $ABC$；\textcircled{3} $CP\perp BC$、$CA\perp BC$（由
        $BC\perp$ 面 $PAC$）。三要素齐全，$\angle PCA$ 是平面角。
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/explanation-example4-solution-annotated/rendered/solution.fragment.tex
        diagram_ref: explanation.example4.solution.annotated
