        libraries: []
  - type: dual_explanation
    id: dihedral-example1-solution
    label: 例题 4
    stem_latex: 指出二面角 $P\text{-}BC\text{-}A$ 的平面角，并核验三要素。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 平面角顶点怎么定
      content_latex: 若能证棱 $\perp$ 某个面，棱与该面的交点就是平面角顶点，该面与两半平面的两条交线就是两边。本题先证 $BC\perp$
        面 $PAC$。
    - kind: hint
      title: 凑棱的垂线
      content_latex: $PA\perp$ 圆面给一条 $PA\perp BC$；直径对圆周角 $90^{\circ}$ 给一条 $AC\perp
        BC$。两条相交垂线凑齐棱的线面垂直。
    - kind: mistake
      title: 三要素不全
      content_latex: 顶点不在棱上、两边不全在两个半平面内、两边不都垂直于棱，任一条不满足都不是平面角。核验要逐项写。
    solution_title: 解答
    solution_step_ids:
    - dh-step1-edge
    - dh-step2-perp-plane
    - dh-step3-locate
    - dh-step4-check
  - type: mistake
    id: dihedral-mistake
    title: 易错提醒
    content_latex: '二面角平面角三要素常缺：①顶点画到棱外（应在棱上）；②两边画到同一半平面（应分别在两个半平面）；③只画一边垂直于棱（两边都要⊥棱）。

      本专题只找角、核验三要素，不进行数值计算。

      '
  - type: method_reminder
    id: dihedral-method
    title: 方法提醒
    items:
    - latex: 认棱 → 证棱⊥某面 → 该面与两半平面交线即平面角两边，交点即顶点。
    - latex: 三要素逐项核验：顶点在棱上、两边在两半平面、两边都⊥棱。
    - latex: 本阶段只找角不算大小，计算留到后续。
