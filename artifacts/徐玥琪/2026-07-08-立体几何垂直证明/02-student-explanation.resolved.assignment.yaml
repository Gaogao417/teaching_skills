  - type: dual_explanation
    id: plane-plane-example2-solution
    label: 例题 3
    stem_latex: 求证：$BC\perp AB$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 线线怎么证
      content_latex: 要证 $BC\perp AB$，转成证 $BC\perp$ 某个含 $AB$ 的面。哪个面？面 $PAB$ 里已经有"面面垂直"的条件，用它。
    - kind: hint
      title: 面面性质怎么用
      content_latex: 面 $PAB\perp$ 面 $PBC$，要在面 $PAB$ 内找一条\textbf{垂直于交线 $PB$}的线，才能由性质得它垂直面
        $PBC$。所以作 $AD\perp PB$。
    - kind: mistake
      title: 漏"垂直于交线"
      content_latex: 面面垂直性质必须满足"该直线垂直于两面的交线"。只写"面面垂直则一面内任一直线垂直另一面"是错的。
    solution_title: 解答
    solution_step_ids:
    - pp2-step1-judge
    - pp2-step2-property
    - pp2-step3-def
    - pp2-step4-second
    - pp2-step5-conclude
  - type: mistake
    id: plane-plane-mistake
    title: 易错提醒
    content_latex: '①判定与性质方向混用：判定是"线面推出面面"，性质是"面面推出线面"，方向不能反。

      ②性质定理漏写"垂直于交线"：必须是面内\textbf{垂直于交线}的线才垂直另一面。

      ③只凑一条垂线就下结论：性质链里凑线面垂直仍需"两条相交线"，别只靠一条。

      '
  - type: method_reminder
    id: plane-plane-method
    title: 方法提醒
    items:
    - latex: 证面面垂直：到一面里找（或证）一条垂直另一面的线，再下判定。
    - latex: 用面面垂直：在面内找垂直于交线的线，由性质得它垂直另一面。
    - latex: 每步标注用的是判定还是性质，向上还是向下，钉回转化环。
- id: dihedral-angle
  title: 单元四：二面角平面角——只找角、不计算
  show_title: true
  type: explanation
  visibility: student
  layout:
    break_before: true
  blocks:
  - type: solution
    id: dihedral-knowledge
    title: 二面角的平面角：三要素与作图口诀
    items:
    - latex: \textbf{二面角 $\alpha\text{-}l\text{-}\beta$：}从一条直线 $l$（棱）出发的两个半平面组成的图形。
    - latex: \textbf{平面角三要素（缺一即非平面角）：}\textcircled{1} 顶点在棱 $l$ 上；\textcircled{2} 两边分别在两个半平面内；\textcircled{3}
        两边都垂直于棱 $l$。
    - latex: \textbf{作图口诀（本题只到"找出角"，不算大小）：}若能证棱 $l\perp$ 某个面，则该面与两半平面的两条交线就是平面角的两边，交点（棱与该面的交点）就是平面角顶点。
    - latex: 本题阶段只做"定平面角顶点 + 核验三要素"，不进行数值计算（计算留到后续）。
  - type: problemcard
    id: dihedral-example1-card
    label: 例题 4
    stem_latex: '如图，$AB$ 是 $\odot O$ 的直径，$PA$ 垂直于 $\odot O$ 所在平面，$C$ 是圆上一点（不同于 $A,B$）。指出二面角
      $P\text{-}BC\text{-}A$ 的平面角，并核验三要素。（只找角，不计算大小。）

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-example4-prompt/rendered/prompt.fragment.tex
