sections:
- id: cycle-overview
  title: 单元一：垂直关系转化环——判定向上、性质向下
  show_title: true
  type: explanation
  visibility: student
  blocks:
  - type: solution
    id: knowledge-map
    title: 结构图：垂直证明的四个入口
    items:
    - content_latex: '\begin{center}

        \begin{tikzpicture}[x=1cm,y=1cm,>=stealth, font=\small]

        \node[draw=edu-blue!80, fill=edu-blue!10, rounded corners=3pt, align=center,
        inner sep=5pt, font=\bfseries] (root) at (0,0) {垂直证明的四个入口};

        \node[draw=green!70, fill=green!8, rounded corners=2pt, align=center, inner
        sep=4pt, minimum width=28mm] (ll) at (-4,1.5) {线线垂直\\勾股逆/等腰/定义};

        \node[draw=orange!70, fill=orange!8, rounded corners=2pt, align=center, inner
        sep=4pt, minimum width=28mm] (lpj) at (0,1.9) {线面判定\\面内两条相交垂线};

        \node[draw=purple!70, fill=purple!8, rounded corners=2pt, align=center, inner
        sep=4pt, minimum width=28mm] (ppj) at (4,1.5) {面面判定\\一面含另一面垂线};

        \node[draw=teal!70, fill=teal!8, rounded corners=2pt, align=center, inner
        sep=4pt, minimum width=28mm] (prop) at (0,-1.9) {性质向下\\线面定义\\面面性质};

        \draw[->, thick, edu-blue!70] (ll) -- node[above, sloped, font=\scriptsize]
        {凑两条} (lpj);

        \draw[->, thick, edu-blue!70] (lpj) -- node[above, sloped, font=\scriptsize]
        {线在面内} (ppj);

        \draw[->, thick, edu-blue!70] (ppj) -- node[above, sloped, font=\scriptsize]
        {用性质} (prop);

        \draw[->, thick, edu-blue!70] (prop) -- node[above, sloped, font=\scriptsize]
        {回线线} (ll);

        \end{tikzpicture}

        \end{center}'
    - latex: \textbf{总口令：}线面垂直判定必须有“面内两条相交线”；面面垂直性质必须有“垂直交线”。
  - type: solution
    id: cycle-overview-knowledge
    title: 核心总图：线线 / 线面 / 面面 的转化环
    items:
    - latex: 三种垂直（线线、线面、面面）构成一个环：\textbf{判定定理"向上"}，\textbf{性质 / 定义"向下"}。
    - latex: 判定方向（向上，凑条件出结论）：线线 $\Rightarrow$ 线面推出面面。
    - latex: 向下方向（用性质或定义）：面面推出线面 $\Rightarrow$ 线线。
    - content_latex: '\begin{tabular}{p{0.30\linewidth}p{0.40\linewidth}p{0.22\linewidth}}

        转化箭头 & 用的定理 & 方向\\

        线线到线面 & 线面垂直判定（找面内两条相交线） & 判定向上\\

        线面 $\to$ 面面 & 面面垂直判定（一面含另一面垂线） & 判定向上\\

        面面到线面 & 面面垂直性质（面内交线垂线 $\Rightarrow$ 线面垂直） & 性质向下\\

        线面到线线 & 线面垂直定义（$a\perp\alpha,\ b\subset\alpha\Rightarrow a\perp b$） & 定义向下

        \end{tabular}

        '
    - latex: \textbf{总口令：}判对象（线线 / 线面 / 面面）$\to$ 找面 $\to$ 写格式（相交前提、垂足字母、标注定理）。
  - type: problemcard
    id: cycle-overview-diff-card
    label: 关键差异 · 对比判断
    stem_latex: '下面两个判断，请分别回答"能不能下结论"，并说出理由。

      \begin{enumerate}[label=(\arabic*)]

      \item 已知 $a\perp b$，$b\subset\alpha$，能否得到 $a\perp\alpha$？

      \item 已知 $a\perp m$，$a\perp n$，$m\cap n=P$，$m,n\subset\alpha$，能否得到 $a\perp\alpha$？

      \end{enumerate}'
  - type: route
    id: cycle-overview-diff-route
    steps:
    - id: cycle-diff-q1
      latex: 判断 (1)：只给一条线垂直
      content_latex: 不能。$a\perp b$ 且 $b\subset\alpha$ 只说明 $a$ 垂直于 $\alpha$ 内的\textbf{一条}线
        $b$，不足以推出 $a\perp\alpha$。线面垂直判定需要面内\textbf{两条相交}线都垂直，缺一不可。
    - id: cycle-diff-q2
      latex: 判断 (2)：给两条相交线垂直
      content_latex: 能。$a\perp m$，$a\perp n$，$m\cap n=P$，$m,n\subset\alpha$ 四个前提齐全，由\textbf{线面垂直判定}得
        $a\perp\alpha$。差别就在"相交"二字：$m,n$ 必须相交于一点 $P$。
  - type: dual_explanation
    id: cycle-overview-diff-solution
    label: 关键差异
    stem_latex: 区分"垂直于面内一条线"与"垂直于面内两条相交线"。
    side_title: 小贴士
    side_items:
    - kind: mistake
      title: 最大陷阱：线面垂直性质推的是平行
      content_latex: 线面垂直的\textbf{性质定理}给的是 $a\perp\alpha,\ b\perp\alpha\Rightarrow
        a\parallel b$——由线面垂直推出的是\textbf{平行线}，不是垂直线！这是跨类结论（线面垂直 $\to$ 线线平行）。
    - kind: note
      title: 别和平行环混
      content_latex: 平行环上"线面到线线"（性质定理）给的是线线\textbf{平行}；垂直环上"线面到线线"（定义推论）给的是线线\textbf{垂直}。看到
        $a\perp\alpha,\ b\subset\alpha$ 要写 $a\perp b$，不要惯性写 $a\parallel b$。
    - kind: hint
      title: 一条 vs 两条相交
      content_latex: 从线线跳到线面，必须补齐"两条相交线"这个台阶：一条不够，两条平行也不够，只有两条\textbf{相交}线都垂直才行。
    solution_title: 解答
    solution_step_ids:
    - cycle-diff-q1
    - cycle-diff-q2
  - type: mistake
    id: cycle-overview-mistake
    title: 易错提醒
    content_latex: '看到 $a\perp b,\ b\subset\alpha$ 就写 $a\perp\alpha$，是最常见的跳级错误——少的是"第二条相交垂线"。

      另一处易混：线面垂直性质定理 $a\perp\alpha,\ b\perp\alpha\Rightarrow a\parallel b$ 推出的是\textbf{平行}，别写成垂直。

      '
  - type: method_reminder
    id: cycle-overview-method
    title: 方法提醒
    items:
    - latex: 判对象在先：先说清要证的是线线、线面还是面面垂直。
    - latex: 线线到线面，必凑"面内两条相交线"；缺相交前提不下结论。
    - latex: 线面到线线，分清是定义推论（得垂直）还是性质定理（得平行）。
- id: line-plane-perp
  title: 单元二：线面垂直判定——找面内两条相交线
  show_title: true
  type: explanation
  visibility: student
  layout:
    break_before: true
  blocks:
  - type: solution
    id: line-plane-knowledge
    title: 判定定理与格式模板卡
    items:
    - latex: \textbf{线面垂直判定定理：}一条直线与一个平面内的\textbf{两条相交直线}都垂直，则该直线与此平面垂直。
    - latex: \textbf{格式模板卡（按填空写，再脱模板）：} $\begin{cases} a\perp m \\ a\perp n \\ m\cap
        n=P \\ m,n\subset\alpha \end{cases} \Rightarrow a\perp\alpha\quad(\text{线面垂直判定})$
    - latex: 五个前提缺一不可：$a\perp m$、$a\perp n$、$m\subset\alpha$、$n\subset\alpha$、$m\cap
        n=P$。其中"相交"是关键。
    - latex: \textbf{找面动作：}定下目标平面 $\alpha$ 后，在 $\alpha$ 内锁定两条与 $a$ 都垂直、且彼此相交的直线；直接找不到时，用勾股逆定理
        / 等腰三角形三线合一 / 中位线先把"线线垂直"凑出来，再升级为线面垂直。
  - type: problemcard
    id: line-plane-example1-card
    label: 例题 1
    stem_latex: "如图，在三棱锥 $P\\text{-}ABC$ 中，$PA\\perp AB$，$PA\\perp AC$，且 $AB\\cap\
      \ AC=A$。\n\\begin{enumerate}[label=(\\arabic*)]\n  \\item 求证：$PA\\perp$ 平面 $ABC$；\n\
      \  \\item 若 $D$ 为 $BC$ 上一点，求证：$PA\\perp AD$。\n\\end{enumerate}\n"
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-example1-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.example1.prompt
      diagram_job_id: explanation-example1-prompt
      width: 70mm
      caption: 三棱锥 P-ABC，观察 PA 与面 ABC 内两条相交线。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:b3570c753f95099e8ab87e4fd4241a1094f5dbabe288519202875f645ab23635
      packages:
      - tikz
      libraries: []
  - type: route
    id: line-plane-example1-route
    steps:
    - id: lp-step1-judge
      latex: 判对象：要证 $PA\perp$ 面 $ABC$
      content_latex: 目标是线面垂直，回到面 $ABC$ 内找两条与 $PA$ 都垂直且相交的直线。
    - id: lp-step2-two-lines
      latex: 锁定面内两条相交线
      content_latex: $AB\subset$ 面 $ABC$，$AC\subset$ 面 $ABC$，且 $AB\cap AC=A$；题设给出
        $PA\perp AB$，$PA\perp AC$。
    - id: lp-step4-conclude
      latex: 写格式下结论
      content_latex: $PA\perp AB$，$PA\perp AC$，$AB\cap AC=A$，$AB,AC\subset$ 面 $ABC$，由线面垂直判定得
        $PA\perp$ 面 $ABC$。
    - id: lp-step5-part2
      latex: (2) 用线面垂直性质
      content_latex: 由 (1) 得 $PA\perp$ 面 $ABC$；又 $D\in BC$，所以 $AD\subset$ 面 $ABC$。由线面垂直性质得
        $PA\perp AD$。
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/explanation-example1-solution-annotated/rendered/solution.fragment.tex
        diagram_ref: explanation.example1.solution.annotated
        diagram_job_id: explanation-example1-solution-annotated
        width: 70mm
        caption: 标出 A 处两条相交线 AB、AC，PA 同时垂直这两条线。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:31a10acbc30c82200f88daf8d7847c694dd2f043c3108dffb285d60d83a1e4fa
        packages:
        - tikz
        libraries: []
  - type: dual_explanation
    id: line-plane-example1-part1
    label: (1)
    stem_latex: 求证：$PA\perp$ 平面 $ABC$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 先想什么
      content_latex: 要证 $PA\perp$ 面 $ABC$，就到面 $ABC$ 里找两条与 $PA$ 垂直且相交的线。
    - kind: hint
      title: 题设已经给足
      content_latex: $PA\perp AB$，$PA\perp AC$ 已经是两条垂线；只要补写 $AB,AC\subset$ 面 $ABC$
        与 $AB\cap AC=A$。
    - kind: mistake
      title: 漏相交前提
      content_latex: 下结论前必须写 $AB\cap AC=A$，且 $AB,AC\subset$ 面 $ABC$。相交前提漏写是扣分重灾区。
    solution_title: 解答
    solution_step_ids:
    - lp-step1-judge
    - lp-step2-two-lines
    - lp-step4-conclude
  - type: dual_explanation
    id: line-plane-example1-part2
    label: (2)
    stem_latex: 若 $D$ 为 $BC$ 上一点，求证：$PA\perp AD$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 从面回到线
      content_latex: 已经有 $PA\perp$ 面 $ABC$，要证 $PA\perp AD$，只需确认 $AD$ 在面 $ABC$ 内。
    - kind: note
      title: 复用 (1) 的结论
      content_latex: $D\in BC$，所以 $A,D$ 都在面 $ABC$ 内，进而 $AD\subset$ 面 $ABC$。
    solution_title: 解答
    solution_step_ids:
    - lp-step5-part2
  - type: mistake
    id: line-plane-mistake
    title: 易错提醒
    content_latex: '线面垂直判定最常见的两类错：①只写"两条线都垂直"就下结论，漏写 $m\cap n=P$；

      ②把 $a\perp b$（$b\subset\alpha$）直接当成 $a\perp\alpha$，跳过"第二条相交垂线"台阶。

      垂足必须落到字母上（写"垂足为 $D$"），相交前提要显式写出。

      '
  - type: method_reminder
    id: line-plane-method
    title: 方法提醒
    items:
    - latex: 线面垂直找面内两条相交线；找不到先用勾股逆 / 等腰三线合一 / 中位线凑线线垂直。
    - latex: 下结论四件套：$a\perp m$、$a\perp n$、$m\cap n=P$、$m,n\subset\alpha$，缺一不可。
    - latex: 垂足标字母，相交前提显式写，行末标注〔线面垂直判定〕。
- id: plane-plane-perp
  title: 单元三：面面垂直判定与性质——一线串两面
  show_title: true
  type: explanation
  visibility: student
  layout:
    break_before: true
  blocks:
  - type: solution
    id: plane-plane-knowledge
    title: 判定定理与性质定理（方向不能反）
    items:
    - latex: \textbf{面面垂直判定定理（线面 $\to$ 面面，向上）：}一个平面过另一个平面的垂线，则这两个平面垂直。即 $\begin{cases}
        l\perp\alpha \\ l\subset\beta \end{cases}\Rightarrow\alpha\perp\beta$。
    - latex: \textbf{面面垂直性质定理（面面到线面，向下）：}两个平面垂直，则其中一个平面内\textbf{垂直于交线}的直线垂直于另一个平面。即
        $\alpha\perp\beta$，$\alpha\cap\beta=l$，$AB\subset\alpha$，$AB\perp l\Rightarrow
        AB\perp\beta$。
    - content_latex: '\begin{tabular}{p{0.18\linewidth}p{0.40\linewidth}p{0.18\linewidth}}

        定理 & 关键动作 & 方向\\

        面面垂直判定 & 在 $\beta$ 内找（或证）一条垂直 $\alpha$ 的线 $l$，$l\subset\beta\Rightarrow\alpha\perp\beta$
        & 线面 $\to$ 面面\\

        面面垂直性质 & 已知 $\alpha\perp\beta$，在 $\alpha$ 内找\textbf{垂直于交线}的线 $\Rightarrow$
        该线垂直 $\beta$ & 面面到线面

        \end{tabular}

        '
    - latex: \textbf{方向记忆：}判定是"有线垂面推出两面垂"；性质是"两面垂推出面内交线垂线也垂另一面"。一个找线出面面，一个用面面出线面。
  - type: problemcard
    id: plane-plane-example1-card
    label: 例题 2（面面垂直判定）
    stem_latex: '在平行四边形 $ABCD$ 中，$AD=2AB=2$，$\angle BAC=90^{\circ}$。将 $\triangle ACD$
      沿 $AC$ 折起，使 $BD=\sqrt{5}$，得到三棱锥 $D\text{-}ABC$。判断面 $ABD$ 与面 $ACD$ 是否垂直，并说明理由。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-example2-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.example2.prompt
      diagram_job_id: explanation-example2-prompt
      width: 70mm
      caption: 折起后的三棱锥 D-ABC，观察 AB 与面 ACD 内两条相交线。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:794ca9bcef0c0c96c02910fe052f13d64e1bfaa22b7365fb9732e339b879ead8
      packages:
      - tikz
      libraries: []
  - type: route
    id: plane-plane-example1-route
    steps:
    - id: pp-step1-judge
      latex: 判对象：证面 $ABD\perp$ 面 $ACD$
      content_latex: 目标是面面垂直，到一面 $ABD$ 内找一条垂直另一面 $ACD$ 的线，找 $AB$。
    - id: pp-step2-line-plane
      latex: 先证 $AB\perp$ 面 $ACD$
      content_latex: 由原平行四边形 $AD=2AB=2$ 得 $AB=1$；$\angle BAC=90^{\circ}$ 得 $AB\perp
        AC$。折起后 $AD=2$，$AB=1$，$BD=\sqrt{5}$，由 $AB^2+AD^2=1+4=5=BD^2$ 用勾股逆定理得 $AB\perp
        AD$。又 $AC\cap AD=A$，$AC,AD\subset$ 面 $ACD$，由线面垂直判定得 $AB\perp$ 面 $ACD$。
    - id: pp-step3-conclude
      latex: 一面含垂线下结论
      content_latex: $AB\perp$ 面 $ACD$，且 $AB\subset$ 面 $ABD$，由\textbf{面面垂直判定}得面 $ABD\perp$
        面 $ACD$。
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/explanation-example2-solution-annotated/rendered/solution.fragment.tex
        diagram_ref: explanation.example2.solution.annotated
        diagram_job_id: explanation-example2-solution-annotated
        width: 70mm
        caption: AB 同时垂直 AC、AD（交于 A），故 AB⊥面 ACD，AB 在面 ABD 内。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:794ca9bcef0c0c96c02910fe052f13d64e1bfaa22b7365fb9732e339b879ead8
        packages:
        - tikz
        libraries: []
  - type: dual_explanation
    id: plane-plane-example1-solution
    label: 例题 2
    stem_latex: 判断面 $ABD$ 与面 $ACD$ 是否垂直，并说明理由。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 面面判定怎么下手
      content_latex: 面面垂直判定 = 在一面里找一条垂直另一面的线。本题自然想到 $AB$，先证 $AB\perp$ 面 $ACD$。
    - kind: hint
      title: 凑线线垂直
      content_latex: $\angle BAC=90^{\circ}$ 已给 $AB\perp AC$；折起后的 $BD=\sqrt{5}$ 配合
        $AB=1,AD=2$ 是勾股逆的信号，得 $AB\perp AD$。两条相交垂线凑齐。
    - kind: mistake
      title: 别把方向用反
      content_latex: 判定是"先有 AB 垂直一个面，且 AB 在另一个面里，才能推出两面垂直"，不是反过来。先证线面，再出面面。
    solution_title: 解答
    solution_step_ids:
    - pp-step1-judge
    - pp-step2-line-plane
    - pp-step3-conclude
  - type: problemcard
    id: plane-plane-example2-card
    label: 例题 3（面面垂直性质链）
    stem_latex: '如图，在三棱锥 $P\text{-}ABC$ 中，$PA\perp$ 平面 $ABC$，平面 $PAB\perp$ 平面 $PBC$。求证：$BC\perp
      AB$。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-example3-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.example3.prompt
      diagram_job_id: explanation-example3-prompt
      width: 70mm
      caption: 三棱锥 P-ABC，PA⊥面 ABC，面 PAB⊥面 PBC，找 BC 的两条相交垂线。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:3292ce50c01dad8dcd66401f0cc9e886820edad2fd8ab336c94fd1f785c72594
      packages:
      - tikz
      libraries: []
  - type: route
    id: plane-plane-example2-route
    steps:
    - id: pp2-step1-judge
      latex: 判对象：证 $BC\perp AB$（线线）
      content_latex: 目标是线线垂直，常用途径是先证 $BC\perp$ 某个面，再由定义推论得到 $BC$ 垂直该面内的 $AB$。
    - id: pp2-step2-property
      latex: 面面垂直性质：作 $AD\perp PB$
      content_latex: 在面 $PAB$ 内作 $AD\perp PB$，垂足为 $D$。由\textbf{面面垂直性质}（$AD\subset$
        面 $PAB$，面 $PAB\perp$ 面 $PBC$，交线为 $PB$，$AD\perp PB$）得 $AD\perp$ 面 $PBC$。
    - id: pp2-step3-def
      latex: 定义推论得 $AD\perp BC$
      content_latex: 由 $AD\perp$ 面 $PBC$，$BC\subset$ 面 $PBC$，据线面垂直定义得 $AD\perp BC$。
    - id: pp2-step4-second
      latex: 再凑第二条 $PA\perp BC$
      content_latex: 由 $PA\perp$ 面 $ABC$，$BC\subset$ 面 $ABC$，据定义得 $PA\perp BC$。
    - id: pp2-step5-conclude
      latex: 两条相交垂线下结论
      content_latex: $AD\perp BC$，$PA\perp BC$，$AD\cap PA=A$，$AD,PA\subset$ 面 $PAB$，由线面垂直判定得
        $BC\perp$ 面 $PAB$；又 $AB\subset$ 面 $PAB$，据定义得 $BC\perp AB$。
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/explanation-example3-solution-annotated/rendered/solution.fragment.tex
        diagram_ref: explanation.example3.solution.annotated
        diagram_job_id: explanation-example3-solution-annotated
        width: 70mm
        caption: 在面 PAB 内作 AD⊥PB（垂足 D），BC 与 PA、AD 都垂直，交于 A。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:eb19763926df421d1e1b73648d5bd7b39c1f577e81f331bc2a85d728e5ee8300
