  - type: choice
    id: q7
    points: 5
    stem: 已知直线 $a,b$ 和平面 $\alpha$，下列判断正确的是（    ）
    choices:
      A: 若 $a\perp b$，$b\subset\alpha$，则 $a\perp\alpha$
      B: 若 $a\perp\alpha$，$b\subset\alpha$，则 $a\parallel b$
      C: 若 $a\perp\alpha$，$b\perp\alpha$，则 $a\parallel b$
      D: 若 $a\perp\alpha$，$b\subset\alpha$，则 $a\perp b$，这叫线面垂直的"性质定理"
    hints:
    - content: 记住：$a\perp\alpha,\ b\subset\alpha\Rightarrow a\perp b$ 是定义推论；$a\perp\alpha,\
        b\perp\alpha\Rightarrow a\parallel b$ 才是性质定理。别把定义推论当成性质定理。
    answer: ''
