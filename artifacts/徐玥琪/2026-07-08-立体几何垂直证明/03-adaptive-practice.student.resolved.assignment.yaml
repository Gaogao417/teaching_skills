- id: medium
  title: 二、中档档（先凑线线再升级）
  type: practice
  visibility: student
  blocks:
  - type: fillin
    id: q4
    points: 5
    stem: 如图，正四棱锥 $P\text{-}ABCD$ 的底面是正方形，$O$ 是底面中心。设侧棱 $PA=PC=\sqrt{2}$，$AC=2$，则
      $PO$ 与 $AC$ 的关系是 $PO\perp AC$，理由是 $PA=PC$ 且 $O$ 是 $AC$ 中点，由 \underline{\quad\quad\quad\quad\quad\quad}（填定理名）得到；进而若再由对称性得
      $PO\perp BD$（$O$ 也是 $BD$ 中点，$PB=PD$），由 $AC\cap BD=$ \underline{\quad}，便可由线面垂直判定得
      $PO\perp$ 平面 $ABCD$。
    hints:
    - content: 等腰三角形顶角顶点向底边中点连线，得到的是什么？这条线叫三线合一中的"高"。
    answer: ''
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-student-q4-prompt/rendered/prompt.fragment.tex
