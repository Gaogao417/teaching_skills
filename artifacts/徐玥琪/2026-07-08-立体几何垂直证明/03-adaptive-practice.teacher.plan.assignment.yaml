    answer: (1) 见解析；(2) 见解析。
    explanation: (1) 正三角形 $ABC$ 中，$D$ 为 $BC$ 中点，得 $AD\perp BC$。正三棱柱中 $AA_1\perp$ 平面 $ABC$，故 $AA_1\perp BC$。$AD\cap AA_1=A$，$AD,AA_1\subset$ 平面 $AA_1D$，由线面垂直判定得 $BC\perp$ 平面 $AA_1D$，所以 $A_1D\perp BC$。 (2) 在底面内取 $AB,AC$，由正棱柱性质 $A_1A\perp AB$，$A_1A\perp AC$，且 $AB\cap AC=A$，由线面垂直判定得 $A_1A\perp$ 平面 $ABC$。
    solution_steps:
    - title: (1) 先证 $BC\perp$ 一个面
      content: 正三角形中 $AD\perp BC$；正棱柱中 $AA_1\perp$ 面 $ABC$，故 $AA_1\perp BC$。
    - title: (1) 套线面垂直判定
      content: $AD\cap AA_1=A$，$AD,AA_1\subset$ 面 $AA_1D$，得 $BC\perp$ 面 $AA_1D$，从而 $A_1D\perp BC$。
    - title: (2) 找底面内两条相交线
      content: $A_1A\perp AB$，$A_1A\perp AC$，$AB\cap AC=A$，$AB,AC\subset$ 面 $ABC$。
    - title: (2) 下结论
      content: 由线面垂直判定得 $A_1A\perp$ 面 $ABC$。
    teaching:
      teaching_goal: 基础档直套判定，练"找面内两条相交线 + 写格式"的完整动作。
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 漏写 $AB\cap AC=A$；只写"侧棱垂直底面"不回到判定格式。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: changed_numbers
      complexity_note: 无计算，纯格式。
      upgrade_rule: 能独立写出完整四件套并标注定理。
      fallback_move: 回格式模板卡，按填空补全。
