    explanation: '要证 $BC\perp AB$（线线），转证 $BC\perp$ 含 $AB$ 的面 $PAB$。

      在面 $PAB$ 内作 $AD\perp PB$，垂足为 $D$。由面面垂直性质（$AD\subset$ 面 $PAB$，面 $PAB\perp$ 面 $PBC$，交线为 $PB$，$AD\perp PB$）得 $AD\perp$ 面 $PBC$；又 $BC\subset$ 面 $PBC$，由定义推论得 $AD\perp BC$（第一条相交垂线）。

