    - title: 定义推论得 $PA\perp BC$
      content: $PA\perp$ 面 $ABC$，$BC\subset$ 面 $ABC$，由定义推论得 $PA\perp BC$。
    - title: 凑两条相交垂线下结论
      content: $AD\perp BC$，$PA\perp BC$，$AD\cap PA=A$，$AD,PA\subset$ 面 $PAB$，由线面垂直判定得 $BC\perp$ 面 $PAB$；$AB\subset$ 面 $PAB$，由定义推论得 $BC\perp AB$（行末标注〔面面垂直性质〕〔线面垂直判定〕）。
