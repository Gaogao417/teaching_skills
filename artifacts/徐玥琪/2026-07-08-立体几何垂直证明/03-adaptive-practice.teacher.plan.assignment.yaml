    explanation: '二面角 $P\text{-}BC\text{-}A$ 的棱为 $BC$。

      $PA\perp$ 圆面 $ABC$，$BC\subset$ 圆面，由定义推论得 $PA\perp BC$。又 $AB$ 为直径，$C$ 在圆上，由直径所对圆周角为 $90^{\circ}$ 得 $\angle ACB=90^{\circ}$，即 $AC\perp BC$。

      $PA\cap AC=A$，$PA,AC\subset$ 面 $PAC$，由线面垂直判定得 $BC\perp$ 面 $PAC$（垂足为 $C$，即 $BC\cap$ 面 $PAC=C$）。

      面 $PAC$ 与两个半平面 $PBC$、$ABC$ 的交线分别为 $PC$、$AC$，故 $\angle PCA$ 为二面角 $P\text{-}BC\text{-}A$ 的平面角。

      三要素核验：①顶点 $C$ 在棱 $BC$ 上；②$CP\subset$ 半平面 $PBC$，$CA\subset$ 半平面 $ABC$；③$CP\perp BC$、$CA\perp BC$（由 $BC\perp$ 面 $PAC$）。三要素齐全。

      '
    solution_steps:
    - title: 认棱
      content: 二面角 $P\text{-}BC\text{-}A$ 的棱为 $BC$，两半平面为 $PBC$ 与 $ABC$，平面角顶点须在 $BC$ 上。
    - title: 证棱 $BC\perp$ 面 $PAC$
      content: $PA\perp$ 圆面 $ABC$，$BC\subset$ 圆面，得 $PA\perp BC$；$AB$ 为直径、$C$ 在圆上，圆周角 $\angle ACB=90^{\circ}$，得 $AC\perp BC$。$PA\cap AC=A$，$PA,AC\subset$ 面 $PAC$，由线面垂直判定得 $BC\perp$ 面 $PAC$，垂足为 $C$。
    - title: 定平面角
      content: 棱 $BC\perp$ 面 $PAC$，垂足 $C$。面 $PAC$ 与半平面 $PBC$ 交线为 $PC$，与半平面 $ABC$ 交线为 $AC$，故 $\angle PCA$ 为平面角。
    - title: 核验三要素
      content: ①顶点 $C\in BC$；②$CP\subset$ 半平面 $PBC$，$CA\subset$ 半平面 $ABC$；③$CP\perp BC$、$CA\perp BC$（由 $BC\perp$ 面 $PAC$）。三要素齐全，$\angle PCA$ 是平面角。
    teaching:
      teaching_goal: 提高档，练"证棱⊥某面定平面角顶点 + 核验三要素"，只找角不计算。
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 二面角三要素不全（顶点画到棱外、两边不分在两半平面、只验一边垂直棱）；漏证棱的线面垂直。
      entry_point: build_relation
      scaffold_level: low
      variation_depth: changed_representation
      complexity_note: 无数值计算，只作图与核验。
      upgrade_rule: 能独立说清"证棱垂一面 → 定顶点 → 三要素逐项核验"。
      fallback_move: 回平面角三要素定义，逐项对照 $\angle PCA$。
