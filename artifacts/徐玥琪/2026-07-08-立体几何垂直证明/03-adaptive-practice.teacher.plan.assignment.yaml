    answer: 第一空填"等腰三角形三线合一"（或"等腰三角形底边上的中线、高线合一"）；第二空填 $O$。
    explanation: $PA=PC$ 且 $O$ 为 $AC$ 中点，在等腰 $\triangle PAC$ 中由三线合一直接得 $PO\perp AC$。同理 $PB=PD$、$O$ 为 $BD$ 中点，得 $PO\perp BD$。两条相交线 $AC,BD$ 交于底面中心 $O$，故 $AC\cap BD=O$，由线面垂直判定得 $PO\perp$ 平面 $ABCD$。
