  - type: fillin
    id: q2
    points: 5
    stem: 在线面垂直判定中，要证直线 $l\perp$ 平面 $\alpha$，需要在 $\alpha$ 内找到两条直线 $m,n$，使 $l\perp m$，$l\perp n$，并且必须补充的关键前提是 $m\cap n=$ \underline{\quad\quad\quad}（写出交点），且 $m,n\subset$ \underline{\quad\quad\quad}（写出平面）。
    hints:
    - content: 回忆格式模板卡里的四个前提，重点补"相交"和"在面内"。
    answer: 第一空填 $P$（或任意一个点字母，表示 $m,n$ 相交于一点）；第二空填 $\alpha$。
    explanation: 线面垂直判定四件套：$l\perp m$、$l\perp n$、$m\cap n=P$、$m,n\subset\alpha$，缺一不可。其中"相交"（$m\cap n=P$）是学生最易漏的前提。
    teaching:
      teaching_goal: 强化"相交"前提与"在面内"前提的显式书写。
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 漏相交前提；只写"两条线都垂直"就下结论。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: same_structure
      complexity_note: 纯填空，无计算。
      upgrade_rule: 在证明里自动补全 $m\cap n=P$。
      fallback_move: 抄写格式模板卡一遍。
  - type: problem
    id: q3
    points: 8
    label: 第 3 题
    stem_latex: "如图，在正三棱柱 $ABC\\text{-}A_1B_1C_1$ 中，$D$ 是 $BC$ 的中点。\n\\begin{enumerate}[label=(\\arabic*)]\n  \\item 求证：$A_1D\\perp BC$；\n  \\item 求证：$A_1A\\perp$ 平面 $ABC$。\n\\end{enumerate}\n"
    answer_space:
      type: steps
      height: 48mm
      step_count: 4
    hints:
    - content_latex: (1) 正三棱柱底面是正三角形，$D$ 是 $BC$ 中点，想到等腰三线合一。(2) 正棱柱的侧棱与底面什么关系？在底面找两条与侧棱都垂直的相交线。
