    - title: 第二条垂线 $DE\perp CE$（勾股逆）
      content: $DE^2=1^2+1^2=2$，$CE^2=1^2+1^2=2$，$DC^2=2^2=4$，$DE^2+CE^2=DC^2$，由勾股逆得 $DE\perp CE$。
