meta:
  title: "菱形存在性 · 10题综合练习（教师版）"
  subtitle: "定点+动点轨迹 · AB为边/为对角线分类讨论"
  grade: "八年级"
  subject: "数学"
  duration: "45分钟"
  total_points: 100
  version: "teacher"
  assignment_id: "2026-06-20-菱形存在性-teacher"
  source_artifacts:
    structure_analysis: "artifacts/荣璟羽/2026-06-20-菱形存在性/01-structure-analysis.md"
