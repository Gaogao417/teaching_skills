sections:
  - id: "group1-scaffold"
    title: "一、入门：单一角色（每题 9 分，共 18 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q1"
        points: 9
        stem_latex: |
          在平面直角坐标系中，点 $A(0,0)$、$B(4,0)$。点 $P$ 在 $y$ 轴上运动（异于 $A$），
          是否存在点 $P$ 和点 $Q$，使以 $A,B,P,Q$ 为顶点（$AB$ 为一条边）的四边形是菱形？
          若存在，求出所有符合条件的点 $P$ 和点 $Q$ 的坐标。
        hints:
          - content: "$AB$ 是菱形的一条边，所以 $|AP|$ 也要等于 $|AB|$。"
          - content: "设 $P=(0,t)$，用 $|AP|=|AB|=4$ 列方程。"
        answer_space:
          type: "steps"
          height: "56mm"
          step_count: 4
          diagram_slot:
            slot_id: "practice.teacher.q1.prompt"
            diagram_ref: "practice.teacher.q1.prompt"
            variant: "prompt"
            disclosure_policy: "clean"
            required: true
            on_failure: "fail_assignment"
            placement: "answer_space.diagram_col"
            layout_role: "answer_area_sidecar"
            display_profile: "worksheet_geometry_sidecar"
            caption: "第1题图（A、B 与 y 轴）"
            engine: "coordinate_renderer"
            diagram_kind: "coordinate_geometry"
            teaching_intent: "practice_prompt"
            semantic_constraints:
              given_objects: ["点 A(0,0)", "点 B(4,0)", "动点 P 在 y 轴上"]
              given_constraints: ["AB 为菱形的一条边"]
              clean_forbidden: ["不要画出 P 或 Q 的具体位置", "不要标注边长"]
            visual_requirements: {show_labels: true, show_given_markers: true, show_axes: true, preferred_orientation: "landscape"}
            analytic_requirements:
              viewport: {x_min: -2, x_max: 6, y_min: -6, y_max: 6, preserve_aspect: true}
              axes: {x: true, y: true, grid: false, show_ticks: true, x_label: "x", y_label: "y"}
              objects:
                - type: "polyline"
                  id: "AB"
                  points: ["A", "B"]
                  style: {stroke: "#111827", stroke_width: 2.8}
                - type: "point"
                  id: "A"
                  x: 0
                  y: 0
                  label: "A"
                  style: {label_dx: -14, label_dy: -16}
                - type: "point"
                  id: "B"
                  x: 4
                  y: 0
                  label: "B"
                  style: {label_dx: 10, label_dy: -16}
        answer: '存在。$P(0,4)$，$Q(4,4)$；或 $P(0,-4)$，$Q(4,-4)$。'
        solution_steps:
          - title: '设动点'
            content: '$AB$ 为边，需 $|AP|=|AB|$。$|AB|=4$。设 $P=(0,t)$（$P$ 在 $y$ 轴，$t\ne0$）。'
          - title: '列方程'
            content: '$|AP|=\sqrt{0^2+t^2}=|t|=4$，所以 $t=4$ 或 $t=-4$。'
          - title: '补 Q 验四边'
            content: '$AB$ 为邻边，顺序 $A\text{-}B\text{-}Q\text{-}P$，$Q=B+P-A$。$t=4$ 时 $P=(0,4)$，$Q=(4,4)$，四边 $AB=BQ=QP=PA=4$；$t=-4$ 时 $P=(0,-4)$，$Q=(4,-4)$，四边均为 $4$。均为菱形。'
        teaching:
          teaching_goal: '建立“AB 为边”时用 $|AP|=|AB|$ 列方程、再补 Q 验四边的骨架'
          expected_blocker: '列完 $|AP|=4$ 就停，不补 Q'
          entry_point: 'build_relation'
          scaffold_level: 'high'
          variation_depth: 'same_structure'
          complexity_note: '一次绝对值方程，整数解'
          upgrade_rule: '能主动写出 $Q=B+P-A$ 并比较四边'
          fallback_move: '提示：$AB$ 是边，那和 $AB$ 相邻的边 $AP$ 等于多少？'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

      - type: "problem"
        id: "q2"
        points: 9
        stem_latex: |
          在平面直角坐标系中，点 $A(0,0)$、$B(6,0)$。线段 $AB$ 是菱形 $ABQP$ 的一条对角线，
          点 $P$ 在直线 $x=3$ 上，且菱形 $ABQP$ 的面积为 $24$。
          求点 $P$ 和点 $Q$ 的坐标，并求菱形的边长。
        hints:
          - content: "$AB$ 是对角线，则另一条对角线 $PQ$ 被 $AB$ 垂直平分，$P,Q$ 关于 $AB$ 对称。"
          - content: '菱形面积 $=\dfrac12\times|AB|\times|PQ|$，先用面积求 $|PQ|$。'
        answer_space:
          type: "steps"
          height: "56mm"
          step_count: 4
        answer: '$P(3,4)$、$Q(3,-4)$（或互换），边长为 $5$。'
        solution_steps:
          - title: '用面积求另一条对角线'
            content: '面积 $=\dfrac12|AB|\cdot|PQ|=24$，$|AB|=6$，得 $|PQ|=8$。'
          - title: '定 P,Q 位置'
            content: '$AB$ 为对角线、中点 $(3,0)$；$PQ\perp AB$ 且被 $AB$ 平分，$P,Q$ 关于 $x$ 轴对称，横坐标为 $3$。$|PQ|=8$，所以 $P,Q$ 到 $x$ 轴距离为 $4$，得 $P(3,4)$、$Q(3,-4)$（或互换）。'
          - title: '求边长'
            content: '半对角线 $3$ 与 $4$，边长 $=\sqrt{3^2+4^2}=5$。'
        teaching:
          teaching_goal: '建立“AB 为对角线”时 $P,Q$ 关于 $AB$ 中点对称、$PQ\perp AB$ 的骨架'
          expected_blocker: '不会用对角线乘积一半算面积'
          entry_point: 'build_relation'
          scaffold_level: 'high'
          variation_depth: 'same_structure'
          complexity_note: '面积反推 + 勾股，整数'
          upgrade_rule: '能说出“AB 为对角线时 PQ 被 AB 垂直平分”'
          fallback_move: '让学生先画对角线 $AB$，再画它的垂直平分线'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

  - id: "group2-full-case"
    title: "二、完整分类：AB为边 + AB为对角线（每题 10 分，共 20 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q3"
        points: 10
        stem_latex: |
          如图，直线 $y=-\dfrac34 x+3$ 与 $x$ 轴交于点 $A$，与 $y$ 轴交于点 $B$。
          点 $P$ 在 $x$ 轴上运动（异于点 $A$）。
          是否存在点 $P$ 和点 $Q$，使以 $A,B,P,Q$ 为顶点的四边形是菱形？
          若存在，求出所有符合条件的点 $P$ 和点 $Q$ 的坐标。
        hints:
          - content: "先求 $A,B$ 的坐标和 $|AB|$。再分两类：$AB$ 为边、$AB$ 为对角线。"
          - content: "每个候选 $P$ 都要补出 $Q$，再验证四边是否相等。"
        answer_space:
          type: "steps"
          height: "92mm"
          step_count: 6
          diagram_slot:
            slot_id: "practice.teacher.q3.prompt"
            diagram_ref: "practice.teacher.q3.prompt"
            variant: "prompt"
            disclosure_policy: "clean"
            required: true
            on_failure: "fail_assignment"
            placement: "answer_space.diagram_col"
            layout_role: "answer_area_sidecar"
            display_profile: "worksheet_geometry_sidecar"
            caption: "第3题图（直线与两坐标轴）"
            engine: "coordinate_renderer"
            diagram_kind: "coordinate_geometry"
            teaching_intent: "practice_prompt"
            semantic_constraints:
              given_objects: ["直线 y=-3/4 x +3", "点 A 在 x 轴上", "点 B 在 y 轴上", "动点 P 在 x 轴上"]
              given_constraints: []
              clean_forbidden: ["不要画出 P 或 Q 的具体位置", "不要标注边长或角度"]
            visual_requirements: {show_labels: true, show_given_markers: true, show_axes: true, preferred_orientation: "landscape"}
            analytic_requirements:
              viewport: {x_min: -6, x_max: 11, y_min: -2, y_max: 7, preserve_aspect: false}
              axes: {x: true, y: true, grid: false, show_ticks: true, x_label: "x", y_label: "y"}
              objects:
                - type: "polyline"
                  id: "line"
                  points: ["La", "Lb"]
                  style: {stroke: "#94a3b8", stroke_width: 1.8}
                - type: "point"
                  id: "A"
                  x: 4
                  y: 0
                  label: "A"
                  style: {label_dx: 8, label_dy: -16}
                - type: "point"
                  id: "B"
                  x: 0
                  y: 3
                  label: "B"
                  style: {label_dx: -16, label_dy: 8}
                - type: "point"
                  id: "La"
                  x: -5
                  y: 6.75
                  label: " "
                - type: "point"
                  id: "Lb"
                  x: 10
                  y: -4.5
                  label: " "
        answer: '共 3 个 $P$：$(9,0)$、$(-1,0)$、$(\tfrac78,0)$。对应 $Q$ 分别为 $(5,3)$、$(-5,3)$、$(\tfrac{25}{8},3)$。'
        solution_steps:
          - title: '求 A,B 与 |AB|'
            content: '令 $y=0$ 得 $A(4,0)$；令 $x=0$ 得 $B(0,3)$。$|AB|=\sqrt{4^2+3^2}=5$。'
          - title: '情况一(AB为边)：|AP|=|AB|'
            content: '$P=(t,0)$，$|AP|=|t-4|=5$，$t=9$ 或 $t=-1$。$t=9$：$Q=B+P-A=(5,3)$，四边均为 $5$，是菱形；$t=-1$：$Q=(-5,3)$，四边均为 $5$，是菱形。'
          - title: '情况一(AB为边)：|BP|=|AB|'
            content: '$|BP|^2=t^2+9=25$，$t=\pm4$。$t=4$ 即 $A$（退化舍去）；$t=-4$：$P=(-4,0)$，$Q=(-8,3)$，四边 $AB=5$ 但 $BQ=8\ne5$，不是菱形，舍去。'
          - title: '情况二(AB为对角线)'
            content: '$AB$ 中点 $M=(2,\tfrac32)$。$P=(t,0)$，$Q=2M-P=(4-t,3)$。菱形需 $PQ\perp AB$：$\overrightarrow{PQ}=(4-2t,3)$，$\overrightarrow{AB}=(-4,3)$，点积 $8t-7=0$，$t=\tfrac78$。$P=(\tfrac78,0)$，$Q=(\tfrac{25}{8},3)$，四边平方均为 $\tfrac{25}{8}$，是菱形。'
          - title: '结论'
            content: '共 3 个 $P$：$(9,0)$、$(-1,0)$、$(\tfrac78,0)$，对应 $Q$ 为 $(5,3)$、$(-5,3)$、$(\tfrac{25}{8},3)$。'
        teaching:
          teaching_goal: '完整练两类分类 + 补点验四边，建立 3 解的存在性范式'
          expected_blocker: '漏掉对角线那一类；或把 $t=-4$（验四边不成立）当解'
          entry_point: 'solve_and_check'
          scaffold_level: 'medium'
          variation_depth: 'partially_hidden'
          complexity_note: '两类各一次方程，对角线解为分数'
          upgrade_rule: '能主动分两类、每个候选都补 Q 验四边'
          fallback_move: '让学生把两类标题先写在纸上：①AB 为边 ②AB 为对角线'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

      - type: "problem"
        id: "q4"
        points: 10
        stem_latex: |
          直线 $y=-\dfrac34 x+6$ 与 $x$ 轴交于点 $A$，与 $y$ 轴交于点 $B$。
          点 $P$ 在 $x$ 轴上运动（异于点 $A$）。
          是否存在点 $P$ 和点 $Q$，使以 $A,B,P,Q$ 为顶点的四边形是菱形？
          若存在，求出所有符合条件的点 $P$ 和点 $Q$ 的坐标。
        hints:
          - content: "本题与第 3 题结构相同，只是数字变了。"
          - content: "记得分两类，每个候选 $P$ 都补 $Q$ 验四边。"
        answer_space:
          type: "steps"
          height: "92mm"
          step_count: 6
        answer: '共 3 个 $P$：$(18,0)$、$(-2,0)$、$(\tfrac74,0)$。对应 $Q$ 分别为 $(10,6)$、$(-10,6)$、$(\tfrac{25}{4},6)$。'
        solution_steps:
          - title: '求 A,B 与 |AB|'
            content: '令 $y=0$ 得 $A(8,0)$；令 $x=0$ 得 $B(0,6)$。$|AB|=\sqrt{8^2+6^2}=10$。'
          - title: '情况一(AB为边)：|AP|=|AB|'
            content: '$|AP|=|t-8|=10$，$t=18$ 或 $t=-2$。$t=18$：$Q=B+P-A=(10,6)$，四边均为 $10$，是菱形；$t=-2$：$Q=(-10,6)$，四边均为 $10$，是菱形。'
          - title: '情况一(AB为边)：|BP|=|AB|'
            content: '$|BP|^2=t^2+36=100$，$t=\pm8$。$t=8$ 即 $A$（退化舍去）；$t=-8$：$P=(-8,0)$，$Q=(-16,6)$，$BQ^2=256+36\ne100$，不是菱形，舍去。'
          - title: '情况二(AB为对角线)'
            content: '$AB$ 中点 $M=(4,3)$。$P=(t,0)$，$Q=2M-P=(8-t,6)$。$PQ\perp AB$：$\overrightarrow{PQ}=(8-2t,6)$，$\overrightarrow{AB}=(-8,6)$，点积 $-8(8-2t)+36=0$，$16t=28$，$t=\tfrac74$。$P=(\tfrac74,0)$，$Q=(\tfrac{25}{4},6)$，四边平方均为 $\tfrac{625}{16}$，是菱形。'
          - title: '结论'
            content: '共 3 个 $P$：$(18,0)$、$(-2,0)$、$(\tfrac74,0)$，对应 $Q$ 为 $(10,6)$、$(-10,6)$、$(\tfrac{25}{4},6)$。'
        teaching:
          teaching_goal: '迁移第 3 题的两类分类骨架到更大数字'
          expected_blocker: '数字变大后 $|BP|=|AB|$ 的筛选容易算错'
          entry_point: 'transfer'
          scaffold_level: 'medium'
          variation_depth: 'changed_numbers'
          complexity_note: '结构同 Q3，对角线解仍为分数'
          upgrade_rule: '能脱离 Q3 独立完成两类分类'
          fallback_move: '让学生对照 Q3 的步骤逐步迁移'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

  - id: "group3-role"
    title: "三、轨迹与角色：天然成立 / 明确无解（每题 10 分，共 20 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q5"
        points: 10
        stem_latex: |
          在平面直角坐标系中，点 $A(0,0)$、$B(8,0)$。线段 $AB$ 是菱形 $ABQP$ 的一条对角线，
          点 $P$ 在直线 $x=4$（即 $AB$ 的垂直平分线）上，菱形 $ABQP$ 的面积为 $24$。
          求点 $P$ 和点 $Q$ 的坐标，并求菱形的边长。
        hints:
          - content: '$P$ 在 $AB$ 的中垂线上，所以 $AB$ 作为对角线时 $PQ\perp AB$ 天然成立。'
          - content: '用面积 $=\dfrac12|AB|\cdot|PQ|$ 求出 $|PQ|$，再定 $P$ 的纵坐标。'
        answer_space:
          type: "steps"
          height: "62mm"
          step_count: 4
        answer: '$P(4,3)$、$Q(4,-3)$（或互换），边长为 $5$。'
        solution_steps:
          - title: '用面积求 |PQ|'
            content: '面积 $=\dfrac12|AB|\cdot|PQ|=24$，$|AB|=8$，得 $|PQ|=6$。'
          - title: '定 P,Q'
            content: '$P$ 在中垂线 $x=4$ 上，$P=(4,t)$，$Q$ 关于 $x$ 轴对称为 $(4,-t)$，$|PQ|=2|t|=6$，$|t|=3$。故 $P(4,3)$、$Q(4,-3)$（或互换）。'
          - title: '求边长'
            content: '半对角线 $4$ 与 $3$，边长 $=\sqrt{4^2+3^2}=5$。'
        teaching:
          teaching_goal: '识别“动点在中垂线上”使对角线情况天然成立'
          expected_blocker: '看不出 $PQ\perp AB$ 已经自动满足'
          entry_point: 'hidden_structure'
          scaffold_level: 'medium'
          variation_depth: 'packaged_condition'
          complexity_note: '面积反推 + 勾股，整数'
          upgrade_rule: '能说出“P 在 AB 中垂线上时对角线天然成立”'
          fallback_move: '提示：直线 $x=4$ 和水平的 $AB$ 是什么关系？'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

      - type: "problem"
        id: "q6"
        points: 10
        stem_latex: |
          在平面直角坐标系中，点 $A(0,0)$、$B(6,0)$。点 $P$ 在 $y$ 轴上运动（异于 $A$）。
          是否存在点 $P$ 和点 $Q$，使以 $A,B,P,Q$ 为顶点的四边形是菱形？
          若存在，求出所有符合条件的点 $P$ 和点 $Q$ 的坐标；若某一类不存在，请说明理由。
        hints:
          - content: "分两类。其中“$AB$ 为对角线”这一类要判断：$P$ 在 $y$ 轴上时，$PQ$ 能否与水平的 $AB$ 垂直？"
          - content: "即使某一类无解，也要写出判断过程，不能直接跳过。"
        answer_space:
          type: "steps"
          height: "78mm"
          step_count: 5
        answer: '存在，$P(0,6)$、$Q(6,6)$ 或 $P(0,-6)$、$Q(6,-6)$。（“$AB$ 为对角线”一类无解）'
        solution_steps:
          - title: '情况一(AB为边)'
            content: '$|AB|=6$。$P=(0,t)$，$|AP|=|t|=6$，$t=\pm6$。$t=6$：$Q=B+P-A=(6,6)$，四边均为 $6$，是菱形；$t=-6$：$Q=(6,-6)$，四边均为 $6$，是菱形。'
          - title: '情况一(AB为边)：|BP|=|AB|'
            content: '$|BP|^2=36+t^2=36$，$t=0$ 即 $A$（退化舍去），无新增解。'
          - title: '情况二(AB为对角线)'
            content: '$AB$ 水平，若 $AB$ 为对角线则 $PQ\perp AB$，$PQ$ 必须竖直，即 $P,Q$ 横坐标相同。但 $P$ 在 $y$ 轴（$x=0$），$Q$ 关于 $AB$ 中点 $(3,0)$ 对称得 $Q_x=6\ne0$，矛盾。故此类无解。'
          - title: '结论'
            content: '只有“$AB$ 为边”一类有解：$P(0,6)$、$Q(6,6)$ 或 $P(0,-6)$、$Q(6,-6)$。'
        teaching:
          teaching_goal: '训练“某一类无解也要写出判断过程”'
          expected_blocker: '对角线那类不会判断无解，直接跳过'
          entry_point: 'solve_and_check'
          scaffold_level: 'medium'
          variation_depth: 'partially_hidden'
          complexity_note: '一类有解一类无解，计算轻'
          upgrade_rule: '能用“PQ 需竖直但 P,Q 不同 x”说明对角线类无解'
          fallback_move: '提示：AB 水平时，垂直于 AB 的直线是什么方向？'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

  - id: "group4-transfer"
    title: "四、迁移与筛选（每题 10 分，共 20 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q7"
        points: 10
        stem_latex: |
          直线 $y=-\dfrac43 x+4$ 与 $x$ 轴交于点 $A$，与 $y$ 轴交于点 $B$。
          点 $P$ 在 $x$ 轴上运动（异于点 $A$）。
          是否存在点 $P$ 和点 $Q$，使以 $A,B,P,Q$ 为顶点的四边形是菱形？
          若存在，求出所有符合条件的点 $P$ 和点 $Q$ 的坐标。
        hints:
          - content: "先求 $A,B$ 和 $|AB|$（这里 $|AB|$ 是整数）。"
          - content: "对角线那一类的解可能是分数，列点积等于 $0$ 的方程即可。"
        answer_space:
          type: "steps"
          height: "92mm"
          step_count: 6
        answer: '共 3 个 $P$：$(8,0)$、$(-2,0)$、$(-\tfrac76,0)$。对应 $Q$ 分别为 $(5,4)$、$(-5,4)$、$(\tfrac{25}{6},4)$。'
        solution_steps:
          - title: '求 A,B 与 |AB|'
            content: '令 $y=0$ 得 $A(3,0)$；令 $x=0$ 得 $B(0,4)$。$|AB|=\sqrt{3^2+4^2}=5$。'
          - title: '情况一(AB为边)：|AP|=|AB|'
            content: '$|AP|=|t-3|=5$，$t=8$ 或 $t=-2$。$t=8$：$Q=B+P-A=(5,4)$，四边均为 $5$，是菱形；$t=-2$：$Q=(-5,4)$，四边均为 $5$，是菱形。'
          - title: '情况一(AB为边)：|BP|=|AB|'
            content: '$|BP|^2=t^2+16=25$，$t=\pm3$。$t=3$ 即 $A$（退化舍去）；$t=-3$：$P=(-3,0)$，$Q=(-6,4)$，$BQ^2=36+16\ne25$，不是菱形，舍去。'
          - title: '情况二(AB为对角线)'
            content: '$AB$ 中点 $M=(\tfrac32,2)$。$P=(t,0)$，$Q=2M-P=(3-t,4)$。$PQ\perp AB$：$\overrightarrow{PQ}=(3-2t,4)$，$\overrightarrow{AB}=(-3,4)$，点积 $-3(3-2t)+16=0$，$6t=-7$，$t=-\tfrac76$。$P=(-\tfrac76,0)$，$Q=(\tfrac{25}{6},4)$，四边平方均为 $\tfrac{625}{36}$，是菱形。'
          - title: '结论'
            content: '共 3 个 $P$：$(8,0)$、$(-2,0)$、$(-\tfrac76,0)$，对应 $Q$ 为 $(5,4)$、$(-5,4)$、$(\tfrac{25}{6},4)$。'
        teaching:
          teaching_goal: '迁移到不同斜率的直线，独立完成完整两类分类'
          expected_blocker: '对角线解为负分数时不敢下结论'
          entry_point: 'transfer'
          scaffold_level: 'low'
          variation_depth: 'changed_representation'
          complexity_note: '两类方程，对角线解为负分数'
          upgrade_rule: '能在分数/负数解面前稳定验算四边相等'
          fallback_move: '让学生对照 Q3 的对角线列法重新列点积方程'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

      - type: "problem"
        id: "q8"
        points: 10
        stem_latex: |
          直线 $y=-\dfrac34 x+3$ 与 $x$ 轴交于点 $A(4,0)$，与 $y$ 轴交于点 $B(0,3)$。
          点 $P$ 在 $y$ 轴上运动（异于点 $B$）。
          是否存在点 $P$ 和点 $Q$，使以 $A,B,P,Q$ 为顶点的四边形是菱形？
          若存在，求出所有符合条件的点 $P$ 和点 $Q$ 的坐标。
        hints:
          - content: "本题动点在 $y$ 轴上。注意：满足某个距离条件的 $P$ 不一定是菱形顶点，要补 $Q$ 验四边。"
          - content: "分两类讨论，把不满足四边相等的候选舍去。"
        answer_space:
          type: "steps"
          height: "92mm"
          step_count: 6
        answer: '共 2 个 $P$：$(0,-3)$（$Q=(-4,0)$）和 $(0,-\tfrac76)$（$Q=(4,\tfrac{25}{6})$）。'
        solution_steps:
          - title: '情况一(AB为边)：|AP|=|AB|'
            content: '$|AB|=5$。$P=(0,s)$，$|AP|^2=16+s^2=25$，$s=\pm3$。$s=3$ 即 $B$（退化舍去）；$s=-3$：$P=(0,-3)$，$Q=B+P-A=(-4,0)$，四边均为 $5$，是菱形。'
          - title: '情况一(AB为边)：|BP|=|AB|'
            content: '$|BP|^2=(s-3)^2=25$，$s=8$ 或 $s=-2$。$s=8$：$Q=(-4,11)$，四边 $AB=5$ 但 $BQ^2=16+64\ne25$，舍去；$s=-2$：$Q=(-4,1)$，$BQ^2=16+16\ne25$，舍去。'
          - title: '情况二(AB为对角线)'
            content: '$AB$ 中点 $M=(2,\tfrac32)$。$P=(0,s)$，$Q=2M-P=(4,3-s)$。$PQ\perp AB$：$\overrightarrow{PQ}=(4,3-2s)$，$\overrightarrow{AB}=(-4,3)$，点积 $-16+3(3-2s)=0$，$9-6s=16$，$s=-\tfrac76$。$P=(0,-\tfrac76)$，$Q=(4,\tfrac{25}{6})$，四边平方均为 $\tfrac{625}{36}$，是菱形。'
          - title: '结论'
            content: '共 2 个 $P$：$(0,-3)$（$Q=(-4,0)$）和 $(0,-\tfrac76)$（$Q=(4,\tfrac{25}{6})$）。注意 $|BP|=|AB|$ 的两个候选都被四边验算筛掉。'
        teaching:
          teaching_goal: '强调“满足距离条件≠菱形顶点”，必须补 Q 验四边筛选'
          expected_blocker: '把 $s=8$、$s=-2$ 当成解，不做四边验算'
          entry_point: 'hidden_structure'
          scaffold_level: 'low'
          variation_depth: 'packaged_condition'
          complexity_note: '动点换到 y 轴，候选多但多数被筛掉'
          upgrade_rule: '能解释为什么 $|BP|=|AB|$ 的候选不是菱形顶点'
          fallback_move: '让学生对 $s=8$ 真的算一遍四条边'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

  - id: "group5-reverse"
    title: "五、反向构造（每题 11 分，共 22 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q9"
        points: 11
        stem_latex: |
          已知一个菱形的边长为 $13$，一条对角线长为 $10$。
          \begin{enumerate}[label=(\arabic*)]
            \item 求这个菱形另一条对角线的长；
            \item 求这个菱形的面积；
            \item 把这个菱形放入平面直角坐标系，使长为 $10$ 的对角线与 $x$ 轴重合、
                  两条对角线的交点在原点，写出四个顶点的坐标。
          \end{enumerate}
        hints:
          - content: "菱形的对角线互相垂直平分，把边长和两条半对角线放进一个直角三角形。"
          - content: "第(3)问先确定两条对角线分别沿哪个坐标轴。"
        answer_space:
          type: "steps"
          height: "82mm"
          step_count: 6
        answer: '(1) 另一对角线长 $24$；(2) 面积 $120$；(3) $(-5,0),(5,0),(0,12),(0,-12)$。'
        solution_steps:
          - title: '求另一条对角线'
            content: '边长 $13$，一对角线 $10$，半对角线 $5$。设另一半对角线为 $x$，$5^2+x^2=13^2$，$x^2=144$，$x=12$。另一对角线长 $=2x=24$。'
          - title: '求面积'
            content: '面积 $=\dfrac12\times10\times24=120$。'
          - title: '放坐标系写顶点'
            content: '长为 $10$ 的对角线在 $x$ 轴、交点在原点，两端点 $(-5,0),(5,0)$；另一对角线在 $y$ 轴，两端点 $(0,12),(0,-12)$。'
          - title: '验证'
            content: '相邻两顶点 $(5,0)$ 与 $(0,12)$ 距离平方 $=25+144=169=13^2$，边长正确。'
        teaching:
          teaching_goal: '综合对角线性质、面积公式与坐标放置'
          expected_blocker: '第(3)问把对角线端点坐标写错正负或写成半长'
          entry_point: 'transfer'
          scaffold_level: 'low'
          variation_depth: 'reverse_construct'
          complexity_note: '勾股 + 面积，全为整数'
          upgrade_rule: '能在不同坐标放置方式下快速写出四个顶点'
          fallback_move: '让学生先画两条垂直坐标轴，再标两条对角线'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

      - type: "problem"
        id: "q10"
        points: 11
        stem_latex: |
          在平面直角坐标系中，点 $A(0,0)$、$B(10,0)$。线段 $AB$ 是菱形 $ABQP$ 的一条对角线，
          点 $P$ 在直线 $x=5$ 上，且菱形的边长为 $\sqrt{34}$。
          求点 $P$ 和点 $Q$ 的坐标。
        hints:
          - content: "$AB$ 为对角线，$P=(5,t)$。边长平方 $=5^2+t^2$。"
          - content: "用边长平方等于 $34$ 求 $t$，注意 $t$ 有两个值。"
        answer_space:
          type: "steps"
          height: "62mm"
          step_count: 4
        answer: '$P(5,3)$、$Q(5,-3)$ 或 $P(5,-3)$、$Q(5,3)$。'
        solution_steps:
          - title: '设 P 并列方程'
            content: '$AB$ 为对角线，$P$ 在 $x=5$ 上，$P=(5,t)$。$AB$ 中点 $(5,0)$，$Q=(5,-t)$。边长平方 $=|AP|^2=5^2+t^2=25+t^2$。'
          - title: '解 t'
            content: '边长为 $\sqrt{34}$，$25+t^2=34$，$t^2=9$，$t=\pm3$。'
          - title: '写 P,Q'
            content: '$t=3$：$P(5,3)$、$Q(5,-3)$；$t=-3$：$P(5,-3)$、$Q(5,3)$。两组等价（互换）。'
        teaching:
          teaching_goal: '反向构造——给边长反求动点（对角线 + 边长约束）'
          expected_blocker: '不用边长平方而试图用面积'
          entry_point: 'reverse_construct'
          scaffold_level: 'medium'
          variation_depth: 'reverse_construct'
          complexity_note: '一个简单二次方程，整数解'
          upgrade_rule: '能区分“给边长”和“给面积”两种反求路径'
          fallback_move: '提示：$|AP|^2$ 怎么用 $t$ 表示？'
          used_relations: ['rhombus_candidate_point_pairs_on_linear_locus']

