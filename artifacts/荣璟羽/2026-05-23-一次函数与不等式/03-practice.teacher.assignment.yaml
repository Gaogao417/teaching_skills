meta:
  title: "一次函数图像与一元一次不等式 · 专题练习（教师版）"
  subtitle: "数形结合 · 图像位置关系 · 待定系数法"
  grade: "八年级"
  subject: "数学"
  duration: "30分钟"
  total_points: 60
  version: "teacher"
  source_artifacts:
    structure_analysis: "artifacts/荣璟羽/2026-05-23-一次函数与不等式/01-structure-analysis.md"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "choice"
    title: "一、选择题（每题 4 分，共 12 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "choice"
        id: "c1"
        points: 4
        stem: "已知一次函数 $y = k_1x + b_1$ 的图像与 $y = k_2x + b_2$ 的图像交于点 $P(-2, 3)$，且 $y = k_1x + b_1$ 随 $x$ 的增大而增大，$y = k_2x + b_2$ 随 $x$ 的增大而减小。则不等式 $k_1x + b_1 < k_2x + b_2$ 的解集是"
        choices:
          A: "$x > -2$"
          B: "$x < -2$"
          C: "$x > 3$"
          D: "$x < 3$"
        answer: "B"
        explanation: |
          因为直线 $y = k_1x + b_1$ 随 $x$ 的增大而增大，所以该直线为递增直线（向右上倾斜）；
          因为直线 $y = k_2x + b_2$ 随 $x$ 的增大而减小，所以该直线为递减直线（向右下倾斜）。
          两条直线相交于点 $P(-2, 3)$，所以在交点的左侧（即 $x < -2$ 时），递增直线在递减直线的下方，
          即 $k_1x + b_1 < k_2x + b_2$。因此解集为 $x < -2$。
        teaching:
          teaching_goal: "数形结合概念建立，理解增减性对应的倾斜方向"
          expected_blocker: "混淆交点的横纵坐标，错选为与 3 相关的选项"
          mastery_band: "A"

      - type: "choice"
        id: "c2"
        points: 4
        stem: "已知一次函数 $y = 2x + k$ 的图像与直线 $y = -x + 3$ 交于点 $P(a, 2)$，则关于 $x$ 的不等式 $2x + k \\ge -x + 3$ 的解集为"
        choices:
          A: "$x \\ge 1$"
          B: "$x \\le 1$"
          C: "$x \\ge 2$"
          D: "$x \\le 2$"
        answer: "A"
        explanation: |
          因为交点 $P(a, 2)$ 在已知直线 $y = -x + 3$ 上，代入得 $2 = -a + 3$，解得 $a = 1$。
          故两直线交点为 $P(1, 2)$，交点横坐标为 $x = 1$。
          不等式 $2x + k \ge -x + 3$ 意味着直线 $y = 2x + k$ 在直线 $y = -x + 3$ 的上方。
          因为 $2 > 0$（递增），$-1 < 0$（递减），所以当 $x \ge 1$ 时，递增的直线在递减直线的上方或重合。
          故解集为 $x \ge 1$。
        teaching:
          teaching_goal: "能够通过已知直线计算交点坐标，进而判定解集"
          expected_blocker: "把不等式解集的方向弄反"
          mastery_band: "B"

      - type: "choice"
        id: "c3"
        points: 4
        stem: "若一次函数 $y = kx + b$ 的图像经过第一、二、四象限，且与直线 $y = x + 1$ 相交于点 $P(1, 2)$，则关于 $x$ 的不等式 $x + 1 > kx + b$ 的解集是"
        choices:
          A: "$x > 1$"
          B: "$x < 1$"
          C: "$x > 2$"
          D: "$x < 2$"
        answer: "A"
        explanation: |
          因为直线 $y = kx + b$ 经过第一、二、四象限，所以该直线的斜率 $k < 0$，直线向右下方倾斜。
          而直线 $y = x + 1$ 的斜率为 $1 > 0$，向右上方倾斜。
          两条直线相交于点 $P(1, 2)$，在交点右侧（即 $x > 1$ 时），向右上方倾斜的直线 $y = x + 1$ 在向右下方倾斜的直线 $y = kx + b$ 的上方，
          即 $x + 1 > kx + b$。因此不等式的解集为 $x > 1$。
        teaching:
          teaching_goal: "从象限分布判定斜率正负，进行图形分析"
          expected_blocker: "不能把“经过第一、二、四象限”转化为“斜率为负”"
          mastery_band: "B"

  - id: "fillin"
    title: "二、填空题（每题 4 分，共 12 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "fillin"
        id: "f1"
        points: 4
        stem: "已知一次函数 $y = 3x - 2$ 与 $y = x + 4$ 的图像交点坐标为 \\underline{\\quad\\quad}。"
        answer: "$(3, 7)$"
        explanation: |
          联立两解析式得：$3x - 2 = x + 4$。
          解得 $2x = 6 \implies x = 3$。
          将 $x = 3$ 代入 $y = x + 4$ 得 $y = 7$。
          所以交点坐标为 $(3, 7)$。
        teaching:
          teaching_goal: "掌握联立方程组求交点的方法"
          mastery_band: "A"

      - type: "fillin"
        id: "f2"
        points: 4
        stem: "已知一次函数 $y = kx + b$ 与正比例函数 $y = -2x$ 的图像相交于点 $P(-1, m)$，且一次函数 $y = kx + b$ 的图像与 $y$ 轴交点为 $(0, 4)$，则该一次函数的解析式为 \\underline{\\quad\\quad}。"
        answer: "$y = 2x + 4$"
        explanation: |
          将点 $P(-1, m)$ 代入正比例函数 $y = -2x$，得 $m = -2 \times (-1) = 2$。
          故交点坐标为 $P(-1, 2)$。
          因为一次函数 $y = kx + b$ 与 $y$ 轴的交点为 $(0, 4)$，所以 $b = 4$。
          再将点 $P(-1, 2)$ 代入 $y = kx + 4$ 得：$2 = -k + 4$，解得 $k = 2$。
          所以该解析式为 $y = 2x + 4$。
        teaching:
          teaching_goal: "应用待定系数法求未知直线的解析式"
          mastery_band: "B"

      - type: "fillin"
        id: "f3"
        points: 4
        stem: "已知直线 $l_1: y = 2x + 6$ 与直线 $l_2: y = kx + b$ 相交于点 $P(-2, 2)$，且直线 $l_2$ 与 $y$ 轴交于点 $(0, -2)$，则不等式 $2x + 6 \\le kx + b$ 的解集是 \\underline{\\quad\\quad}。"
        answer: "$x \\le -2$"
        explanation: |
          直线 $l_2$ 经过 $P(-2, 2)$ 和 $(0, -2)$，可求得其斜率 $k = \frac{-2 - 2}{0 - (-2)} = -2 < 0$，直线向右下倾斜。
          直线 $l_1$ 的斜率为 $2 > 0$，向右上倾斜。
          它们相交于 $P(-2, 2)$，在交点左侧（即 $x \le -2$ 时），向右上倾斜的直线 $l_1$ 位于向右下倾斜的直线 $l_2$ 的下方或与之重合。
          即 $2x + 6 \le kx + b$。因此解集为 $x \le -2$。
        teaching:
          teaching_goal: "在交点横坐标边界处正确确定小于等于关系对应的取值区间"
          mastery_band: "C"

  - id: "problems"
    title: "三、解答题（每题 12 分，共 36 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "p1"
        points: 12
        label: "第 1 题"
        stem_latex: |
          如图 1，已知一次函数 $y = -x + 3$ 的图像 $l_1$ 与另一个一次函数 $y = kx + b$ 的图像 $l_2$ 相交于点 $P(1, 2)$，且 $l_2$ 经过点 $A(0, -1)$。
          \begin{center}
            \includegraphics[width=6.5cm]{plot_p1.pdf}
          \end{center}
          \begin{enumerate}[label=(\arabic*)]
            \item 求一次函数 $y = kx + b$ 的解析式；
            \item 直接根据图像，求不等式 $kx + b > -x + 3$ 的解集；
            \item 求直线 $l_2$ 与坐标轴围成的三角形面积。
          \end{enumerate}
        subquestions:
          - latex: "求一次函数 $y = kx + b$ 的解析式；"
          - latex: "直接根据图像，求不等式 $kx + b > -x + 3$ 的解集；"
          - latex: "求直线 $l_2$ 与坐标轴围成的三角形面积。"
        answer: "(1) $y = 3x - 1$；(2) $x > 1$；(3) $\frac{1}{6}$。"
        explanation: |
          (1) 因为直线 $l_2$ 经过点 $A(0, -1)$，所以 $b = -1$。
          将 $P(1, 2)$ 代入 $y = kx - 1$，得 $2 = k - 1$，解得 $k = 3$。
          故解析式为 $y = 3x - 1$。
          (2) 由图像可知，在交点 $P(1, 2)$ 的右侧，直线 $l_2$ 位于直线 $l_1$ 的上方，
          故不等式 $kx + b > -x + 3$ 的解集为 $x > 1$。
          (3) 令 $y = 0$，得 $3x - 1 = 0 \implies x = \frac{1}{3}$，所以与 $x$ 轴交点为 $(\frac{1}{3}, 0)$。
          与 $y$ 轴交于点 $(0, -1)$。
          故围成的三角形面积为 $S = \frac{1}{2} \times | -1 | \times \frac{1}{3} = \frac{1}{6}$。
        solution_steps:
          - title: "待定系数法求解析式"
          - content: "因为直线过 $A(0, -1)$，故 $b = -1$。代入 $P(1, 2)$ 得 $2 = k - 1 \implies k = 3$。所以解析式为 $y = 3x - 1$。"
          - title: "数形结合读解集"
          - content: "观察图像发现，在交点 $P(1, 2)$ 右侧直线 $l_2$ 在直线 $l_1$ 的上方，因此不等式 $kx + b > -x + 3$ 的解集为 $x > 1$。"
          - title: "计算坐标轴交点与面积"
          - content: "令 $y = 0$ 得 $x = \frac{1}{3}$，与 $x$ 轴交于 $(\frac{1}{3}, 0)$，与 $y$ 轴交于 $(0, -1)$。面积为 $S = \frac{1}{2} \times 1 \times \frac{1}{3} = \frac{1}{6}$。"
        teaching:
          teaching_goal: "标准综合题流程训练：代数求参 + 几何读图 + 面积运算"
          expected_blocker: "求面积时把交点代错，或者把 $x$ 轴交点坐标算错"
          mastery_band: "B"
        layout:
          avoid_break: true

      - type: "problem"
        id: "p2"
        points: 12
        label: "第 2 题"
        stem_latex: |
          如图 2，已知一次函数 $y = x - 1$ 的图像 $l_1$ 与另一个一次函数 $y = kx + b$ 的图像 $l_2$ 相交于点 $P(2, 1)$，且 $l_2$ 经过点 $B(0, 5)$。
          \begin{center}
            \includegraphics[width=6.5cm]{plot_p2.pdf}
          \end{center}
          \begin{enumerate}[label=(\arabic*)]
            \item 求一次函数 $y = kx + b$ 的解析式；
            \item 直接根据图像，求不等式 $kx + b \ge x - 1$ 的解集；
            \item 求直线 $l_1, l_2$ 与 $y$ 轴围成的三角形面积。
          \end{enumerate}
        subquestions:
          - latex: "求一次函数 $y = kx + b$ 的解析式；"
          - latex: "直接根据图像，求不等式 $kx + b \ge x - 1$ 的解集；"
          - latex: "求直线 $l_1, l_2$ 与 $y$ 轴围成的三角形面积。"
        answer: "(1) $y = -2x + 5$；(2) $x \le 2$；(3) 6。"
        explanation: |
          (1) 因为直线 $l_2$ 经过点 $B(0, 5)$，所以 $b = 5$。
          将 $P(2, 1)$ 代入 $y = kx + 5$，得 $1 = 2k + 5 \implies 2k = -4 \implies k = -2$。
          故解析式为 $y = -2x + 5$。
          (2) 观察图像，在交点 $P(2, 1)$ 的左侧直线 $l_2$ 位于直线 $l_1$ 的上方，包括交点本身，
          故不等式 $kx + b \ge x - 1$ 的解集为 $x \le 2$。
          (3) 直线 $l_1: y = x - 1$ 与 $y$ 轴交于点 $(0, -1)$，直线 $l_2: y = -2x + 5$ 与 $y$ 轴交于点 $(0, 5)$。
          两个交点之间的距离（底边）为 $d = 5 - (-1) = 6$。
          三角形的高为交点 $P(2, 1)$ 横坐标的绝对值，即 $h = 2$。
          故围成的三角形面积为 $S = \frac{1}{2} \times 6 \times 2 = 6$。
        solution_steps:
          - title: "求一次函数解析式"
          - content: "直线 $l_2$ 过点 $B(0, 5) \implies b = 5$。代入 $P(2, 1)$ 得 $1 = 2k + 5 \implies k = -2$。故解析式为 $y = -2x + 5$。"
          - title: "求不等式解集"
          - content: "观察图形知，$l_2$ 位于 $l_1$ 上方对应的区间（包括相交点）在 $x = 2$ 左侧，故解集为 $x \le 2$。"
          - title: "计算两线与 y 轴所围面积"
          - content: "两线与 $y$ 轴交点分别为 $(0, -1)$ 和 $(0, 5)$，底为 $6$；交点 $P(2, 1)$ 横坐标为 $2$，高为 $2$。面积 $S = \frac{1}{2} \times 6 \times 2 = 6$。"
        teaching:
          teaching_goal: "中级变式训练：负斜率下的区间分析，以及两条直线与 $y$ 轴围成面积的方法"
          expected_blocker: "负斜率下方向写反（写成 $x \ge 2$），或者不知道如何利用 $y$ 轴截距之差作为底边"
          mastery_band: "C"
        layout:
          avoid_break: true

      - type: "problem"
        id: "p3"
        points: 12
        label: "第 3 题"
        stem_latex: |
          如图 3，已知一次函数 $y = 2x + 4$ 的图像 $l_1$ 与另一个一次函数 $y = kx + b$ 的图像 $l_2$ 相交于点 $P(-1, 2)$，且 $l_2$ 经过点 $C(0, 3)$。
          \begin{center}
            \includegraphics[width=6.5cm]{plot_p3.pdf}
          \end{center}
          \begin{enumerate}[label=(\arabic*)]
            \item 求一次函数 $y = kx + b$ 的解析式；
            \item 直接根据图像，求不等式 $2x + 4 < kx + b$ 的解集；
            \item 直线 $l_1, l_2$ 分别与 $x$ 轴相交于点 $A$ 和点 $B$，求 $\triangle PAB$ 的面积。
          \end{enumerate}
        subquestions:
          - latex: "求一次函数 $y = kx + b$ 的解析式；"
          - latex: "直接根据图像，求不等式 $2x + 4 < kx + b$ 的解集；"
          - latex: "直线 $l_1, l_2$ 分别与 $x$ 轴相交于点 $A$ 和点 $B$，求 $\triangle PAB$ 的面积。"
        answer: "(1) $y = x + 3$；(2) $x < -1$；(3) 1。"
        explanation: |
          (1) 因为直线 $l_2$ 过点 $C(0, 3)$，所以 $b = 3$。
          将 $P(-1, 2)$ 代入 $y = kx + 3$，得 $2 = -k + 3 \implies k = 1$。
          故解析式为 $y = x + 3$。
          (2) 由图像可知，在交点 $P(-1, 2)$ 的左侧，直线 $l_2: y = x + 3$ 位于直线 $l_1: y = 2x + 4$ 的上方，
          即 $2x + 4 < kx + b$。故解集为 $x < -1$。
          (3) 令直线 $l_1$ 的 $y = 0$，得 $2x + 4 = 0 \implies x = -2$，交点 $A(-2, 0)$。
          令直线 $l_2$ 的 $y = 0$，得 $x + 3 = 0 \implies x = -3$，交点 $B(-3, 0)$。
          底边 $AB$ 的长度为 $| -2 - (-3) | = 1$。
          $\triangle PAB$ 的高为交点 $P(-1, 2)$ 的纵坐标，即 $h = 2$。
          故 $S_{\triangle PAB} = \frac{1}{2} \times 1 \times 2 = 1$。
        solution_steps:
          - title: "求待定系数及解析式"
          - content: "$l_2$ 过 $C(0, 3) \implies b = 3$。代入 $P(-1, 2)$ 得 $2 = -k + 3 \implies k = 1$。故解析式为 $y = x + 3$。"
          - title: "求不等式解集"
          - content: "从图像可以看出，在交点 $P(-1, 2)$ 左侧，直线 $l_2$ 在直线 $l_1$ 的上方，所以 $2x + 4 < kx + b$ 的解集为 $x < -1$。"
          - title: "求与 x 轴交点及三角形面积"
          - content: "令 $y = 0$：$l_1$ 交 $x$ 轴于 $A(-2, 0)$，$l_2$ 交 $x$ 轴于 $B(-3, 0)$。底边 $AB = 1$。高为 $P$ 的纵坐标 $2$。面积 $S = \frac{1}{2} \times 1 \times 2 = 1$。"
        teaching:
          teaching_goal: "经典压轴变式训练：两条直线在 $x$ 轴截距所围三角形面积（$\triangle PAB$ 模式）"
          expected_blocker: "算错 $x$ 轴截距，或者误用纵坐标算底边"
          mastery_band: "C"
        layout:
          avoid_break: true

  - id: "answer-key"
    title: "参考答案"
    type: "answer_key"
    visibility: "teacher"
    layout:
      break_before: true
    blocks:
      - type: "step"
        id: "ak-choice"
        title: "选择题"
        content: |
          1. B（$x < -2$）
          2. A（$x \ge 1$）
          3. A（$x > 1$）

      - type: "step"
        id: "ak-fillin"
        title: "填空题"
        content: |
          1. $(3, 7)$
          2. $y = 2x + 4$
          3. $x \le -2$

      - type: "step"
        id: "ak-problem"
        title: "解答题"
        content: |
          第 1 题：(1) $y = 3x - 1$；(2) $x > 1$；(3) $\frac{1}{6}$。
          第 2 题：(1) $y = -2x + 5$；(2) $x \le 2$；(3) 6。
          第 3 题：(1) $y = x + 3$；(2) $x < -1$；(3) 1。
