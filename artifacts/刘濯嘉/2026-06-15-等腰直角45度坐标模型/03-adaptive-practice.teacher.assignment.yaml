meta:
  title: "45°旋转与等腰直角坐标模型练习"
  subtitle: "刘濯嘉 · 教师版"
  grade: "八年级"
  subject: "数学"
  duration: "30分钟"
  total_points: 80
  version: "teacher"
  source_artifacts:
    structure_analysis: "artifacts/刘濯嘉/2026-06-15-等腰直角45度坐标模型/01-structure-analysis.md"
    explanation: "artifacts/刘濯嘉/2026-06-15-等腰直角45度坐标模型/02-student-explanation.assignment.yaml"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "find-c"
    title: "一、求底角顶点 C（每题 10 分，共 20 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q1"
        points: 10
        stem_latex: |
          等腰直角三角形 $ABC$ 中，$\angle A=90^\circ$，$AB=AC$。
          已知 $A(-2,3)$，$B(4,7)$，点 $C$ 在点 $A$ 的右下方，求点 $C$ 的坐标。
        hints:
          - content: "先把 $AB$ 读成“右几上几”，再交换水平和竖直步数。"
        answer_space:
          type: "steps"
          height: "35mm"
          step_count: 4
        answer: "$C(2,-3)$"
        solution_steps:
          - title: "读 $AB$"
            content: "从 $A(-2,3)$ 到 $B(4,7)$ 是“右 $6$ 上 $4$”。"
          - title: "旋转成 $AC$"
            content: "右下方对应“右 $4$ 下 $6$”。"
          - title: "定坐标"
            content: "从 $A(-2,3)$ 出发，右 $4$ 下 $6$，得 $C(2,-3)$。"
        teaching:
          teaching_goal: "训练底角顶点模型的走法读取与方向筛选。"
          expected_blocker: "把右3上4直接写成C坐标，忘记从A出发。"
          entry_point: "build_relation"
          scaffold_level: "medium"
          variation_depth: "changed_numbers"
          complexity_note: "整数坐标，只有一个方向限制。"
          upgrade_rule: "能主动说出另一个候选方向。"
          fallback_move: "只问从A到B怎么走。"

      - type: "problem"
        id: "q2"
        points: 10
        stem_latex: |
          等腰直角三角形 $ABC$ 中，$\angle A=90^\circ$，$AB=AC$。
          已知 $A(3,-1)$，$B(-2,5)$，点 $C$ 在点 $A$ 的右上方，求点 $C$ 的坐标。
        hints:
          - content: "从 $A$ 到 $B$ 是右下方向，旋转后要选右上方向。"
        answer_space:
          type: "steps"
          height: "35mm"
          step_count: 4
        answer: "$C(9,4)$"
        solution_steps:
          - title: "读 $AB$"
            content: "从 $A(3,-1)$ 到 $B(-2,5)$ 是“左 $5$ 上 $6$”。"
          - title: "旋转成 $AC$"
            content: "右上方对应“右 $6$ 上 $5$”。"
          - title: "定坐标"
            content: "从 $A(3,-1)$ 出发，右 $6$ 上 $5$，得 $C(9,4)$。"
        teaching:
          teaching_goal: "处理负坐标与右下到右上的旋转。"
          expected_blocker: "只交换数字，不处理上下方向。"
          entry_point: "build_relation"
          scaffold_level: "medium"
          variation_depth: "changed_numbers"
          complexity_note: "坐标含负数，但算术干净。"
          upgrade_rule: "能解释为什么不是左2下3。"
          fallback_move: "让学生画出右3下2的小箭头。"

  - id: "find-a"
    title: "二、求顶角顶点 A（每题 10 分，共 20 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q3"
        points: 10
        stem_latex: |
          等腰直角三角形 $ABC$ 中，$\angle A=90^\circ$。
          已知 $B(-3,4)$，$C(5,-2)$，点 $A$ 在第一象限，求点 $A$ 的坐标。
        hints:
          - content: "先取 $BC$ 的中点 $D$，再从 $D$ 到 $B$ 读走法。"
        answer_space:
          type: "steps"
          height: "40mm"
          step_count: 4
        answer: "$A(4,5)$"
        solution_steps:
          - title: "取中点"
            content: '$D\left(\frac{-3+5}{2},\frac{4+(-2)}{2}\right)=(1,1)$。'
          - title: "读 $DB$"
            content: "从 $D(1,1)$ 到 $B(-3,4)$ 是“左 $4$ 上 $3$”。"
          - title: "旋转成 $DA$"
            content: "候选走法为“右 $3$ 上 $4$”或“左 $3$ 下 $4$”。"
          - title: "筛选"
            content: "第一象限取 $A(4,5)$。"
        teaching:
          teaching_goal: "训练顶角顶点题先取斜边中点。"
          expected_blocker: "直接用BC整段旋转，导致长度翻倍。"
          entry_point: "find_entry"
          scaffold_level: "medium"
          variation_depth: "changed_question"
          complexity_note: "中点为整数。"
          upgrade_rule: "学生能独立说出D是旋转中心。"
          fallback_move: "先复述为什么取中点。"

      - type: "problem"
        id: "q4"
        points: 10
        stem_latex: |
          等腰直角三角形 $ABC$ 中，$\angle A=90^\circ$。
          已知 $B(-4,1)$，$C(2,9)$，点 $A$ 在第一象限，求点 $A$ 的坐标。
        hints:
          - content: "中点 $D$ 是旋转中心，不是 $B$ 或 $C$。"
        answer_space:
          type: "steps"
          height: "40mm"
          step_count: 4
        answer: "$A(3,2)$"
        solution_steps:
          - title: "取中点"
            content: '$D\left(\frac{-4+2}{2},\frac{1+9}{2}\right)=(-1,5)$。'
          - title: "读 $DB$"
            content: "从 $D(-1,5)$ 到 $B(-4,1)$ 是“左 $3$ 下 $4$”。"
          - title: "旋转成 $DA$"
            content: "候选走法为“右 $4$ 下 $3$”或“左 $4$ 上 $3$”。"
          - title: "筛选"
            content: "第一象限取“右 $4$ 下 $3$”，所以 $A(3,2)$。"
        teaching:
          teaching_goal: "在跨象限条件下筛选顶角顶点。"
          expected_blocker: "第一步中点算错或象限判断错。"
          entry_point: "find_entry"
          scaffold_level: "medium"
          variation_depth: "changed_numbers"
          complexity_note: "中点整数，方向判断为主要负担。"
          upgrade_rule: "能写出两个候选点并筛掉一个。"
          fallback_move: "先只求D点。"

  - id: "find-line"
    title: "三、45 度求直线与后续计算（每题 10 分，共 20 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q5"
        points: 10
        stem_latex: |
          已知 $A(2,5)$，$B(5,6)$。直线 $BC$ 与射线 $BA$ 成 $45^\circ$，对应的辅助点 $P$ 在点 $A$ 的右下方。
          \begin{enumerate}[label=(\arabic*)]
            \item 求直线 $BC$ 的解析式；
            \item 若直线 $BC$ 与反比例函数 $y=\dfrac{30}{x}$ 的图像除 $B$ 外还交于点 $C$，求点 $C$ 的坐标和 $\triangle ABC$ 的面积。
          \end{enumerate}
        hints:
          - content: "先作等腰直角三角形 $ABP$，让 $A$ 做直角顶点。"
        answer_space:
          type: "steps"
          height: "55mm"
          step_count: 5
        answer: '(1) $y=2x-4$；(2) $C(-3,-10)$，$S_{\triangle ABC}=20$。'
        solution_steps:
          - title: "求辅助点 $P$"
            content: "从 $A(2,5)$ 到 $B(5,6)$ 是“右 $3$ 上 $1$”。$P$ 在右下方，所以 $AP$ 是“右 $1$ 下 $3$”，得 $P(3,2)$。"
          - title: "求直线 $BC$"
            content: '直线 $BP$ 的斜率 $k=\frac{6-2}{5-3}=2$。代入 $B(5,6)$，得 $6=10+b$，所以 $b=-4$，$BC:y=2x-4$。'
          - title: "求 $C$"
            content: '联立 $y=2x-4$ 与 $y=\dfrac{30}{x}$，得 $x^2-2x-15=0$，解得 $x=5$ 或 $x=-3$。$x=5$ 是点 $B$，所以 $C(-3,-10)$。'
          - title: "求面积"
            content: '$S_{\triangle ABC}=\frac12|(5-2)(-10-5)-(6-5)(-3-2)|=20$。'
        teaching:
          teaching_goal: "把45度转化为辅助等腰直角三角形并接一次函数。"
          expected_blocker: "把直线过P和A，而不是过B和P。"
          entry_point: "transfer"
          scaffold_level: "medium"
          variation_depth: "changed_representation"
          complexity_note: "斜率为整数，面积计算简单。"
          upgrade_rule: "能独立完成从P到直线再到交点。"
          fallback_move: "只问P点坐标。"

      - type: "problem"
        id: "q6"
        points: 10
        stem_latex: |
          已知 $A(2,11)$，$B(6,9)$。直线 $BC$ 与射线 $BA$ 成 $45^\circ$，对应的辅助点 $P$ 在点 $A$ 的右上方。
          \begin{enumerate}[label=(\arabic*)]
            \item 求直线 $BC$ 的解析式；
            \item 若点 $C$ 在反比例函数 $y=\dfrac{54}{x}$ 的图像上，且 $x_C<4$，求点 $C$ 的坐标和 $\triangle ABC$ 的面积。
          \end{enumerate}
        hints:
          - content: "求出 $P$ 后，用 $B,P$ 两点求直线。"
        answer_space:
          type: "steps"
          height: "55mm"
          step_count: 5
        answer: '(1) $y=-3x+27$；(2) $C(3,18)$，$S_{\triangle ABC}=15$。'
        solution_steps:
          - title: "求辅助点 $P$"
            content: "从 $A(2,11)$ 到 $B(6,9)$ 是“右 $4$ 下 $2$”。$P$ 在右上方，所以 $AP$ 是“右 $2$ 上 $4$”，得 $P(4,15)$。"
          - title: "求直线 $BC$"
            content: '直线 $BP$ 的斜率 $k=\frac{15-9}{4-6}=-3$。代入 $B(6,9)$，得 $9=-18+b$，所以 $b=27$，$BC:y=-3x+27$。'
          - title: "求 $C$"
            content: '联立 $y=-3x+27$ 与 $y=\dfrac{54}{x}$，得 $-3x^2+27x-54=0$，即 $x^2-9x+18=0$。解得 $x=3$ 或 $x=6$，由 $x_C<4$ 得 $C(3,18)$。'
          - title: "求面积"
            content: '$S_{\triangle ABC}=\frac12|(6-2)(18-11)-(9-11)(3-2)|=15$。'
        teaching:
          teaching_goal: "处理45度直线中的负斜率和后续面积。"
          expected_blocker: "斜率符号错误。"
          entry_point: "transfer"
          scaffold_level: "medium"
          variation_depth: "changed_numbers"
          complexity_note: "有负斜率，但交点整数。"
          upgrade_rule: "能用同一流程处理另一方向。"
          fallback_move: "让学生先说AB走法和AP走法。"

  - id: "condition-check"
    title: "四、条件是否足够（每题 10 分，共 20 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q7"
        points: 10
        stem_latex: |
          已知 $A(1,2)$，$B(7,2)$。如果题目只说 $\angle ACB=45^\circ$，
          能不能唯一求出直线 $BC$ 的解析式？请说明理由。
        hints:
          - content: '先看 $\angle ACB$ 的顶点是谁。'
        answer_space:
          type: "lines"
          height: "35mm"
        answer: "不能唯一求出。"
        solution_steps:
          - title: "看角顶点"
            content: '$\angle ACB$ 的顶点是 $C$，但题目没有给出点 $C$ 的位置。'
          - title: "判断唯一性"
            content: '不同位置的点 $C$ 都可能满足 $\angle ACB=45^\circ$，因此直线 $BC$ 不唯一。'
          - title: "规范结论"
            content: "还需要补充 $C$ 所在直线、坐标或其他条件。"
        teaching:
          teaching_goal: "训练条件充分性判断，防止套错ABC模型。"
          expected_blocker: "看到45度就直接求过B的旋转线。"
          entry_point: "hidden_structure"
          scaffold_level: "medium"
          variation_depth: "partially_hidden"
          complexity_note: "无计算，重在读角顶点。"
          upgrade_rule: "能主动说出需要补充什么条件。"
          fallback_move: "圈出角名中间字母C。"

      - type: "problem"
        id: "q8"
        points: 10
        stem_latex: |
          已知 $A(1,1)$，$B(5,1)$，$\angle ACB=45^\circ$，且点 $C$ 在直线 $x=1$ 上并位于点 $A$ 上方。
          求点 $C$ 的坐标和直线 $BC$ 的解析式。
        hints:
          - content: "这次题目补充了 $C$ 的位置，所以可以先确定 $C$。"
        answer_space:
          type: "steps"
          height: "40mm"
          step_count: 4
        answer: "$C(1,5)$，$BC:y=-x+6$。"
        solution_steps:
          - title: "利用位置确定形状"
            content: "设 $C(1,t)$，且 $t>1$。从 $C$ 到 $A$ 是“下 $t-1$”，从 $C$ 到 $B$ 是“右 $4$ 下 $t-1$”。"
          - title: "用45度判断"
            content: '要让 $CA$ 与 $CB$ 成 $45^\circ$，这里需要水平距离和竖直距离相等，所以 $t-1=4$，得 $C(1,5)$。'
          - title: "求直线"
            content: "直线 $BC$ 过 $B(5,1)$、$C(1,5)$，斜率为 $-1$，所以 $BC:y=-x+6$。"
        teaching:
          teaching_goal: "对比条件不足与补充条件后的可解题。"
          expected_blocker: "不知道补充C在定直线后应先求C。"
          entry_point: "transfer"
          scaffold_level: "medium"
          variation_depth: "packaged_condition"
          complexity_note: "避免三角函数，只用45度等腰直角直观。"
          upgrade_rule: "能说明为什么q7不可解而q8可解。"
          fallback_move: "先画出A、B和直线 $x=1$ 上的C。"

  - id: "answer-key"
    title: "答案速查"
    type: "answer_key"
    visibility: "teacher"
    blocks:
      - type: "answers"
        id: "answers-main"
        items:
          - number: "1"
            answer: "$C(2,-3)$"
          - number: "2"
            answer: "$C(9,4)$"
          - number: "3"
            answer: "$A(4,5)$"
          - number: "4"
            answer: "$A(3,2)$"
          - number: "5"
            answer: '$BC:y=2x-4$；$C(-3,-10)$；$S_{\triangle ABC}=20$'
          - number: "6"
            answer: '$BC:y=-3x+27$；$C(3,18)$；$S_{\triangle ABC}=15$'
          - number: "7"
            answer: "不能唯一求出，还缺少确定点 $C$ 的条件。"
          - number: "8"
            answer: "$C(1,5)$；$BC:y=-x+6$"
