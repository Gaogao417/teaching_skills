          engine_options:
            max_retries: 2
            wolfram_timeout_s: 45
            wolfram_hard_timeout_s: 90
            engine_model_config:
              base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
              api_key_env: "DASHSCOPE_API_KEY"
              text_models: ["qwen3.5-plus", "qwen3.5-flash"]
