      - type: "problem"
        id: "q16"
        stem_latex: "（原第16题）动手操作是学习数学的一种好方法。如图，小明同学在一次折纸活动中，将一张 $A4$ 纸（长宽比为 $\\sqrt2:1$）$ABCD$ 沿 $AP$ 折叠，使点 $B$ 落在 $AD$ 边上的点 $G$ 处，再沿 $FI$ 折叠，使点 $C$ 落在 $FG$ 边上的点 $H$ 处，则矩形 $GHID$ 的长与宽的比值为\\underline{\\hspace{24mm}}。"
        answer: "$\\sqrt2-1$"
