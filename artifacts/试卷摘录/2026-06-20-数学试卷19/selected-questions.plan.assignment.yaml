      - type: "choice"
        id: "q2"
        stem_latex: "（原第2题）直线 $y=\\dfrac12x+n$ 经过点 $A(m,y_1)$，$B(n,y_2)$，且 $m>n$，下列结论正确的是（\\quad）。"
        choices:
          A: "$y_1>y_2$"
          B: "$y_1=y_2$"
          C: "$y_1<y_2$"
          D: "$y_1,y_2$ 的大小不能确定"
        answer: "A"

      - type: "choice"
        id: "q5"
        stem_latex: "（原第5题）如图，菱形 $ABCD$ 的对角线 $AC,BD$ 相交于点 $O$，过点 $D$ 作 $DH\\perp AB$ 于点 $H$，连接 $OH$。若 $OA=6$，$OB=4$，则菱形 $ABCD$ 的面积为（\\quad）。"
        choices:
          A: "$24\\sqrt7$"
          B: "$48\\sqrt7$"
          C: "$48$"
          D: "$96$"
        answer: "C"
        diagram_slot:
          slot_id: "q5.prompt"
          diagram_ref: "q5.prompt"
          variant: "prompt"
          disclosure_policy: "clean"
          required: true
          on_failure: "fail_assignment"
          placement: "diagram_col"
          layout_role: "question_sidecar"
          display_profile: "worksheet_geometry_sidecar"
          caption: "菱形对角线与垂线"
          engine: "geometric_scene"
          diagram_kind: "synthetic_geometry"
          teaching_intent: "practice_prompt"
          problem_context:
            stem_latex: "菱形 $ABCD$ 的对角线 $AC,BD$ 相交于点 $O$，过点 $D$ 作 $DH\\perp AB$ 于点 $H$，连接 $OH$。若 $OA=6$，$OB=4$。"
            source_problem_text: "原题图只画已知对象：菱形ABCD，A在左、C在右、D在上、B在下；AC与BD相交于O；H在AB上，DH垂直AB，连接OH。不要画面积或答案提示。"
