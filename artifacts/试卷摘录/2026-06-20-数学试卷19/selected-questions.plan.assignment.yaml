      - type: "fillin"
        id: "q9"
        fillin_type: "line"
        stem_latex: "（原第9题）将直线 $y=5x-3\\sqrt3$ 向上平移 $5$ 个单位，得到的直线的解析式是\\underline{\\hspace{36mm}}。"
        answer: "$y=5x-3\\sqrt3+5$"

      - type: "fillin"
        id: "q13"
        fillin_type: "line"
        stem_latex: "（原第13题）在平行四边形 $ABCD$ 中，$AB=12$，$DC=7$，点 $E$ 在 $CD$ 边上，点 $F$ 在 $AB$ 边上。连接 $EF,DF$，若 $CG=3\\sqrt6$，$EF=5\\sqrt2$，则 $DF$ 的长为\\underline{\\hspace{24mm}}。"
        answer: ""

      - type: "fillin"
        id: "q14"
        fillin_type: "line"
        stem_latex: "（原第14题）我们把直角坐标系平面内到 $x$ 轴和到 $y$ 轴距离之比的值为 $2$ 的点称为“特殊点”，那么一次函数 $y=-2x+4$ 的图象上的“特殊点”坐标为\\underline{\\hspace{24mm}}。"
        answer: "$(1,2)$"

      - type: "problem"
        id: "q15"
        stem_latex: "（原第15题）如图，直线 $y_1=-2x$ 与 $y_2=ax+3$ 的图象相交于点 $A(-1,2)$，则当 $y_1<y_2$ 时，$x$ 的取值范围是\\underline{\\hspace{24mm}}。"
