            source_problem_text: "原题图只画已知构型：以三角形ABC的三边AB、AC、BC分别作等边三角形ABD、ACE、BCF，并连接D、E、F形成三角形DEF。B在左下，C在右下，A在图形内部，D在左上，F在上方，E在右上。不要画结论或答案提示。"
