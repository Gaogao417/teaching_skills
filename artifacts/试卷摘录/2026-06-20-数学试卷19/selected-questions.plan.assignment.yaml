              vision_models: ["qwen-vl-max-latest", "qwen-vl-plus-latest"]
              temperature: 0.2
              vision_temperature: 0.0
              request_timeout_s: 90
              vision_request_timeout_s: 90
          semantic_constraints:
            given_objects: ["A", "B", "C", "D", "O", "H"]
            given_constraints:
              - "ABCD是菱形"
              - "A、O、C共线，B、O、D共线"
              - "AC与BD交于O，且O是两条对角线的中点"
              - "OA=OC=6"
