              - "H在AB上"
              - "DH垂直AB于H"
              - "连接OH"
              - "点位顺序按原题图：A左、C右、D上、B下"

      - type: "choice"
        id: "q6"
        stem_latex: "（原第6题）如图，在 $\\triangle ABC$ 中，$AB=3$，$AC=4$，$BC=5$，$\\triangle ABD$、$\\triangle ACE$、$\\triangle BCF$ 都是等边三角形。下列结论中：① $AB\\perp AC$；② $\\triangle DEF\\cong\\triangle ABC$；③ 四边形 $AEFD$ 是平行四边形；④ $\\angle DFE=110^\\circ$；⑤ $S_{\\triangle DEF}-S_{\\triangle ABC}=5$。正确的个数是（\\quad）。"
        choices:
          A: "2个"
          B: "3个"
          C: "4个"
          D: "5个"
        answer: "B"
        diagram_slot:
          slot_id: "q6.prompt"
          diagram_ref: "q6.prompt"
          variant: "prompt"
          disclosure_policy: "clean"
          required: true
          on_failure: "fail_assignment"
