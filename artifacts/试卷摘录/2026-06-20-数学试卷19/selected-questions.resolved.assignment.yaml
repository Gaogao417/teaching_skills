    id: q2
    stem_latex: （原第2题）直线 $y=\dfrac12x+n$ 经过点 $A(m,y_1)$，$B(n,y_2)$，且 $m>n$，下列结论正确的是（\quad）。
    choices:
      A: $y_1>y_2$
      B: $y_1=y_2$
      C: $y_1<y_2$
      D: $y_1,y_2$ 的大小不能确定
    answer: A
