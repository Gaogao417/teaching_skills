      - type: "problem"
        id: "q17"
        points: 4
        stem_latex: "如图，$\\triangle ABC$ 中，$\\angle BAC=90^\\circ$，$\\angle ABC=30^\\circ$。将 $\\triangle ABC$ 绕点 $A$ 按顺时针方向旋转到 $\\triangle ADE$（点 $D$ 与点 $B$ 对应），且使射线 $AD\\parallel BC$，直线 $DE$ 交射线 $BC$ 于点 $G$，那么 $\\angle EAG$ 的度数为\\underline{\\hspace{18mm}}度。"
        answer: "$15$"
        answer_space:
          type: "lines"
          height: "44mm"
          diagram_slot:
            slot_id: "q17.prompt"
            diagram_ref: "q17.prompt"
            variant: "prompt"
            disclosure_policy: "clean"
            required: true
            on_failure: "fail_assignment"
            placement: "answer_space.diagram_col"
            layout_role: "answer_area_sidecar"
            display_profile: "worksheet_geometry_sidecar"
            caption: "旋转与平行"
            engine: "renderer_spec"
            diagram_kind: "synthetic_geometry"
            teaching_intent: "practice_prompt"
            engine_options:
              renderer_spec:
                points:
                  B: [0, 0]
                  C: [5.2, 0]
                  A: [3.9, 2.25]
                  D: [0.6, 2.25]
                  E: [3.9, -0.35]
                  G: [3.3, 0]
                segments:
                  - {from: "B", to: "C"}
                  - {from: "A", to: "B"}
                  - {from: "A", to: "C"}
                  - {from: "A", to: "D"}
                  - {from: "A", to: "E"}
                  - {from: "D", to: "E"}
                  - {from: "A", to: "G"}
                labels:
                  A: {text: "A", placement: "above"}
                  B: {text: "B", placement: "below left"}
                  C: {text: "C", placement: "below right"}
                  D: {text: "D", placement: "above left"}
                  E: {text: "E", placement: "below"}
                  G: {text: "G", placement: "below"}
                markers:
                  - type: "right_angle"
                    vertex: "A"
                    arms: ["B", "C"]
            semantic_constraints:
              given_objects: ["A", "B", "C", "D", "E", "G"]
              given_constraints: ["angle BAC=90 degrees", "angle ABC=30 degrees", "triangle ABC rotates clockwise about A to triangle ADE", "D corresponds to B", "AD parallel BC", "DE meets ray BC at G"]

      - type: "problem"
        id: "q18"
        points: 4
        stem_latex: "如图，在 $\\triangle ABC$ 中，点 $E,F$ 分别是 $AB,BC$ 的中点，$EH\\perp AC$ 于 $H$，$GF\\perp BC$ 且交 $EH$ 于点 $G$，$GF=FC$。若 $BG=\\sqrt5$，$AH=3$，则 $CH$ 的长度为\\underline{\\hspace{18mm}}。"
        answer: "$5+2\\sqrt5$"
        answer_space:
          type: "lines"
          height: "64mm"
          diagram_slot:
            slot_id: "q18.prompt"
            diagram_ref: "q18.prompt"
            variant: "prompt"
