        fillin_type: "line"
        stem_latex: "已知点 $P(2a-1,a+1)$，如果点 $Q$ 的坐标为 $(5,2)$，且直线 $PQ\\parallel y$ 轴，那么点 $P$ 的坐标是\\underline{\\hspace{22mm}}。"
        answer: "$(5,4)$"

      - type: "problem"
        id: "q14"
        points: 4
        stem_latex: "如图，在平面直角坐标系中，矩形 $ABCD$ 的对角线 $AC,BD$ 相交于点 $E$，$B(-1,0)$，$C(0,\\sqrt3)$，如果 $AC\\parallel x$ 轴，那么 $BE$ 的长为\\underline{\\hspace{18mm}}。"
        answer: "$2$"
        answer_space:
          type: "lines"
          height: "68mm"
          diagram_slot:
            slot_id: "q14.prompt"
            diagram_ref: "q14.prompt"
            variant: "prompt"
            disclosure_policy: "clean"
            required: true
            on_failure: "fail_assignment"
