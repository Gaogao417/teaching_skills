                  B: {text: "B", placement: "below left"}
                  C: {text: "C", placement: "below right"}
                  E: {text: "E", placement: "left"}
                  F: {text: "F", placement: "below"}
                  G: {text: "G", placement: "below left"}
                  H: {text: "H", placement: "right"}
                markers:
                  - type: "right_angle"
                    vertex: "F"
                    arms: ["G", "C"]
                  - type: "right_angle"
                    vertex: "H"
                    arms: ["E", "C"]
            semantic_constraints:
              given_objects: ["A", "B", "C", "E", "F", "G", "H"]
              given_constraints: ["E is midpoint of AB", "F is midpoint of BC", "EH perpendicular AC at H", "GF perpendicular BC", "GF=FC", "BG=sqrt(5)", "AH=3"]

