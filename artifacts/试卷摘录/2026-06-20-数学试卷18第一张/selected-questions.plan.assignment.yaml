                    style: {label_dx: -18, label_dy: -10}
                  - type: "point"
                    id: "B"
                    x: -1
                    y: 0
                    label: "B"
                    style: {label_dx: -16, label_dy: -18}
                  - type: "point"
                    id: "C"
                    x: 0
