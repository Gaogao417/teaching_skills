  - type: problem
    id: q17
    points: 4
    stem_latex: 如图，$\triangle ABC$ 中，$\angle BAC=90^\circ$，$\angle ABC=30^\circ$。将
      $\triangle ABC$ 绕点 $A$ 按顺时针方向旋转到 $\triangle ADE$（点 $D$ 与点 $B$ 对应），且使射线 $AD\parallel
      BC$，直线 $DE$ 交射线 $BC$ 于点 $G$，那么 $\angle EAG$ 的度数为\underline{\hspace{18mm}}度。
    answer: $15$
