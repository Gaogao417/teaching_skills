  - type: problem
    id: q19
    points: 8
    stem_latex: 如图，在平面直角坐标系中，四边形 $OABC$ 是平行四边形。点 $O$ 是原点，点 $A$ 的坐标是 $(-16,0)$。线段 $BC$
      交 $y$ 轴于点 $D(0,8)$，$CD=6$。动点 $P$ 从点 $O$ 出发，沿射线 $OA$ 的方向以每秒 $2$ 个单位的速度运动，同时动点
      $Q$ 从点 $D$ 出发，以每秒 $1$ 个单位的速度向点 $B$ 运动，当点 $Q$ 运动到点 $B$ 时，点 $P$ 随之停止运动。设运动时间为
      $t$ 秒。\par (1) 用含 $t$ 的代数式表示：$BQ=$\underline{\hspace{18mm}}；\par (2) 当以 $P,Q,A,B$
      为顶点的四边形是平行四边形时，则 $t$ 的值是\underline{\hspace{18mm}}。
    answer: (1) $10-t$；(2) $\dfrac{26}{3}$
