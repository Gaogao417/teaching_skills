    stem_latex: 正方形 $A_1B_1C_1O$、$A_2B_2C_2C_1$、$A_3B_3C_3C_2\cdots$ 按如图所示的方式放置，点
      $A_1,A_2,A_3,\cdots$ 和点 $C_1,C_2,C_3,\cdots$ 分别在直线 $y=x+1$ 和 $x$ 轴上，则点 $B_{2020}$
      的坐标是（\quad）。
    choices:
      A: $(2^{2020},\ 2^{2020})$
      B: $(2^{2020}-1,\ 2^{2019})$
      C: $(2^{2020},\ 2^{2019})$
      D: $(2^{2019}-1,\ 2^{2019})$
    answer: B
