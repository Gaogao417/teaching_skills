    stem_latex: （原第15题）定义：如果直线 $y_1=k_1x+b_1\ (k_1\ne0)$ 与直线 $y_2=k_2x+b_2\ (k_2\ne0)$ 满足如下条件：$k_1\cdot k_2=-1$ 且 $b_1+b_2=0$，那么我们就说这两条直线具有“和谐关系”。例如，直线
      $y_1=2x+3$ 与直线 $y_2=-\dfrac12x-3$，它们具有“和谐关系”。如果直线 $y_1=h_1x+2\ (h_1>0)$ 与直线 $y_2=kx-2$ 具有“和谐关系”，且这两条直线与 $y$ 轴围成的三角形面积为
      $\dfrac{16}{5}$，则 $h_1=$\underline{\hspace{28mm}}。
