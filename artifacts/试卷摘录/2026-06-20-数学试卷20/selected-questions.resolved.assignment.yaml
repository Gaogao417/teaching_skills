      $1$ 尺高；将竿子的脚跟向前推动 $2$ 步 $10$ 尺时，斜竿就和推竿子的人一样高，同为 $5$ 尺。小明根据上述信息画出了如图所示的示意图，则可求竿子的长度为\underline{\hspace{28mm}}尺。
