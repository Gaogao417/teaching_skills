    stem_latex: （原第4题）下列命题，其中是假命题的是（\quad）。
    choices:
      A: 对角线相等的菱形是正方形
      B: 对角线互相垂直平分的四边形是菱形
      C: 有一个角是直角且对角线互相平分的四边形是矩形
      D: 一组对角相等且一组对边相等的四边形是平行四边形
    answer: ''
  - type: choice
