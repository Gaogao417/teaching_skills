    blocks:
      - type: "choice"
        id: "q3"
        stem_latex: "（原第3题）若一个四边形顶点的横坐标变为原来的相反数，而纵坐标不变，此时图形位置也不变，则这个四边形不可能是（\\quad）。"
        choices:
          A: "矩形"
          B: "直角梯形"
          C: "正方形"
          D: "菱形"
        answer: "B"

      - type: "choice"
        id: "q4"
        stem_latex: "（原第4题）在四边形 $ABCD$ 中，$AD\\parallel BC$，$AC,BD$ 交于点 $O$，下列说法错误的是（\\quad）。"
        choices:
          A: "如果 $AB=CD$，$\\angle ABC=\\angle BAD$，那么四边形 $ABCD$ 是矩形"
          B: "如果 $AB=CD$，$AC=BD$，那么四边形 $ABCD$ 是矩形"
          C: "如果 $OB=OD$，$AC\\perp BD$，那么四边形 $ABCD$ 是菱形"
          D: "如果 $AD=BC$，$\\angle ABD=\\angle CBD$，那么四边形 $ABCD$ 是菱形"
        answer: "B"

      - type: "choice"
        id: "q5"
        stem_latex: >-
          （原第5题）如图，在矩形 $ABCD$ 中，$\angle BAD$ 的平分线 $AE$ 交 $BC$ 于点 $E$，且 $AD=\sqrt{2}AB$，$DH\perp AE$ 于点 $H$，连接 $BH$ 并延长，交 $CD$ 于点 $F$，连接 $DE$。下列结论：① $BC=\sqrt{2}AB$；② $\angle AHD=\angle CED$；③ $DH=BF$；④ $DC=2BH+CF$。其中正确的有（\quad）。
        choices:
          A: "1个"
          B: "2个"
          C: "3个"
          D: "4个"
        answer: "D"
        diagram_slot:
          slot_id: "q5.prompt"
          diagram_ref: "q5.prompt"
          source_problem_ref: "q5"
          variant: "prompt"
          disclosure_policy: "clean"
          required: true
          on_failure: "fail_assignment"
          placement: "diagram_col"
          layout_role: "question_sidecar"
          display_profile: "worksheet_geometry_sidecar"
          caption: "矩形中的角平分线与垂线"
          engine: "renderer_spec"
          diagram_kind: "synthetic_geometry"
          teaching_intent: "practice_prompt"
          problem_context:
            source_problem_text: "几何坐标来源见 diagram-coordinate-derivations.md：由矩形、AD=sqrt(2)AB、AE为角平分线、DH垂直AE、BH延长交CD于F解析得到，不是视觉手摆。"
          engine_options:
            renderer_spec:
              points:
                A: [0.0, 4.0]
                B: [0.0, 0.0]
                C: [5.657, 0.0]
                D: [5.657, 4.0]
                E: [4.0, 0.0]
                H: [2.828, 1.172]
                F: [5.657, 2.343]
              polygons:
                - ["A", "B", "C", "D"]
              segments:
                - ["A", "E"]
                - ["D", "H"]
                - ["B", "H"]
                - ["H", "F"]
                - ["D", "E"]
              markers:
                - type: "right_angle"
                  vertex: "H"
                  arms: ["D", "E"]
              labels:
                A: {text: "A", placement: "above left"}
                B: {text: "B", placement: "below left"}
                C: {text: "C", placement: "below right"}
                D: {text: "D", placement: "above right"}
                E: {text: "E", placement: "below"}
                F: {text: "F", placement: "right"}
                H: {text: "H", placement: "below left"}
              constraints:
                - "ABCD为矩形"
                - "AD=sqrt(2)AB"
                - "AE平分角BAD并交BC于E"
                - "DH垂直AE于H"
                - "B,H,F共线，F在CD上"
              source:
                derivation_file: "diagram-coordinate-derivations.md"
          semantic_constraints:
            given_objects: ["A", "B", "C", "D", "E", "F", "H"]
            given_constraints:
              - "ABCD为矩形"
              - "AD=sqrt(2)AB"
              - "AE平分角BAD，E在BC上"
              - "DH垂直AE于H"
              - "B,H,F共线，F在CD上"
              - "连接DE"

      - type: "fillin"
        id: "q9"
        fillin_type: "line"
        stem_latex: "（原第9题）在平面直角坐标系 $xOy$ 中，若一次函数 $y=kx+2k+3\\ (k\\ne0)$ 对于除 $0$ 之外的任意实数 $k$，其图象都经过一个定点 $A$，点 $A'$ 与点 $A$ 关于 $x$ 轴对称，则 $\\triangle OAA'$ 的面积为\\underline{\\hspace{28mm}}。"
        answer: "$6$"

      - type: "fillin"
        id: "q11"
        fillin_type: "line"
        stem_latex: "（原第11题）若一元二次方程 $x^2-5x+a=0$ 无实数根，则一次函数 $y=(a-5)x+a$ 的图象不经过\\underline{\\hspace{28mm}}。"
        answer: "第四象限"

      - type: "fillin"
        id: "q12"
        fillin_type: "line"
        stem_latex: "（原第12题）在平面直角坐标系中，若点 $A(3,0)$，点 $B(0,1)$，点 $P$ 在 $y$ 轴上，且三角形 $PAB$ 的面积为 $6$，则点 $P$ 的坐标为\\underline{\\hspace{36mm}}。"
        answer: "$(0,5)$ 或 $(0,-3)$"

      - type: "problem"
        id: "q13"
        points: 4
        stem_latex: >-
          （原第13题）已知一次函数 $y_1=kx+b$ 与 $y_2=x+a$ 的图象如图所示，有下列结论：① $a<0$；② $b>0$；③ 关于 $x$ 的方程 $kx+b=x+a$ 的解为 $x=3$；④ 当 $x\le3$ 时，$y_2\ge y_1$。其中正确的结论有\underline{\hspace{18mm}}个。
        answer: "$3$"
        answer_space:
          type: "lines"
          height: "36mm"
          diagram_slot:
            slot_id: "q13.prompt"
            diagram_ref: "q13.prompt"
            source_problem_ref: "q13"
            variant: "prompt"
            disclosure_policy: "clean"
            required: true
            on_failure: "fail_assignment"
            placement: "answer_space.diagram_col"
