              given_objects: ["x-axis", "y-axis", "line y1", "line y2"]
              given_constraints:
                - "y1=kx+b为下降直线且b>0"
                - "y2=x+a为斜率1的上升直线且a<0"
                - "两图象交点横坐标为3"

      - type: "problem"
        id: "q15"
        points: 4
        stem_latex: >-
          （原第15题）如图，在矩形 $ABCD$ 中，$AD=5$，$AB=8$，点 $E$ 为射线 $DC$ 上一个动点，将 $\triangle ADE$ 沿直线 $AE$ 折叠，当点 $D$ 的对应点 $F$ 刚好落在线段 $AB$ 的垂直平分线上时，$DE$ 的长为\underline{\hspace{28mm}}。
        answer: "$\\dfrac52$ 或 $10$"
        answer_space:
          type: "lines"
          height: "44mm"
