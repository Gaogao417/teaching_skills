          (2) 已知 $AB=5$，$BC=6$。\par
          ① 当 $AC$ 的长为多少时，四边形 $BECP$ 是菱形？并加以证明；\par
          ② 请直接写出当 $AP$ 的长为多少时，四边形 $BECP$ 是正方形。
        answer_space:
          type: "lines"
          height: "76mm"
