      - type: "fillin"
        id: "q16"
        fillin_type: "line"
        stem_latex: >-
          （原第16题）新定义：有一组对角相等而另一组对角不相等的四边形叫做“等对角四边形”。在“等对角四边形” $ABCD$ 中，$\angle DAB=60^\circ$，$\angle ABC=90^\circ$，$AB=5$，$AD=7$，对角线 $AC$ 的长为\underline{\hspace{28mm}}。
        answer: "$2\\sqrt3$ 或 $\\sqrt{13}$"

      - type: "problem"
        id: "q20"
        stem_latex: >-
          （原第20题）如图，在 $\triangle ABC$ 中，$D$ 是边 $BC$ 的中点，点 $P,E$ 分别在线段 $AD$ 及其延长线上，$DE=DP$，连接 $BP,CP,BE,CE$。\par
