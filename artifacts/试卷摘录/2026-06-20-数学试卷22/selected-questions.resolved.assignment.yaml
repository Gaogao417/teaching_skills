    stem_latex: （原第9题）在平面直角坐标系 $xOy$ 中，若一次函数 $y=kx+2k+3\ (k\ne0)$ 对于除 $0$ 之外的任意实数
      $k$，其图象都经过一个定点 $A$，点 $A'$ 与点 $A$ 关于 $x$ 轴对称，则 $\triangle OAA'$ 的面积为\underline{\hspace{28mm}}。
    answer: $6$
  - type: fillin
    id: q11
    fillin_type: line
    stem_latex: （原第11题）若一元二次方程 $x^2-5x+a=0$ 无实数根，则一次函数 $y=(a-5)x+a$ 的图象不经过\underline{\hspace{28mm}}。
    answer: 第四象限
  - type: fillin
    id: q12
    fillin_type: line
    stem_latex: （原第12题）在平面直角坐标系中，若点 $A(3,0)$，点 $B(0,1)$，点 $P$ 在 $y$ 轴上，且三角形 $PAB$
      的面积为 $6$，则点 $P$ 的坐标为\underline{\hspace{36mm}}。
    answer: $(0,5)$ 或 $(0,-3)$
  - type: problem
    id: q13
    points: 4
    stem_latex: （原第13题）已知一次函数 $y_1=kx+b$ 与 $y_2=x+a$ 的图象如图所示，有下列结论：① $a<0$；② $b>0$；③
      关于 $x$ 的方程 $kx+b=x+a$ 的解为 $x=3$；④ 当 $x\le3$ 时，$y_2\ge y_1$。其中正确的结论有\underline{\hspace{18mm}}个。
    answer: $3$
