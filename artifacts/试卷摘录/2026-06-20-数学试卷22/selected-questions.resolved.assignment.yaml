  - type: choice
    id: q3
    stem_latex: （原第3题）若一个四边形顶点的横坐标变为原来的相反数，而纵坐标不变，此时图形位置也不变，则这个四边形不可能是（\quad）。
    choices:
      A: 矩形
      B: 直角梯形
      C: 正方形
      D: 菱形
    answer: B
  - type: choice
    id: q4
    stem_latex: （原第4题）在四边形 $ABCD$ 中，$AD\parallel BC$，$AC,BD$ 交于点 $O$，下列说法错误的是（\quad）。
    choices:
      A: 如果 $AB=CD$，$\angle ABC=\angle BAD$，那么四边形 $ABCD$ 是矩形
      B: 如果 $AB=CD$，$AC=BD$，那么四边形 $ABCD$ 是矩形
      C: 如果 $OB=OD$，$AC\perp BD$，那么四边形 $ABCD$ 是菱形
      D: 如果 $AD=BC$，$\angle ABD=\angle CBD$，那么四边形 $ABCD$ 是菱形
    answer: B
  - type: choice
    id: q5
    stem_latex: （原第5题）如图，在矩形 $ABCD$ 中，$\angle BAD$ 的平分线 $AE$ 交 $BC$ 于点 $E$，且 $AD=\sqrt{2}AB$，$DH\perp
      AE$ 于点 $H$，连接 $BH$ 并延长，交 $CD$ 于点 $F$，连接 $DE$。下列结论：① $BC=\sqrt{2}AB$；② $\angle
      AHD=\angle CED$；③ $DH=BF$；④ $DC=2BH+CF$。其中正确的有（\quad）。
    choices:
      A: 1个
      B: 2个
      C: 3个
      D: 4个
    answer: D
