meta:
  title: "函数求点坐标条件专题：对称点与中点条件"
  subtitle: "学生讲义"
  grade: "八年级"
  subject: "数学"
  version: "student"
  source_artifacts:
    structure_analysis: "artifacts/函数求点坐标条件专题/05-对称点与中点条件/01-structure-analysis.md"

render:
  template: "exam-zh-explanation"
  paper_size: "a4paper"

sections:
  - id: "symmetry-midpoint"
    title: "模型五：对称与中点把条件翻译成坐标"
    show_title: true
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "solution"
        id: "symmetry-midpoint-knowledge"
        title: "核心结论：横纵坐标分开处理"
        items:
          - latex: "关于 $x$ 轴对称：$(x,y)\\to(x,-y)$。"
          - latex: "关于 $y$ 轴对称：$(x,y)\\to(-x,y)$。"
          - latex: "关于原点对称：$(x,y)\\to(-x,-y)$。"
          - latex: "中点 $M$ 的坐标满足 $x_M=\\dfrac{x_1+x_2}{2}$，$y_M=\\dfrac{y_1+y_2}{2}$。"

      - type: "problemcard"
        id: "ex1-card"
        label: "例题 1"
        stem_latex: |
          点 $A(3,-4)$ 关于 $y$ 轴的对称点为 $B$，点 $B$ 关于原点的对称点为 $C$。
          求点 $B$、$C$ 的坐标。

      - type: "route"
        id: "ex1-route"
        steps:
          - id: "ex1-b"
            latex: "关于 $y$ 轴求 $B$"
            content_latex: "关于 $y$ 轴对称，横坐标相反，纵坐标不变，所以 $B(-3,-4)$。"
          - id: "ex1-c"
            latex: "关于原点求 $C$"
            content_latex: "关于原点对称，横、纵坐标都相反，所以 $C(3,4)$。"

      - type: "dual_explanation"
        id: "ex1-solution"
        label: "例题 1"
        stem_latex: "连续使用对称条件求点坐标。"
        side_title: "小贴士"
        side_items:
          - kind: "hint"
            title: "不要背乱"
            content_latex: "关于 $y$ 轴对称时，点左右翻过去，所以变横坐标。"
          - kind: "mistake"
            title: "第二步的源点"
            content_latex: "求 $C$ 时源点是 $B$，不是最初的 $A$。"
        solution_title: "解答"
        solution_step_ids:
          - "ex1-b"
          - "ex1-c"

      - type: "problemcard"
        id: "ex2-card"
        label: "例题 2"
        stem_latex: |
          点 $A(a,4)$ 在一次函数 $y=2x-2$ 的图像上。点 $B$ 与点 $A$ 关于 $x$ 轴对称，点 $C$ 是 $A$、$B$ 的中点。
          求点 $C$ 的坐标。

      - type: "route"
        id: "ex2-route"
        steps:
          - id: "ex2-a"
            latex: "先由函数求 $A$"
            content_latex: "将 $A(a,4)$ 代入 $y=2x-2$，得 $4=2a-2$，所以 $a=3$，$A(3,4)$。"
          - id: "ex2-b"
            latex: "再求对称点 $B$"
            content_latex: "关于 $x$ 轴对称，横坐标不变，纵坐标相反，所以 $B(3,-4)$。"
          - id: "ex2-c"
            latex: "最后求中点 $C$"
            content_latex: "$C\\left(\\dfrac{3+3}{2},\\dfrac{4+(-4)}{2}\\right)=(3,0)$。"

      - type: "dual_explanation"
        id: "ex2-solution"
        label: "例题 2"
        stem_latex: "先由函数确定源点，再接对称与中点。"
        side_title: "小贴士"
        side_items:
          - kind: "hint"
            title: "条件顺序"
            content_latex: "$A$ 还没确定时，不能直接求 $B$ 和 $C$。"
          - kind: "hint"
            title: "中点看平均"
            content_latex: "求中点时横坐标平均、纵坐标平均，两个方向分开算。"
        solution_title: "解答"
        solution_step_ids:
          - "ex2-a"
          - "ex2-b"
          - "ex2-c"

      - type: "mistake"
        id: "symmetry-midpoint-mistake"
        title: "易错提醒"
        content_latex: |
          对称题先问“关于谁对称”：关于 $x$ 轴变纵坐标，关于 $y$ 轴变横坐标，关于原点两个都变。中点反求端点时要列平均关系，不能把中点坐标再除以 $2$。

      - type: "method_reminder"
        id: "symmetry-midpoint-method"
        title: "方法提醒"
        items:
          - latex: "先确定源点，再处理对称或中点。"
          - latex: "横坐标关系和纵坐标关系分开写。"
          - latex: "最后用变号规则或平均关系回代检查。"
