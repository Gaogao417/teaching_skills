meta:
  title: "函数求点坐标条件专题：对称点与中点条件"
  subtitle: "学生版"
  grade: "八年级"
  subject: "数学"
  duration: "20分钟"
  total_points: 30
  version: "student"
  source_artifacts:
    structure_analysis: "artifacts/函数求点坐标条件专题/05-对称点与中点条件/01-structure-analysis.md"
    explanation: "artifacts/函数求点坐标条件专题/05-对称点与中点条件/02-student-explanation.assignment.yaml"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "practice"
    title: "一、核心练习（每题 10 分，共 30 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "q1"
        points: 10
        stem_latex: |
          点 $A(3,-4)$ 关于 $y$ 轴的对称点为 $B$，点 $B$ 关于原点的对称点为 $C$。
          求点 $B$、$C$ 的坐标。
        hints:
          - content: "关于 $y$ 轴对称变横坐标，关于原点对称两个坐标都变。"
        answer_space:
          type: "steps"
          height: "35mm"
          step_count: 3

      - type: "problem"
        id: "q2"
        points: 10
        stem_latex: |
          已知点 $A(-2,5)$，点 $B$ 与点 $A$ 的中点是 $M(1,2)$。
          求点 $B$ 的坐标。
        hints:
          - content: "中点的横坐标、纵坐标分别是两端点坐标的平均数。"
        answer_space:
          type: "steps"
          height: "35mm"
          step_count: 4

      - type: "problem"
        id: "q3"
        points: 10
        stem_latex: |
          点 $A(a,4)$ 在一次函数 $y=2x-2$ 的图像上。点 $B$ 与点 $A$ 关于 $x$ 轴对称，点 $C$ 是 $A$、$B$ 的中点。
          求点 $C$ 的坐标。
        hints:
          - content: "先由函数图像求 $a$，再处理对称和中点。"
        answer_space:
          type: "steps"
          height: "44mm"
          step_count: 5
