meta:
  title: "函数求点坐标条件专题 2：函数与坐标轴交点"
  subtitle: "自适应练习教师版"
  grade: "八年级"
  subject: "数学"
  duration: "20分钟"
  total_points: 30
  version: "teacher"
  source_artifacts:
    structure_analysis: "artifacts/函数求点坐标条件专题/02-函数与坐标轴交点/01-structure-analysis.md"
    explanation: "artifacts/函数求点坐标条件专题/02-函数与坐标轴交点/02-student-explanation.assignment.yaml"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "problems"
    title: "练习题（每题 10 分，共 30 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "p1"
        points: 10
        label: "第 1 题"
        stem_latex: |
          一次函数 $y=-2x+6$ 的图像分别与 $x$ 轴、$y$ 轴交于点 $A,B$。求点 $A,B$ 的坐标。
        hints:
          - content: "与 $x$ 轴交点令 $y=0$，与 $y$ 轴交点令 $x=0$。"
        answer_space:
          type: "steps"
          height: "38mm"
          step_count: 3
        answer: "$A(3,0)$，$B(0,6)$。"
        explanation: "坐标轴交点给零坐标条件：$x$ 轴上 $y=0$，$y$ 轴上 $x=0$。"
        solution_steps:
          - title: "求 $x$ 轴交点"
            content: "令 $y=0$，得 $0=-2x+6$，解得 $x=3$，所以 $A(3,0)$。"
          - title: "求 $y$ 轴交点"
            content: "令 $x=0$，得 $y=6$，所以 $B(0,6)$。"
        teaching:
          teaching_goal: "训练坐标轴交点的零坐标条件。"
          source_relations:
            - "linear_function_intercepts"
          model_fusion:
            model_count: 1
            models:
              - "linear_function_intercepts"
            fusion_role: "single_model"
          relation_chain:
            - step: 1
              relation_id: "linear_function_intercepts"
              inputs:
                L: "LinearFunction y=-2x+6"
              outputs:
                x_intercept: "Point2D A(3,0)"
                y_intercept: "Point2D B(0,6)"
              constraints_checked:
                - "求 x 轴交点时斜率 k 不为 0"
                - "y 轴交点由 x=0 得到"
          expected_blocker: "把两条轴对应的零坐标记反。"
          entry_point: "find_entry"
          scaffold_level: "high"
          variation_depth: "same_structure"
          complexity_note: "两次代入，数值为整数。"
          upgrade_rule: "能说明为什么 $x$ 轴交点令 $y=0$。"
          fallback_move: "先写 $x$ 轴点 $(a,0)$、$y$ 轴点 $(0,b)$。"

      - type: "problem"
        id: "p2"
        points: 10
        label: "第 2 题"
        stem_latex: |
          一次函数 $y=kx+b$ 的图像与 $x$ 轴交于 $A(-2,0)$，与 $y$ 轴交于 $B(0,3)$。求这个一次函数的解析式。
        hints:
          - content: "先由 $B(0,3)$ 读出 $b$，再把 $A(-2,0)$ 代入。"
        answer_space:
          type: "steps"
          height: "42mm"
          step_count: 4
        answer: "$y=\\dfrac32x+3$。"
        explanation: "由 $y$ 轴截距可先确定 $b$，再用 $x$ 轴交点求 $k$。"
        solution_steps:
          - title: "确定 $b$"
            content: "$B(0,3)$ 在图像上，代入 $y=kx+b$ 得 $b=3$。"
          - title: "求 $k$"
            content: "$A(-2,0)$ 在图像上，代入 $y=kx+3$ 得 $0=-2k+3$，所以 $k=\\dfrac32$。"
          - title: "写解析式"
            content: "一次函数为 $y=\\dfrac32x+3$。"
        teaching:
          teaching_goal: "训练由截距点反求一次函数参数。"
          source_relations:
            - "linear_function_intercepts"
            - "two_points_determine_linear_function"
          model_fusion:
            model_count: 2
            models:
              - "linear_function_intercepts"
              - "linear_function_determination"
            fusion_role: "target_transform"
          relation_chain:
            - step: 1
              relation_id: "linear_function_intercepts"
              inputs:
                L: "unknown LinearFunction y=kx+b"
              outputs:
                x_intercept: "Point2D A(-2,0)"
                y_intercept: "Point2D B(0,3)"
              constraints_checked:
                - "两个截距点均在函数图像上"
            - step: 2
              relation_id: "two_points_determine_linear_function"
              consumes:
                P: "step1.outputs.x_intercept"
                Q: "step1.outputs.y_intercept"
              outputs:
                L: "LinearFunction y=3/2 x+3"
              constraints_checked:
                - "两个点横坐标不同"
          expected_blocker: "没有先利用 $B(0,3)$ 直接读出 $b$。"
          entry_point: "build_relation"
          scaffold_level: "medium"
          variation_depth: "changed_question"
          complexity_note: "只出现一个简单分数。"
          upgrade_rule: "能把截距点代回解析式。"
          fallback_move: "先代入 $B(0,3)$。"

      - type: "problem"
        id: "p3"
        points: 10
        label: "第 3 题"
        stem_latex: |
          已知直线 $l:y=-2x+6$ 与 $x$ 轴交于点 $A$，与 $y$ 轴交于点 $B$。点 $P$ 在直线 $y=x+1$ 上，且点 $P$ 的横坐标等于点 $A$ 的横坐标；点 $Q$ 在直线 $y=-x+8$ 上，且点 $Q$ 的纵坐标等于点 $B$ 的纵坐标。求点 $P,Q$ 的坐标。
        hints:
          - content: "先求 $A,B$，再把截距坐标当作后续求点的条件。"
        answer_space:
          type: "steps"
          height: "52mm"
          step_count: 5
        answer: "$P(3,4)$，$Q(2,6)$。"
        explanation: "本题把截距作为后续求点条件：$A$ 的横坐标传给 $P$，$B$ 的纵坐标传给 $Q$。"
        solution_steps:
          - title: "求截距"
            content: "$l:y=-2x+6$ 与 $x$ 轴交于 $A(3,0)$，与 $y$ 轴交于 $B(0,6)$。"
          - title: "求 $P$"
            content: "$x_P=3$，代入 $y=x+1$，得 $y_P=4$，所以 $P(3,4)$。"
          - title: "求 $Q$"
            content: "$y_Q=6$，代入 $y=-x+8$，得 $6=-x+8$，解得 $x=2$，所以 $Q(2,6)$。"
        teaching:
          teaching_goal: "训练截距坐标作为后续求点条件的传递链。"
          source_relations:
            - "linear_function_intercepts"
            - "axis_intercept_coordinate_transfer_to_function_point"
          model_fusion:
            model_count: 2
            models:
              - "linear_function_intercepts"
              - "function_coordinate_conditions"
            fusion_role: "prerequisite"
          relation_chain:
            - step: 1
              relation_id: "linear_function_intercepts"
              inputs:
                L: "LinearFunction y=-2x+6"
              outputs:
                x_intercept: "Point2D A(3,0)"
                y_intercept: "Point2D B(0,6)"
              constraints_checked:
                - "先求出可传递的截距坐标"
            - step: 2
              relation_id: "axis_intercept_coordinate_transfer_to_function_point"
              consumes:
                intercept_point: "step1.outputs.x_intercept"
              inputs:
                target_locus: "LinearFunction y=x+1"
                transfer_condition: "横坐标等于 A 的横坐标"
              outputs:
                candidate_points: "CandidateSet<Point2D>: P(3,4)"
              selector: "题干指定唯一横坐标，得到单点"
              constraints_checked:
                - "明确传递的是横坐标"
            - step: 3
              relation_id: "axis_intercept_coordinate_transfer_to_function_point"
              consumes:
                intercept_point: "step1.outputs.y_intercept"
              inputs:
                target_locus: "LinearFunction y=-x+8"
                transfer_condition: "纵坐标等于 B 的纵坐标"
              outputs:
                candidate_points: "CandidateSet<Point2D>: Q(2,6)"
              selector: "题干指定唯一纵坐标，得到单点"
              constraints_checked:
                - "明确传递的是纵坐标"
          expected_blocker: "求出 $A,B$ 后不知道哪个坐标传给哪个点。"
          entry_point: "transfer"
          scaffold_level: "medium"
          variation_depth: "packaged_condition"
          complexity_note: "两个后续点各代入一次。"
          upgrade_rule: "能在题干中圈出横坐标/纵坐标传递词。"
          fallback_move: "先把 $A(3,0)$、$B(0,6)$ 写在旁边。"

  - id: "answer-key"
    title: "参考答案"
    type: "answer_key"
    visibility: "teacher"
    layout:
      break_before: true
    blocks:
      - type: "step"
        id: "ak-main"
        title: "答案汇总"
        content: |
          第 1 题：$A(3,0)$，$B(0,6)$。

          第 2 题：$y=\dfrac32x+3$。

          第 3 题：$P(3,4)$，$Q(2,6)$。
