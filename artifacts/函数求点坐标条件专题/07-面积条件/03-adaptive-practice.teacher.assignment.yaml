  title: "函数求点坐标条件专题 07 · 面积条件"
  subtitle: "教师版"
  grade: "八年级"
  subject: "数学"
  duration: "20分钟"
  total_points: 30
  version: "teacher"
  source_artifacts:
    structure_analysis: "artifacts/函数求点坐标条件专题/07-面积条件/01-structure-analysis.md"
    explanation: "artifacts/函数求点坐标条件专题/07-面积条件/02-student-explanation.assignment.yaml"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
