meta:
  title: "函数求点坐标条件专题 1：新定义特殊点"
  subtitle: "学生讲义"
  grade: "八年级"
  subject: "数学"
  version: "student"
  source_artifacts:
    structure_analysis: "artifacts/函数求点坐标条件专题/01-新定义特殊点/01-structure-analysis.md"

render:
  template: "exam-zh-explanation"
  paper_size: "a4paper"

sections:
  - id: "model-special-definition"
    title: "模型一：新定义特殊点与坐标约束"
    show_title: true
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "solution"
        id: "special-definition-knowledge"
        title: "核心结论：先翻译定义，再联立函数"
        items:
          - latex: '\textbf{新定义不是新公式：} 先把题干中的定义翻译成 $x,y$ 的关系。'
          - latex: '\textbf{函数条件：} 点 $P(x,y)$ 在 $y=kx+b$ 上，就有 $y=kx+b$。'
          - latex: '\textbf{筛选检查：} 若有象限、正负、范围条件，最后用它筛掉不合格候选点。'
          - latex: '\textbf{常见距离：} 点 $(x,y)$ 到 $x$ 轴距离是 $|y|$，到 $y$ 轴距离是 $|x|$。'

      - type: "problemcard"
        id: "example-1"
        label: "例题 1"
        stem_latex: |
          我们把到 $x$ 轴和到 $y$ 轴距离相等的点叫做“等轴点”。点 $P(x,y)$ 在一次函数 $y=2x-3$ 的图像上，且 $P$ 是第一象限内的等轴点。求点 $P$ 的坐标。

      - type: "route"
        id: "route-example-1"
        steps:
          - id: "ex1-translate"
            latex: "翻译等轴点"
            content_latex: "第一象限内 $x>0,y>0$，由 $|x|=|y|$ 得 $x=y$。"
          - id: "ex1-link-function"
            latex: "联立函数条件"
            content_latex: "点在 $y=2x-3$ 上，所以 $y=2x-3$。与 $x=y$ 联立，得 $x=2x-3$。"
          - id: "ex1-solve-check"
            latex: "求坐标并验算"
            content_latex: "解得 $x=3$，所以 $y=3$，点 $P(3,3)$。代入函数和定义均成立。"

      - type: "dual_explanation"
        id: "solution-example-1"
        label: "例题 1"
        stem_latex: "求第一象限内等轴点 $P$ 的坐标。"
        side_title: "小贴士"
        side_items:
          - kind: "hint"
            title: "先读定义"
            content_latex: "看到“叫做”类新定义，先问：它限制的是 $x,y$ 的哪一个关系？"
          - kind: "mistake"
            title: "绝对值别漏"
            content_latex: "到坐标轴的距离永远非负，不能把到 $x$ 轴距离写成 $y$。"
          - kind: "hint"
            title: "象限的作用"
            content_latex: "第一象限把 $|x|=|y|$ 简化成 $x=y$；没有象限时要保留分支。"
        solution_title: "解答"
        solution_step_ids:
          - "ex1-translate"
          - "ex1-link-function"
          - "ex1-solve-check"

      - type: "problemcard"
        id: "example-2"
        label: "例题 2"
        stem_latex: |
          对一次函数 $y=ax+2$，若它的图像上横坐标为 $2$ 的点是等轴点，则称 $a$ 为这个函数的“等轴参数”。求所有等轴参数 $a$，并写出对应点所在的象限。

      - type: "route"
        id: "route-example-2"
        steps:
          - id: "ex2-param-point"
            latex: "先表示点"
            content_latex: "横坐标为 $2$，代入 $y=ax+2$，得到点 $(2,2a+2)$。"
          - id: "ex2-definition"
            latex: "列定义方程"
            content_latex: "等轴点满足 $|2|=|2a+2|$，即 $|2a+2|=2$。"
          - id: "ex2-branch"
            latex: "分支求参数"
            content_latex: "由 $2a+2=2$ 得 $a=0$；由 $2a+2=-2$ 得 $a=-2$。"
          - id: "ex2-check"
            latex: "回代判断象限"
            content_latex: "$a=0$ 时点为 $(2,2)$，在第一象限；$a=-2$ 时点为 $(2,-2)$，在第四象限。"

      - type: "dual_explanation"
        id: "solution-example-2"
        label: "例题 2"
        stem_latex: "求所有等轴参数 $a$。"
        side_title: "小贴士"
        side_items:
          - kind: "hint"
            title: "参数题第一步"
            content_latex: "先把待研究的点坐标写成含参数的形式，再使用定义。"
          - kind: "mistake"
            title: "两个分支"
            content_latex: "$|2a+2|=2$ 有正负两个分支，只写一个会漏解。"
        solution_title: "解答"
        solution_step_ids:
          - "ex2-param-point"
          - "ex2-definition"
          - "ex2-branch"
          - "ex2-check"

      - type: "mistake"
        id: "special-definition-mistake"
        title: "易错提醒"
        content_latex: |
          “特殊点”这类新定义题最容易错在两处：一是没有把定义翻译成坐标关系，二是绝对值方程只解一个分支。若题目没有给足筛选条件，答案应保留所有候选点。

      - type: "method_reminder"
        id: "special-definition-method"
        title: "方法提醒"
        items:
          - latex: "第一行写定义条件，第二行写函数条件，第三行写筛选条件。"
          - latex: "含参题先把点坐标表示出来，再代入定义。"
          - latex: "最后必须把候选点代回定义和函数图像验算。"
