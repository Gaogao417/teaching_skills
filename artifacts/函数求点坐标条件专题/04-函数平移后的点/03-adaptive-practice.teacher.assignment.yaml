meta:
  title: "函数求点坐标条件专题：函数平移后的点"
  subtitle: "教师版"
  grade: "八年级"
  subject: "数学"
  duration: "20分钟"
  total_points: 30
  version: "teacher"
  source_artifacts:
    structure_analysis: "artifacts/函数求点坐标条件专题/04-函数平移后的点/01-structure-analysis.md"
    explanation: "artifacts/函数求点坐标条件专题/04-函数平移后的点/02-student-explanation.assignment.yaml"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "practice"
    title: "一、核心练习（每题 10 分，共 30 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q1"
        points: 10
        stem_latex: |
          将一次函数 $y=2x-3$ 的图像向上平移 $5$ 个单位，得到直线 $l$。
          求直线 $l$ 与 $y$ 轴的交点坐标。
        hints:
          - content: "向上平移只改变常数项，不改变斜率。"
        answer_space:
          type: "steps"
          height: "32mm"
          step_count: 3
        answer: "$(0,2)$"
        explanation: "向上平移 $5$ 个单位，解析式变为 $y=2x+2$，令 $x=0$ 得交点为 $(0,2)$。"
        solution_steps:
          - title: "写平移后的解析式"
            content: "$y=2x-3$ 向上平移 $5$ 个单位，得到 $l:y=2x+2$。"
          - title: "求与y轴交点"
            content: "与 $y$ 轴交点的横坐标为 $0$，代入得 $y=2$，所以交点为 $(0,2)$。"
        teaching:
          teaching_goal: "训练把“向上平移”转成常数项增加，并用截距点读坐标。"
          source_relations: ["function_translation_shift_to_linear_function", "translated_function_point_condition", "linear_function_intercepts"]
          model_fusion:
            model_count: 2
            models: ["function_coordinate_conditions", "linear_function_intercepts"]
            fusion_role: "target_transform"
          expected_blocker: "把平移误认为改变斜率，或忘记与 $y$ 轴交点要令 $x=0$。"
          entry_point: "find_entry"
          scaffold_level: "high"
          variation_depth: "changed_numbers"
          complexity_note: "只涉及整数平移和一次代入。"
          upgrade_rule: "能主动说出斜率不变、常数项改变。"
          fallback_move: "先写平移后的直线，再求交轴点。"

      - type: "problem"
        id: "q2"
        points: 10
        stem_latex: |
          一次函数 $y=-x+b$ 的图像向右平移 $3$ 个单位后，所得直线经过点 $A(5,1)$。
          求原函数的解析式。
        hints:
          - content: "先写出向右平移后的解析式，再代入点 $A$。"
        answer_space:
          type: "steps"
          height: "38mm"
          step_count: 4
        answer: "$y=-x+3$"
        explanation: "向右平移 $3$ 个单位后，$y=-(x-3)+b=-x+b+3$。代入 $(5,1)$ 得 $1=-5+b+3$，所以 $b=3$。"
        solution_steps:
          - title: "写平移后的解析式"
            content: "向右平移 $3$ 个单位，把 $x$ 换成 $x-3$，得 $y=-(x-3)+b=-x+b+3$。"
          - title: "代入经过的点"
            content: "点 $A(5,1)$ 在平移后的直线上，所以 $1=-5+b+3$。"
          - title: "求原函数"
            content: "解得 $b=3$，原函数为 $y=-x+3$。"
        teaching:
          teaching_goal: "训练“平移后经过某点”要先写新直线，再反求原参数。"
          source_relations: ["function_translation_shift_to_linear_function", "translated_function_point_condition"]
          model_fusion:
            model_count: 1
            models: ["function_coordinate_conditions"]
            fusion_role: "target_transform"
          expected_blocker: "直接把点代入原函数，忽略点在平移后的图像上。"
          entry_point: "build_relation"
          scaffold_level: "medium"
          variation_depth: "reverse_construct"
          complexity_note: "只含一个参数，方程为一次方程。"
          upgrade_rule: "能区分原函数与平移后的函数。"
          fallback_move: "圈出“平移后”“经过点”两个条件。"

      - type: "problem"
        id: "q3"
        points: 10
        stem_latex: |
          直线 $l: y=kx+2$ 向下平移 $4$ 个单位后得到直线 $m$。已知 $m$ 经过点 $P(3,1)$，且与 $x$ 轴交于点 $B$。
          求点 $B$ 的坐标。
        hints:
          - content: "平移后斜率仍是 $k$，先用点 $P$ 求出 $k$。"
        answer_space:
          type: "steps"
          height: "42mm"
          step_count: 5
        answer: "$B(2,0)$"
        explanation: "平移后 $m:y=kx-2$，代入 $P(3,1)$ 得 $1=3k-2$，所以 $k=1$。令 $y=0$，得 $x=2$，所以 $B(2,0)$。"
        solution_steps:
          - title: "写平移后的直线"
            content: "$l:y=kx+2$ 向下平移 $4$ 个单位，得到 $m:y=kx-2$。"
          - title: "用经过点求k"
            content: "将 $P(3,1)$ 代入 $m$，得 $1=3k-2$，所以 $k=1$。"
          - title: "求x轴交点"
            content: "$m:y=x-2$。与 $x$ 轴交点满足 $y=0$，所以 $0=x-2$，得 $x=2$。"
          - title: "写点坐标"
            content: "因此 $B(2,0)$。"
        teaching:
          teaching_goal: "训练平移、斜率不变、过点求参、交轴求点的条件组合。"
          source_relations: ["function_translation_shift_to_linear_function", "translated_function_point_condition", "linear_function_intercepts"]
          model_fusion:
            model_count: 2
            models: ["function_coordinate_conditions", "linear_function_intercepts"]
            fusion_role: "target_transform"
          expected_blocker: "知道平移但不会把过点条件和交轴条件按顺序串起来。"
          entry_point: "solve_and_check"
          scaffold_level: "medium"
          variation_depth: "packaged_condition"
          complexity_note: "出现简单分数，重点仍是条件顺序。"
          upgrade_rule: "能先求直线再求点，不在题面条件间跳步。"
          fallback_move: "分三行写：平移后解析式、代入点、令 $y=0$。"

  - id: "answer-key"
    title: "答案速查"
    type: "answer_key"
    visibility: "teacher"
    layout:
      break_before: true
    blocks:
      - type: "answers"
        id: "answers-main"
        items:
          - number: "1"
            answer: "$(0,2)$"
          - number: "2"
            answer: "$y=-x+3$"
          - number: "3"
            answer: "$B(2,0)$"
