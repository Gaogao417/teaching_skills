sections:
  - id: "isosceles-perpendicular-practice"
    title: "一、等腰与垂直条件怎么给坐标"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "q1"
        points: 10
        stem_latex: |
          已知 $A(0,0)$，$B(5,0)$，点 $P$ 在直线 $y=3$ 上。
          若 $\triangle ABP$ 是等腰三角形，求所有可能的点 $P$，并说明对应哪两条边相等。
        hints:
          - content: "等腰要分三类：$PA=PB$，$PA=AB$，$PB=AB$。"
        answer_space:
          type: "steps"
          height: "62mm"
          step_count: 6
        answer: "$P\\left(\\dfrac52,3\\right)$，此时 $PA=PB$；$P(4,3)$ 或 $P(-4,3)$，此时 $PA=AB$；$P(1,3)$ 或 $P(9,3)$，此时 $PB=AB$。"
        explanation: "等腰条件在坐标题中就是距离相等，但必须先分类，不能默认只有腰在两侧。"
        solution_steps:
          - title: "设点并写距离平方"
            content: "设 $P(t,3)$。则 $PA^2=t^2+9$，$PB^2=(t-5)^2+9$，$AB^2=25$。"
          - title: "第一类：$PA=PB$"
            content: "$t^2+9=(t-5)^2+9$，解得 $t=\\dfrac52$，所以 $P\\left(\\dfrac52,3\\right)$。"
          - title: "第二类：$PA=AB$"
            content: "$t^2+9=25$，解得 $t=4$ 或 $t=-4$，所以 $P(4,3)$ 或 $P(-4,3)$。"
          - title: "第三类：$PB=AB$"
            content: "$(t-5)^2+9=25$，解得 $t=1$ 或 $t=9$，所以 $P(1,3)$ 或 $P(9,3)$。"
        teaching:
          teaching_goal: "训练等腰条件的三类距离方程。"
          source_relations:
            - "needs_review:isosceles_point_on_linear_locus_by_distance"
          model_fusion:
            model_count: 1
            models:
              - "等腰三角形距离相等"
            fusion_role: "single_model"
          expected_blocker: "只做 $PA=PB$，漏掉 $PA=AB$ 与 $PB=AB$。"
          entry_point: "find_entry"
          scaffold_level: "medium"
          variation_depth: "same_structure"
          complexity_note: "三个一元二次方程都可直接开方。"
          upgrade_rule: "能先列分类表再算。"
          fallback_move: "先写三种相等关系，不急着解。"

      - type: "problem"
        id: "q2"
        points: 10
        stem_latex: |
          已知 $A(0,2)$，$B(4,0)$，点 $P$ 在一次函数 $y=x$ 的图像上。
          若 $AP\perp BP$，求点 $P$ 的坐标。
        hints:
          - content: "设 $P(t,t)$，可以用两条线段的斜率乘积为 $-1$，也可以用向量数量积为 $0$。"
        answer_space:
          type: "steps"
          height: "44mm"
          step_count: 4
        answer: "$P(0,0)$ 或 $P(3,3)$"
        explanation: "垂直条件可用斜率，也可用横竖结构或数量积；本题用数量积可避开竖直线斜率不存在。"
        solution_steps:
          - title: "设函数图像上的点"
            content: "设 $P(t,t)$。"
          - title: "写垂直条件"
            content: "$\\overrightarrow{PA}=(-t,2-t)$，$\\overrightarrow{PB}=(4-t,-t)$。垂直时数量积为 $0$。"
          - title: "列方程并求解"
            content: "$(-t)(4-t)+(2-t)(-t)=0$，化简得 $2t^2-6t=0$，所以 $t=0$ 或 $t=3$。"
          - title: "写坐标"
            content: "$P(0,0)$ 或 $P(3,3)$。其中 $P(0,0)$ 时一条线竖直、一条线水平，也满足垂直。"
        teaching:
          teaching_goal: "训练垂直条件在坐标中的方程化，兼顾斜率特殊情况。"
          source_relations:
            - "point_on_linear_function_forward"
            - "needs_review:perpendicular_point_on_linear_locus_by_dot_product"
          model_fusion:
            model_count: 2
            models:
              - "一次函数图像上点"
              - "垂直条件"
            fusion_role: "target_transform"
          relation_chain:
            - step: 1
              relation_id: "point_on_linear_function_forward"
              inputs:
                function: "$y=x$"
              outputs:
                point: "$P(t,t)$"
              constraints_checked:
                - "点必须在函数图像上"
            - step: 2
              relation_id: "needs_review:perpendicular_point_on_linear_locus_by_dot_product"
              consumes:
                point: "step1.outputs.point"
              outputs:
                equation: "$2t^2-6t=0$"
              constraints_checked:
                - "数量积为 $0$ 等价于两线段垂直"
          expected_blocker: "用斜率时遇到竖直线就漏掉 $P(0,0)$。"
          entry_point: "build_relation"
          scaffold_level: "medium"
          variation_depth: "changed_representation"
          complexity_note: "二次方程可提公因式。"
          upgrade_rule: "能根据题形选择斜率法或数量积法。"
          fallback_move: "先写 $P(t,t)$，再写两个方向向量。"

      - type: "problem"
        id: "q3"
        points: 10
        stem_latex: |
          已知直线 $l_1:y=-\dfrac43x+4$ 与直线 $l_2:y=-\dfrac34x+4$ 交于点 $A$，直线 $l_1$ 与 $x$ 轴交于点 $B$。
          点 $P$ 在 $x$ 轴上，且 $AP\perp l_2$。求 $A,B,P$ 的坐标，并判断 $\triangle ABP$ 是否为等腰三角形。
        hints:
          - content: "先求交点和截距，再用垂直斜率找到过 $A$ 的直线。"
        answer_space:
          type: "steps"
          height: "58mm"
          step_count: 6
        answer: "$A(0,4)$，$B(3,0)$，$P(-3,0)$；$AB=AP=5$，所以 $\triangle ABP$ 是等腰三角形。"
        explanation: "综合题先从函数条件得到点，再把垂直条件转成新直线，最后用距离相等判断等腰。"
        solution_steps:
          - title: "求交点 $A$"
            content: "两条直线都有截距 $4$，且斜率不同，所以交点为 $A(0,4)$。"
          - title: "求截距点 $B$"
            content: "令 $y=0$，$0=-\\dfrac43x+4$，得 $x=3$，所以 $B(3,0)$。"
          - title: "用垂直条件求 $P$"
            content: "$l_2$ 的斜率为 $-\\dfrac34$，与它垂直的直线斜率为 $\\dfrac43$。过 $A(0,4)$ 的直线为 $y=\\dfrac43x+4$。令 $y=0$，得 $x=-3$，所以 $P(-3,0)$。"
          - title: "判断等腰"
            content: "$AB=\\sqrt{3^2+(-4)^2}=5$，$AP=\\sqrt{(-3)^2+(-4)^2}=5$，所以 $AB=AP$，$\\triangle ABP$ 是等腰三角形。"
        teaching:
          teaching_goal: "训练函数交点、垂直斜率和等腰距离判断的连续转化。"
          source_relations:
            - "intersection_of_two_linear_functions"
            - "linear_function_intercepts"
            - "needs_review:perpendicular_point_on_linear_locus_by_dot_product"
            - "needs_review:isosceles_point_on_linear_locus_by_distance"
          model_fusion:
            model_count: 3
            models:
              - "函数交点"
              - "垂直斜率"
              - "等腰距离相等"
            fusion_role: "verification"
          relation_chain:
            - step: 1
              relation_id: "intersection_of_two_linear_functions"
              inputs:
                lines: "$l_1,l_2$"
              outputs:
                point_A: "$A(0,4)$"
              constraints_checked:
                - "两直线斜率不同"
            - step: 2
              relation_id: "needs_review:perpendicular_point_on_linear_locus_by_dot_product"
              consumes:
                point_A: "step1.outputs.point_A"
              inputs:
                slope_l2: "$-\\dfrac34$"
              outputs:
                point_P: "$P(-3,0)$"
              constraints_checked:
                - "垂直斜率乘积为 $-1$"
            - step: 3
              relation_id: "needs_review:isosceles_point_on_linear_locus_by_distance"
              consumes:
                point_P: "step2.outputs.point_P"
              inputs:
                point_B: "$B(3,0)$"
              outputs:
                result: "$AB=AP=5$"
              constraints_checked:
                - "用距离公式判断等腰"
          expected_blocker: "先算点后忘记回到等腰条件验算。"
          entry_point: "transfer"
          scaffold_level: "medium"
          variation_depth: "packaged_condition"
          complexity_note: "斜率与距离都是 3-4-5 数组。"
          upgrade_rule: "能把函数条件得到的点继续送入几何条件。"
          fallback_move: "先分三步写：交点、垂直线、距离。"

  - id: "answer-key"
    title: "答案速查"
    type: "answer_key"
    visibility: "teacher"
    blocks:
      - type: "answers"
        id: "answers-main"
        items:
          - number: "1"
            answer: "$P\\left(\\dfrac52,3\\right)$；$P(4,3)$；$P(-4,3)$；$P(1,3)$；$P(9,3)$。"
          - number: "2"
            answer: "$P(0,0)$ 或 $P(3,3)$"
          - number: "3"
            answer: "$A(0,4)$，$B(3,0)$，$P(-3,0)$；$AB=AP=5$，是等腰三角形。"
