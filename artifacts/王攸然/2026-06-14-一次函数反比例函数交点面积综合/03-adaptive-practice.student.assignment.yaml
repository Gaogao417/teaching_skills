meta:
  title: "一次函数与反比例函数交点面积综合 · 练习"
  subtitle: "两题近迁移，两题只迁移面积第三问"
  grade: "八年级"
  subject: "数学"
  duration: "28分钟"
  total_points: 40
  version: "student"
  source_artifacts:
    structure_analysis: "artifacts/王攸然/2026-06-14-一次函数反比例函数交点面积综合/01-structure-analysis.md"
    explanation: "artifacts/王攸然/2026-06-14-一次函数反比例函数交点面积综合/02-student-explanation.assignment.yaml"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "problems"
    title: "练习题（每题 10 分，共 40 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "p1"
        points: 10
        label: "第 1 题（近迁移）"
        stem_latex: |
          已知一次函数 $y_1=kx+b$ 与反比例函数 $y_2=\dfrac{m}{x}$ 的图像交于点 $A,B$。已知：点 $A$ 的横坐标为 $3$，点 $B$ 的横坐标为 $-1$，一次函数图像与 $y$ 轴交于点 $C(0,-2)$。
          \begin{enumerate}[label=(\arabic*)]
            \item 求一次函数解析式、反比例函数解析式，以及点 $A,B$ 的坐标；
            \item 根据图像求不等式 $kx+b>\dfrac{m}{x}$ 的解集；
            \item 求 $\triangle OAB$ 的面积。
          \end{enumerate}
        diagram_col:
          image_path: "diagrams/p1.pdf"
          diagram_job_id: "practice-p1"
          width: "62mm"
          caption: "第 1 题图"
          variant: "prompt"
          disclosure_policy: "clean"
        hints:
          - content: "先由 $C(0,-2)$ 得到 $b$，再用两个交点在反比例函数上列 $xy$ 相等。"
        answer_space:
          type: "steps"
          height: "58mm"
      - type: "problem"
        id: "p2"
        points: 10
        label: "第 2 题（近迁移：给 $k,b$ 和一个交点横坐标）"
        stem_latex: |
          已知一次函数 $y_1=kx+b$ 与反比例函数 $y_2=\dfrac{m}{x}$ 的图像交于点 $A,B$。已知：$k=-1$，$b=5$，点 $A$ 的横坐标为 $1$。
          \begin{enumerate}[label=(\arabic*)]
            \item 求一次函数解析式、反比例函数解析式，以及点 $A,B$ 的坐标；
            \item 根据图像求不等式 $kx+b>\dfrac{m}{x}$ 的解集；
            \item 求 $\triangle OAB$ 的面积。
          \end{enumerate}
        diagram_col:
          image_path: "diagrams/p2.pdf"
          diagram_job_id: "practice-p2"
          width: "62mm"
          caption: "第 2 题图"
          variant: "prompt"
          disclosure_policy: "clean"
        hints:
          - content: "先由 $k,b$ 写出直线，再用点 $A$ 的横坐标求 $m$；另一个交点可由方程或根的关系求出。"
        answer_space:
          type: "steps"
          height: "58mm"
      - type: "problem"
        id: "p3"
        points: 10
        label: "第 3 题（远迁移：面积目标改变）"
        stem_latex: |
          已知一次函数 $y_1=kx+b$ 与反比例函数 $y_2=\dfrac{m}{x}$ 的图像交于点 $A,B$。已知：$b=1$，$m=6$，点 $A$ 的横坐标为 $2$。
          \begin{enumerate}[label=(\arabic*)]
            \item 求一次函数解析式、反比例函数解析式，以及点 $A,B$ 的坐标；
            \item 根据图像求不等式 $kx+b>\dfrac{m}{x}$ 的解集；
            \item 已知 $P(0,4)$，求 $\triangle PAB$ 的面积。
          \end{enumerate}
        diagram_col:
          image_path: "diagrams/p3.pdf"
          diagram_job_id: "practice-p3"
          width: "62mm"
          caption: "第 3 题图"
          variant: "prompt"
          disclosure_policy: "clean"
        hints:
          - content: "先用点 $A$ 同时在两条函数图像上求 $k$；第三问可用铅垂线法，看点 $P$ 到直线 $AB$ 在 $y$ 轴上的竖直距离。"
        answer_space:
          type: "steps"
          height: "62mm"
      - type: "problem"
        id: "p4"
        points: 10
        label: "第 4 题（远迁移：由面积反求点）"
        stem_latex: |
          已知一次函数 $y_1=kx+b$ 与反比例函数 $y_2=\dfrac{m}{x}$ 的图像交于点 $A,B$。已知：$k=-1$，$m=-2$，点 $A$ 的横坐标为 $1$。
          \begin{enumerate}[label=(\arabic*)]
            \item 求一次函数解析式、反比例函数解析式，以及点 $A,B$ 的坐标；
            \item 根据图像求不等式 $kx+b>\dfrac{m}{x}$ 的解集；
            \item 点 $P$ 在反比例函数第四象限分支上，且在点 $A$ 的右侧。若 $S_{\triangle PAB}=3$，求点 $P$ 的坐标。
          \end{enumerate}
        diagram_col:
          image_path: "diagrams/p4.pdf"
          diagram_job_id: "practice-p4"
          width: "62mm"
          caption: "第 4 题图"
          variant: "prompt"
          disclosure_policy: "clean"
        hints:
          - content: "先用点 $A$ 求出 $b$，再求另一个交点；设 $P(t,\\dfrac{m}{t})$，用过 $P$ 的铅垂线到直线 $AB$ 的距离列面积方程。"
        answer_space:
          type: "steps"
          height: "64mm"
