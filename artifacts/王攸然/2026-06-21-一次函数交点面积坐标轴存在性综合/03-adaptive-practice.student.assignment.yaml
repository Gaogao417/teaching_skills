meta:
  title: "一次函数交点、面积与坐标轴存在性综合"
  subtitle: "先求交点和函数，再把面积条件转成坐标方程"
  grade: "八年级"
  subject: "数学"
  duration: "30分钟"
  total_points: 30
  version: "student"
  source_artifacts:
    previous_assignment: "artifacts/王攸然/2026-06-14-一次函数反比例函数交点面积综合/03-adaptive-practice.teacher.assignment.yaml"
    structure_analysis: "artifacts/王攸然/2026-06-14-一次函数反比例函数交点面积综合/01-structure-analysis.md"
    explanation: "artifacts/王攸然/2026-06-14-一次函数反比例函数交点面积综合/02-student-explanation.assignment.yaml"
    question_bank: "documents/八年级/函数题库/数学试卷18-22_函数求点坐标题库.yaml"
    question_bank_item: "T19-Q19"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "problems"
    title: "练习题（每题 10 分，共 30 分）"
    type: "practice"
    visibility: "student"
    blocks:
      - type: "problem"
        id: "p1"
        points: 10
        label: "第 1 题"
        stem_latex: |
          如图意，一次函数 $y_1=x-2$ 的图像与 $y$ 轴交于点 $A$，一次函数 $y_2$ 的图像与 $y$ 轴交于点 $B(0,4)$，两函数图像交于点 $C$，且点 $C$ 的横坐标为 $3$。
          \par\noindent (1) 求点 $A,C$ 的坐标及一次函数 $y_2$ 的解析式；
          \par\noindent (2) 求 $\triangle ABC$ 的面积；
          \par\noindent (3) 在坐标轴上，是否存在一点 $P$，使得 $S_{\triangle AOP}=2S_{\triangle BCP}$？若存在，直接写出点 $P$ 的坐标；若不存在，说明理由。
        hints:
          - content: "先把交点横坐标代入已知直线，得到 $C$ 的完整坐标。"
          - content: "第 (3) 问先分 $P$ 在 $x$ 轴和 $y$ 轴两种情况。"
        diagram_slot:
          slot_id: "practice.student.p1.prompt"
          diagram_ref: "practice.student.p1.prompt"
          variant: "prompt"
          disclosure_policy: "clean"
          required: true
          on_failure: "fail_assignment"
          placement: "diagram_col"
          layout_role: "question_sidecar"
          display_profile: "worksheet_geometry_sidecar"
          caption: "第1题图"
          engine: "coordinate_renderer"
          diagram_kind: "coordinate_geometry"
          teaching_intent: "practice_prompt"
          semantic_constraints:
            given_objects: ["直线 y1=x-2", "直线 y2=-x+4", "点 A(0,-2)", "点 B(0,4)", "点 C(3,1)"]
            given_constraints: ["P 在坐标轴上，但不画出具体答案点"]
            clean_forbidden: ["不要画出 P 的具体位置", "不要标注面积答案"]
          visual_requirements: {show_labels: true, show_given_markers: true, show_axes: true, preferred_orientation: "landscape"}
          analytic_requirements:
            viewport: {x_min: -1, x_max: 7, y_min: -4, y_max: 6, preserve_aspect: false}
            axes: {x: true, y: true, grid: false, show_ticks: true, x_label: "x", y_label: "y"}
            objects:
              - type: "polyline"
                id: "line_y1"
                points: [[-1, -3], [7, 5]]
                style: {stroke: "#2563eb", stroke_width: 2.4}
              - type: "polyline"
                id: "line_y2"
                points: [[-1, 5], [7, -3]]
                style: {stroke: "#dc2626", stroke_width: 2.4}
              - type: "point"
                id: "A"
                x: 0
                y: -2
                label: "A"
              - type: "point"
                id: "B"
                x: 0
                y: 4
                label: "B"
              - type: "point"
                id: "C"
                x: 3
                y: 1
                label: "C"
        answer_space:
          type: "steps"
          height: "70mm"
          step_count: 5
        layout:
          avoid_break: true

      - type: "problem"
        id: "p2"
        points: 10
        label: "第 2 题"
        stem_latex: |
          已知一次函数 $y_1=kx+b$ 与反比例函数 $y_2=\dfrac{m}{x}$ 的图像交于点 $A,B$。已知：点 $A$ 的横坐标为 $3$，点 $B$ 的横坐标为 $-1$，一次函数图像与 $y$ 轴交于点 $C(0,-2)$。
          \par\noindent (1) 求一次函数解析式、反比例函数解析式，以及点 $A,B$ 的坐标；
          \par\noindent (2) 根据图像求不等式 $kx+b>\dfrac{m}{x}$ 的解集；
          \par\noindent (3) 点 $P$ 在 $x$ 轴上，若 $S_{\triangle AOP}=S_{\triangle PAB}$，求点 $P$ 的坐标。
        hints:
          - content: "先由 $C(0,-2)$ 得到 $b$，再用两个交点在反比例函数上列 $xy$ 相等。"
          - content: "第 (3) 问设 $P(t,0)$，把两个面积都写成含 $t$ 的式子。"
        diagram_slot:
          slot_id: "practice.student.p2.prompt"
          diagram_ref: "practice.student.p2.prompt"
          variant: "prompt"
          disclosure_policy: "clean"
          required: true
          on_failure: "fail_assignment"
          placement: "diagram_col"
          layout_role: "question_sidecar"
          display_profile: "worksheet_geometry_sidecar"
          caption: "第2题图"
          engine: "coordinate_renderer"
          diagram_kind: "coordinate_geometry"
          teaching_intent: "practice_prompt"
          semantic_constraints:
            given_objects: ["直线 y=x-2", "双曲线 y=3/x", "交点 A(3,1)", "交点 B(-1,-3)", "点 O(0,0)"]
            given_constraints: ["x=0 为反比例函数断点", "P 在 x 轴上但不画出具体答案点"]
            clean_forbidden: ["不要画出 P 的具体位置", "不要标注不等式解集或面积答案"]
          visual_requirements: {show_labels: true, show_given_markers: true, show_axes: true, preferred_orientation: "landscape"}
          analytic_requirements:
            viewport: {x_min: -4, x_max: 5, y_min: -6, y_max: 5, preserve_aspect: false}
            axes: {x: true, y: true, grid: false, show_ticks: true, x_label: "x", y_label: "y"}
            objects:
              - type: "polyline"
                id: "line"
                points: [[-3, -5], [5, 3]]
                style: {stroke: "#2563eb", stroke_width: 2.4}
              - type: "polyline"
                id: "hyperbola_left"
                points: [[-4, -0.75], [-3, -1], [-2, -1.5], [-1, -3], [-0.6, -5]]
                style: {stroke: "#dc2626", stroke_width: 2.4}
              - type: "polyline"
                id: "hyperbola_right"
                points: [[0.6, 5], [1, 3], [2, 1.5], [3, 1], [4, 0.75], [5, 0.6]]
                style: {stroke: "#dc2626", stroke_width: 2.4}
              - type: "point"
                id: "O"
                x: 0
                y: 0
                label: "O"
              - type: "point"
                id: "A"
                x: 3
                y: 1
                label: "A"
              - type: "point"
                id: "B"
                x: -1
                y: -3
                label: "B"
        answer_space:
          type: "steps"
          height: "72mm"
          step_count: 5
        layout:
          avoid_break: true

      - type: "problem"
        id: "p3"
        points: 10
        label: "第 3 题"
        stem_latex: |
          已知一次函数 $y_1=kx+b$ 与反比例函数 $y_2=\dfrac{m}{x}$ 的图像交于点 $A,B$。已知：$k=-1$，$m=-2$，点 $A$ 的横坐标为 $1$。
          \par\noindent (1) 求一次函数解析式、反比例函数解析式，以及点 $A,B$ 的坐标；
          \par\noindent (2) 根据图像求不等式 $kx+b>\dfrac{m}{x}$ 的解集；
          \par\noindent (3) 点 $P$ 在反比例函数第四象限分支上，且在点 $A$ 的右侧。若 $S_{\triangle PAB}=3$，求点 $P$ 的坐标。
        hints:
          - content: "先用点 $A$ 在反比例函数上求出 $A$ 的纵坐标，再代入一次函数求 $b$。"
          - content: "第 (3) 问设 $P(t,-\\dfrac2t)$，其中 $t>1$。"
        diagram_slot:
          slot_id: "practice.student.p3.prompt"
          diagram_ref: "practice.student.p3.prompt"
          variant: "prompt"
          disclosure_policy: "clean"
          required: true
          on_failure: "fail_assignment"
          placement: "diagram_col"
          layout_role: "question_sidecar"
          display_profile: "worksheet_geometry_sidecar"
          caption: "第3题图"
          engine: "coordinate_renderer"
          diagram_kind: "coordinate_geometry"
          teaching_intent: "practice_prompt"
          semantic_constraints:
            given_objects: ["直线 y=-x-1", "双曲线 y=-2/x", "交点 A(1,-2)", "交点 B(-2,1)", "点 O(0,0)"]
            given_constraints: ["x=0 为反比例函数断点", "P 在第四象限分支且在 A 的右侧，但不画出具体答案点"]
            clean_forbidden: ["不要画出 P 的具体位置", "不要标注面积答案"]
          visual_requirements: {show_labels: true, show_given_markers: true, show_axes: true, preferred_orientation: "landscape"}
          analytic_requirements:
            viewport: {x_min: -5, x_max: 5, y_min: -5, y_max: 5, preserve_aspect: false}
            axes: {x: true, y: true, grid: false, show_ticks: true, x_label: "x", y_label: "y"}
            objects:
              - type: "polyline"
                id: "line"
                points: [[-5, 4], [5, -6]]
                style: {stroke: "#2563eb", stroke_width: 2.4}
              - type: "polyline"
                id: "hyperbola_left"
                points: [[-5, 0.4], [-4, 0.5], [-2, 1], [-1, 2], [-0.5, 4]]
                style: {stroke: "#dc2626", stroke_width: 2.4}
              - type: "polyline"
                id: "hyperbola_right"
                points: [[0.5, -4], [1, -2], [2, -1], [4, -0.5], [5, -0.4]]
                style: {stroke: "#dc2626", stroke_width: 2.4}
              - type: "point"
                id: "O"
                x: 0
                y: 0
                label: "O"
              - type: "point"
                id: "A"
                x: 1
                y: -2
                label: "A"
              - type: "point"
                id: "B"
                x: -2
                y: 1
                label: "B"
        answer_space:
          type: "steps"
          height: "76mm"
          step_count: 5
        layout:
          avoid_break: true
