  - type: problem
    id: p2
    points: 10
    label: 第 2 题
    stem_latex: '已知一次函数 $y_1=kx+b$ 与反比例函数 $y_2=\dfrac{m}{x}$ 的图像交于点 $A,B$。已知：点 $A$
      的横坐标为 $3$，点 $B$ 的横坐标为 $-1$，一次函数图像与 $y$ 轴交于点 $C(0,-2)$。

      \par\noindent (1) 求一次函数解析式、反比例函数解析式，以及点 $A,B$ 的坐标；

      \par\noindent (2) 根据图像求不等式 $kx+b>\dfrac{m}{x}$ 的解集；

      \par\noindent (3) 点 $P$ 在 $x$ 轴上，若 $S_{\triangle AOP}=S_{\triangle PAB}$，求点
      $P$ 的坐标。

      '
    hints:
    - content: 先由 $C(0,-2)$ 得到 $b$，再用两个交点在反比例函数上列 $xy$ 相等。
    - content: 第 (3) 问设 $P(t,0)$，把两个面积都写成含 $t$ 的式子。
