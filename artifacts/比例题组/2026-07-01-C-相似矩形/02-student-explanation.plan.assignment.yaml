  - type: route
    id: c-route2
    steps:
    - id: c2-s1
      latex: 情况一：$6$ 对应 $2$
      content_latex: $2:3=6:x$，解得 $x=9$。
    - id: c2-s2
      latex: 情况二：$6$ 对应 $3$
      content_latex: $2:3=x:6$，解得 $x=4$。
    - id: c2-s3
      latex: 写完整答案
      content_latex: 所以 $x=9$ 或 $x=4$。
  - type: dual_explanation
    id: c-dual2
    label: 例题 2
    stem_latex: 求 $x$。
    side_title: 小贴士
    side_items:
    - kind: mistake
      title: 多解入口
      content_latex: 题目没有说明 $6$ 是长边还是短边，所以不能只列一种比例。
    solution_title: 解答
    solution_step_ids:
    - c2-s1
    - c2-s2
    - c2-s3
  - type: mistake
    id: c-mistake
    title: 易错提醒
    content_latex: 相似矩形题最容易错在“对应关系没判定就计算”。如果题目没有明确长宽或对应边，先分类。
  - type: method_reminder
    id: c-method
    title: 方法提醒
    items:
    - latex: 判断题：先写两个长宽比。
    - latex: 求边题：先写对应边关系。
    - latex: 未指定对应：分两种情况。
