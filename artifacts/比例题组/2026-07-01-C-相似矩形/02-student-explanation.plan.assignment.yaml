    stem_latex: 判断两个矩形是否相似。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 判断入口
      content_latex: 判断相似时先比较两个矩形的长宽比，不先列未知数。
    solution_title: 解答
    solution_step_ids:
