  blocks:
  - type: solution
    id: c-knowledge
    title: 核心结论：先确定对应，再列比例
    items:
    - latex: 如果题目明确“长、宽”，通常长对长、宽对宽。
    - latex: 如果只说“两边长为 $2$ 和 $3$”，没有指定哪条边对应，就要分类。
    - latex: 判断相似先比较长宽比；求未知边先写对应边比例。
  - type: problemcard
    id: c-ex1
    label: 例题 1
    stem_latex: 矩形甲的长为 $4$、宽为 $6$，矩形乙的长为 $8$、宽为 $12$。判断两个矩形是否相似。
