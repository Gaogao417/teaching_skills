meta:
  title: 相似矩形：先定对应，再列比例
  subtitle: 诊断式讲解——看·转·防三栏
  grade: 八年级
  subject: 数学
  version: student
  source_artifacts:
    structure_analysis: artifacts/比例题组/2026-07-01-C-相似矩形/01-structure-analysis.md
render:
  template: exam-zh-explanation
  paper_size: a4paper
