    label: 题目
    stem_latex: 一个矩形的两边长为 $2$ 和 $7$。另一个矩形的一边长为 $14$，另一边长为 $x$。若两个矩形相似，求 $x$。
    answer_space:
      type: lines
      height: 28mm
    answer: $x=49$ 或 $x=4$
    solution_steps:
    - title: 识别对应是否唯一
      content: 没说 $14$ 对应 $2$ 还是 $7$，要分类。
    - title: 情况一（14 对应 2）
      content: $2:7=14:x$，选倍数法，$2\to14$ 是 $\times7$，所以 $x=49$。
    - title: 情况二（14 对应 7）
      content: $2:7=x:14$，选倍数法，$7\to14$ 是 $\times2$，所以 $x=4$。
    teaching:
      teaching_goal: 未指定对应多解（综合）
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 漏掉第二种对应
      entry_point: identify_correspondence
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 两种对应两个答案
      upgrade_rule: 能稳定主动分类时，表明对应唯一性判断已自动化
      fallback_move: 先问"$14$ 对应哪条边？"
      checks: [P3对应边, R2列比例]
