  - type: problem
    id: cq1
    points: 6
    label: 题目
    stem_latex: 矩形甲的长为 $8$、宽为 $5$，矩形乙的长为 $16$、宽为 $10$。判断两个矩形是否相似。
    answer_space:
      type: lines
      height: 28mm
    answer: 相似
    solution_steps:
    - title: 识别长宽比
      content: 甲 $8:5$，乙 $16:10=8:5$。
    - title: 比较判断
      content: 两个长宽比相同，故相似。
    teaching:
      teaching_goal: 判断相似——先写两个长宽比再比较
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 直接看数字像不像就判相似，不写化简比
      entry_point: identify_aspect_ratio
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 小整数、可化简
      upgrade_rule: 能先写长宽比再判断时，可迁移到分数边长判断
      fallback_move: 先写两个长宽比，化简后再比较。
      checks: [P2长宽比, R1判断]
