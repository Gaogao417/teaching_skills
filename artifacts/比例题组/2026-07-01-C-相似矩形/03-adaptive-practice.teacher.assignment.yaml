  - type: problem
    id: cq2
    points: 6
    label: 题目
    stem_latex: 矩形甲的长为 $7$、宽为 $4$，矩形乙的长为 $12$、宽为 $8$。判断两个矩形是否相似。
    answer_space:
      type: lines
      height: 28mm
    answer: 不相似
    solution_steps:
    - title: 识别长宽比
      content: 甲 $7:4$，乙 $12:8=3:2$。
    - title: 比较判断
      content: $7:4\ne 3:2$，两个长宽比不同，故不相似。
    teaching:
      teaching_goal: 判断不相似——化简比后比较
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 不化简直接比，或看数字差不多就判相似
      entry_point: identify_aspect_ratio
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 需化简才能比较
      upgrade_rule: 能稳定化简比后判断时，可迁移到分数边长判断
      fallback_move: 先把两个长宽比都化简，再比较。
      checks: [P2长宽比, R1判断]
