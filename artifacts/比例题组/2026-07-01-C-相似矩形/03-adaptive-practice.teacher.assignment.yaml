    label: 题目
    stem_latex: 矩形甲的长为 $5$、宽为 $8$，矩形乙的长为 $10$、宽为 $16$。判断两个矩形是否相似。
    answer_space:
      type: lines
      height: 28mm
    answer: 相似
    solution_steps:
    - title: 比较长宽比
      content: $5:8=10:16$，所以相似。
