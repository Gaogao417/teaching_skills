  - type: problem
    id: cq6
    points: 6
    label: 题目
    stem_latex: 两个矩形相似。矩形甲的长为 $x+2$、宽为 $10$；矩形乙的长为 $6$、宽为 $5$。求 $x$。
    answer_space:
      type: lines
      height: 28mm
    answer: $x=10$
    solution_steps:
    - title: 定对应并列比例
      content: 长对长、宽对宽，$(x+2):10=6:5$。
    - title: 选方法
      content: 先看明显倍数，$5\to10$ 是 $\times2$，所以 $6\to x+2$ 也应 $\times2$。
    - title: 计算
      content: $x+2=12$，$x=10$。
    teaching:
      teaching_goal: 含一次式求边——先看倍数，注意整体
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 忘记给 $x+2$ 加括号，或对应边写反
      entry_point: identify_correspondence
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 含一次式，但可优先用倍数法
      upgrade_rule: 能稳定处理一次式括号时，可迁移到更复杂代数式
      fallback_move: 先写对应比例，再圈出 $x+2$ 提醒加括号。
      checks: [P3对应边, R2列比例, R3解比例]
    diagram_col:
