  - type: problem
    id: cq8
    points: 6
    label: 题目
    stem_latex: 一个矩形的两边长为 $4$ 和 $9$。另一个矩形的一边长为 $12$，另一边长为 $x$。若两个矩形相似，求 $x$。
    answer_space:
      type: lines
      height: 28mm
    answer: $x=27$ 或 $x=\dfrac{16}{3}$
    solution_steps:
    - title: 识别对应是否唯一
      content: 没说 $12$ 对应 $4$ 还是 $9$，要分类。
    - title: 情况一（12 对应 4）
      content: $4:9=12:x$，选倍数法，$4\to12$ 是 $\times3$，所以 $x=27$。
    - title: 情况二（12 对应 9）
      content: $4:9=x:12$，无明显整数倍，交叉相乘得 $x=\dfrac{16}{3}$。
    teaching:
      teaching_goal: 未指定对应多解（含分数答案）
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 漏掉第二种对应，或分数答案算错
      entry_point: identify_correspondence
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 一种对应产生分数答案
      upgrade_rule: 能稳定分类且算对分数时，可迁移到更大多对应比
      fallback_move: 先问"$12$ 对应哪条边？"
      checks: [P3对应边, R2列比例]
