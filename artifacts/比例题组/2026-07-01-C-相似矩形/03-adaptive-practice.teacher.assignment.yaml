  - type: problem
    id: cq4
    points: 6
    label: 题目
    stem_latex: 两个矩形相似。矩形甲的长为 $9$、宽为 $6$；矩形乙的长为 $x$、宽为 $10$。求 $x$。
    answer_space:
      type: lines
      height: 28mm
    answer: $x=15$
    solution_steps:
    - title: 定对应并列比例
      content: 长对长、宽对宽，$9:6=x:10$。
    - title: 选方法
      content: 没有明显整数倍，改用交叉相乘。
    - title: 计算
      content: $6x=90$，$x=15$。
    teaching:
      teaching_goal: 已知相似求边——先写对应边比例
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 不先定对应就硬列比例，或长宽对应错
      entry_point: identify_correspondence
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 小整数，交叉相乘
      upgrade_rule: 能先写谁对应谁时，可迁移到含一次式求边
      fallback_move: 先写"长对长、宽对宽"四个字，再列比例。
      checks: [P3对应边, R2列比例, R3解比例]
    diagram_col:
