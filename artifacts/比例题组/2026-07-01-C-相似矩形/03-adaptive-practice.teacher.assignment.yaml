  - type: problem
    id: cq3
    points: 6
    label: 题目
    stem_latex: 矩形甲的两边长为 $\frac{3}{2}$ 和 $\frac{5}{2}$，矩形乙的两边长为 $3$ 和 $5$。判断两个矩形是否相似。
    answer_space:
      type: lines
      height: 28mm
    answer: 相似
    solution_steps:
    - title: 识别长宽比（含分数）
      content: 甲 $\frac{3}{2}:\frac{5}{2}=3:5$，乙 $3:5$。
    - title: 比较判断
      content: 两个长宽比相同，故相似。
    teaching:
      teaching_goal: 分数边长判断——先把分数比约成整数比
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 看到分数边长就卡住，不会约分母
      entry_point: identify_aspect_ratio
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 分数边长，需约去分母
      upgrade_rule: 能稳定处理分数长宽比时，可迁移到含一次式求边
      fallback_move: 分数比同乘分母，先变成整数比再比较。
      checks: [P2长宽比, R1判断]
