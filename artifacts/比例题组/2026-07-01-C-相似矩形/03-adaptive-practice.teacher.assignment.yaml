  - type: problem
    id: cq7
    points: 6
    label: 题目
    stem_latex: 一个矩形的两边长为 $3$ 和 $5$。另一个矩形的一边长为 $15$，另一边长为 $x$。若两个矩形相似，求 $x$。
    answer_space:
      type: lines
      height: 28mm
    answer: $x=25$ 或 $x=9$
    solution_steps:
    - title: 识别对应是否唯一
      content: 没说 $15$ 对应 $3$ 还是 $5$，对应不唯一，要分类。
    - title: 情况一（15 对应 3）
      content: $3:5=15:x$，选倍数法，$3\to15$ 是 $\times5$，所以 $x=25$。
    - title: 情况二（15 对应 5）
      content: $3:5=x:15$，选倍数法，$5\to15$ 是 $\times3$，所以 $x=9$。
    teaching:
      teaching_goal: 未指定对应多解——识别分类信号
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 默认 15 只对应 3，漏掉第二种对应
      entry_point: identify_correspondence
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 两种对应两个答案
      upgrade_rule: 能主动分类不漏解时，可迁移到更复杂的多对应题
      fallback_move: 先问"$15$ 对应哪条边？题目说了吗？"
      checks: [P3对应边, R2列比例]
    diagram_col:
      kind: tikz
