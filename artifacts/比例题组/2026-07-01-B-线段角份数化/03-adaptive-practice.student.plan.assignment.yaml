  blocks:
  - type: problem
    id: bq1
    points: 6
    label: 题目
    stem_latex: 点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $AB:BC=2:3$，且 $AC=25$，求 $AB$。
    answer_space:
      type: lines
      height: 28mm
    diagram_slot:
      slot_id: bq1.prompt
      diagram_ref: bq1.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 观察整体 AC 由 AB 和 BC 组成。
      engine: renderer_spec
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      semantic_constraints:
        given_objects:
        - A
        - B
        - C
        given_constraints:
        - A,B,C 共线
        - B 在 A,C 之间
      engine_options:
        renderer_spec:
          points:
            A:
            - 0
            - 0
            B:
            - 1.8
            - 0
            C:
            - 4.6
            - 0
          segments:
          - from: A
            to: B
          - from: B
            to: C
          polygons: []
          labels:
            A:
              text: A
              placement: below
            B:
              text: B
              placement: below
            C:
              text: C
              placement: below
          constraints:
          - A,B,C 共线
          - B 在 A,C 之间
