    label: 填空题
    stem_latex: 点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $AB:BC=2:5$，且 $AC=49$，求 $AB$。  图上份数：____；比例方程：________________；答案：____。
