sections:
- id: b-mark-shares
  title: 线段和角：先在图上标份数
  show_title: true
  type: explanation
  visibility: student
  blocks:
  - type: solution
    id: b-core
    title: 图形题的三格填空
    items:
    - latex: 第一格：把比例或方程式翻成图上的带圈份数。
    - latex: '第二格：写“目标量 : 整体 = 目标份数 : 总份数”。'
    - latex: 第三格：填出题目问的线段或角；不问的量不用作为最终答案。
    - latex: 若条件是 $ma=nb$，则 $a:b=n:m$，份数和系数交叉对应。
  - type: problemcard
    id: b-ex1
    label: 例题 1
    stem_latex: 点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $AB:BC=3:5$，且 $AC=32$，求 $AB$。
    diagram_col:
      kind: tikz
      tikz_code: |-
        \begin{tikzpicture}[x=1cm,y=1cm,baseline=(current bounding box.center)]
          \draw[line width=1.05pt] (0,0) -- (5.0,0);
          \fill (0,0) circle (1.7pt) node[below] {$A$};
          \fill (1.9,0) circle (1.7pt) node[below] {$B$};
          \fill (5.0,0) circle (1.7pt) node[below] {$C$};
          \draw[decorate,decoration={brace,amplitude=4pt,mirror}] (0,-0.35) -- (2.1,-0.35) node[midway,below=5pt] {$AB$};
          \draw[decorate,decoration={brace,amplitude=4pt,mirror}] (2.1,-0.35) -- (5.6,-0.35) node[midway,below=5pt] {$BC$};
          \node[above=4pt] at (0.95,0) {\textcircled{\scriptsize 3}};
          \node[above=4pt] at (3.45,0) {\textcircled{\scriptsize 5}};
          \node[above=13pt] at (2.5,0) {$AC=32$};
        \end{tikzpicture}
      width: 60mm
      caption: 先把 AB 标 ③，BC 标 ⑤。
  - type: route
    id: b-route1
    steps:
    - id: b1-s1
      latex: 标份数
      content_latex: "在图上标 $AB$ 为 \\textcircled{\\scriptsize 3}，$BC$ 为 \\textcircled{\\scriptsize 5}，所以 $AC$ 共 $8$ 份。"
    - id: b1-s2
      latex: 写目标比例
      content_latex: $\dfrac{AB}{32}=\dfrac{3}{8}$。
    - id: b1-s3
      latex: 填答案
      content_latex: "$AB=32\\times\\dfrac{3}{8}=12$。"
  - type: dual_explanation
    id: b-dual1
    label: 例题 1
    stem_latex: 求 $AB$。
    side_title: 看图填空
    side_items:
    - kind: hint
      title: 先标图
      content_latex: "图上的 \\textcircled{\\scriptsize 3} 和 \\textcircled{\\scriptsize 5} 比文字说明更直观。"
    - kind: hint
      title: 只看目标
      content_latex: 题目问 $AB$，就写 $AB$ 对整体 $AC$ 的份数。
    solution_title: 填法
    solution_step_ids:
    - b1-s1
    - b1-s2
    - b1-s3
  - type: problemcard
    id: b-ex2
    label: 例题 2
    stem_latex: 点 $A,B,C$ 在同一直线上，$B$ 在 $A,C$ 之间。若 $5AB=3BC$，且 $AC=56$，求 $AB$。
    diagram_col:
      kind: tikz
      tikz_code: |-
        \begin{tikzpicture}[x=1cm,y=1cm,baseline=(current bounding box.center)]
          \draw[line width=1.05pt] (0,0) -- (5.0,0);
          \fill (0,0) circle (1.7pt) node[below] {$A$};
          \fill (1.9,0) circle (1.7pt) node[below] {$B$};
          \fill (5.0,0) circle (1.7pt) node[below] {$C$};
          \draw[decorate,decoration={brace,amplitude=4pt,mirror}] (0,-0.35) -- (2.1,-0.35) node[midway,below=5pt] {$AB$};
          \draw[decorate,decoration={brace,amplitude=4pt,mirror}] (2.1,-0.35) -- (5.6,-0.35) node[midway,below=5pt] {$BC$};
          \node[above=4pt] at (0.95,0) {\textcircled{\scriptsize 3}};
          \node[above=4pt] at (3.45,0) {\textcircled{\scriptsize 5}};
          \node[above=13pt] at (2.5,0) {$AC=56$};
        \end{tikzpicture}
      width: 60mm
      caption: 由 5AB=3BC 得 AB:BC=3:5。
  - type: route
    id: b-route2
    steps:
    - id: b2-s1
      latex: 标份数
      content_latex: $5AB=3BC$，所以 $AB:BC=3:5$，在图上标 $AB$ 为 ③，$BC$ 为 ⑤。
    - id: b2-s2
      latex: 写目标比例
      content_latex: $\dfrac{AB}{56}=\dfrac{3}{8}$。
    - id: b2-s3
      latex: 填答案
      content_latex: "$AB=56\\times\\dfrac{3}{8}=21$。"
  - type: dual_explanation
    id: b-dual2
    label: 例题 2
    stem_latex: 求 $AB$。
    side_title: 看图填空
    side_items:
    - kind: mistake
      title: 交叉对应
      content_latex: $5AB=3BC$ 时，$AB$ 是 $3$ 份，不是 $5$ 份。
    - kind: hint
      title: 再写目标比例
      content_latex: 标完份数后，只写目标量 $AB$ 和整体 $AC$ 的比例。
    solution_title: 填法
    solution_step_ids:
    - b2-s1
    - b2-s2
    - b2-s3
  - type: mistake
    id: b-mistake
    title: 易错提醒
    content_latex: 方程式关系要先转成份数。$ma=nb$ 时，$a:b=n:m$；份数和系数是交叉对应。
  - type: method_reminder
    id: b-method
    title: 方法提醒
    items:
    - latex: 先在图上标带圈份数，再写目标量对整体的比例。
    - latex: "线段整体：$AC=AB+BC$；角度题同构：$\angle AOC=\angle AOB+\angle BOC$。"
    - latex: '目标量 : 整体 = 目标份数 : 总份数。'
