    structure_analysis: artifacts/比例题组/2026-07-01-A-纯比例方程/01-structure-analysis.md
render:
  template: exam-zh-explanation
  paper_size: a4paper
  answer_key_position: after_page_break
sections:
- id: a-reaction-cards
  title: 比例方程：看信号，填关键式
  show_title: true
  type: explanation
  visibility: student
  blocks:
  - type: solution
    id: a-core
    title: 看信号：先判断能不能直接填
    items:
    - latex: 已经给出比例式时，先看同位置有没有明显倍数或份数。
    - latex: 第四比例项题，前三个数顺序不乱，$x$ 是最后要补的数。
    - latex: 比例中项题，$x$ 是夹在两个数中间的正数，可以先想“中间数平方等于两端乘积”。
    - latex: 看不出倍数或份数时，再写交叉相乘关键式；含一次式时括号必须整体保留。
  - type: problemcard
    id: a-example
    label: 例题
    stem_latex: |
      \begin{enumerate}[label=(\arabic*)]
        \item $4:12=5:x$，$x=\underline{\hspace{1.5cm}}$。
        \item 求 $5,20,3$ 的第四比例项 $x$，$x=\underline{\hspace{1.5cm}}$。
        \item 正数 $x$ 是 $9$ 和 $16$ 的比例中项，$x=\underline{\hspace{1.5cm}}$。
        \item $\dfrac{x+2}{5}=\dfrac{3}{4}$，交叉相乘得 $\underline{\hspace{2.6cm}}$，$x=\underline{\hspace{1.5cm}}$。
      \end{enumerate}
  - type: route
    id: a-example-route
    steps:
    - id: a-q1-ratio
      latex: 比例式先看倍数
      content_latex: $4\to12$ 是 $\times3$，所以 $5\to x$ 也乘 $3$，$x=15$。
    - id: a-q2-fourth
      latex: 第四比例项保顺序
      content_latex: 前两个数 $5\to20$ 是 $\times4$，所以 $3\to x$ 也乘 $4$，$x=12$。
    - id: a-q3-mean
      latex: 比例中项看两端
      content_latex: 两端乘积 $9\times16=144$，所以 $x^2=144$；$x$ 为正数，$x=12$。
    - id: a-q4-whole
      latex: 一次式整体交叉
      content_latex: 交叉相乘得 $4(x+2)=15$，解得 $x=\dfrac{7}{4}$。
  - type: dual_explanation
    id: a-example-solution
    label: 例题
    stem_latex: 完成上面四个填空。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 先找入口
      content_latex: 能看倍数先看倍数；遇到“中项”看两端；含一次式先整体保留。
    solution_title: 填法
    solution_step_ids:
    - a-q1-ratio
    - a-q2-fourth
    - a-q3-mean
    - a-q4-whole
