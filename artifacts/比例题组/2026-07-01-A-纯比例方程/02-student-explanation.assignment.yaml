meta:
  title: 比例方程：先判断方法，再计算
  subtitle: 倍数/份数法与交叉相乘的选择
  grade: 八年级
  subject: 数学
  version: student
  source_artifacts:
    structure_analysis: artifacts/比例题组/2026-07-01-A-纯比例方程/01-structure-analysis.md
render:
  template: exam-zh-explanation
  paper_size: a4paper
  answer_key_position: after_page_break
sections:
- id: a-method-choice
  title: 比例方程：先判断方法，再计算
  show_title: true
  type: explanation
  visibility: student
  blocks:
  - type: solution
    id: a-core
    title: 核心判断：先看能不能直接倍数/份数
    items:
    - latex: 第一步永远先写比例式；没有比例式，就没有方法选择。
    - latex: 若一组对应量有整数倍或简单份数，优先用倍数/份数法。
    - latex: 若没有明显倍数，或未知数在一次式中，使用交叉相乘。
    - latex: 第四比例项：$a,b,c,x$ 成比例就是 $a:b=c:x$。正比例中项：$a:x=x:b$，即 $x^2=ab$。
  - type: problemcard
    id: a-one-problem
    label: 大题 1
    stem_latex: "完成下列小题。每小问先写“优先方法”，再计算。\n\\begin{enumerate}[label=(\\arabic*)]\n  \\item $2,4,3,x$ 成比例，求 $x$；\n  \\item 求\
      \ $3,12,5$ 的第四比例项 $x$；\n  \\item $7:x=3:5$，求 $x$；\n  \\item $\\dfrac{x+2}{5}=\\dfrac{3}{4}$，求 $x$。\n\\end{enumerate}"
  - type: route
    id: a-route
    steps:
    - id: a-s1
      latex: (1) 整数倍，优先倍数法
      content_latex: $2:4=3:x$，$2\to4$ 是 $\times2$，所以 $3\to x$ 也是 $\times2$，$x=6$。
    - id: a-s2
      latex: (2) 第四比例项，先定顺序
      content_latex: $3:12=5:x$，$3\to12$ 是 $\times4$，所以 $5\to x$ 也是 $\times4$，$x=20$。
    - id: a-s3
      latex: (3) 无整数倍，交叉相乘
      content_latex: $7:x=3:5$，交叉得 $3x=35$，所以 $x=\dfrac{35}{3}$。
    - id: a-s4
      latex: (4) 含一次式，交叉相乘
      content_latex: $4(x+2)=15$，所以 $x+2=\dfrac{15}{4}$，$x=\dfrac{7}{4}$。
  - type: dual_explanation
    id: a-dual1
    label: (1)
    stem_latex: $2,4,3,x$ 成比例，求 $x$。
    side_title: 策略判断
    side_items:
    - kind: hint
      title: 先观察
      content_latex: 写成 $2:4=3:x$ 后，$2\to4$ 是明显整数倍。
    solution_title: 解答
    solution_step_ids:
    - a-s1
  - type: dual_explanation
    id: a-dual2
    label: (2)
    stem_latex: 求 $3,12,5$ 的第四比例项 $x$。
    side_title: 策略判断
    side_items:
    - kind: hint
      title: 先定顺序
      content_latex: 第四比例项不是随便配对，而是 $3:12=5:x$。
    solution_title: 解答
    solution_step_ids:
    - a-s2
  - type: dual_explanation
    id: a-dual3
    label: (3)
    stem_latex: $7:x=3:5$，求 $x$。
    side_title: 策略判断
    side_items:
    - kind: hint
      title: 换方法
      content_latex: 这里没有“左边整体同乘一个整数到右边”的入口，直接交叉相乘更稳。
    solution_title: 解答
    solution_step_ids:
    - a-s3
  - type: dual_explanation
    id: a-dual4
    label: (4)
    stem_latex: $\dfrac{x+2}{5}=\dfrac{3}{4}$，求 $x$。
    side_title: 策略判断
    side_items:
    - kind: mistake
      title: 括号
      content_latex: 交叉相乘时 $x+2$ 是一个整体，必须写 $4(x+2)$。
    solution_title: 解答
    solution_step_ids:
    - a-s4
  - type: mistake
    id: a-mistake
    title: 易错提醒
    content_latex: 比例方程最容易错在“没判断就动手”。先写比例式，再决定是倍数/份数法，还是交叉相乘。
  - type: method_reminder
    id: a-method
    title: 方法提醒
    items:
    - latex: 有明显整数倍或简单份数：优先直接对应。
    - latex: 没有明显倍数、未知数在分母或一次式里：交叉相乘。
    - latex: 第四比例项先定顺序；比例中项先写 $a:x=x:b$。
