  - type: problem
    id: a1
    points: 6
    label: 题目
    stem_latex: $4,12,5,x$ 成比例，求 $x$。
    answer_space:
      type: lines
      height: 24mm
    answer: $x=15$
    solution_steps:
    - title: 方法选择
      content: 先写比例式，判断是否能用倍数/份数法；不合适时交叉相乘。
    - title: 计算
      content: "倍数法：$4:12=5:x$，$4\to12$ 为 $\times3$，所以 $x=15$。"
    teaching:
      teaching_goal: 交错训练比例方程的方法选择
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 不判断方法，机械交叉相乘或写错文字比例顺序
      entry_point: find_entry
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 小整数、简单分数和一次式，不引入复杂方程
      upgrade_rule: 能先写方法理由再计算时，可迁移到 B 组几何份数
      fallback_move: 先写标准比例式，再圈出一组对应量看是否有倍数。
