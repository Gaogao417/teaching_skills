    - title: 共底转高
      content: $\triangle OAB$ 与 $\triangle OAE$ 共底 $AO$，面积比为 $BO:OE=5:2$，所以 $S_{\triangle OAB}=10$。
    teaching:
      teaching_goal: 训练面积比链和四边形拆分
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 把 OECD 看成 OEC 或漏掉三角形 OCD
      entry_point: build_relation
