    - title: 统一份数
      content: 设 $S_{\triangle OAE}=1$，则 $S_{\triangle OAB}=3$，$S_{\triangle OEC}=2$，$S_{\triangle OAC}=3$，$S_{\triangle OCD}=3$。所以目标比为
