- id: group-1
  title: 第1组：基础面积转换
  type: practice
  visibility: both
  blocks:
  - type: problem
    id: dq1
    points: 8
    label: 题目
    stem_latex: |-
      在 $\triangle ABC$ 中，点 $E$ 在边 $AC$ 上，点 $O$ 不在直线 $AC$ 上。若 $AE:EC=2:3$，且 $S_{\triangle OAE}=6$，求 $S_{\triangle OEC}$。
    answer_space:
      type: lines
      height: 42mm
    diagram_slot:
      slot_id: dq1.prompt
      diagram_ref: dq1.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 根据题干观察点的位置关系。
      engine: renderer_spec
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      semantic_constraints:
        given_objects:
        - A
        - E
        - C
        - O
        given_constraints: &id001
        - E 在 AC 上
      engine_options:
        renderer_spec:
          points:
            A:
            - 0
            - 0
            E:
            - 1.8
            - 0
            C:
            - 4.5
            - 0
            O:
            - 1.8
            - 2.2
          segments:
          - from: A
            to: E
          - from: E
            to: C
          - from: O
            to: A
          - from: O
            to: E
          - from: O
            to: C
          polygons: []
          labels:
            A:
              text: A
              placement: below
            E:
              text: E
              placement: below
            C:
              text: C
              placement: below
            O:
              text: O
              placement: above
          constraints: *id001
    answer: $9$
    solution_steps:
    - title: 同高转底
      content: $\triangle OAE$ 与 $\triangle OEC$ 同高，面积比为 $2:3$。$6$ 对应 $2$ 份，所以 $S_{\triangle OEC}=9$。
    teaching:
      teaching_goal: 训练面积比链和四边形拆分
      source_relations:
      - fallback:structure_analysis
      expected_blocker: 把 OECD 看成 OEC 或漏掉三角形 OCD
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 小整数、手算可验算
      upgrade_rule: 能先写出关键比例或对应关系
      fallback_move: "先写 $S_{OECD}=S_{\triangle OEC}+S_{\triangle OCD}$。"
