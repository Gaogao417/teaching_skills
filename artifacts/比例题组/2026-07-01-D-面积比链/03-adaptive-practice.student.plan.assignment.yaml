    id: dq1
    points: 8
    label: 题目
    stem_latex: |-
      在 $\triangle ABC$ 中，点 $E$ 在边 $AC$ 上，点 $O$ 不在直线 $AC$ 上。若 $AE:EC=2:3$，且 $S_{\triangle OAE}=6$，求 $S_{\triangle OEC}$。
