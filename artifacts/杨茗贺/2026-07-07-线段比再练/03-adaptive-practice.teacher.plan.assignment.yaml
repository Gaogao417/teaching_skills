  blocks:
  - type: step
    id: ak-main
    title: 线段比再练
    content: '第 1 题：$BC=40$。

      第 2 题：$AB=35$。

      第 3 题：$BD=56$。

      第 4 题：$AC=72$。

      第 5 题：$AC=50$。

      第 6 题：$CD=45$。

      '
