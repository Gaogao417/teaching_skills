      scaffold_level: low
      variation_depth: packaged_condition
      complexity_note: 先减后比，两步计算但数字保持干净。
      upgrade_rule: 能判断一个比例覆盖的是整条线段还是局部线段。
      fallback_move: 先问：$BC:CD$ 能不能告诉我们 $AB$ 的份数？不能，就先求 $BD$。
