  blocks:
  - type: problem
    id: q1
    points: 8
    label: 第 1 题
    stem_latex: '点 $A,B,C$ 在同一直线上，顺序为 $A-B-C$。若 $AB:BC=3:5$，且 $AC=64$，求 $BC$。

      '
    answer_space:
      type: steps
      height: 30mm
    answer: $BC=40$
    explanation: $BC:AC=5:(3+5)=5:8$，所以 $BC=64\times\dfrac{5}{8}=40$。
    solution_steps:
    - title: 先定目标比
      content: 题目要求 $BC$，已知 $AC$，所以先定 $BC:AC$。
    - title: 改成可比较的份数
      content: $AB:BC=3:5$，$AC$ 共 $3+5=8$ 份，所以 $BC:AC=5:8$。
    - title: 乘已知量
      content: $BC=64\times\dfrac{5}{8}=40$。
    teaching:
      teaching_goal: 训练从目标量和已知量出发，先定目标比。
      source_relations:
      - fallback:line_segment_ratio_shares
      expected_blocker: 只看 $AB:BC$，没有把已知的 $AC$ 改成总份数。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: changed_numbers
      complexity_note: 单层整体-部分线段比，数字可整除。
      upgrade_rule: 能主动写出目标量与已知量的比。
      fallback_move: 先圈出题目问什么、已知什么，再写目标比。
    hints:
    - content_latex: 要求 $BC$，已知 $AC$，先想 $BC:AC$。\par 再把 $AC$ 改成总份数 $3+5$。
    diagram_slot:
      slot_id: segment.teacher.q1.prompt
      diagram_ref: segment.teacher.q1.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 第 1 题图：先看点的顺序。
      engine: renderer_spec
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      semantic_constraints:
        given_objects:
        - A
        - B
        - C
        given_constraints:
        - A, B, C are collinear in order A-B-C
        - AB:BC=3:5
        - AC=64
        - BC target
        clean_forbidden:
        - 不要写答案
        - 不要标注推理结论
      engine_options:
        renderer_spec:
          type: synthetic_geometry
          points:
            A:
            - 0.0
            - 0
            B:
            - 3.0
            - 0
            C:
            - 8.0
            - 0
          segments:
          - from: A
            to: B
          - from: B
            to: C
          labels:
            A: A
            B: B
            C: C
          constraints:
          - A-B-C
          - AB:BC=3:5
          - AC=64
          - BC target
          - segment-regression-q1
          teaching_focus:
          - read the point order first
          - convert target segment to shares
  - type: problem
    id: q2
    points: 8
    label: 第 2 题
    stem_latex: '点 $A,B,C$ 在同一直线上，顺序为 $A-B-C$。若 $4AB=7BC$，且 $AC=55$，求 $AB$。

      '
    answer_space:
      type: steps
      height: 30mm
    answer: $AB=35$
    explanation: 由 $4AB=7BC$ 得 $AB:BC=7:4$，所以 $AB:AC=7:11$，$AB=55\times\dfrac{7}{11}=35$。
    solution_steps:
    - title: 方程改比例
      content: $4AB=7BC$，所以 $AB:BC=7:4$。
    - title: 目标比
      content: $AC=AB+BC$，共 $7+4=11$ 份，故 $AB:AC=7:11$。
    - title: 求值
      content: $AB=55\times\dfrac{7}{11}=35$。
    teaching:
      teaching_goal: 训练把乘法式线段关系改成线段比，再接目标比。
      source_relations:
      - fallback:line_segment_ratio_shares
      expected_blocker: 把 $4AB=7BC$ 误读成 $AB:BC=4:7$。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: changed_representation
      complexity_note: 加入方程式比例转换，但仍是一层整体-部分。
      upgrade_rule: 能说出份数和系数交叉对应。
      fallback_move: 先用一个小例子检查：左边乘得一样大，较长的线段对应较小的系数。
    hints:
    - content_latex: 先把 $4AB=7BC$ 改成线段比。\par 乘法式里，份数和系数是交叉对应的。
    diagram_slot:
      slot_id: segment.teacher.q2.prompt
      diagram_ref: segment.teacher.q2.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 第 2 题图：先看点的顺序。
      engine: renderer_spec
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      semantic_constraints:
        given_objects:
