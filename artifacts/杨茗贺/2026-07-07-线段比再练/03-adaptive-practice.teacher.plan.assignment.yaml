          - 4AB=7BC
          - AB:BC=7:4
          - AC=55
          - AB target
          - segment-regression-q2
          teaching_focus:
          - read the point order first
          - convert target segment to shares
  - type: problem
    id: q3
    points: 8
    label: 第 3 题
    stem_latex: '点 $A,B,C,D$ 在同一直线上，顺序为 $A-B-C-D$。若 $AB:BC:CD=2:3:4$，且 $AD=72$，求 $BD$。

      '
    answer_space:
      type: steps
      height: 32mm
    answer: $BD=56$
    explanation: $BD=BC+CD$，对应 $3+4=7$ 份；$AD$ 对应 $2+3+4=9$ 份，所以 $BD=72\times\dfrac{7}{9}=56$。
    solution_steps:
    - title: 看点的顺序
      content: 顺序为 $A-B-C-D$，所以 $BD$ 包含 $BC$ 与 $CD$。
    - title: 改份数
      content: $BD$ 是 $3+4=7$ 份，$AD$ 是 $2+3+4=9$ 份。
    - title: 乘已知量
      content: $BD=72\times\dfrac{7}{9}=56$。
    teaching:
      teaching_goal: 训练三段线段中目标量不是单段时，先把目标量拆成相邻线段和。
      source_relations:
      - fallback:line_segment_ratio_shares
      expected_blocker: 把 $BD$ 看成一段新线段，没有回到 $BC+CD$。
      entry_point: find_entry
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 三段比，目标为相邻两段和。
      upgrade_rule: 能根据点的顺序说出每个复合线段包含哪些小段。
      fallback_move: 先写 $AD=AB+BC+CD$，再写 $BD=BC+CD$。
    hints:
    - content_latex: $BD$ 是从 $B$ 到 $D$，包含 $BC$ 和 $CD$。\par 把 $BD$ 的份数和 $AD$ 的总份数相比。
