    label: 第 6 题
    stem_latex: '点 $A,B,C,D$ 在同一直线上，顺序为 $A-B-C-D$。若 $AB=18$，$BC:CD=2:5$，且 $AD=81$，求 $CD$。

      '
    answer_space:
      type: steps
      height: 34mm
    answer: $CD=45$
    explanation: 先由 $AD-AB=81-18=63$ 得 $BD=63$。又 $BD=BC+CD$，对应 $2+5=7$ 份，$CD$ 为 $5$ 份，所以 $CD=63\times\dfrac{5}{7}=45$。
    solution_steps:
    - title: 先改已知量
      content: $BC:CD$ 只管 $BD$ 这一段，因此先求 $BD=AD-AB=81-18=63$。
    - title: 写目标比
      content: $CD:BD=5:(2+5)=5:7$。
    - title: 求值
      content: $CD=63\times\dfrac{5}{7}=45$。
    teaching:
      teaching_goal: 训练已知量不能直接做比例时，先把已知改成同一范围内的线段。
