      height: 30mm
    answer: $AC=72$
    explanation: $AB:AC=5:(5+7)=5:12$，所以 $AC=30\times\dfrac{12}{5}=72$。
    solution_steps:
    - title: 定比较对象
      content: 题目已知 $AB=30$，要求 $AC$，所以用 $AC:AB$ 或 $AB:AC$。
    - title: 写比例
      content: $AB:AC=5:12$。
    - title: 求整体
      content: $AC=30\times\dfrac{12}{5}=72$。
    teaching:
      teaching_goal: 减少提示后，训练从已知部分反求整体。
      source_relations:
