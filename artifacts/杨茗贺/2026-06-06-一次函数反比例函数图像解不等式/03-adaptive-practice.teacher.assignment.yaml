meta:
  title: "一次函数与反比例函数图像解不等式 · 练习（教师版）"
  subtitle: "三张新图，练会分段、方向和端点"
  grade: "八年级"
  subject: "数学"
  duration: "18分钟"
  total_points: 30
  version: "teacher"
  source_artifacts:
    structure_analysis: "artifacts/杨茗贺/2026-06-06-一次函数反比例函数图像解不等式/01-structure-analysis.md"
    explanation: "artifacts/杨茗贺/2026-06-06-一次函数反比例函数图像解不等式/02-student-explanation.reuse-graphs.assignment.yaml"

render:
  template: "exam-zh-practice"
  paper_size: "a4paper"
  answer_key_position: "after_page_break"

sections:
  - id: "problems"
    title: "练习题（每题 10 分，共 30 分）"
    type: "practice"
    visibility: "both"
    blocks:
      - type: "problem"
        id: "p1"
        points: 10
        label: "第 1 题"
        stem_latex: |
          如图，已知一次函数 $y_1=x+3$ 与反比例函数 $y_2=\dfrac{4}{x}$ 的图像交点横坐标为 $-4$ 和 $1$。
          根据图像求不等式
          $$
          x+3>\frac{4}{x}
          $$
          的解集。
        diagram_col:
          image_path: "03-practice-diagrams/p1.pdf"
          diagram_job_id: "practice-p1-prompt"
          width: "62mm"
          caption: "第 1 题图"
          variant: "prompt"
          disclosure_policy: "clean"
        hints:
          - content: "先把不等式读成 $y_1>y_2$，再用 $-4,0,1$ 分段。"
        answer_space:
          type: "steps"
          height: "42mm"
        answer: "$-4<x<0$ 或 $x>1$。"
        explanation: "用 $-4,0,1$ 分段。由图可知，$y_1$ 在 $y_2$ 上方的区间是 $(-4,0)$ 和 $(1,+\\infty)$；严格大于不取交点，$x=0$ 不取。"
        solution_steps:
          - title: "翻译"
            content: "$x+3>\\dfrac{4}{x}$ 等价于 $y_1>y_2$。"
          - title: "分段"
            content: "断点为 $-4,0,1$，分成 $(-\\infty,-4)$、$(-4,0)$、$(0,1)$、$(1,+\\infty)$。"
          - title: "取区间"
            content: "直线在上方的是 $(-4,0)$ 和 $(1,+\\infty)$，所以解集为 $-4<x<0$ 或 $x>1$。"
        teaching:
          teaching_goal: "固定 $>$，训练找直线在双曲线上方的区间。"
          expected_blocker: "漏掉 $x=0$ 或把交点写进答案。"
          entry_point: "solve_and_check"
          scaffold_level: "medium"
          variation_depth: "changed_numbers"
          complexity_note: "只换数和图，保留讲解题核心结构。"
          upgrade_rule: "能先列四段，再逐段判断。"
          fallback_move: "先在图上指出 $y_1$ 和 $y_2$。"
      - type: "problem"
        id: "p2"
        points: 10
        label: "第 2 题"
        stem_latex: |
          如图，已知一次函数 $y_1=x-1$ 与反比例函数 $y_2=\dfrac{6}{x}$ 的图像交点横坐标为 $-2$ 和 $3$。
          根据图像求不等式
          $$
          x-1<\frac{6}{x}
          $$
          的解集。
        diagram_col:
          image_path: "03-practice-diagrams/p2.pdf"
          diagram_job_id: "practice-p2-prompt"
          width: "62mm"
          caption: "第 2 题图"
          variant: "prompt"
          disclosure_policy: "clean"
        hints:
          - content: "这次要找 $y_1<y_2$，也就是双曲线在直线上方的区间。"
        answer_space:
          type: "steps"
          height: "42mm"
        answer: "$x<-2$ 或 $0<x<3$。"
        explanation: "$x-1<\\dfrac{6}{x}$ 等价于 $y_1<y_2$。由图可知，双曲线在直线上方的区间是 $(-\\infty,-2)$ 和 $(0,3)$，所以解集为 $x<-2$ 或 $0<x<3$。"
        solution_steps:
          - title: "翻译"
            content: "$x-1<\\dfrac{6}{x}$ 等价于 $y_1<y_2$。"
          - title: "分段"
            content: "断点为 $-2,0,3$。"
          - title: "取区间"
            content: "双曲线在上方的区间为 $(-\\infty,-2)$ 和 $(0,3)$，所以解集为 $x<-2$ 或 $0<x<3$。"
        teaching:
          teaching_goal: "改变不等号方向，训练选择相反的上下关系。"
          expected_blocker: "沿用第 1 题的“直线在上方”，没有重新翻译 $<$。"
          entry_point: "transfer"
          scaffold_level: "medium"
          variation_depth: "changed_question"
          complexity_note: "只改变不等号方向和数值。"
          upgrade_rule: "能说出 $<$ 对应双曲线在直线上方。"
          fallback_move: "先写 $y_1<y_2$，再回图找谁在上。"
      - type: "problem"
        id: "p3"
        points: 10
        label: "第 3 题"
        stem_latex: |
          如图，已知一次函数 $y_1=x-3$ 与反比例函数 $y_2=\dfrac{4}{x}$ 的图像交点横坐标为 $-1$ 和 $4$。
          根据图像求不等式
          $$
          x-3\ge\frac{4}{x}
          $$
          的解集，并说明哪些端点可以取。
        diagram_col:
          image_path: "03-practice-diagrams/p3.pdf"
          diagram_job_id: "practice-p3-prompt"
          width: "62mm"
          caption: "第 3 题图"
          variant: "prompt"
          disclosure_policy: "clean"
        hints:
          - content: "先按 $>$ 找直线在上方的区间，再判断交点横坐标是否可取。"
        answer_space:
          type: "steps"
          height: "46mm"
        answer: "$-1\\le x<0$ 或 $x\\ge4$；端点 $-1,4$ 可以取，$0$ 不能取。"
        explanation: "由图可知，直线在上方的区间为 $(-1,0)$ 和 $(4,+\\infty)$。因为题目是 $\\ge$，交点横坐标 $-1,4$ 可以取；但 $x=0$ 是反比例函数无定义点，不能取。"
        solution_steps:
          - title: "找大于的区间"
            content: "先看 $y_1>y_2$，直线在上方的是 $(-1,0)$ 和 $(4,+\\infty)$。"
          - title: "处理等号"
            content: "$\\ge$ 包含交点，所以 $x=-1$ 和 $x=4$ 可以取。"
          - title: "排除 $0$"
            content: "$x=0$ 处 $\\dfrac{4}{x}$ 无定义，不能取。解集为 $-1\\le x<0$ 或 $x\\ge4$。"
        teaching:
          teaching_goal: "训练含等号时交点可取，但无定义点仍不可取。"
          expected_blocker: "把 $0$ 当作普通端点取入。"
          entry_point: "solve_and_check"
          scaffold_level: "low"
          variation_depth: "changed_question"
          complexity_note: "加入端点判断，但不加入额外计算。"
          upgrade_rule: "能区分交点横坐标和无定义点。"
          fallback_move: "把端点分成两类：交点、反比例函数无定义点。"

  - id: "answer-key"
    title: "参考答案"
    type: "answer_key"
    visibility: "teacher"
    blocks:
      - type: "step"
        id: "ak-main"
        title: "练习题"
        content: |
          第 1 题：$-4<x<0$ 或 $x>1$。
          第 2 题：$x<-2$ 或 $0<x<3$。
          第 3 题：$-1\le x<0$ 或 $x\ge4$；端点 $-1,4$ 可以取，$0$ 不能取。
