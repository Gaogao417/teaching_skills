    id: q1
    points: 8
    label: 第 1 题
    stem_latex: '如图，在 $\triangle ACE$ 中，点 $B$ 在线段 $AC$ 上，点 $D$ 在线段 $AE$ 上，且 $BD\parallel CE$。已知 $AD=4$，$AB=3$，$BC=6$，求 $DE$。

      '
    answer_space:
      type: steps
      height: 34mm
      step_count: 4
    hints:
    - content_latex: 要求的边是 $DE$，这条边的对应边是 $BC$；先想 $DE:AD=BC:AB$。
    diagram_slot:
      slot_id: practice.student.q1.prompt
      diagram_ref: practice.student.q1.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 第 1 题图：观察对应边和已知长度。
      engine: renderer_spec
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      semantic_constraints:
        given_objects:
        - A
        - B
        - C
        - D
        - E
        given_constraints:
        - A, B, C are collinear in order A-B-C
        - A, D, E are collinear in order A-D-E
        - BD parallel CE
        - AD=4
        - AB=3
        - BC=6
        - DE target
        clean_forbidden:
        - 不要写答案
        - 不要标注推理结论
      engine_options:
        renderer_spec:
          type: synthetic_geometry
