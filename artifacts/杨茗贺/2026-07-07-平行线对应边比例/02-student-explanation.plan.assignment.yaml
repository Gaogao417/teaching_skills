  - type: solution
    id: knowledge
    title: 核心结论：先找目标比，再找对应边
    items:
    - latex: 在 $\triangle ACE$ 中，若 $B$ 在线段 $AC$ 上，$D$ 在线段 $AE$ 上，且 $BD\parallel CE$，则
        $\triangle ABD\sim\triangle ACE$。
    - latex: 对应边比例：$\dfrac{AB}{AC}=\dfrac{AD}{AE}=\dfrac{BD}{CE}$。
    - latex: 差段也可以配对：$\dfrac{BC}{AB}=\dfrac{DE}{AD}$，$\dfrac{BC}{AC}=\dfrac{DE}{AE}$。
    - latex: 固定动作：先定目标比，再把已知改成目标比，最后乘已知量。
  - type: problemcard
    id: example
    label: 例题
    stem_latex: '如图，在 $\triangle ACE$ 中，点 $B$ 在线段 $AC$ 上，点 $D$ 在线段 $AE$ 上，且 $BD\parallel
      CE$。

      已知 $AD=3$，$BC=5$，$AC=7$，求 $DE$。

      '
