    stem_latex: '如图，在 $\triangle ACE$ 中，点 $B$ 在线段 $AC$ 上，点 $D$ 在线段 $AE$ 上，且 $BD\parallel CE$。已知 $AB=5$，$BC=3$，$BD=10$，求 $CE$。

      '
    answer_space:
      type: steps
      height: 30mm
      step_count: 4
    answer: $CE=16$。
    explanation: $AC=5+3=8$，且 $BD:CE=AB:AC=5:8$，所以 $CE=10\times\dfrac85=16$。
    solution_steps:
    - title: 求整段
      content: $AC=AB+BC=5+3=8$。
    - title: 写平行线段比
      content: 由 $BD\parallel CE$，$BD:CE=AB:AC=5:8$。
    - title: 乘已知量
      content: $CE=BD\times\dfrac{8}{5}=10\times\dfrac85=16$。
    teaching:
      teaching_goal: 训练从 $BD:CE$ 切入，不只看左右两边。
      source_relations:
      - fallback:parallel_side_corresponding_ratio
      expected_blocker: 忘记先求 $AC$，或把 $5:8$ 倒用。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: changed_question
      complexity_note: 一加一乘，数值保持整数。
      upgrade_rule: 能说明 $BD$ 对应 $CE$，$AB$ 对应 $AC$。
      fallback_move: 先标出小三角形边和大三角形边。
    hints:
