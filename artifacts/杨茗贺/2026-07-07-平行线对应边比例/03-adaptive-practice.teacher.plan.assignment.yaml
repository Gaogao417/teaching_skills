    stem_latex: '如图，在 $\triangle ACE$ 中，点 $B$ 在线段 $AC$ 上，点 $D$ 在线段 $AE$ 上，且 $BD\parallel CE$。已知 $AD=4$，$AB=3$，$BC=6$，求 $DE$。

      '
    answer_space:
      type: steps
      height: 30mm
      step_count: 4
    answer: $DE=8$。
    explanation: $DE:AD=BC:AB=6:3=2:1$，所以 $DE=4\times2=8$。
    solution_steps:
    - title: 先定目标比
      content: 要求 $DE$，已知 $AD=4$，先想 $DE:AD$。
    - title: 改成已知比
      content: 由 $BD\parallel CE$，对应差段成比例，$DE:AD=BC:AB=6:3=2:1$。
    - title: 乘已知量
      content: $DE=AD\times2=4\times2=8$。
    teaching:
      teaching_goal: 训练差段 $DE$ 与差段 $BC$ 的对应关系。
      source_relations:
      - fallback:parallel_side_corresponding_ratio
      expected_blocker: 把 $DE$ 错配到 $AB$ 或 $AC$。
      entry_point: find_entry
      scaffold_level: high
      variation_depth: changed_numbers
      complexity_note: 只需一次比例和一次乘法。
      upgrade_rule: 能主动写出 $DE:AD=BC:AB$。
      fallback_move: 回到目标量和已知量组成目标比。
    hints:
    - content_latex: 要求的边是 $DE$，这条边的对应边是 $BC$；先想 $DE:AD=BC:AB$。
