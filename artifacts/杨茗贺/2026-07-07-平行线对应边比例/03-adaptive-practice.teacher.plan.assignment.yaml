      '
    answer_space:
      type: steps
      height: 30mm
      step_count: 4
    answer: $BD=9$。
    explanation: $AE=6+4=10$，且 $BD:CE=AD:AE=6:10=3:5$，所以 $BD=15\times\dfrac35=9$。
    solution_steps:
    - title: 求整段
      content: $AE=AD+DE=6+4=10$。
    - title: 写平行线段比
      content: 由 $BD\parallel CE$，$BD:CE=AD:AE=6:10=3:5$。
    - title: 乘已知量
      content: $BD=CE\times\dfrac35=15\times\dfrac35=9$。
    teaching:
      teaching_goal: 巩固 $BD:CE$ 与右侧 $AD:AE$ 的对应。
      source_relations:
      - fallback:parallel_side_corresponding_ratio
      expected_blocker: 只会用左边 $AB,AC$，不会换到右边 $AD,AE$。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: changed_question
      complexity_note: 一次求整段，一次比例乘法。
      upgrade_rule: 能主动选择 $AD:AE$，不依赖左侧边。
      fallback_move: 回看 $BD$ 和 $CE$ 分别在哪两个三角形中。
