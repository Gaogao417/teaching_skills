  - type: problem
    id: q5
    points: 8
    label: 第 5 题
    stem_latex: '如图，在 $\triangle ACE$ 中，点 $B$ 在线段 $AC$ 上，点 $D$ 在线段 $AE$ 上，且 $BD\parallel CE$。已知 $AD=5$，$AE=8$，$BD=6$，求 $CE$，并求 $DE:AD$。

      '
    answer_space:
      type: steps
      height: 34mm
      step_count: 5
    answer: $CE=\dfrac{48}{5}$，$DE:AD=3:5$。
    explanation: $BD:CE=AD:AE=5:8$，故 $CE=6\times\dfrac85=\dfrac{48}{5}$；$DE=8-5=3$，所以 $DE:AD=3:5$。
    solution_steps:
    - title: 用平行线段比求 CE
      content: $BD:CE=AD:AE=5:8$，所以 $CE=BD\times\dfrac85=6\times\dfrac85=\dfrac{48}{5}$。
    - title: 求差段比例
      content: $DE=AE-AD=8-5=3$，所以 $DE:AD=3:5$。
    teaching:
      teaching_goal: 同时训练平行线段比例和差段比例。
      source_relations:
      - fallback:parallel_side_corresponding_ratio
      expected_blocker: 只求出 $CE$，漏掉 $DE:AD$。
      entry_point: solve_and_check
      scaffold_level: low
      variation_depth: changed_question
      complexity_note: 出现简单分数，要求保留准确值。
      upgrade_rule: 能分清 $BD:CE$ 与 $DE:AD$ 是两种不同配对。
      fallback_move: 先写三组基本对应比，再单独看差段。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-teacher-q5-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.teacher.q5.prompt
      diagram_job_id: practice-teacher-q5-prompt
      width: 56mm
