      packages:
      - tikz
      libraries: []
    hints:
    - content_latex: 要求的边是 $DE$，这条边的对应边是 $BC$；先想 $DE:AD=BC:AB$。
  - type: problem
    id: q2
    points: 8
    label: 第 2 题
    stem_latex: '如图，在 $\triangle ACE$ 中，点 $B$ 在线段 $AC$ 上，点 $D$ 在线段 $AE$ 上，且 $BD\parallel CE$。已知 $AB=5$，$BC=3$，$BD=10$，求 $CE$。

      '
    answer_space:
      type: steps
      height: 30mm
      step_count: 4
    answer: $CE=16$。
    explanation: $AC=5+3=8$，且 $BD:CE=AB:AC=5:8$，所以 $CE=10\times\dfrac85=16$。
    solution_steps:
    - title: 求整段
      content: $AC=AB+BC=5+3=8$。
    - title: 写平行线段比
      content: 由 $BD\parallel CE$，$BD:CE=AB:AC=5:8$。
    - title: 乘已知量
      content: $CE=BD\times\dfrac{8}{5}=10\times\dfrac85=16$。
    teaching:
      teaching_goal: 训练从 $BD:CE$ 切入，不只看左右两边。
      source_relations:
      - fallback:parallel_side_corresponding_ratio
      expected_blocker: 忘记先求 $AC$，或把 $5:8$ 倒用。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: changed_question
      complexity_note: 一加一乘，数值保持整数。
      upgrade_rule: 能说明 $BD$ 对应 $CE$，$AB$ 对应 $AC$。
      fallback_move: 先标出小三角形边和大三角形边。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-teacher-q2-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.teacher.q2.prompt
      diagram_job_id: practice-teacher-q2-prompt
      width: 56mm
      caption: 第 2 题图：$BD\parallel CE$
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:9fed073fa1a0994bb65e73649b4de14d1fd8e493968a6ce1702c6ffc70ea1801
      packages:
      - tikz
      libraries: []
    hints:
    - content_latex: 要求的边是 $CE$，这条边的对应边是 $BD$；先把 $AB$ 和 $AC$ 的比例写出来。
  - type: problem
    id: q3
    points: 8
    label: 第 3 题
    stem_latex: '如图，在 $\triangle ACE$ 中，点 $B$ 在线段 $AC$ 上，点 $D$ 在线段 $AE$ 上，且 $BD\parallel CE$。已知 $AD=6$，$DE=4$，$CE=15$，求 $BD$。

      '
    answer_space:
      type: steps
      height: 30mm
      step_count: 4
    answer: $BD=9$。
    explanation: $AE=6+4=10$，且 $BD:CE=AD:AE=6:10=3:5$，所以 $BD=15\times\dfrac35=9$。
    solution_steps:
    - title: 求整段
      content: $AE=AD+DE=6+4=10$。
    - title: 写平行线段比
      content: 由 $BD\parallel CE$，$BD:CE=AD:AE=6:10=3:5$。
    - title: 乘已知量
      content: $BD=CE\times\dfrac35=15\times\dfrac35=9$。
    teaching:
      teaching_goal: 巩固 $BD:CE$ 与右侧 $AD:AE$ 的对应。
      source_relations:
      - fallback:parallel_side_corresponding_ratio
      expected_blocker: 只会用左边 $AB,AC$，不会换到右边 $AD,AE$。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: changed_question
      complexity_note: 一次求整段，一次比例乘法。
      upgrade_rule: 能主动选择 $AD:AE$，不依赖左侧边。
      fallback_move: 回看 $BD$ 和 $CE$ 分别在哪两个三角形中。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-teacher-q3-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.teacher.q3.prompt
      diagram_job_id: practice-teacher-q3-prompt
      width: 56mm
