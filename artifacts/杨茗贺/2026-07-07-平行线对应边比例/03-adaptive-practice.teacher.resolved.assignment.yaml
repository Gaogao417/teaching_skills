      packages:
      - tikz
      libraries: []
  - type: problem
    id: q6
    points: 8
    label: 第 6 题
    stem_latex: '如图，在 $\triangle ACE$ 中，点 $B$ 在线段 $AC$ 上，点 $D$ 在线段 $AE$ 上，且 $BD\parallel CE$。已知 $BD:CE=3:7$，$AD=6$，$BC=8$，求 $AB$ 和 $DE$。

      '
    answer_space:
      type: steps
      height: 36mm
      step_count: 5
    answer: $AB=6$，$DE=8$。
    explanation: $BD:CE=3:7$，所以 $AB:AC=AD:AE=3:7$。差段占 $4$ 份，$BC=8$ 得每份 $2$，故 $AB=6$；$AD=6$ 也是 $3$ 份，每份 $2$，故 $DE=8$。
    solution_steps:
    - title: 把平行线段比改成两侧比例
      content: $BD:CE=3:7$，所以 $AB:AC=3:7$，$AD:AE=3:7$。
    - title: 求 AB
      content: 左侧差段 $BC$ 是 $7-3=4$ 份，$BC=8$，每份为 $2$，所以 $AB=3\times2=6$。
    - title: 求 DE
      content: 右侧 $AD$ 是 $3$ 份，$AD=6$，每份为 $2$。$DE$ 是 $4$ 份，所以 $DE=4\times2=8$。
    teaching:
      teaching_goal: 直接给 $BD:CE$，训练学生把它转到两侧分段。
      source_relations:
      - fallback:parallel_side_corresponding_ratio
      expected_blocker: 看见比例后不知道左右两侧也同为 $3:7$。
      entry_point: hidden_structure
      scaffold_level: low
      variation_depth: packaged_condition
      complexity_note: 只用份数法，不引入代数方程。
      upgrade_rule: 能用 $BD:CE$ 同时求左右两侧的差段。
      fallback_move: 先把 $BD:CE$ 写成 $AB:AC$ 和 $AD:AE$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-teacher-q6-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.teacher.q6.prompt
