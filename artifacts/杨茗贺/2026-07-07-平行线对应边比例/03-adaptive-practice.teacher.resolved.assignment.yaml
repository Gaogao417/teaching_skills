      packages:
      - tikz
      libraries: []
    hints:
    - content_latex: 要求的边是 $BD$，这条边的对应边是 $CE$；先把 $AD$ 和 $AE$ 的比例写出来。
  - type: problem
    id: q4
    points: 8
    label: 第 4 题
    stem_latex: '如图，在 $\triangle ACE$ 中，点 $B$ 在线段 $AC$ 上，点 $D$ 在线段 $AE$ 上，且 $BD\parallel CE$。已知 $AB=4$，$AC=10$，$DE=9$，求 $AD$。

      '
    answer_space:
      type: steps
      height: 32mm
      step_count: 4
    answer: $AD=6$。
    explanation: $AB:AC=4:10=2:5$，所以 $AD:AE=2:5$，于是 $DE:AD=3:2$，$AD=9\times\dfrac23=6$。
    solution_steps:
    - title: 转成右侧比例
      content: $AB:AC=4:10=2:5$，所以 $AD:AE=2:5$。
    - title: 看差段
      content: $AE$ 比 $AD$ 多 $3$ 份，因此 $DE:AD=3:2$。
    - title: 乘已知量
      content: $AD=DE\times\dfrac23=9\times\dfrac23=6$。
    teaching:
      teaching_goal: 减少提示后训练整段比例到差段比例的转换。
      source_relations:
      - fallback:parallel_side_corresponding_ratio
      expected_blocker: 能写 $AD:AE=2:5$，但不知道 $DE$ 是多出的 3 份。
      entry_point: transfer
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 比例份数清楚，答案为整数。
      upgrade_rule: 能把 $AD:AE$ 自动改成 $DE:AD$。
      fallback_move: 画份数条：$AD$ 是 2 份，$AE$ 是 5 份。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-teacher-q4-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.teacher.q4.prompt
      diagram_job_id: practice-teacher-q4-prompt
