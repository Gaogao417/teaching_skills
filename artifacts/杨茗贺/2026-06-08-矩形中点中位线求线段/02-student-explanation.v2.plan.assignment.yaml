                      label_dy: -20
                  - type: "text"
                    id: "mo-len"
                    x: 2.35
                    y: 3.42
                    text: "MO=4"
                    style:
                      font_size: 15
                      fill: "#2563eb"
                  - type: "text"
                    id: "mf-len"
                    x: 0.45
                    y: 2.62
                    text: "MF=1"
                    style:
                      font_size: 15
                      fill: "#16a34a"
                  - type: "text"
                    id: "of-len"
                    x: 2.5
                    y: 2.58
                    text: "OF=3"
                    style:
                      font_size: 15
                      fill: "#dc2626"
          - id: "route-big-midline"
            latex: "看 $\triangle ABD$ 中的中位线"
            content_latex: |
              在 $\triangle ABD$ 中，由中位线定理得
              $$
              MO=\frac12AD=4.
              $$
          - id: "route-small-midline"
            latex: "看 $\triangle ABE$ 中的中位线"
            content_latex: |
              在 $\triangle ABE$ 中，由中位线定理得
              $$
              MF=\frac12BE=1.
              $$
          - id: "route-subtract"
            latex: "用同一直线上的两段相减"
            content_latex: |
              $MO\parallel AD$，$MF\parallel BE$，且 $AD\parallel BE$，所以 $M,F,O$ 共线。
              因此
              $$
              OF=MO-MF=4-1=3.
              $$

  - id: "solution"
    title: "二、标准讲解"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "dual_explanation"
        id: "sol-main"
        label: "本题"
        stem_latex: "求 $OF$ 的长。"
        side_title: "小贴士"
        side_items:
          - kind: "hint"
            title: "为什么补 $M$"
            content_latex: "$O$ 在 $BD$ 上，$F$ 在 $AE$ 上；补 $AB$ 的中点 $M$，才能分别组成 $\triangle ABD$ 和 $\triangle ABE$ 的中位线。"
          - kind: "hint"
            title: "看哪两个三角形"
            content_latex: "先看大三角形 $\triangle ABD$ 得 $MO$，再看小三角形 $\triangle ABE$ 得 $MF$。"
          - kind: "mistake"
            title: "为什么相减"
            content_latex: "$M,F,O$ 共线，且 $F$ 在 $M$ 与 $O$ 之间，所以 $OF=MO-MF$，不是 $MO+MF$。"
        solution_title: "解答"
        solution_step_ids:
          - "route-find-width"
          - "route-add-midpoint"
          - "route-big-midline"
          - "route-small-midline"
          - "route-subtract"
        connection_title: "一句话收束"
        connection_items:
          - latex: "本题的关键不是硬算 $O,F$ 的坐标，而是补一个中点，把两个已有中点接进中位线。"

  - id: "summary"
    title: "三、方法收束"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "summary_dual"
        id: "summary-block"
        left_title: "答案"
        left_items:
          - latex: "$OF=3$"
        right_title: "方法提醒"
        right_items:
          - latex: "看到两个中点但套不上中位线时，先想：能不能补一个中点。"
          - latex: "平行线间的中点连线，常常等于两条对应底边的一半之差。"
