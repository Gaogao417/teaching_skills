        label: "题目"
        stem_latex: |
          如图，在矩形 $ABCD$ 中，$AB=6$，$BD=10$，$O$ 为对角线 $BD$ 的中点，
          $E$ 为边 $BC$ 上一点，连接 $AE$，取 $AE$ 的中点 $F$，连接 $OF$。
          若 $BE=2$，则 $OF$ 的长为多少？
