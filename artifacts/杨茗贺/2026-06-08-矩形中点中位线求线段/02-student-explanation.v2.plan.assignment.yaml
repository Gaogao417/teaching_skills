  - id: "route-section"
    title: "一、解题路线"
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "route"
        id: "route"
        steps:
          - id: "route-find-width"
            latex: "先求矩形的另一条边"
            content_latex: |
              由矩形得 $CD=AB=6$，在 $\triangle BCD$ 中，
              $$
              BC=\sqrt{BD^2-CD^2}=\sqrt{10^2-6^2}=8.
              $$
              所以 $AD=BC=8$。
          - id: "route-add-midpoint"
            latex: "在 $AB$ 上补取中点 $M$"
            content_latex: |
              取 $M$ 为 $AB$ 的中点。
            diagram_slot:
              slot_id: "explanation.v2.solution.annotated"
              diagram_ref: "explanation.v2.solution.annotated"
              variant: "solution"
              disclosure_policy: "annotated"
              reuse_geometry_from: "explanation.v2.orig.prompt"
              required: true
              on_failure: "fail_assignment"
              placement: "step_diagram"
              layout_role: "solution_annotation"
              width_hint: "0.58\\linewidth"
              caption: "补 $M$：$MO=4$，$MF=1$。"
              engine: "coordinate_renderer"
              diagram_kind: "coordinate_geometry"
              teaching_intent: "explanation_solution"
              problem_context:
                stem_latex: "在原题图基础上，补取 M 为 AB 的中点，连接 MO 与 MF。"
                grade_or_topic: "八年级几何·中位线"
              semantic_constraints:
                given_objects:
                  - "原题矩形 ABCD 与点 E,O,F"
                given_constraints:
                  - "M 是 AB 的中点"
                  - "MO 是三角形 ABD 的中位线"
                  - "MF 是三角形 ABE 的中位线"
                derived_objects:
                  - "辅助点 M"
                  - "线段 MO"
                  - "线段 MF"
                derived_constraints:
                  - "MO=AD/2=4"
                  - "MF=BE/2=1"
                  - "OF=MO-MF=3"
                solution_allowed_annotations:
                  - "标出辅助点 M"
                  - "标出 MO=4、MF=1"
              visual_requirements:
                show_labels: true
                show_given_markers: true
                show_axes: false
                preferred_orientation: "landscape"
                caption: "补 $M$：$MO=4$，$MF=1$。"
              analytic_requirements:
                viewport:
                  x_min: -0.8
                  x_max: 8.8
                  y_min: -0.8
                  y_max: 6.8
                  preserve_aspect: true
                axes:
                  x: false
                  y: false
                  grid: false
                  show_ticks: false
                  x_label: ""
                  y_label: ""
                objects:
                  - type: "polygon"
                    id: "rect"
                    points: ["A", "B", "C", "D"]
                    style:
                      fill: "#f8fafc"
                      stroke: "#111827"
                      stroke_width: 2.4
                  - type: "polyline"
                    id: "BD"
