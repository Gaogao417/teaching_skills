  visibility: both
  blocks:
  - type: problem
    id: q1
    points: 10
    label: 平行线求线段
    stem_latex: '如图，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。

      已知 $PA=\frac{5}{12}$，$PC=\frac{25}{12}$，$CD=10$，求 $AB$。

      '
    answer_space:
      type: steps
      height: 38mm
      step_count: 4
    answer: $AB=2$。
    explanation: $\frac{AB}{CD}=\frac{PA}{PC}=\frac15$，所以 $AB=10\times\frac15=2$。
    solution_steps:
    - title: 写比例
      content: $\frac{AB}{10}=\frac{5/12}{25/12}=\frac15$。
    - title: 求第四条线
      content: $AB=10\times\frac15=2$。
    teaching:
      teaching_goal: A 字型中已知三条线段求第四条线段
