- id: fraction-warmup
  title: 一、分母相同分子相除（5 道）
  type: practice
  visibility: both
  blocks:
  - type: problem
    id: w1
    points: 5
    label: 第 1 题
    stem_latex: '计算：$\dfrac{5}{12}\div\dfrac{25}{12}$。'
    answer_space: {type: steps, height: 22mm, step_count: 2}
    answer: $\dfrac{1}{5}$。
    explanation: 分母相同，分子相除：$5\div25=\frac15$。
    solution_steps:
    - {title: 直接计算, content: '$5\div25=\frac15$。'}
    teaching:
      teaching_goal: 识别同分母时只比较分子
      source_relations: [training-number-database:rational_multiple_pairs]
      number_selection: {database_id: question-bank-training-numbers, family_id: rational_multiple_pairs, entry_id: rational-5-over-12-x-5, subcategory: numerator_multiple_only}
      expected_blocker: 先把两个分数通分，增加无效计算。
      entry_point: solve_and_check
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 只做一次倒数转换和整除。
      upgrade_rule: 能直接看出同分母时结果等于分子之比。
      fallback_move: 先把除法改写成乘第二个分数的倒数。
  - type: problem
    id: w2
    points: 5
    label: 第 2 题
    stem_latex: '计算：$\dfrac{4}{7}\div\dfrac{20}{7}$。'
    answer_space: {type: steps, height: 22mm, step_count: 2}
    answer: $\dfrac{1}{5}$。
    explanation: 同分母，$\frac{4}{7}\div\frac{20}{7}=4\div20=\frac15$。
    solution_steps:
    - {title: 直接计算, content: '$4\div20=\frac15$。'}
    teaching:
      teaching_goal: 识别同分母时只比较分子
      source_relations: [training-number-database:rational_multiple_pairs]
      number_selection: {database_id: question-bank-training-numbers, family_id: rational_multiple_pairs, entry_id: rational-4-over-7-x-5, subcategory: numerator_multiple_only}
      expected_blocker: 忽略 20 与 4 的整倍数关系。
      entry_point: solve_and_check
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 只做一次倒数转换和整除。
      upgrade_rule: 能口算得到 5。
      fallback_move: 先写成乘倒数，再分别约 20 与 4、7 与 7。
