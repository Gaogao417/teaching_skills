- id: same-numerator
  title: 二、分子相同，分母相除（5 道）
  type: practice
  visibility: both
  blocks:
  - type: problem
    id: w6
    points: 5
    label: 第 1 题
    stem_latex: '计算：$\dfrac{7}{10}\div\dfrac{7}{5}$。'
    answer_space: {type: steps, height: 22mm, step_count: 2}
    answer: $\dfrac{1}{2}$。
    explanation: 分子相同，分母反过来相除：$5\div10=\frac12$。
    solution_steps:
    - {title: 直接计算, content: '$5\div10=\frac12$。'}
    teaching: &same_num_teaching
      teaching_goal: 识别同分子时分母反过来相除
      source_relations: [training-number-database:rational_multiple_pairs]
      number_selection: {database_id: question-bank-training-numbers, family_id: rational_multiple_pairs, entry_id: rational-7-over-10-x-2, subcategory: denominator_multiple_only}
      expected_blocker: 分母仍按原顺序相除。
      entry_point: solve_and_check
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 直接做整数除法。
      upgrade_rule: 能直接口算反向的分母之比。
      fallback_move: 先标出第二个分母除以第一个分母。
