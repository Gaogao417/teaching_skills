- id: mixed-parallel
  title: 三、平行线比例：已知三条线求第四条线（10 道）
  type: practice
  visibility: both
  blocks:
  - type: problem
    id: q1
    points: 10
    label: 平行线求线段
    stem_latex: |
      如图，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。
      已知 $PA=\frac{5}{12}$，$PC=\frac{25}{12}$，$CD=10$，求 $AB$。
    answer_space: {type: steps, height: 38mm, step_count: 4}
    answer: $AB=2$。
    explanation: $\frac{AB}{CD}=\frac{PA}{PC}=\frac15$，所以 $AB=10\times\frac15=2$。
    solution_steps:
    - {title: 写比例, content: '$\frac{AB}{10}=\frac{5/12}{25/12}=\frac15$。'}
    - {title: 求第四条线, content: '$AB=10\times\frac15=2$。'}
    teaching:
      teaching_goal: A 字型中已知三条线段求第四条线段
      source_relations: [fallback:approved_2026_07_12_explanation]
      number_selection: {database_id: question-bank-training-numbers, family_id: rational_multiple_pairs, entry_id: rational-5-over-12-x-5, integer: 10}
      expected_blocker: 忘记把外段 AC 加到 PA 上。
      entry_point: solve_and_check
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: 直接复用热身第 1 题的分数商，再乘整数 10。
      upgrade_rule: 能先写整段关系，再写同序比例。
      fallback_move: 沿点序 P-A-C 写出 PC=PA+AC。
