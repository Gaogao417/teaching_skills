  - type: problem
    id: q2
    points: 8
    label: 第 2 题（A 字型）
    stem_latex: 如图，$l_1\parallel l_2$，点 $A$ 在两条平行线外侧，直线 $AC$、$AD$ 分别交 $l_1$、$l_2$ 于 $C,E$ 和 $D,F$。已知 $AC:AE=3:5$，$CD=9$，求
      $EF$。
    answer_space:
      type: steps
      height: 30mm
      step_count: 4
    answer: $EF=15$。
    explanation: $AC:AE=3:5$ 是两个相似三角形的对应边比，故 $CD:EF=3:5$。$CD=9$ 为 3 份，每份 3，故 $EF=5\times3=15$。
    solution_steps:
    - title: 先看已知比的对象
      content: $AC$、$AE$ 分属两个相似三角形，是对应边比。
    - title: 配对对应边
      content: 由 $\triangle ACD\sim\triangle AEF$，得 $CD:EF=AC:AE=3:5$。
    - title: 用份数求解
      content: $CD=9$ 是 3 份，每份 3，所以 $EF=5\times3=15$。
    teaching:
      teaching_goal: 识别两个相似三角形的对应边比，并迁移到另一组对应边。
      source_relations:
      - fallback:parallel_line_ratio_parts
      expected_blocker: 把 $AC:AE$ 与 $CD:EF$ 的对应顺序写反。
      entry_point: build_relation
      scaffold_level: high
      variation_depth: changed_representation
      complexity_note: 一次相似对应和一次份数计算，答案为整数。
      upgrade_rule: 能写出 $AC\leftrightarrow AE$、$CD\leftrightarrow EF$。
      fallback_move: 先写 $\triangle ACD\sim\triangle AEF$。
