  - type: problem
    id: q4
    points: 8
    label: 第 4 题（8 字型）
    stem_latex: 如图，$l_1\parallel l_2$，点 $A$ 在两条平行线之间，直线 $AC$、$AD$ 分别交两条平行线于 $C,E$
      和 $D,F$。已知 $AC:AE=3:5$，$CD=12$，求 $EF$。
    answer_space:
      type: steps
      height: 30mm
      step_count: 4
    answer: $EF=20$。
    explanation: $AC:AE=3:5$，对应有 $CD:EF=3:5$。$CD=12$ 为 3 份，每份 4，故 $EF=5\times4=20$。
    solution_steps:
    - title: 观察已知条件
      content: $AC:AE$ 是两个相似三角形的对应边比。
    - title: 配对目标边
      content: 由 $\triangle ACD\sim\triangle AEF$，得 $CD:EF=3:5$。
    - title: 用份数求解
      content: $CD=12$ 是 3 份，每份 4，所以 $EF=5\times4=20$。
    teaching:
      teaching_goal: 巩固 8 字型对应边比与份数求解。
      source_relations:
      - fallback:parallel_line_ratio_parts
      expected_blocker: 把 $CD$、$EF$ 与斜边对应关系混淆。
      entry_point: solve_and_check
      scaffold_level: low
      variation_depth: changed_numbers
      complexity_note: 一次对应关系和一次份数计算，答案为整数。
      upgrade_rule: 能独立写出 $CD:EF=AC:AE$。
      fallback_move: 在图上沿两条平行线找 $CD$、$EF$。
