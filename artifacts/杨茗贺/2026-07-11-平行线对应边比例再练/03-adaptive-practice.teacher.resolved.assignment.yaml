  - type: problem
    id: q3
    points: 8
    label: 第 3 题（8 字型）
    stem_latex: 如图，$l_1\parallel l_2$，点 $A$ 在两条平行线之间，直线 $AC$、$AD$ 分别交两条平行线于 $C,E$
      和 $D,F$。已知 $AC:AE=2:3$，$AD=10$，求 $AF$。
    answer_space:
      type: steps
      height: 30mm
      step_count: 4
    answer: $AF=15$。
    explanation: 8 字型中 $\triangle ACD\sim\triangle AEF$，所以 $AD:AF=AC:AE=2:3$。$AD=10$
      为 2 份，每份 5，故 $AF=3\times5=15$。
    solution_steps:
    - title: 先观察图形位置
      content: 点 $A$ 在两条平行线之间，构成 8 字型；$AC:AE$ 是两个三角形的对应边比。
    - title: 写出对应关系
      content: 由 $\triangle ACD\sim\triangle AEF$，得 $AD:AF=2:3$。
    - title: 用份数求解
      content: $AD=10$ 是 2 份，每份 5，所以 $AF=3\times5=15$。
    teaching:
      teaching_goal: 在 8 字型中保持对应关系不变，训练图形方向变化后的迁移。
      source_relations:
      - fallback:parallel_line_ratio_parts
      expected_blocker: 只凭图形方向套 A 字型公式，漏看对应点。
      entry_point: transfer
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 与第 2 题同一计算层级，只改变相似图形位置。
      upgrade_rule: 能说明 A 字型和 8 字型都按对应边比例处理。
      fallback_move: 先标出 $AC\leftrightarrow AE$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-ratio-teacher-q3-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.ratio.teacher.q3.prompt
