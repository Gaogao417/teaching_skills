  blocks:
  - type: problem
    id: q1
    points: 8
    label: 第 1 题（A 字型）
    stem_latex: 如图，$l_1\parallel l_2$，点 $A$ 在两条平行线外侧，直线 $AC$、$AD$ 分别交 $l_1$、$l_2$
      于 $C,E$ 和 $D,F$。已知 $AC:CE=2:3$，$AD=8$，求 $DF$。
    answer_space:
      type: steps
      height: 30mm
      step_count: 4
    answer: $DF=12$。
    explanation: $AC:CE=2:3$ 是同一条截线上的分段比，对应得到 $AD:DF=2:3$。$AD=8$ 为 2 份，每份 4，故 $DF=3\times4=12$。
    solution_steps:
    - title: 先看已知比的对象
      content: $AC:CE$ 是同一条截线上的分段比；图形是 A 字型。
    - title: 写成对应份数
      content: $AD:DF=AC:CE=2:3$。
    - title: 用份数求解
      content: $AD=8$ 是 2 份，每份 $8\div2=4$，所以 $DF=3\times4=12$。
    teaching:
      teaching_goal: 先辨认同一条截线上的分段比，再用对应份数求目标段。
      source_relations:
      - fallback:parallel_line_ratio_parts
      expected_blocker: 把 $AC:CE$ 误写成两个三角形的对应边比。
      entry_point: find_entry
      scaffold_level: high
      variation_depth: changed_representation
      complexity_note: 一次对应关系和一次份数计算，答案为整数。
      upgrade_rule: 能指出 $CE$ 是分段而不是整段三角形边。
      fallback_move: 先在图上圈出 $AC,CE$ 是否共线。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-ratio-teacher-q1-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.ratio.teacher.q1.prompt
