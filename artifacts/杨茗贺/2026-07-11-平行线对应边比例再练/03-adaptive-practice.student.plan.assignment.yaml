    stem_latex: '如图，$l_1\parallel l_2$，点 $A$ 在两条平行线外侧，直线 $AC$、$AD$ 分别交 $l_1$、$l_2$ 于 $C,E$ 和 $D,F$。

      已知 $AC:CE=2:3$，$AD=8$，求 $DF$。

      '
    diagram_slot:
      slot_id: practice.ratio.student.q1.prompt
      diagram_ref: practice.ratio.student.q1.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 第 1 题图
      engine: renderer_spec
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      problem_context:
        stem_latex: A 字型平行线图，已知 $AC:CE=2:3$，$AD=8$。
        source_problem_text: 画两条水平平行线 l_1、l_2。A 在 l_1 上方外侧；直线 AC 经过 A、C、E，直线 AD 经过 A、D、F；C、D 在 l_1 上，E、F 在 l_2 上。标出 A、C、D、E、F、l_1、l_2，不标数字和答案。
      semantic_constraints:
        given_objects:
        - A
        - C
        - D
        - E
        - F
        given_constraints:
        - l1 and l2 are parallel horizontal lines
        - A is above and outside the strip formed by l1 and l2
        - A, C, E are collinear; C lies on l1; E lies on l2
        - A, D, F are collinear; D lies on l1; F lies on l2
        clean_forbidden:
        - 不要写比例答案
        - 不要写辅助线
      engine_options:
