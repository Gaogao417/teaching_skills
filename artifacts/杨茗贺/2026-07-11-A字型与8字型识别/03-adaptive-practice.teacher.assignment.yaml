    answer: $l_1\parallel l_2$；点 $A$；直线 $AC$、$AD$；$\triangle ACD\sim\triangle AEF$；8
      字型。
    explanation: 点 $A$ 位于两条平行线之间，$AC$、$AD$ 是两条交叉截线，故两侧三角形构成 8 字型相似模型。
    solution_steps:
    - title: 找平行线
      content: $l_1\parallel l_2$。
    - title: 找交点和截线
      content: 两平行线之间的交点为 $A$，过 $A$ 的两条截线为 $AC$、$AD$。
    - title: 写相似模型
      content: $\triangle ACD\sim\triangle AEF$，且 A 在两平行线之间，所以是 8 字型。
    teaching:
      teaching_goal: 识别 8 字型的内部交点和两条截线
