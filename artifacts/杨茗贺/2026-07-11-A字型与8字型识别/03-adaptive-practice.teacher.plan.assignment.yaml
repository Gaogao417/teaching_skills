  title: 一、找出 A 字型和 8 字型
  type: practice
  visibility: both
  blocks:
  - type: problem
    id: q1
    points: 10
    label: 第 1 题
    stem_latex: 观察下图，填写：（1）两条平行线；（2）平行线外侧的点；（3）过该点且同时与 $l_1,l_2$ 相交的两条直线；（4）相似三角形；（5）模型名称。
    answer_space:
      type: steps
      height: 34mm
      step_count: 5
    answer: $l_1\parallel l_2$；点 $A$；直线 $AC$、$AD$；$\triangle ACD\sim\triangle AEF$；A 字型。
    explanation: 点 $A$ 在两条平行线外侧，$AC$、$AD$ 分别经过 $A$ 并交两条平行线，底边 $CD\parallel EF$，故为 A 字型相似模型。
    solution_steps:
    - title: 找平行线
      content: $l_1\parallel l_2$。
    - title: 找外点和两条截线
      content: 外侧点为 $A$，过 $A$ 的两条截线为 $AC$、$AD$。
    - title: 写相似模型
      content: $\triangle ACD\sim\triangle AEF$，且 A 在平行线外侧，所以是 A 字型。
    teaching:
      teaching_goal: 识别 A 字型的平行线、外点和两条截线
      source_relations:
      - fallback:similarity_shape_identification
      expected_blocker: 漏找平行线或把截线写成 CE、DF
      entry_point: find_entry
      scaffold_level: high
      variation_depth: changed_representation
      complexity_note: 只做图形识别
      upgrade_rule: 能完整写出平行关系与相似三角形
      fallback_move: 先看哪两条直线保持同方向
    diagram_slot:
      slot_id: recognition.teacher.q1.prompt
      diagram_ref: recognition.teacher.q1.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 第 1 题图
      engine: renderer_spec
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      problem_context:
