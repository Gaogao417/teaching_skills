    content_latex: '第 1、2 题：$DF\parallel BC$；模型点为 $A$；截线为 $AB,AC$；$\triangle ADF\sim\triangle
      ABC$；A 字型。\\

      第 3 题：$AB\parallel CF$；模型点为 $E$；截线为 $AC,BF$；$\triangle EAB\sim\triangle ECF$；8
      字型。\\

      第 4 题：$DB\parallel CF$；模型点为 $P$；截线为 $CD,BF$；$\triangle PDB\sim\triangle PCF$；8
      字型。

      '
