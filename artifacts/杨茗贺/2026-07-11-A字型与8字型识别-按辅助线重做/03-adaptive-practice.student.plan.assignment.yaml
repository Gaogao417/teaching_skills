  - &model_question
    type: problem
    id: q1
    label: 第 1 题
    points: 10
    stem_latex: |
      观察完整图形中的原三角形、两条分线和已作好的平行辅助线。把图中的实际对象代入模型：

      （1）$l_1\parallel l_2$ 对应 \underline{\hspace{2cm}}；（2）模型点 $A$ 对应 \underline{\hspace{1cm}}；
      （3）两条截线 $AC,AD$ 对应 \underline{\hspace{1.5cm}}、\underline{\hspace{1.5cm}}；
      （4）相似三角形是 \underline{\hspace{4cm}}；（5）该模型是 \underline{\hspace{1.5cm}} 型。
    answer_space: {type: steps, height: 32mm, step_count: 2}
    diagram_slot:
      slot_id: identify.student.q1.prompt
      diagram_ref: identify.student.q1.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 第 1 题图
      engine: renderer_spec
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      semantic_constraints: {given_objects: [A, B, C, D, E, F, G, P], given_constraints: [D on AB, E on AC, CD meets BE at P, DG parallel BC]}
      engine_options:
        renderer_spec:
          schema_version: geometry-render-spec/v1
          job_id: identify-student-q1-full-a
          variant: prompt
          disclosure_policy: clean
          type: synthetic_geometry
          status: ready
          points: {A: [0, 4], B: [-3, 0], C: [3, 0], D: [-1.2, 2.4], E: [1.5, 2], F: [1.2, 2.4], G: [2.4, 2.4], P: [0.375, 1.5]}
          segments: [{from: A, to: B}, {from: B, to: C}, {from: C, to: A}, {from: C, to: D}, {from: B, to: G}, {from: D, to: G}]
          markers: [{type: parallel, segments: [[D, G], [B, C]]}]
