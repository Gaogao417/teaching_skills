sections:
  - id: total-to-long
    title: 例题 1：已知全长，求长段
    show_title: true
    type: explanation
    visibility: student
    blocks:
      - type: problemcard
        id: example-total-to-long
        label: 例题 1
        stem_latex: |
          一条装饰线全长 $30\text{ cm}$，按黄金分割分成较长、较短两段。
          求较长一段的长度。
      - type: route
        id: route-total-to-long
        steps:
          - id: total-to-long-calculate
            latex: 列式计算
            content_latex: |
              \[
                30\times\frac{\sqrt5-1}{2}
                =15(\sqrt5-1)\text{ cm}.
              \]
      - type: dual_explanation
        id: explanation-total-to-long
        label: 例题 1
        stem_latex: 求较长一段的长度。
        side_title: 小贴士
        side_items:
          - kind: hint
            title: 第一步：确定两条边
            content_latex: |
              本题已知的是“全” $30\text{ cm}$，要求的是“长”。
          - kind: hint
            title: 第二步：确定比值
            content_latex: |
              三组两两比值为
              \[
                \begin{aligned}
                  \frac{\text{短}}{\text{长}}&=\frac{\sqrt5-1}{2},\\
                  \frac{\text{长}}{\text{全}}&=\frac{\sqrt5-1}{2},\\
                  \frac{\text{短}}{\text{全}}&=\frac{3-\sqrt5}{2}.
                \end{aligned}
              \]
              本题用“长比全” $\dfrac{\text{长}}{\text{全}}=\dfrac{\sqrt5-1}{2}$。
          - kind: hint
            title: 第三步：确定乘除
            content_latex: |
              已知的是分母“全”，所以用 $30\times\dfrac{\sqrt5-1}{2}$。
        solution_title: 解答
        solution_step_ids:
          - total-to-long-calculate

  - id: short-to-total
    title: 例题 2：已知短段，求全长
    show_title: true
    type: explanation
    visibility: student
    layout:
      break_before: true
    blocks:
      - type: problemcard
        id: example-short-to-total
        label: 例题 2
        stem_latex: |
          一段窗格按黄金分割分成长、短两段，其中较短一段长 $6\text{ m}$。
          求整段窗格的长度。
      - type: route
        id: route-short-to-total
        steps:
          - id: short-to-total-calculate
            latex: 列式计算
            content_latex: |
              \[
                6\div\frac{3-\sqrt5}{2}
                =3(3+\sqrt5)\text{ m}.
              \]
      - type: dual_explanation
        id: explanation-short-to-total
        label: 例题 2
        stem_latex: 求整段窗格的长度。
        side_title: 小贴士
        side_items:
          - kind: hint
            title: 第一步：确定两条边
            content_latex: |
              本题已知的是“短” $6\text{ m}$，要求的是“全”。
          - kind: hint
            title: 第二步：确定比值
            content_latex: |
              直接使用“短比全” $\dfrac{\text{短}}{\text{全}}=\dfrac{3-\sqrt5}{2}$，不必先求长段。
          - kind: hint
            title: 第三步：确定乘除
            content_latex: |
              已知的是分子“短”，所以用 $6\div\dfrac{3-\sqrt5}{2}$。
        solution_title: 解答
        solution_step_ids:
          - short-to-total-calculate
