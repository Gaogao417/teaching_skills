sections:
- id: golden-ratio-practice
  title: 一、黄金分割比专项（每题 8 分，共 48 分）
  type: practice
  visibility: student
  blocks:
  - type: problem
    id: gr1
    points: 8
    label: 第 1 题
    diagram_col:
      image_path: images/gr1-sunflower.png
      width: 42mm
      caption: 花盘径向线
    stem_latex: |
      在自然观察手账中，同学想画一朵向日葵花盘的径向示意线。花心到花瓣外缘长 $20\text{ cm}$，为了让花瓣环的位置看起来更接近自然花序的疏密美感，准备把花瓣环标在黄金分割点附近。若黄金分割中长段:全长 $=\dfrac{\sqrt5-1}{2}$，求从花心到花瓣环的较长一段长度。
    answer_space:
      type: steps
      height: 28mm
  - type: problem
    id: gr2
    points: 8
    label: 第 2 题
    diagram_col:
      image_path: images/gr2-bookmark.png
      width: 42mm
      caption: 书签分区
    stem_latex: |
      设计一张带传统纹样的书签时，较长的纹样区用来放莲花纹，长 $15\text{ cm}$；较短的留白区用来写姓名。为了让纹样和留白有更舒服的比例，设计师采用黄金分割关系。若短段:长段 $=\dfrac{\sqrt5-1}{2}$，求较短留白区的长度。
    answer_space:
      type: steps
      height: 28mm
  - type: problem
    id: gr3
    points: 8
    label: 第 3 题
    diagram_col:
      image_path: images/gr3-stage.png
      width: 42mm
      caption: 舞台光带
    stem_latex: |
      舞蹈舞台的背景幕布上有一条横向光带，导演把它分成“静区”和“亮区”两段，让演员站位偏在黄金分割附近。较短的静区长 $6\text{ m}$，若短段:长段 $=\dfrac{\sqrt5-1}{2}$，求较长的亮区长度。
    answer_space:
      type: steps
      height: 30mm
  - type: problem
    id: gr4
    points: 8
    label: 第 4 题
    diagram_col:
      image_path: images/gr4-garden.png
      width: 42mm
      caption: 赏花小径
    stem_latex: |
      园林里一条总长 $34\text{ m}$ 的赏花小径，常把观景点放在不正中、但看起来很自然的位置。园艺师准备按黄金分割把小径分成长短两段。若长段:全长 $=\dfrac{\sqrt5-1}{2}$，求从入口到观景点的较短一段长度。
    answer_space:
      type: steps
      height: 30mm
  - type: problem
    id: gr5
    points: 8
    label: 第 5 题
    diagram_col:
      image_path: images/gr5-photo.png
      width: 42mm
      caption: 摄影构图
    stem_latex: |
      摄影构图时，摄影师常把主体放在画面黄金分割线附近，而不是正中间。一张照片裁切后，主体到较远边的长留白为 $18\text{ cm}$。若这段长留白与原来整条边的比为 $\dfrac{\sqrt5-1}{2}$，求原来整条边的长度。
    answer_space:
      type: steps
      height: 30mm
  - type: problem
    id: gr6
    points: 8
    label: 第 6 题
    diagram_col:
      image_path: images/gr6-architecture.png
      width: 42mm
      caption: 窗格分段
    stem_latex: |
      古典建筑立面常用黄金分割的比例安排窗格，让墙面不显得呆板。一段窗格被分成长短两段，其中较短窗格长 $4\text{ m}$。若短段:长段 $=\dfrac{\sqrt5-1}{2}$，求整段窗格的长度。
    answer_space:
      type: steps
      height: 32mm
