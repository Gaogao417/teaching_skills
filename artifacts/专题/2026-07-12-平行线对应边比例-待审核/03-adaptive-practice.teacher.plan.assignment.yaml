render:
  template: exam-zh-practice
  paper_size: a4paper
  answer_key_position: after_page_break
sections:
  - id: a-shape
    title: 一、A 字型（3 题）
    type: practice
    visibility: both
    blocks:
      - type: problem
        id: a1
        points: 10
        label: 第 1 题
        stem_latex: |
          如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。
          已知 $PA:AC=1:2$，求 $AB:CD$。
        answer_space: {type: steps, height: 38mm, step_count: 4}
        answer: '$AB:CD=1:3$'
        explanation: '本问涉及平行边长度比。先把 $PA:AC$ 改写为两个相似三角形的对应边比 $PA:PC$，再转到 $AB:CD$。'
        solution_steps:
          - title: 根据点序补出整段
            content: '由 $P-A-C$，$PC=PA+AC$，所以 $PA:PC=1:(1+2)=1:3$。'
          - title: 写出相似与对应边
            content: '由 $AB\parallel CD$，$△PAB\sim△PCD$，故 $AB:CD=PA:PC$。'
          - title: 得出结果
            content: '$AB:CD=1:3$。'
        teaching:
          teaching_goal: 先判断本问涉及平行边比，再用截线上的分段比求两个三角形的比。
          source_relations: [fallback:approved_review_parallel_corresponding_sides]
          expected_blocker: 直接把 $PA:AC$ 当成相似三角形对应边比。
          entry_point: find_entry
          scaffold_level: medium
          variation_depth: changed_question
          complexity_note: 只含一次整段加法和一次对应比转换。
          upgrade_rule: 能主动先求 $PA:PC$。
          fallback_move: 先画出 $PC=PA+AC$的份数图。
      - type: problem
        id: a2
        points: 10
        label: 第 2 题
        stem_latex: |
          如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。
          已知 $PA:PC=2:5$，求 $PB:PD$。
        diagram_slot:
          slot_id: practice.parallel.student.a3.prompt
          diagram_ref: practice.parallel.student.a3.prompt
          variant: prompt
          disclosure_policy: clean
          required: true
          on_failure: fail_assignment
          placement: diagram_col
          layout_role: question_sidecar
          display_profile: worksheet_geometry_sidecar
          caption: 第 2 题图
          engine: geometric_scene
          diagram_kind: synthetic_geometry
          engine_options: {engine_model_config: {codex_model: gpt-5.6-luna}}
          teaching_intent: practice_prompt
          problem_context:
            stem_latex: '$AC$ 与 $BD$ 交于 $P$，$P-A-C$、$P-B-D$，$AB\parallel CD$。'
            source_problem_text: 画 A 字型嵌套三角形：P 在两条平行线同侧，P-A-C 和 P-B-D 为严格点序，连接 AB 与 CD 并标平行符号。只标点名和平行符号，不显示比例推导或答案。
          semantic_constraints:
            given_objects: [A, B, C, D, P]
            given_constraints:
              - A, P, C are collinear with exact order P-A-C
              - B, P, D are collinear with exact order P-B-D
              - AB is parallel to CD
              - P lies outside the strip between AB and CD
            clean_forbidden: [do not label similar triangles or A-shape, do not draw correspondence arrows or answers]
        answer_space: {type: steps, height: 38mm, step_count: 4}
        answer: '$PB:PD=2:5$'
        explanation: '本问不把 $AB:CD$ 作为已知或所求，只在 $AC,BD$ 两条截线上转移对应边比。'
        solution_steps:
          - title: 写出相似三角形
            content: '由 $AB\parallel CD$，$△PAB\sim△PCD$。'
          - title: 只取两条截线上的对应边
            content: '$PA\leftrightarrow PC$，$PB\leftrightarrow PD$，所以 $PA:PC=PB:PD$。'
          - title: 得出结果
            content: '$PB:PD=2:5$。'
        teaching:
          teaching_goal: 识别本问不需要计算 $AB:CD$，只转移截线上的对应边比。
          source_relations: [fallback:approved_review_parallel_corresponding_sides]
          expected_blocker: 看到平行条件就多写 $AB:CD$，忽略本问只求截线比。
          entry_point: build_relation
          scaffold_level: medium
          variation_depth: changed_question
          complexity_note: 直接转移一组对应边比。
          upgrade_rule: 能只写 $PA:PC=PB:PD$而不写无关比例。
          fallback_move: 在两条截线上分别圈出小、大三角形的对应边。
      - type: problem
        id: a3
        points: 10
        label: 第 3 题
        stem_latex: |
          如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $P-A-C$、$P-B-D$，且 $AB\parallel CD$。
          已知 $PB:BD=3:5$，求 $PA:PC$。
        diagram_slot:
          slot_id: practice.parallel.student.a2.prompt
          diagram_ref: practice.parallel.student.a2.prompt
          variant: prompt
          disclosure_policy: clean
          required: true
          on_failure: fail_assignment
          placement: diagram_col
          layout_role: question_sidecar
          display_profile: worksheet_geometry_sidecar
          caption: 第 3 题图
          engine: geometric_scene
          diagram_kind: synthetic_geometry
          engine_options: {engine_model_config: {codex_model: gpt-5.6-luna}}
          teaching_intent: practice_prompt
          problem_context:
            stem_latex: '$AC$ 与 $BD$ 交于 $P$，$P-A-C$、$P-B-D$，$AB\parallel CD$。'
            source_problem_text: 画 A 字型嵌套三角形：P 在两条平行线同侧，P-A-C 和 P-B-D 为严格点序，连接 AB 与 CD 并标平行符号。只标点名和平行符号，不显示比例推导或答案。
          semantic_constraints:
            given_objects: [A, B, C, D, P]
            given_constraints:
              - A, P, C are collinear with exact order P-A-C
              - B, P, D are collinear with exact order P-B-D
              - AB is parallel to CD
              - P lies outside the strip between AB and CD
            clean_forbidden: [do not label similar triangles or A-shape, do not draw correspondence arrows or answers]
        answer_space: {type: steps, height: 38mm, step_count: 4}
        answer: '$PA:PC=3:8$'
        explanation: '本问先根据 A 字型点序把分段比 $PB:BD$ 改写为对应边比 $PB:PD$，再转移到另一条截线。'
        solution_steps:
          - title: 先看点序
            content: '由 $P-B-D$，$PD=PB+BD$，所以 $PB:PD=3:(3+5)=3:8$。'
          - title: 转移对应边比
            content: '由 $△PAB\sim△PCD$，$PA:PC=PB:PD$。'
          - title: 得出结果
            content: '$PA:PC=3:8$。'
        teaching:
          teaching_goal: 在“只转移截线比”中，正确处理 A 字型的整段加法。
          source_relations: [fallback:approved_review_parallel_corresponding_sides]
          expected_blocker: 把 $PD$ 误写为 $BD-PB$。
          entry_point: solve_and_check
          scaffold_level: low
          variation_depth: packaged_condition
          complexity_note: 一次分段比转整段比，再转移比例。
          upgrade_rule: 能用点序自主写出 $PD=PB+BD$。
          fallback_move: 把 $PB,BD$ 分别看成 3 份和 5 份。
  - id: eight-shape
    title: 二、8 字型（3 题）
    type: practice
    visibility: both
    layout: {break_before: true}
    blocks:
      - type: problem
        id: b1
        points: 10
        label: 第 4 题
        stem_latex: |
          如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。
          已知 $AP:AC=2:5$，求 $AB:CD$。
        diagram_slot:
          slot_id: practice.parallel.student.b1.prompt
          diagram_ref: practice.parallel.student.b1.prompt
          variant: prompt
          disclosure_policy: clean
          required: true
          on_failure: fail_assignment
          placement: diagram_col
          layout_role: question_sidecar
          display_profile: worksheet_geometry_sidecar
          caption: 第 4 题图
          engine: geometric_scene
          diagram_kind: synthetic_geometry
          engine_options: {engine_model_config: {codex_model: gpt-5.6-luna}}
          teaching_intent: practice_prompt
          problem_context:
            stem_latex: '$AC$ 与 $BD$ 交于 $P$，$A-P-C$、$B-P-D$，$AB\parallel CD$。'
            source_problem_text: 画清晰、非退化的交叉 8 字型：采用坐标 A=(-3,2)、B=(3,2)、C=(3,-2)、D=(-3,-2)、P=(0,0)。AB 和 CD 是上下两条水平平行线段，AC 与 BD 在其间交于 P；A-P-C 和 B-P-D 为严格点序。上下平行线之间要保留明显高度，交叉角不能过小。只标点名和平行符号，不显示比例推导或答案。
          semantic_constraints:
            given_objects: [A, B, C, D, P]
            given_constraints:
              - A, P, C are collinear with exact order A-P-C
              - B, P, D are collinear with exact order B-P-D
              - AB is parallel to CD
              - P lies inside both AC and BD and between AB and CD
              - use a clear nondegenerate crossed layout with A=(-3,2), B=(3,2), C=(3,-2), D=(-3,-2), P=(0,0)
              - vertical distance between AB and CD is visually substantial and the crossing angle is not flat
            clean_forbidden: [do not label similar triangles or 8-shape, do not draw correspondence arrows or answers]
        answer_space: {type: steps, height: 38mm, step_count: 4}
        answer: '$AB:CD=2:3$'
        explanation: '本问涉及平行边长度比。先用 8 字型点序把 $AP:AC$ 改写为 $AP:PC$，再转到 $AB:CD$。'
        solution_steps:
          - title: 根据点序求另一段
            content: '由 $A-P-C$，$AC=AP+PC$，所以 $AP:PC=2:(5-2)=2:3$。'
          - title: 写出对应边比
            content: '由 $AB\parallel CD$，$△PAB\sim△PCD$，故 $AB:CD=AP:PC$。'
          - title: 得出结果
            content: '$AB:CD=2:3$。'
        teaching:
          teaching_goal: 先判断本问涉及平行边比，再用整段与分段的关系求两个三角形的比。
          source_relations: [fallback:approved_review_parallel_corresponding_sides]
          expected_blocker: 沿用 A 字型的加法，忽略 $AC$ 是整段。
          entry_point: find_entry
          scaffold_level: medium
          variation_depth: changed_representation
          complexity_note: 一次整段减法和一次对应比转换。
          upgrade_rule: 能先求 $AP:PC$ 再回答平行边比。
          fallback_move: 把 $AC$ 看成 5 份，标出 $AP$ 占 2 份。
      - type: problem
        id: b2
        points: 10
        label: 第 5 题
        stem_latex: |
          如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。
          已知 $BP:PD=4:7$，求 $AP:PC$。
        diagram_slot:
          slot_id: practice.parallel.student.b2.prompt
          diagram_ref: practice.parallel.student.b2.prompt
          variant: prompt
          disclosure_policy: clean
          required: true
          on_failure: fail_assignment
          placement: diagram_col
          layout_role: question_sidecar
          display_profile: worksheet_geometry_sidecar
          caption: 第 5 题图
          engine: geometric_scene
          diagram_kind: synthetic_geometry
          engine_options: {engine_model_config: {codex_model: gpt-5.6-luna}}
          teaching_intent: practice_prompt
          problem_context:
            stem_latex: '$AC$ 与 $BD$ 交于 $P$，$A-P-C$、$B-P-D$，$AB\parallel CD$。'
            source_problem_text: 画交叉的 8 字型：AB 和 CD 为上下两条平行线段，AC 与 BD 在其间交于 P；A-P-C 和 B-P-D 为严格点序。只标点名和平行符号，不显示比例推导或答案。
          semantic_constraints:
            given_objects: [A, B, C, D, P]
            given_constraints:
              - A, P, C are collinear with exact order A-P-C
              - B, P, D are collinear with exact order B-P-D
              - AB is parallel to CD
              - P lies inside both AC and BD and between AB and CD
            clean_forbidden: [do not label similar triangles or 8-shape, do not draw correspondence arrows or answers]
        answer_space: {type: steps, height: 38mm, step_count: 4}
        answer: '$AP:PC=4:7$'
        explanation: '本问不涉及 $AB:CD$，只把 $BD$ 截线上的对应边比转移到 $AC$ 截线。'
        solution_steps:
          - title: 写出相似三角形
            content: '由 $AB\parallel CD$，$△PAB\sim△PCD$。'
          - title: 只取截线上的对应边
            content: '$PB\leftrightarrow PD$，$PA\leftrightarrow PC$，所以 $PB:PD=PA:PC$。'
          - title: 得出结果
            content: '$AP:PC=4:7$。'
        teaching:
          teaching_goal: 在 8 字型中直接转移两条截线上的对应边比。
          source_relations: [fallback:approved_review_parallel_corresponding_sides]
          expected_blocker: 把 $PB:PD$ 误当成整段与分段的比再做多余计算。
          entry_point: transfer
          scaffold_level: low
          variation_depth: changed_question
          complexity_note: 一次对应边比直接转移。
          upgrade_rule: 能不引入 $AB:CD$ 完成解答。
          fallback_move: 先配对 $PB\leftrightarrow PD$ 和 $PA\leftrightarrow PC$。
      - type: problem
        id: b3
        points: 10
        label: 第 6 题
        stem_latex: |
          如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。
          已知 $BP:BD=3:8$，求 $AP:PC$。
        answer_space: {type: steps, height: 38mm, step_count: 4}
        answer: '$AP:PC=3:5$'
        explanation: '本问先根据 8 字型点序从整段比 $BP:BD$ 求出分段比 $BP:PD$，再转移到 $AC$ 截线。'
        solution_steps:
          - title: 先看点序
            content: '由 $B-P-D$，$BD=BP+PD$，所以 $BP:PD=3:(8-3)=3:5$。'
          - title: 转移对应边比
            content: '由 $△PAB\sim△PCD$，$AP:PC=BP:PD$。'
          - title: 得出结果
            content: '$AP:PC=3:5$。'
        teaching:
          teaching_goal: 在“只转移截线比”中，正确处理 8 字型的整段减法。
          source_relations: [fallback:approved_review_parallel_corresponding_sides]
          expected_blocker: 沿用 A 字型的加法，把 $BP:PD$ 算成 $3:11$。
          entry_point: solve_and_check
          scaffold_level: low
          variation_depth: packaged_condition
          complexity_note: 一次整段比转分段比，再转移比例。
          upgrade_rule: 能用点序自主写出 $BD=BP+PD$。
          fallback_move: 把 $BD$ 看成 8 份，先求 $PD$ 占几份。
