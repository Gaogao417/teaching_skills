      packages:
      - tikz
      libraries: []
- id: eight-shape
  title: 二、8 字型（3 题）
  type: practice
  visibility: both
  layout:
    break_before: true
  blocks:
  - type: problem
    id: b1
    points: 10
    label: 第 4 题
    stem_latex: '如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。

      已知 $AP:AC=2:5$，求 $AB:CD$。

      '
    answer_space:
      type: steps
      height: 38mm
      step_count: 4
    answer: $AB:CD=2:3$
    explanation: 本问涉及平行边长度比。先用 8 字型点序把 $AP:AC$ 改写为 $AP:PC$，再转到 $AB:CD$。
    solution_steps:
    - title: 根据点序求另一段
      content: 由 $A-P-C$，$AC=AP+PC$，所以 $AP:PC=2:(5-2)=2:3$。
    - title: 写出对应边比
      content: 由 $AB\parallel CD$，$△PAB\sim△PCD$，故 $AB:CD=AP:PC$。
    - title: 得出结果
      content: $AB:CD=2:3$。
    teaching:
      teaching_goal: 先判断本问涉及平行边比，再用整段与分段的关系求两个三角形的比。
      source_relations:
      - fallback:approved_review_parallel_corresponding_sides
      expected_blocker: 沿用 A 字型的加法，忽略 $AC$ 是整段。
      entry_point: find_entry
      scaffold_level: medium
      variation_depth: changed_representation
      complexity_note: 一次整段减法和一次对应比转换。
      upgrade_rule: 能先求 $AP:PC$ 再回答平行边比。
      fallback_move: 把 $AC$ 看成 5 份，标出 $AP$ 占 2 份。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-parallel-student-b1-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.parallel.student.b1.prompt
      diagram_job_id: practice-parallel-student-b1-prompt
      width: 60mm
      caption: 第 4 题图
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:758f984ad402f214d98f93eca7f66a1ba99acfdc961d9e5a0a6a525548e49da5
      packages:
      - tikz
      libraries: []
  - type: problem
    id: b2
    points: 10
    label: 第 5 题
    stem_latex: '如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。

      已知 $BP:PD=4:7$，求 $AP:PC$。

      '
    answer_space:
      type: steps
      height: 38mm
      step_count: 4
    answer: $AP:PC=4:7$
    explanation: 本问不涉及 $AB:CD$，只把 $BD$ 截线上的对应边比转移到 $AC$ 截线。
    solution_steps:
    - title: 写出相似三角形
      content: 由 $AB\parallel CD$，$△PAB\sim△PCD$。
    - title: 只取截线上的对应边
      content: $PB\leftrightarrow PD$，$PA\leftrightarrow PC$，所以 $PB:PD=PA:PC$。
    - title: 得出结果
      content: $AP:PC=4:7$。
    teaching:
      teaching_goal: 在 8 字型中直接转移两条截线上的对应边比。
      source_relations:
      - fallback:approved_review_parallel_corresponding_sides
      expected_blocker: 把 $PB:PD$ 误当成整段与分段的比再做多余计算。
      entry_point: transfer
      scaffold_level: low
      variation_depth: changed_question
      complexity_note: 一次对应边比直接转移。
      upgrade_rule: 能不引入 $AB:CD$ 完成解答。
      fallback_move: 先配对 $PB\leftrightarrow PD$ 和 $PA\leftrightarrow PC$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-parallel-student-b2-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.parallel.student.b2.prompt
      diagram_job_id: practice-parallel-student-b2-prompt
      width: 60mm
      caption: 第 5 题图
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:e62129ab72173cd3e0087b1c3abf7589d4979a02c0d77b159384139c07b80c99
      packages:
      - tikz
      libraries: []
  - type: problem
    id: b3
    points: 10
    label: 第 6 题
    stem_latex: '如图，直线 $AC$ 与 $BD$ 相交于点 $P$，点序分别为 $A-P-C$、$B-P-D$，且 $AB\parallel CD$。

      已知 $BP:BD=3:8$，求 $AP:PC$。

      '
    answer_space:
      type: steps
      height: 38mm
      step_count: 4
    answer: $AP:PC=3:5$
    explanation: 本问先根据 8 字型点序从整段比 $BP:BD$ 求出分段比 $BP:PD$，再转移到 $AC$ 截线。
    solution_steps:
    - title: 先看点序
      content: 由 $B-P-D$，$BD=BP+PD$，所以 $BP:PD=3:(8-3)=3:5$。
    - title: 转移对应边比
      content: 由 $△PAB\sim△PCD$，$AP:PC=BP:PD$。
    - title: 得出结果
      content: $AP:PC=3:5$。
    teaching:
      teaching_goal: 在“只转移截线比”中，正确处理 8 字型的整段减法。
      source_relations:
      - fallback:approved_review_parallel_corresponding_sides
      expected_blocker: 沿用 A 字型的加法，把 $BP:PD$ 算成 $3:11$。
      entry_point: solve_and_check
      scaffold_level: low
      variation_depth: packaged_condition
      complexity_note: 一次整段比转分段比，再转移比例。
      upgrade_rule: 能用点序自主写出 $BD=BP+PD$。
      fallback_move: 把 $BD$ 看成 8 份，先求 $PD$ 占几份。
