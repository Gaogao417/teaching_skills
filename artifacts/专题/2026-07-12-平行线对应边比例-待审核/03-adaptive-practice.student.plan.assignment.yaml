          problem_context:
            stem_latex: '$AC$ 与 $BD$ 交于 $P$，$A-P-C$、$B-P-D$，$AB\parallel CD$。'
            source_problem_text: 画清晰、非退化的交叉 8 字型：采用坐标 A=(-3,2)、B=(3,2)、C=(3,-2)、D=(-3,-2)、P=(0,0)。AB 和 CD 是上下两条水平平行线段，AC 与 BD 在其间交于 P；A-P-C 和 B-P-D 为严格点序。上下平行线之间要保留明显高度，交叉角不能过小。只标点名和平行符号，不显示比例推导或答案。
          semantic_constraints:
            given_objects: [A, B, C, D, P]
            given_constraints:
              - A, P, C are collinear with exact order A-P-C
              - B, P, D are collinear with exact order B-P-D
              - AB is parallel to CD
              - P lies inside both AC and BD and between AB and CD
              - use a clear nondegenerate crossed layout with A=(-3,2), B=(3,2), C=(3,-2), D=(-3,-2), P=(0,0)
              - vertical distance between AB and CD is visually substantial and the crossing angle is not flat
            clean_forbidden:
              - do not label similar triangles or 8-shape
              - do not draw correspondence arrows or answers
        answer_space: {type: steps, height: 38mm, step_count: 4}
