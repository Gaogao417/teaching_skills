  paper_size: a4paper
sections:
- id: ssa-altitude-two-positions
  title: SSA 不保证唯一：作高后检查垂足两侧
  show_title: true
  type: explanation
  visibility: student
  blocks:
  - type: solution
    id: ssa-core
    title: 锐角 SSA 的解数：先比较高、对边和另一已知边
    items:
    - latex: \textbf{先认条件：}已知两边及其中一边的对角，叫作 SSA。已知角不夹在两条已知边之间，所以三角形不一定唯一。
    - latex: \textbf{统一作高：}若已知锐角 $A$、对边 $a=BC$、另一边 $c=AB$，从非已知角顶点 $B$ 向 $AC$ 所在直线作
        $BH\perp AC$，则 $h=BH=c\sin A$。
    - content_latex: '\renewcommand{\arraystretch}{1.45}

        \begin{center}

        \begin{tabular}{c|c|c}

        \textbf{大小关系} & \textbf{解的个数} & \textbf{点的位置} \\

        \hline

        $a<h$ & $0$ & 定长边够不到角的另一边 \\

        $a=h$ & $1$ & 恰好落在垂足，得到直角三角形 \\

        $h<a<c$ & $2$ & 垂足两侧各有一个合法点 \\

        $a\ge c$ & $1$ & 近点分支退化或落到反向延长线上

        \end{tabular}

        \end{center}

        '
    - latex: \textbf{表格条件：}上表要求 $A$ 为锐角，且 $a$ 是 $A$ 的对边、$c$ 是另一条已知边。换字母时先重新认清这三个量。
  - type: problemcard
    id: ssa-example
    label: 例题
    stem_latex: '在 $\triangle ABC$ 中，已知 $\angle A=30^\circ$，$AB=8$，$BC=5$。

      不预设点 $C$ 的位置唯一，求所有可能的 $AC$，并说明为什么会出现两个三角形。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-ssa-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.ssa.prompt
      diagram_job_id: explanation-ssa-prompt
      width: 70mm
      caption: 点 $C$ 既要在 $30^\circ$ 射线上，又要满足到 $B$ 的距离为 $5$；先判断这样的位置是否唯一。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:8b03796603ad7247db169f5724498ea3cc2be538d826873bd44d0ed09fc88260
      packages:
      - tikz
      libraries: []
  - type: route
    id: ssa-route
    steps:
    - id: ssa-step-identify
      latex: 识别 SSA，不先假定图形唯一
      content_latex: 已知 $AB,BC$ 及 $BC$ 的对角 $\angle A$；$\angle A$ 不是两条已知边的夹角，因此属于 SSA。
    - id: ssa-step-altitude
      latex: 从非已知角顶点 $B$ 作高
      content_latex: 向 $AC$ 所在直线作 $BH\perp AC$ 于 $H$。在 $\operatorname{Rt}\triangle
        ABH$ 中，$BH=8\sin30^\circ=4$，$AH=8\cos30^\circ=4\sqrt3$。
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/explanation-ssa-altitude/rendered/solution.fragment.tex
        diagram_ref: explanation.ssa.altitude
        diagram_job_id: explanation-ssa-altitude
        width: 70mm
        caption: 两个候选点位于垂足 $H$ 两侧，点序分别给出线段差与线段和。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:21039bb9edb9c735f3cf0b3d90c857c7847eb91f6584e8ea6031ab1632751a9c
        packages:
        - tikz
        libraries: []
    - id: ssa-step-count
      latex: 先比较大小，确认有两个解
      content_latex: 因为 $BH=4<BC=5<AB=8$，即 $h<a<c$，所以点 $C$ 在垂足 $H$ 两侧各有一个合法位置。
    - id: ssa-step-second-rt
      latex: 在第二个直角三角形中求 $HC$
      content_latex: 在 $\operatorname{Rt}\triangle BCH$ 中，由勾股定理得 $HC=\sqrt{BC^2-BH^2}=\sqrt{5^2-4^2}=3$。
    - id: ssa-step-near
      latex: 近点分支：垂足在线段 $AC$ 的延长线上
      content_latex: 当点序为 $A-C_1-H$ 时，$AC_1=AH-C_1H=4\sqrt3-3$。
    - id: ssa-step-far
      latex: 远点分支：垂足在线段 $AC$ 内
      content_latex: 当点序为 $A-H-C_2$ 时，$AC_2=AH+HC_2=4\sqrt3+3$。
    - id: ssa-step-check
      latex: 检查两个候选三角形
      content_latex: 两个 $AC$ 均为正，且分别满足三角形不等式；故两种点序都对应合法三角形。
  - type: dual_explanation
    id: ssa-solution
    label: 例题
    stem_latex: 求所有可能的 $AC$，并说明两个三角形对应的点序。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 为什么从 $B$ 作高
      content_latex: $B$ 不是已知角顶点；由 $AB$ 和 $\angle A$ 可直接求出高 $BH$ 与投影 $AH$。
    - kind: hint
      title: 为什么先比较 $4,5,8$
      content_latex: $4<5$ 表示定长 $BC$ 能跨过垂足两侧；$5<8$ 保证靠近 $A$ 的候选点仍留在射线上。
    - kind: hint
      title: 两解从哪里来
      content_latex: 两解不是代数中的符号游戏，而是 $C_1,C_2$ 位于 $H$ 两侧的两个真实位置。
    - kind: mistake
      title: 垂足在线段外仍可能合法
      content_latex: 在近点分支中，$H$ 位于 $AC_1$ 的延长线上；原三角形仍然存在，不能因此删解。
    solution_title: 解答
    solution_step_ids:
    - ssa-step-identify
    - ssa-step-altitude
    - ssa-step-count
    - ssa-step-second-rt
    - ssa-step-near
    - ssa-step-far
    - ssa-step-check
    connection_title: 结论
    connection_items:
    - latex: $\boxed{AC=4\sqrt3-3\quad\text{或}\quad AC=4\sqrt3+3}$，共有两个三角形。
  - type: mistake
    id: ssa-mistake
    title: 易错提醒：不要把 SSA 当成唯一条件
    content_latex: '写出 $AC=AH\pm HC$ 还不够，必须说明两个符号各对应什么点序，并检查候选点是否仍在角的射线上。

      只有在锐角 SSA 中满足 $h<a<c$ 时才有两解；不能见到 SSA 就固定写两个答案。

      '
  - type: method_reminder
    id: ssa-method
    title: SSA 做题顺序
    items:
    - latex: \textbf{认：}已知角是不是两条已知边的夹角；若不是，先警惕 SSA 不唯一。
    - latex: \textbf{作：}从非已知角顶点向已知角的另一边所在直线作高。
    - latex: \textbf{比：}算 $h=c\sin A$，比较 $h,a,c$，先判 $0/1/2$ 解。
    - latex: \textbf{拆：}分别解两个 $\operatorname{Rt}\triangle$，再按点序作线段和差。
    - latex: \textbf{查：}检查正值、射线位置、点序和三角形不等式。
