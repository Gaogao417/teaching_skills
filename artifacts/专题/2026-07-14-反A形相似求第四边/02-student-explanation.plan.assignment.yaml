meta:
  title: 反 A 形相似：证明相似后求边长
  subtitle: 学生讲义
  grade: 八年级
  subject: 数学
  version: student
  source_artifacts:
    structure_analysis: artifacts/专题/2026-07-14-反A形相似求第四边/01-structure-analysis.md

render:
  template: exam-zh-explanation
  paper_size: a4paper

sections:
  - id: reverse-a-similarity
    title: 反 A 形：证明相似后求第四边
    show_title: true
    type: explanation
    visibility: student
    blocks:
      - type: problemcard
        id: reverse-a-example
        label: 例题
        stem_latex: |
          如图，$\angle PAB=\angle PDC$。已知 $PA=6$，$PB=8$，$PD=9$，求 $PC$。
        diagram_slot:
          slot_id: explanation.reverse-a.prompt
          diagram_ref: explanation.reverse-a.prompt
          variant: prompt
          disclosure_policy: clean
          required: true
          on_failure: fail_assignment
          placement: block_center
          layout_role: center_block
          display_profile: worksheet_geometry_center
          caption: 先沿两个角的顶点顺序，找出两个三角形的对应顶点。
          engine: geometric_scene
          diagram_kind: synthetic_geometry
          engine_options:
            engine_model_config:
              codex_model: gpt-5.4
          teaching_intent: explanation_prompt
          problem_context:
            stem_latex: '点 $P,A,C$ 依次共线，点 $P,B,D$ 依次共线，$\angle PAB=\angle PDC$，$PA=6$，$PB=8$，$PD=9$，求 $PC$。'
            source_problem_text: '画反 A 形的一小一大两个三角形：从 P 引出两条不重合射线，第一条射线上依次为 P、A、C，第二条射线上依次为 P、B、D；连接 AB 和 CD。标出 PA=6、PB=8、PD=9，PC 用问号表示；对角 PAB 与 PDC 使用相同角标记。只画题设信息，不标相似结论、比例式或答案。'
          semantic_constraints:
            given_objects: [P, A, B, C, D]
            given_constraints:
              - P, A, C are collinear in that order
              - P, B, D are collinear in that order
              - angle PAB equals angle PDC
              - PA=6
              - PB=8
              - PD=9
              - PC is the unknown side
              - draw segments AB and CD
            clean_forbidden:
              - do not mark triangle PAB similar to triangle PDC
              - do not show any proportion or the value of PC
              - do not imply AB is parallel to CD as a given condition
              - do not draw an isosceles or right-angle mark

      - type: route
        id: reverse-a-route
        steps:
          - id: reverse-a-prove-similar
            latex: 先证明两个三角形相似
            content_latex: '由共线关系，得 $\angle APB=\angle DPC$。又 $\angle PAB=\angle PDC$，所以 $\triangle PAB\sim\triangle PDC$。'
          - id: reverse-a-use-proportion
            latex: 再列对应边比例求边长
            content_latex: '由对应边成比例，得 $\dfrac{PA}{PD}=\dfrac{PB}{PC}$，即 $\dfrac69=\dfrac8{PC}$，解得 $PC=12$。'

      - type: dual_explanation
        id: reverse-a-solution
        label: 例题
        stem_latex: 求 $PC$。
        side_title: 小贴士
        side_items:
          - kind: hint
            title: 对应边怎么看
            content_latex: '先看等角的顶点：$A\leftrightarrow D$，公共顶点 $P\leftrightarrow P$，于是 $B\leftrightarrow C$；边由两个端点决定，所以 $PA\leftrightarrow PD$，$PB\leftrightarrow PC$。'
        solution_title: 解答
        solution_step_ids:
          - reverse-a-prove-similar
          - reverse-a-use-proportion
