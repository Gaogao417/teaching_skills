    - id: reverse-a-use-proportion
      latex: 再列对应边比例求边长
      content_latex: 由对应边成比例，得 $\dfrac{PA}{PD}=\dfrac{PB}{PC}$，即 $\dfrac69=\dfrac8{PC}$，解得
        $PC=12$。
