    id: nested-example
    label: 例题 1
    stem_latex: '如图，在 $\triangle ABC$ 中，$\angle ABD=\angle ACB$。已知 $AC=9$，$CD=5$。


      （1）求 $AB$；


      （2）若 $BC=12$，求 $BD$。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-nested-prompt/rendered/prompt.fragment.tex
