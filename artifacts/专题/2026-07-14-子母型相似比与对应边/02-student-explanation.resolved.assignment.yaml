  - type: route
    id: nested-route
    steps:
    - id: nested-step-similar
      latex: 先证明两个三角形相似
      content_latex: 由 $D\in AC$，得 $\angle BAD=\angle CAB$。又因为 $\angle ABD=\angle
        ACB$，所以 $\triangle ABD\sim\triangle ACB$。
    - id: nested-step-use-proportion
      latex: 再列对应边比例求边长
      content_latex: 先得 $AD=AC-CD=4$。由 $\dfrac{AC}{AB}=\dfrac{AB}{AD}$，得 $AB^2=9\times4$，所以
        $AB=6$；再由 $\dfrac{BC}{BD}=\dfrac{AC}{AB}=\dfrac96$，得 $BD=8$。
  - type: dual_explanation
    id: nested-solution
    label: 例题
    stem_latex: （1）求 $AB$；（2）若 $BC=12$，求 $BD$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 对应边怎么看
      content_latex: 先看等角的顶点：$A\leftrightarrow A$、$B\leftrightarrow C$，于是 $D\leftrightarrow
        B$；因此 $AB\leftrightarrow AC$、$AD\leftrightarrow AB$、$BD\leftrightarrow BC$。$CD$
        不在小三角形中，列比例前先换成 $AD=AC-CD$。
    solution_title: 解答
    solution_step_ids:
    - nested-step-similar
    - nested-step-use-proportion
