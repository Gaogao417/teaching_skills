- id: helper-ratio
  title: 比例辅助线：先选三角形，再接两组相似
  show_title: true
  type: explanation
  visibility: student
  blocks:
  - type: solution
    id: core-action
    title: 核心动作：把交点比例转成平行线比例
    items:
    - latex: 目标在 $CD$ 上时，先看 $\triangle ACD$，过 $C$ 作 $CF\parallel AB$。
    - latex: 外点 $E$ 看到一组相似：$\triangle EAB\sim\triangle ECF$，所以 $CF:AB=CE:AE$。
    - latex: 外点 $P$ 看到另一组相似：$\triangle PDB\sim\triangle PCF$，所以 $CP:PD=CF:DB$。
    - latex: 中间量 $CF$ 把两组比例接起来：$CP:PD=(AB:DB)\times(CE:AE)$。
  - type: problemcard
    id: example-card
    label: 例题
    stem_latex: '如图，在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$
      相交于点 $P$。

      已知 $AD:DB=1:1$，$AE:EC=1:2$，求 $CP:PD$。

      '
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/explanation-step1-prompt/rendered/prompt.fragment.tex
      diagram_ref: explanation.step1.prompt
      diagram_job_id: explanation-step1-prompt
      width: 70mm
      caption: 第 1 步：先标出已知线和目标线。
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:546877401433d5b7cfa590c3941e5c08f52c4a7980f1db917a6d58c11f3a41d1
      packages:
      - tikz
      libraries: []
  - type: route
    id: example-route
    steps:
    - id: ex-s1
      latex: 先圈出要用的三角形
      content_latex: 已知在 $AB$、$AC$ 上，目标在 $CD$ 上；目标线 $CD$ 属于 $\triangle ACD$。
    - id: ex-s2
      latex: 过顶点作对边平行线
      content_latex: 过 $C$ 作 $CF\parallel AB$，也就是 $CF\parallel DB$。
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/explanation-step2-solution/rendered/solution.fragment.tex
        diagram_ref: explanation.step2.solution
        diagram_job_id: explanation-step2-solution
        width: 70mm
        caption: 第 2 步：过 $C$ 作 $CF\parallel AB$。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:489473786dd9048b6730490ad07369afcd3449d5c3e3c0b9c229733ad42f26b7
        packages:
        - tikz
        libraries: []
    - id: ex-s3
      latex: 找到平行线上的交点
      content_latex: 令 $F=CF\cap BE$，这时 $B,P,E,F$ 在同一条直线上。
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/explanation-step3-solution/rendered/solution.fragment.tex
        diagram_ref: explanation.step3.solution
        diagram_job_id: explanation-step3-solution
        width: 70mm
        caption: 第 3 步：让 $CF$ 与 $BE$ 的延长线相交于 $F$。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:489473786dd9048b6730490ad07369afcd3449d5c3e3c0b9c229733ad42f26b7
        packages:
        - tikz
        libraries: []
    - id: ex-s4
      latex: 读两组相似比例
      content_latex: $\triangle EAB\sim\triangle ECF$，所以 $CF:AB=CE:AE$；$\triangle
        PDB\sim\triangle PCF$，所以 $CP:PD=CF:DB$。
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/explanation-step4-solution/rendered/solution.fragment.tex
        diagram_ref: explanation.step4.solution
        diagram_job_id: explanation-step4-solution
        width: 70mm
        caption: 第 4 步：外点 $E$ 和外点 $P$ 分别看到一组相似三角形。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:8ab5eb4ade7e010ee5c4689ff9d34b91424554db40fdaf1ef06e38d9c1c48e70
        packages:
        - tikz
        libraries: []
    - id: ex-s5
      latex: 把比例接起来
      content_latex: $CP:PD=(AB:DB)\times(CE:AE)$。由 $AD:DB=1:1$ 得 $AB:DB=2:1$；由 $AE:EC=1:2$
        得 $CE:AE=2:1$，所以 $CP:PD=4:1$。
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/explanation-step5-solution/rendered/solution.fragment.tex
        diagram_ref: explanation.step5.solution
        diagram_job_id: explanation-step5-solution
