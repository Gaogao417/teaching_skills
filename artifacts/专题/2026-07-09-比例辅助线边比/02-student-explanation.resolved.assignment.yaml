  - type: dual_explanation
    id: example-solution
    label: 例题
    stem_latex: 求 $CP:PD$。
    side_title: 小贴士
    side_items:
    - kind: hint
      title: 先看目标线
      content_latex: 目标是 $CP:PD$，它在 $CD$ 上，所以先看包含 $CD$ 的 $\triangle ACD$。
    - kind: hint
      title: 为什么作平行线
      content_latex: 作 $CF\parallel AB$ 后，$CF$ 同时和 $AB$、$DB$ 对应，能把两组相似接起来。
    - kind: mistake
      title: 整段比不要漏
      content_latex: 已知 $AD:DB$ 时，要求的是 $AB:DB$，要先把 $AD+DB$ 合成整段 $AB$。
    solution_title: 解答
    solution_step_ids:
    - ex-s1
    - ex-s2
    - ex-s3
    - ex-s4
    - ex-s5
  - type: method_reminder
    id: method-card
    title: 方法提醒
    items:
    - latex: 目标在 $CD$ 上：用 $CP:PD=(AB:DB)\times(CE:AE)$。
    - latex: 目标在 $BE$ 上：用 $BP:PE=(AC:CE)\times(BD:AD)$。
    - latex: 每次先把小段比转成需要的整段比，再相乘或反解。
