  blocks:
  - type: problem
    id: q1
    points: 10
    label: 第 1 题
    stem_latex: '如图，在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$
      相交于点 $P$。

      已知 $AD:DB=1:2$，$AE:EC=1:2$，求 $CP:PD$。

      '
    hints:
    - content_latex: 目标在 $CD$ 上，先想 $CP:PD=(AB:DB)\times(CE:AE)$。
    answer_space:
      type: steps
      height: 45mm
      step_count: 4
    answer: $CP:PD=3:1$。
    explanation: $AD:DB=1:2$，所以 $AB:DB=3:2$；$AE:EC=1:2$，所以 $CE:AE=2:1$；因此 $CP:PD=3:1$。
    solution_steps:
    - title: 选公式
      content: 目标在 $CD$ 上，用 $CP:PD=(AB:DB)\times(CE:AE)$。
    - title: 转整段比
      content: $AD:DB=1:2$，所以 $AB:DB=(AD+DB):DB=3:2$。
    - title: 转反向比
      content: $AE:EC=1:2$，所以 $CE:AE=2:1$。
    - title: 相乘
      content: $CP:PD=(3:2)\times(2:1)=3:1$。
    teaching:
      teaching_goal: 训练正向使用辅助线比例链求 $CD$ 上的分点比例。
      source_relations:
      - fallback:structure_analysis:parallel_helper_ratio_bridge
      model_fusion:
        model_count: 1
        models:
        - 平行辅助线接比例
        fusion_role: single_model
      relation_chain:
      - step: 1
        relation_id: fallback:parallel_helper_ratio_bridge.cd_target
        inputs:
          AD_DB: 62
          AE_EC: 62
        outputs:
          CP_PD: 181
        constraints_checked:
        - $D\in AB$，$E\in AC$，$P=CD\cap BE$
        - 全部线段长度为正
      expected_blocker: 容易把 $AD:DB$ 直接当成 $AB:DB$。
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: $1:n$ 型整段比转换和一次比例乘法。
      upgrade_rule: 若学生能先写出 $AB:DB$ 与 $CE:AE$，下一题可换目标线。
      fallback_move: 回到五步图，先标目标线 $CD$，再写 $CP:PD=(AB:DB)\times(CE:AE)$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-teacher-q1-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.teacher.q1.prompt
      diagram_job_id: practice-teacher-q1-prompt
      width: 60mm
      caption: 第 1 题图
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:69833c755a72fb9ef59ba50c8609d97fd93c911c301d38462a0ee135d1d5e10f
      packages:
      - tikz
      libraries: []
  - type: problem
    id: q2
    points: 10
    label: 第 2 题
    stem_latex: '如图，在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$
      相交于点 $P$。

      已知 $AD:DB=\frac{4}{3}:1$，$AE:EC=\frac{1}{2}:1$，求 $BP:PE$。

      '
    hints:
    - content_latex: 目标在 $BE$ 上，先想 $BP:PE=(AC:CE)\times(BD:AD)$。
    answer_space:
      type: steps
      height: 45mm
      step_count: 4
    answer: $BP:PE=9:8$。
    explanation: $AE:EC=\frac12:1$，所以 $AC:CE=\frac32:1=3:2$；$AD:DB=\frac43:1$，所以 $BD:AD=1:\frac43=3:4$；因此
      $BP:PE=(3:2)\times(3:4)=9:8$。
    solution_steps:
    - title: 选公式
      content: 目标在 $BE$ 上，用 $BP:PE=(AC:CE)\times(BD:AD)$。
    - title: 转整段比
      content: $AE:EC=\frac12:1$，所以 $AC:CE=(AE+EC):CE=\frac32:1=3:2$。
    - title: 转反向比
      content: $AD:DB=\frac43:1$，所以 $BD:AD=1:\frac43=3:4$。
    - title: 相乘
      content: $BP:PE=(3:2)\times(3:4)=9:8$。
    teaching:
      teaching_goal: 训练换目标线后仍按同一辅助线思路接两组比例。
      source_relations:
      - fallback:structure_analysis:parallel_helper_ratio_bridge
      model_fusion:
        model_count: 1
        models:
        - 平行辅助线接比例
        fusion_role: single_model
      relation_chain:
      - step: 1
        relation_id: fallback:parallel_helper_ratio_bridge.be_target
        inputs:
          AD_DB: 4/3:1
          AE_EC: 1/2:1
        outputs:
          BP_PE: 548
        constraints_checked:
        - $D\in AB$，$E\in AC$，$P=CD\cap BE$
        - 全部线段长度为正
      expected_blocker: 容易沿用第 1 题公式，或把分数比先错误化成整数比。
      entry_point: transfer
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 目标线从 $CD$ 换到 $BE$，并加入分数比的整段转换。
      upgrade_rule: 若学生能先判断目标线并写对整段比，可进入反向求边上分点比。
      fallback_move: 先问目标比例在哪条线上，再写 $BP:PE=(AC:CE)\times(BD:AD)$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-teacher-q2-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.teacher.q2.prompt
      diagram_job_id: practice-teacher-q2-prompt
      width: 60mm
      caption: 第 2 题图
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:7af4eab1bf1bb6aacc37891206ef842c929517842415ae01bb6bd63aa2172731
      packages:
      - tikz
      libraries: []
  - type: problem
    id: q3
    points: 10
    label: 第 3 题
    stem_latex: '如图，在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$
      相交于点 $P$。

      已知 $AE:EC=\sqrt{2}:1$，$CP:PD=2\sqrt{2}:1$，求 $AD:DB$。

      '
    hints:
    - content_latex: 反过来用 $CP:PD=(AB:DB)\times(CE:AE)$，先求 $AB:DB$。
    answer_space:
      type: steps
      height: 45mm
      step_count: 4
    answer: $AD:DB=3:1$。
    explanation: $AE:EC=\sqrt2:1$，所以 $CE:AE=1:\sqrt2$。由 $CP:PD=(AB:DB)\times(CE:AE)$
      得 $2\sqrt2=(AB:DB)\cdot\frac{1}{\sqrt2}$，所以 $AB:DB=4:1$，进而 $AD:DB=3:1$。
    solution_steps:
    - title: 反用比例链
      content: $CP:PD=(AB:DB)\times(CE:AE)$。
    - title: 代入已知
      content: $AE:EC=\sqrt2:1$，所以 $CE:AE=1:\sqrt2$；又 $CP:PD=2\sqrt2:1$。
    - title: 求整段比
      content: 因为 $2\sqrt2=(AB:DB)\cdot\frac{1}{\sqrt2}$，所以 $AB:DB=4:1$。
    - title: 转回分段比
      content: $AD:DB=(AB-DB):DB=3:1$。
    teaching:
      teaching_goal: 训练反向使用比例链，由交点比例反求边上的分点比例。
      source_relations:
      - fallback:structure_analysis:parallel_helper_ratio_bridge
      model_fusion:
        model_count: 1
        models:
        - 平行辅助线接比例
        fusion_role: single_model
      relation_chain:
      - step: 1
        relation_id: fallback:parallel_helper_ratio_bridge.reverse_ab
        inputs:
          AE_EC: sqrt(2):1
          CP_PD: 2sqrt(2):1
        outputs:
          AD_DB: 181
        constraints_checked:
        - $D\in AB$，$E\in AC$，$P=CD\cap BE$
        - 全部线段长度为正
      expected_blocker: 容易把 $CE:AE$ 写反，或求到 $AB:DB=4:1$ 后忘记转回 $AD:DB$。
      entry_point: reverse_construct
      scaffold_level: low
      variation_depth: reverse_construct
      complexity_note: 在原比例链上增加根式比化简、一元比例反解和整段转分段。
      upgrade_rule: 若学生能独立把 $AB:DB$ 转成 $AD:DB$，说明该模型的反向方向基本可迁移。
      fallback_move: 把 $DB$ 设为 $1$，先算 $AB$，再用 $AD=AB-DB$。
    diagram_col:
      kind: tikz
      tikz_code: ''
      tikz_path: build/diagram/jobs/practice-teacher-q3-prompt/rendered/prompt.fragment.tex
      diagram_ref: practice.teacher.q3.prompt
      diagram_job_id: practice-teacher-q3-prompt
      width: 60mm
      caption: 第 3 题图
      variant: prompt
      disclosure_policy: clean
      artifact_hash: sha256:29f2bdf7f6bf07925559fef704d9b7da74a095e43b380a2e1ef8bbca81accb99
      packages:
      - tikz
      libraries: []
