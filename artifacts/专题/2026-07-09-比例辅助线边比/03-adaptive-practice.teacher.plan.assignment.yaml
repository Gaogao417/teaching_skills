sections:
- id: main
  title: 一、核心练习
  type: practice
  visibility: teacher
  blocks:
  - type: problem
    id: q1
    points: 10
    label: 第 1 题
    stem_latex: |
      如图，在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$ 相交于点 $P$。
      已知 $AD:DB=1:2$，$AE:EC=1:2$，求 $CP:PD$。
    diagram_slot:
      slot_id: practice.teacher.q1.prompt
      diagram_ref: practice.teacher.q1.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 第 1 题图
      engine: geometric_scene
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      problem_context:
        stem_latex: 在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$ 相交于点 $P$。已知 $AD:DB=1:2$，$AE:EC=1:2$。
        source_problem_text: 画三角形 ABC，D 在 AB 上且 AD:DB=1:2，E 在 AC 上且 AE:EC=1:2，连接 CD 与 BE 交于 P。P 必须清楚落在 CD 上，使学生能看到目标分段 CP 和 PD。只画题设对象，不画辅助线，不写答案。
      semantic_constraints:
        given_objects: [A, B, C, D, E, P]
        given_constraints:
        - D lies on AB with AD:DB=1:2
        - E lies on AC with AE:EC=1:2
        - P is the intersection of CD and BE
        - target ratio is CP:PD; show C, P, D collinear so segments CP and PD are visible
        clean_forbidden:
        - 不要画辅助线
        - 不要写答案
    hints:
    - content_latex: 目标在 $CD$ 上，先想 $CP:PD=(AB:DB)\times(CE:AE)$。
    answer_space:
      type: steps
      height: 45mm
      step_count: 4
    answer: $CP:PD=3:1$。
    explanation: $AD:DB=1:2$，所以 $AB:DB=3:2$；$AE:EC=1:2$，所以 $CE:AE=2:1$；因此 $CP:PD=3:1$。
    solution_steps:
    - title: 选公式
      content: 目标在 $CD$ 上，用 $CP:PD=(AB:DB)\times(CE:AE)$。
    - title: 转整段比
      content: $AD:DB=1:2$，所以 $AB:DB=(AD+DB):DB=3:2$。
    - title: 转反向比
      content: $AE:EC=1:2$，所以 $CE:AE=2:1$。
    - title: 相乘
      content: $CP:PD=(3:2)\times(2:1)=3:1$。
    teaching:
      teaching_goal: 训练正向使用辅助线比例链求 $CD$ 上的分点比例。
      source_relations:
      - fallback:structure_analysis:parallel_helper_ratio_bridge
      model_fusion:
        model_count: 1
        models:
        - 平行辅助线接比例
        fusion_role: single_model
      relation_chain:
      - step: 1
        relation_id: fallback:parallel_helper_ratio_bridge.cd_target
        inputs:
          AD_DB: 1:2
          AE_EC: 1:2
        outputs:
          CP_PD: 3:1
        constraints_checked:
        - $D\in AB$，$E\in AC$，$P=CD\cap BE$
        - 全部线段长度为正
      expected_blocker: 容易把 $AD:DB$ 直接当成 $AB:DB$。
      entry_point: build_relation
      scaffold_level: medium
      variation_depth: changed_numbers
      complexity_note: $1:n$ 型整段比转换和一次比例乘法。
      upgrade_rule: 若学生能先写出 $AB:DB$ 与 $CE:AE$，下一题可换目标线。
      fallback_move: 回到五步图，先标目标线 $CD$，再写 $CP:PD=(AB:DB)\times(CE:AE)$。
  - type: problem
    id: q2
    points: 10
    label: 第 2 题
    stem_latex: |
      如图，在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$ 相交于点 $P$。
      已知 $AD:DB=\frac{4}{3}:1$，$AE:EC=\frac{1}{2}:1$，求 $BP:PE$。
    diagram_slot:
      slot_id: practice.teacher.q2.prompt
      diagram_ref: practice.teacher.q2.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 第 2 题图
      engine: geometric_scene
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      problem_context:
        stem_latex: 在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$ 相交于点 $P$。已知 $AD:DB=\frac{4}{3}:1$，$AE:EC=\frac{1}{2}:1$。
        source_problem_text: 画三角形 ABC，D 在 AB 上且 AD:DB=4/3:1，E 在 AC 上且 AE:EC=1/2:1，连接 CD 与 BE 交于 P。P 必须清楚落在 BE 上，使学生能看到目标分段 BP 和 PE。只画题设对象，不画辅助线，不写答案。
      semantic_constraints:
        given_objects: [A, B, C, D, E, P]
        given_constraints:
        - D lies on AB with AD:DB=4/3:1
        - E lies on AC with AE:EC=1/2:1
        - P is the intersection of CD and BE
        - target ratio is BP:PE; show B, P, E collinear so segments BP and PE are visible
        clean_forbidden:
        - 不要画辅助线
        - 不要写答案
    hints:
    - content_latex: 目标在 $BE$ 上，先想 $BP:PE=(AC:CE)\times(BD:AD)$。
    answer_space:
      type: steps
      height: 45mm
      step_count: 4
    answer: $BP:PE=9:8$。
    explanation: $AE:EC=\frac12:1$，所以 $AC:CE=\frac32:1=3:2$；$AD:DB=\frac43:1$，所以 $BD:AD=1:\frac43=3:4$；因此 $BP:PE=(3:2)\times(3:4)=9:8$。
    solution_steps:
    - title: 选公式
      content: 目标在 $BE$ 上，用 $BP:PE=(AC:CE)\times(BD:AD)$。
    - title: 转整段比
      content: $AE:EC=\frac12:1$，所以 $AC:CE=(AE+EC):CE=\frac32:1=3:2$。
    - title: 转反向比
      content: $AD:DB=\frac43:1$，所以 $BD:AD=1:\frac43=3:4$。
    - title: 相乘
      content: $BP:PE=(3:2)\times(3:4)=9:8$。
    teaching:
      teaching_goal: 训练换目标线后仍按同一辅助线思路接两组比例。
      source_relations:
      - fallback:structure_analysis:parallel_helper_ratio_bridge
      model_fusion:
        model_count: 1
        models:
        - 平行辅助线接比例
        fusion_role: single_model
      relation_chain:
      - step: 1
        relation_id: fallback:parallel_helper_ratio_bridge.be_target
        inputs:
          AD_DB: 4/3:1
          AE_EC: 1/2:1
        outputs:
          BP_PE: 9:8
        constraints_checked:
        - $D\in AB$，$E\in AC$，$P=CD\cap BE$
        - 全部线段长度为正
      expected_blocker: 容易沿用第 1 题公式，或把分数比先错误化成整数比。
      entry_point: transfer
      scaffold_level: medium
      variation_depth: changed_question
      complexity_note: 目标线从 $CD$ 换到 $BE$，并加入分数比的整段转换。
      upgrade_rule: 若学生能先判断目标线并写对整段比，可进入反向求边上分点比。
      fallback_move: 先问目标比例在哪条线上，再写 $BP:PE=(AC:CE)\times(BD:AD)$。
  - type: problem
    id: q3
    points: 10
    label: 第 3 题
    stem_latex: |
      如图，在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$ 相交于点 $P$。
      已知 $AE:EC=\sqrt{2}:1$，$CP:PD=2\sqrt{2}:1$，求 $AD:DB$。
    diagram_slot:
      slot_id: practice.teacher.q3.prompt
      diagram_ref: practice.teacher.q3.prompt
      variant: prompt
      disclosure_policy: clean
      required: true
      on_failure: fail_assignment
      placement: diagram_col
      layout_role: question_sidecar
      display_profile: worksheet_geometry_sidecar
      caption: 第 3 题图
      engine: geometric_scene
      diagram_kind: synthetic_geometry
      teaching_intent: practice_prompt
      problem_context:
        stem_latex: 在 $\triangle ABC$ 中，点 $D$ 在边 $AB$ 上，点 $E$ 在边 $AC$ 上，$CD$ 与 $BE$ 相交于点 $P$。已知 $AE:EC=\sqrt{2}:1$，$CP:PD=2\sqrt{2}:1$。
        source_problem_text: 画三角形 ABC，题面比例保持 AE:EC=sqrt(2):1，CP:PD=2sqrt(2):1。为避免图形生成反解，可直接使用近似坐标 A=(0,0), B=(4,0), D=(3,0), C=(0,2.414), E=(0,1.414), P=(2.216,0.631)。这些坐标满足 E 在 AC 上且 AE:EC≈1.414:1，P 在 CD 上且 CP:PD≈2.828:1，B、P、E 共线。只画题设对象，不画辅助线，不写答案，不标出 AD:DB。
      semantic_constraints:
        given_objects: [A, B, C, D, E, P]
        given_constraints:
        - E lies on AC with AE:EC=sqrt(2):1, use drawing approximation AE:EC=1.414:1
        - use approximate coordinates A=(0,0), B=(4,0), D=(3,0), C=(0,2.414), E=(0,1.414), P=(2.216,0.631)
        - D lies on AB; do not label AD:DB
        - P is the intersection of CD and BE
        - CP:PD=2*sqrt(2):1, use drawing approximation CP:PD=2.828:1
        clean_forbidden:
        - 不要画辅助线
        - 不要写答案
    hints:
    - content_latex: 反过来用 $CP:PD=(AB:DB)\times(CE:AE)$，先求 $AB:DB$。
    answer_space:
      type: steps
      height: 45mm
      step_count: 4
    answer: $AD:DB=3:1$。
    explanation: $AE:EC=\sqrt2:1$，所以 $CE:AE=1:\sqrt2$。由 $CP:PD=(AB:DB)\times(CE:AE)$ 得 $2\sqrt2=(AB:DB)\cdot\frac{1}{\sqrt2}$，所以 $AB:DB=4:1$，进而 $AD:DB=3:1$。
    solution_steps:
    - title: 反用比例链
      content: $CP:PD=(AB:DB)\times(CE:AE)$。
    - title: 代入已知
      content: $AE:EC=\sqrt2:1$，所以 $CE:AE=1:\sqrt2$；又 $CP:PD=2\sqrt2:1$。
    - title: 求整段比
      content: 因为 $2\sqrt2=(AB:DB)\cdot\frac{1}{\sqrt2}$，所以 $AB:DB=4:1$。
    - title: 转回分段比
      content: $AD:DB=(AB-DB):DB=3:1$。
    teaching:
      teaching_goal: 训练反向使用比例链，由交点比例反求边上的分点比例。
      source_relations:
      - fallback:structure_analysis:parallel_helper_ratio_bridge
      model_fusion:
        model_count: 1
        models:
        - 平行辅助线接比例
        fusion_role: single_model
      relation_chain:
      - step: 1
        relation_id: fallback:parallel_helper_ratio_bridge.reverse_ab
        inputs:
          AE_EC: sqrt(2):1
          CP_PD: 2sqrt(2):1
        outputs:
          AD_DB: 3:1
        constraints_checked:
        - $D\in AB$，$E\in AC$，$P=CD\cap BE$
        - 全部线段长度为正
      expected_blocker: 容易把 $CE:AE$ 写反，或求到 $AB:DB=4:1$ 后忘记转回 $AD:DB$。
      entry_point: reverse_construct
      scaffold_level: low
      variation_depth: reverse_construct
      complexity_note: 在原比例链上增加根式比化简、一元比例反解和整段转分段。
      upgrade_rule: 若学生能独立把 $AB:DB$ 转成 $AD:DB$，说明该模型的反向方向基本可迁移。
      fallback_move: 把 $DB$ 设为 $1$，先算 $AB$，再用 $AD=AB-DB$。
- id: answer-key
  title: 答案
  type: answer_key
  visibility: teacher
  blocks:
  - type: answer
    id: answers
    title: 答案速查
    items:
    - latex: 第 1 题：$CP:PD=3:1$。
    - latex: 第 2 题：$BP:PE=9:8$。
    - latex: 第 3 题：$AD:DB=3:1$。
