sections:
  - id: main
    title: 一、先围三角形，再作平行线接两组比例
    type: practice
    visibility: student
    blocks:
      - type: problem
        id: q1
        points: 10
        label: 第 1 题
        stem_latex: |
          如图，在 $\triangle ABC$ 中，点 $D$ 在线段 $BC$ 上，点 $E$ 在线段 $AC$ 上，
          线段 $AD$ 与 $BE$ 相交于点 $P$。已知
          \[
          AE:EC=1:4,\qquad AP:PD=2:3,
          \]
          求 $BP:PE$。

          \begin{enumerate}[label=(\arabic*)]
            \item 写出两条已知比和所求比分别在哪三条直线上，并指出这三条直线围成的三角形；
            \item 选择这个三角形的一个顶点，在图中作对边的平行线，并写清它与第四条比例线相交于哪一点；
            \item 写出辅助线形成的两组 A/8 字型相似三角形；
            \item 用两组相似所得的比例求 $BP:PE$。
          \end{enumerate}
        diagram_slot:
          slot_id: auxiliary.student.q1.prompt
          diagram_ref: auxiliary.student.q1.prompt
          variant: prompt
          disclosure_policy: clean
          required: true
          on_failure: fail_assignment
          placement: diagram_col
          layout_role: question_sidecar
          display_profile: worksheet_geometry_sidecar
          caption: 第 1 题原始构型，请在图上补作辅助线。
          engine: geometric_scene
          diagram_kind: synthetic_geometry
          engine_options:
            engine_model_config:
              codex_model: gpt-5.4
          teaching_intent: practice_prompt
          problem_context:
            stem_latex: 在 $\triangle ABC$ 中，$D\in BC$，$E\in AC$，$P=AD\cap BE$。已知 $AE:EC=1:4$、$AP:PD=2:3$，求 $BP:PE$。
            source_problem_text: 画原始三角形 ABC，D 在线段 BC 上，E 在线段 AC 上，AD 与 BE 交于 P。由 AE:EC=1:4、AP:PD=2:3 确定一致母图，并保持 A-E-C、A-P-D、B-P-E、B-D-C 的点序清楚；不要画 F、辅助线、相似标记、比例答案或任何解题提示。标签必须逐点错开：A 上方，B 左下，C 右下，D 下方，E 在 AC 右上侧，P 在交点左下侧；禁止标签压在线段、交点或彼此重叠。
          semantic_constraints:
            given_objects: [A, B, C, D, E, P]
            given_constraints:
              - A, E, C are collinear with E between A and C
              - B, D, C are collinear with D between B and C
              - A, P, D are collinear with P between A and D
              - B, P, E are collinear with P between B and E
              - AE:EC=1:4
              - AP:PD=2:3
              - show segments AE, EC, AP, PD, BP and PE clearly
            clean_forbidden:
              - do not draw point F or any auxiliary parallel line; the parallel line is the student's construction task
              - do not mark similar triangles
              - do not show BD:DC, intermediate ratios, or the answer
        hints:
          - content_latex: '先把“两条已知比＋所求比”落到三条直线上，再看它们围成哪个三角形。'
          - content_latex: '作线后先找两组相似；两组比例要通过同一条中间线段接起来。'
        answer_space:
          type: steps
          height: 68mm
          step_count: 5
        layout:
          avoid_break: true
