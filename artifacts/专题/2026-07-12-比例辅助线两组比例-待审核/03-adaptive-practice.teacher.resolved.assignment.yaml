  - type: problem
    id: q3
    points: 10
    label: 第 3 题
    stem_latex: "如图，在 $\\triangle ABC$ 中，点 $D$ 在线段 $BC$ 上，点 $E$ 在线段 $AC$ 上，\n线段 $AD$\
      \ 与 $BE$ 相交于点 $P$。已知\n\\[\nAP:PD=2:1,\\qquad BP:PE=3:1,\n\\]\n求 $BD:DC$。\n\n\
      \\begin{enumerate}[label=(\\arabic*)]\n  \\item 写出两条已知比和所求比分别在哪三条直线上，并指出这三条直线围成的三角形；\n\
      \  \\item 选择这个三角形的一个顶点，在图中作对边的平行线，并写清它与第四条比例线相交于哪一点；\n  \\item 写出辅助线形成的两组 A/8\
      \ 字型相似三角形；\n  \\item 用两组相似所得的比例求 $BD:DC$。\n\\end{enumerate}\n"
    hints:
    - content_latex: 先找 $AD,BE,BC$ 三条比例线围成的三角形，再决定平行线。
    answer_space:
      type: steps
      height: 70mm
      step_count: 5
      diagram_col:
        kind: tikz
        tikz_code: ''
        tikz_path: build/diagram/jobs/auxiliary-teacher-q3-solution/rendered/prompt.fragment.tex
        diagram_ref: auxiliary.teacher.q3.solution
        diagram_job_id: auxiliary-teacher-q3-solution
        width: 60mm
        caption: 过 $P$ 作 $PF\parallel DB$，交直线 $AC$ 于 $F$。
        variant: solution
        disclosure_policy: annotated
        artifact_hash: sha256:b3ad830ffddc26a5413bfe54a8b2b3b434e2e7ddf53478dc03228de76993d915
        packages:
        - tikz
        libraries: []
    answer: $BD:DC=5:3$。
    explanation: 三个比在 $AD,BE,BC$ 上，围成 $\triangle PDB$。过 $P$ 作 $PF\parallel DB$，交直线
      $AC$ 于 $F$。由两组相似通过 $PF$ 接比例，得到 $BD:DC=5:3$。
    solution_steps:
    - title: 围三角形并确定辅助线
      content: $AP:PD$ 在 $AD$ 上，$BP:PE$ 在 $BE$ 上，$BD:DC$ 在 $BC$ 上，三条线围成 $\triangle
        PDB$。过 $P$ 作 $PF\parallel DB$，交第四条比例线 $AC$ 于 $F$。
    - title: 用 $A$ 处的相似
      content: 由 $A,P,D$ 共线、$A,F,C$ 共线及 $PF\parallel DC$，得 $\triangle APF\sim\triangle
        ADC$。因为 $AP:PD=2:1$，所以 $AP:AD=2:3$，从而 $PF:DC=2:3$。
    - title: 用 $E$ 处的相似
      content: 由 $E,P,B$ 共线、$E,F,C$ 共线及 $PF\parallel BC$，得 $\triangle EPF\sim\triangle
        EBC$。因为 $BP:PE=3:1$，所以 $PE:BE=1:4$，从而 $PF:BC=1:4$。
    - title: 统一中间线段
      content: 取 $PF=2$ 份。由 $PF:DC=2:3$ 得 $DC=3$ 份；由 $PF:BC=1:4$ 得 $BC=8$ 份。
    - title: 写出答案
      content: $BD=BC-DC=5$ 份，所以 $BD:DC=5:3$。
    teaching:
      teaching_goal: 在两个已知比都在内部交线附近时，仍从三条比例线围成的三角形反推出辅助线。
      source_relations:
      - fallback:approved_review:auxiliary_ratio_bridge
      model_fusion:
        model_count: 1
        models:
        - 比例辅助线接两组相似
        fusion_role: single_model
      relation_chain:
      - step: 1
        relation_id: fallback:approved_review:q3_pdb
        inputs:
          AP_PD: '2:1'
          BP_PE: '3:1'
        outputs:
          BD_DC: '5:3'
        constraints_checked:
        - $D\in BC$，$E\in AC$，$P=AD\cap BE$
        - $PF\parallel DB$ 且 $F=PF\cap AC$
      expected_blocker: 看见 $P$ 就沿用前两题的外部顶点作线，或求出 $BC:DC$ 后忘记减去 $DC$。
      entry_point: transfer
      scaffold_level: low
      variation_depth: changed_representation
      complexity_note: 辅助线从内部交点作出，计算仍只涉及小整数份数和一次整段减法。
      upgrade_rule: 能解释为什么本题必须过 $P$ 作线，并主动写出 $BD=BC-DC$。
      fallback_move: 只保留 $AD,BE,BC$ 三条线，先看清 $\triangle PDB$ 的顶点和对边。
    layout:
      avoid_break: true
