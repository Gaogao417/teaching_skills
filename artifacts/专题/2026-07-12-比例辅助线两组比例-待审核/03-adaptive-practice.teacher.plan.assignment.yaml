            content: '由 $A,P,D$ 共线、$A,F,C$ 共线及 $PF\parallel DC$，得 $\triangle APF\sim\triangle ADC$。因为 $AP:PD=3:1$，所以 $AP:AD=3:4$，从而 $PF:DC=3:4$。'
          - title: 用 $E$ 处的相似
            content: '由 $E,P,B$ 共线、$E,F,C$ 共线及 $PF\parallel BC$，得 $\triangle EPF\sim\triangle EBC$。因为 $BP:PE=2:1$，所以 $PE:BE=1:3$，从而 $PF:BC=1:3$。'
          - title: 统一中间线段
            content: '取 $PF=3$ 份。由 $PF:DC=3:4$ 得 $DC=4$ 份；由 $PF:BC=1:3$ 得 $BC=9$ 份。'
          - title: 写出答案
            content: '$BD=BC-DC=5$ 份，所以 $BD:DC=5:4$。'
        teaching:
          teaching_goal: 在两个已知比都在内部交线附近时，仍从三条比例线围成的三角形反推出辅助线。
          source_relations:
            - 'fallback:approved_review:auxiliary_ratio_bridge'
          model_fusion:
            model_count: 1
            models: [比例辅助线接两组相似]
            fusion_role: single_model
          relation_chain:
            - step: 1
              relation_id: 'fallback:approved_review:q3_pdb'
              inputs:
                AP_PD: '3:1'
                BP_PE: '2:1'
              outputs:
                BD_DC: '5:4'
              constraints_checked:
                - '$D\in BC$，$E\in AC$，$P=AD\cap BE$'
                - '$PF\parallel DB$ 且 $F=PF\cap AC$'
          expected_blocker: 看见 $P$ 就沿用前两题的外部顶点作线，或求出 $BC:DC$ 后忘记减去 $DC$。
          entry_point: transfer
          scaffold_level: low
          variation_depth: changed_representation
          complexity_note: 辅助线从内部交点作出，计算仍只涉及小整数份数和一次整段减法。
          upgrade_rule: 能解释为什么本题必须过 $P$ 作线，并主动写出 $BD=BC-DC$。
          fallback_move: 只保留 $AD,BE,BC$ 三条线，先看清 $\triangle PDB$ 的顶点和对边。
        layout:
          avoid_break: true
