          - title: 接到底边比例
            content: '由 $BD:DC=1:2$，取 $BD=5$ 份、$DC=10$ 份，则 $EF=4$ 份，所以 $EF:DC=2:5$。'
          - title: 再用 $A$ 处的相似
            content: '由 $A,E,C$ 共线、$A,F,D$ 共线及 $EF\parallel CD$，得 $\triangle AEF\sim\triangle ACD$，所以 $AE:AC=EF:DC=2:5$。'
