    blocks:
      - type: problem
        id: q1
        points: 10
        label: 第 1 题
        stem_latex: |
          如图，在 $\triangle ABC$ 中，点 $D$ 在线段 $BC$ 上，点 $E$ 在线段 $AC$ 上，
          线段 $AD$ 与 $BE$ 相交于点 $P$。已知
          \[
          AE:EC=1:4,\qquad AP:PD=2:3,
          \]
          求 $BP:PE$。

          \begin{enumerate}[label=(\arabic*)]
            \item 写出两条已知比和所求比分别在哪三条直线上，并指出这三条直线围成的三角形；
            \item 选择这个三角形的一个顶点，在图中作对边的平行线，并写清它与第四条比例线相交于哪一点；
            \item 写出辅助线形成的两组 A/8 字型相似三角形；
            \item 用两组相似所得的比例求 $BP:PE$。
          \end{enumerate}
        diagram_slot:
          slot_id: auxiliary.student.q1.prompt
          diagram_ref: auxiliary.student.q1.prompt
          variant: prompt
          disclosure_policy: clean
          required: true
          on_failure: fail_assignment
          placement: diagram_col
          layout_role: question_sidecar
          display_profile: worksheet_geometry_sidecar
          caption: 第 1 题原始构型，请在图上补作辅助线。
          engine: geometric_scene
          diagram_kind: synthetic_geometry
          engine_options:
            engine_model_config:
              codex_model: gpt-5.4
          teaching_intent: practice_prompt
          problem_context:
            stem_latex: 在 $\triangle ABC$ 中，$D\in BC$，$E\in AC$，$P=AD\cap BE$。已知 $AE:EC=1:4$、$AP:PD=2:3$，求 $BP:PE$。
            source_problem_text: 画原始三角形 ABC，D 在线段 BC 上，E 在线段 AC 上，AD 与 BE 交于 P。由 AE:EC=1:4、AP:PD=2:3 确定一致母图，并保持 A-E-C、A-P-D、B-P-E、B-D-C 的点序清楚；不要画 F、辅助线、相似标记、比例答案或任何解题提示。标签必须逐点错开：A 上方，B 左下，C 右下，D 下方，E 在 AC 右上侧，P 在交点左下侧；禁止标签压在线段、交点或彼此重叠。
          semantic_constraints:
            given_objects: [A, B, C, D, E, P]
            given_constraints:
              - A, E, C are collinear with E between A and C
              - B, D, C are collinear with D between B and C
              - A, P, D are collinear with P between A and D
              - B, P, E are collinear with P between B and E
              - AE:EC=1:4
              - AP:PD=2:3
              - show segments AE, EC, AP, PD, BP and PE clearly
            clean_forbidden:
              - do not draw point F or any auxiliary parallel line; the parallel line is the student's construction task
              - do not mark similar triangles
              - do not show BD:DC, intermediate ratios, or the answer
        hints:
          - content_latex: '先找 $AC,AD,BE$ 三条比例线围成的三角形，再决定平行线。'
        answer_space:
          type: steps
          height: 70mm
          step_count: 5
          diagram_slot:
            slot_id: auxiliary.teacher.q1.solution
            diagram_ref: auxiliary.teacher.q1.solution
            variant: solution
            disclosure_policy: annotated
            reuse_geometry_from: auxiliary.student.q1.prompt
            required: true
            on_failure: fail_assignment
            placement: diagram_col
            layout_role: solution_annotation
            display_profile: worksheet_geometry_sidecar
            caption: 过 $A$ 作 $AF\parallel EP$，交直线 $BC$ 于 $F$。
            engine: geometric_scene
            diagram_kind: synthetic_geometry
            engine_options:
              engine_model_config:
                codex_model: gpt-5.4
            teaching_intent: practice_solution
            problem_context:
              stem_latex: 在原图上，过 $A$ 作 $AF\parallel EP$，交直线 $BC$ 于 $F$；标出两组相似三角形 $\triangle ACF\sim\triangle ECB$、$\triangle ADF\sim\triangle PDB$。
              source_problem_text: 复用教师第1题 prompt 的原始点位。新增点 F，使 A-F 直线平行 E-P 直线，且 F 位于直线 BC 上；完整画出 AF 和平行标记。用两组可区分的浅色轮廓或边线标出三角形 ACF 与 ECB、三角形 ADF 与 PDB。保留所有原始点，不写最终比例答案。F 放在底边延长线左端并将标签置于左下；A 上方、B/D/C 下方错开，E 放右上、P 放左下，所有标签远离线段和高亮边界。
            semantic_constraints:
              given_objects: [A, B, C, D, E, P, F]
              given_constraints:
                - reuse the complete original geometry from auxiliary.teacher.q1.prompt
                - A, F line is parallel to E, P line
                - B, D, F, C are collinear
                - F is the intersection of line BC and the line through A parallel to EP
                - triangle ACF is similar to triangle ECB
                - triangle ADF is similar to triangle PDB
                - show the auxiliary line AF and a parallel marker for AF and EP
        answer: '$BP:PE=3:1$。'
        explanation: '三个比在 $AC,AD,BE$ 上，围成 $\triangle AEP$。过 $A$ 作 $AF\parallel EP$，交直线 $BC$ 于 $F$。由两组相似通过 $AF$ 接比例，得到 $BP:PE=3:1$。'
        solution_steps:
          - title: 围三角形并确定辅助线
            content: '$AE:EC$ 在 $AC$ 上，$AP:PD$ 在 $AD$ 上，$BP:PE$ 在 $BE$ 上，三条线围成 $\triangle AEP$。过 $A$ 作 $AF\parallel EP$，交第四条比例线 $BC$ 于 $F$。'
          - title: 第一组相似
            content: '由 $A,E,C$ 共线、$B,D,F,C$ 共线及 $AF\parallel EB$，得 $\triangle ACF\sim\triangle ECB$，所以 $AF:EB=AC:EC=5:4$。'
          - title: 第二组相似
            content: '由 $A,P,D$ 共线、$B,D,F$ 共线及 $AF\parallel PB$，得 $\triangle ADF\sim\triangle PDB$。因为 $AP:PD=2:3$，所以 $AD:PD=5:3$，从而 $AF:PB=5:3$。'
          - title: 统一中间线段
            content: '取 $AF=5$ 份，则 $EB=4$ 份、$PB=3$ 份，所以 $PE=EB-PB=1$ 份。'
          - title: 写出答案
            content: '$BP:PE=3:1$。'
        teaching:
          teaching_goal: 训练由两条已知比和所求比围出三角形，再现场决定平行线与交点。
          source_relations:
            - 'fallback:approved_review:auxiliary_ratio_bridge'
          model_fusion:
            model_count: 1
            models: [比例辅助线接两组相似]
            fusion_role: single_model
          relation_chain:
            - step: 1
              relation_id: 'fallback:approved_review:q1_aep'
              inputs:
                AE_EC: '1:4'
                AP_PD: '2:3'
              outputs:
                BP_PE: '3:1'
              constraints_checked:
                - '$D\in BC$，$E\in AC$，$P=AD\cap BE$'
                - '$AF\parallel EP$ 且 $F=AF\cap BC$'
          expected_blocker: 只看两个已知比围图，漏掉所求比所在的第三条线，或把交点随便放在一条边上。
          entry_point: hidden_structure
          scaffold_level: high
          variation_depth: same_structure
          complexity_note: 两次整段比转换、两组相似和一次同线段统一份数，数值均为小整数。
          upgrade_rule: 能在不提示顶点和相交直线时独立写出 $AF\parallel EP$、$F\in BC$。
          fallback_move: 先分别圈出 $AC,AD,BE$，只看它们围出的 $\triangle AEP$。
        layout:
          avoid_break: true
