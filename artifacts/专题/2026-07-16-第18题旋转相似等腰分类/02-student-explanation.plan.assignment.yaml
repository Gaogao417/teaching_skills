meta:
  title: "第 18 题：旋转相似与等腰分类"
  subtitle: "学生讲义"
  grade: "九年级"
  subject: "数学"
  version: "student"

render:
  template: "exam-zh-explanation"
  paper_size: "a4paper"

sections:
  - id: "rotation-similarity-isosceles"
    title: '旋转相似：固定角 $D$ 是顶角还是底角'
    show_title: true
    type: "explanation"
    visibility: "student"
    blocks:
      - type: "problemcard"
        id: "problem-18"
        label: "第 18 题"
        stem_latex: |
          如图，在 $\triangle ABC$ 中，$AB=AC=5$，$\cos C=\dfrac45$。
          将 $\triangle ABC$ 绕点 $A$ 逆时针旋转得到 $\triangle ADE$，
          点 $B,C$ 分别与点 $D,E$ 对应，边 $AD,DE$ 分别与原三角形底边 $BC$ 交于点 $F,G$。
          当 $\triangle DFG$ 是等腰三角形时，求 $FG$ 的长。
        diagram_slot:
          slot_id: "explanation.problem18.prompt"
          diagram_ref: "explanation.problem18.prompt"
          variant: "prompt"
          disclosure_policy: "clean"
          required: true
          on_failure: "fail_assignment"
          placement: "block_center"
          layout_role: "center_block"
          display_profile: "worksheet_geometry_center"
          caption: '原图只给出 $\triangle ABC$；先由已知三角比解出底边。'
          engine: "geometric_scene"
          diagram_kind: "synthetic_geometry"
          teaching_intent: "explanation_prompt"
          problem_context:
            stem_latex: '在 $\triangle ABC$ 中，$AB=AC=5$，$\cos C=\dfrac45$。'
            source_problem_text: "画一个非直角的等腰三角形 ABC，A 为顶点，BC 为水平底边，标注 AB=AC=5 与 cos C=4/5。只画原题已知信息，不画旋转图、辅助线或答案。"
          semantic_constraints:
            given_objects: [A, B, C]
            given_constraints:
              - "AB=5"
              - "AC=5"
              - "cos(angle ACB)=4/5"
              - "segment BC is horizontal and B is left of C"
            clean_forbidden:
              - "do not draw a right-angle mark"
              - "do not draw the altitude from A"
              - "do not draw D, E, F or G"
              - "do not show BC=8 or any value of FG"

      - type: "route"
        id: "problem18-route"
        steps:
          - id: "solve-abc"
            latex: "先解原三角形"
            content_latex: |
              \textbf{解等腰 $\triangle ABC$}：已知 $AB=AC$，$AC=5$，$\cos C=\dfrac45$。\\
              作 $AH\perp BC$。\\
              $\because AB=AC$，\\
              $\therefore BH=CH$。\\
              在 $\triangle ACH$ 中，\\
              $\because \dfrac{CH}{AC}=\cos C=\dfrac45$，\\
              $\therefore CH=BH=4$，$AH=3$。\\
              得 $BC=8$，$\angle B=\angle C$。

          - id: "prove-fixed-similarity"
            latex: "找到两个分支共用的相似"
            content_latex: |
              $\because$ 旋转保持角，\\
              $\therefore \angle FDG=\angle ADE=\angle ABC$。\\
              $\because \angle DFG=\angle BFA$（对顶角），\\
              $\therefore \triangle DFG\sim\triangle BFA$，\\
              对应顶点为 $D\leftrightarrow B$、$F\leftrightarrow F$、$G\leftrightarrow A$。

          - id: "case-d-vertex"
            latex: "情形一：$D$ 是顶角"
            content_latex: |
              $\because DF=DG$，且 $\triangle DFG\sim\triangle BFA$，\\
              $\therefore BF=BA=5$。\\
              \textbf{解等腰 $\triangle BFA$}：已知 $BF=BA$，$BA=5$，$\cos\angle FBA=\dfrac45$，得
              \[
                FA^2=BF^2+BA^2-2\cdot BF\cdot BA\cos C
                =25+25-50\cdot\frac45=10,
              \]
              即 $FA=\sqrt{10}$，$FD=AD-AF=5-\sqrt{10}$。\\
              两个等腰三角形的顶角 $D\leftrightarrow B$，\\
              $\because \triangle DFG\sim\triangle BFA$，
              \[
                \therefore \frac{DF}{FG}=\frac{BF}{FA}
                =\frac{5}{\sqrt{10}},
              \]
              故 $FG=\dfrac{DF\cdot FA}{BF}=\sqrt{10}-2$。
            diagram_slot:
              slot_id: "explanation.problem18.case-vertex"
              diagram_ref: "explanation.problem18.case-vertex"
              variant: "solution"
              disclosure_policy: "annotated"
              reuse_geometry_from: "explanation.problem18.prompt"
              required: true
              on_failure: "fail_assignment"
              placement: "step_diagram"
              layout_role: "solution_annotation"
              display_profile: "worksheet_geometry_center"
              caption: "情形一：$D$ 为顶角，$DF=DG$，经相似传递为 $BF=BA$。"
              engine: "geometric_scene"
              diagram_kind: "synthetic_geometry"
              teaching_intent: "explanation_solution"
              problem_context:
                stem_latex: '$D$ 是等腰 $\triangle DFG$ 的顶角，画出旋转后的非退化构型。'
                source_problem_text: "在同一幅图中保留原等腰三角形 ABC。绕 A 逆时针旋转得 ADE，B 对应 D，C 对应 E。AD 与 BC 交于 F，DE 与 BC 交于 G，点序为 A-F-D 和 B-F-G-C。本分支 D 是顶角，标出 DF=DG，并用角标记显示 angle FDG=angle FBA、angle DFG=angle BFA，不标答案。"
              semantic_constraints:
                given_objects: [A, B, C, D, E, F, G]
                given_constraints:
                  - "triangle ADE is the counterclockwise rotation image of triangle ABC about A"
                  - "B maps to D and C maps to E"
                  - "AB=AC=AD=5"
                  - "A, F, D are collinear in that order"
                  - "B, F, G, C are collinear in that order"
                  - "F is the intersection of AD and BC"
                  - "G is the intersection of DE and BC"
                  - "DF=DG"
                  - "angle FDG equals angle FBA"
                  - "angle DFG equals angle BFA"
                solution_allowed_annotations:
                  - "mark DF and DG as equal"
                  - "show the two angle correspondences used for triangle DFG similar to triangle BFA"
                clean_forbidden:
                  - "do not label FG with its answer"
                  - "do not draw a right-angle mark"
                  - "do not let D, F or G coincide"

          - id: "case-d-base"
            latex: "情形二：$D$ 是底角"
            content_latex: |
              非退化时另一底角为 $G$，即 $\angle D=\angle G$。\\
              $\because \triangle DFG\sim\triangle BFA$，\\
              $\therefore \angle B=\angle A$，$BF=FA$。\\
              \textbf{解等腰 $\triangle BFA$}：已知 $BF=FA$，$BA=5$，$\cos\angle FBA=\dfrac45$。\\
              设 $BF=FA=x$，得
              \[
                x^2=5^2+x^2-2\cdot5\cdot x\cdot\frac45,
              \]
              即 $x=\dfrac{25}{8}$。\\
              因此 $FD=AD-AF=5-\dfrac{25}{8}=\dfrac{15}{8}$。\\
              $\because \angle D=\angle G$，\\
              $\therefore FG=FD=\dfrac{15}{8}$。
            diagram_slot:
              slot_id: "explanation.problem18.case-base"
              diagram_ref: "explanation.problem18.case-base"
              variant: "solution"
              disclosure_policy: "annotated"
              reuse_geometry_from: "explanation.problem18.prompt"
              required: true
              on_failure: "fail_assignment"
              placement: "step_diagram"
              layout_role: "solution_annotation"
              display_profile: "worksheet_geometry_center"
              caption: "情形二：$D,G$ 为两个底角，$DF=FG$，经相似传递为 $BF=FA$。"
              engine: "geometric_scene"
              diagram_kind: "synthetic_geometry"
              teaching_intent: "explanation_solution"
              problem_context:
                stem_latex: '$D$ 是等腰 $\triangle DFG$ 的底角，画出旋转后的非退化构型。'
                source_problem_text: "在同一幅图中保留原等腰三角形 ABC。绕 A 逆时针旋转得 ADE，B 对应 D，C 对应 E。AD 与 BC 交于 F，DE 与 BC 交于 G，点序为 A-F-D 和 B-F-G-C。本分支 D 与 G 是底角，标出 DF=FG，并用角标记显示 angle FDG=angle FBA、angle DFG=angle BFA，不标答案。"
              semantic_constraints:
                given_objects: [A, B, C, D, E, F, G]
                given_constraints:
                  - "triangle ADE is the counterclockwise rotation image of triangle ABC about A"
                  - "B maps to D and C maps to E"
                  - "AB=AC=AD=5"
                  - "A, F, D are collinear in that order"
                  - "B, F, G, C are collinear in that order"
                  - "F is the intersection of AD and BC"
                  - "G is the intersection of DE and BC"
                  - "angle FDG equals angle DGF"
                  - "DF=FG"
                  - "angle FDG equals angle FBA"
                  - "angle DFG equals angle BFA"
                solution_allowed_annotations:
                  - "mark DF and FG as equal"
                  - "show the two angle correspondences used for triangle DFG similar to triangle BFA"
                clean_forbidden:
                  - "do not label FG with its answer"
                  - "do not draw a right-angle mark"
                  - "do not let D, F or G coincide"

      - type: "dual_explanation"
        id: "problem18-solution"
        label: "第 18 题"
        stem_latex: '当 $\triangle DFG$ 是等腰三角形时，求 $FG$ 的所有可能值。'
        side_title: "小贴士"
        side_items:
          - kind: "hint"
            title: "先找等腰，再写腰底比"
            content_latex: '$\triangle ABC$、$\triangle ADE$ 本来就是等腰三角形；题设又给出等腰 $\triangle DFG$。由 $\triangle DFG\sim\triangle BFA$ 知 $\triangle BFA$ 也是等腰三角形。先对齐顶角和底角；情形一可直接写腰底比 $\dfrac{DF}{FG}=\dfrac{BF}{FA}$。'
          - kind: "hint"
            title: "底角情形为什么不取 $F$"
            content_latex: '若 $D,F$ 是两个底角，相似会给出 $FA=BA=5$，从而 $F$ 与 $B$ 或 $C$ 重合，再由 $AD=5$ 得 $D=F$，$\triangle DFG$ 退化。'
          - kind: "hint"
            title: "$FD$ 为什么做减法"
            content_latex: "两个有效构型的点序都是 $A-F-D$，所以 $AD=AF+FD$，必须用 $FD=AD-AF$。"
        solution_title: "解答"
        solution_step_ids:
          - "solve-abc"
          - "prove-fixed-similarity"
          - "case-d-vertex"
          - "case-d-base"
        connection_title: "答案"
        connection_items:
          - latex: '$FG=\sqrt{10}-2$ 或 $FG=\dfrac{15}{8}$。'
