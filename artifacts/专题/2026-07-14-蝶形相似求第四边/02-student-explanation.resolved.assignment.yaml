      latex: 先证明两个三角形相似
      content_latex: 由对顶角相等，得 $\angle AOC=\angle DOB$。又 $\angle OAC=\angle ODB$，所以
        $\triangle AOC\sim\triangle DOB$。
    - id: butterfly-step-use-proportion
      latex: 再列对应边比例求边长
      content_latex: 由对应边成比例，得 $\dfrac{AO}{DO}=\dfrac{OC}{OB}$，即 $\dfrac69=\dfrac8{OB}$，解得
        $OB=12$。
