          caption: A 字型基准图 1
          engine: geometric_scene
          diagram_kind: synthetic_geometry
          engine_options: {engine_model_config: {codex_model: gpt-5.4}}
          teaching_intent: practice_prompt
          problem_context:
            stem_latex: '$P-A-C$、$P-B-D$，$AB\parallel CD$。'
            source_problem_text: '固定坐标 $P=(0,0)$、$A=(-1,2)$、$B=(1,2)$、$C=(-2.5,5)$、$D=(2.5,5)$，画清楚 A 字型；只标点名和平行符号，不显示答案。'
          semantic_constraints:
            given_objects: [A, B, C, D, P]
            given_constraints:
              - P, A, C are collinear with exact order P-A-C
              - P, B, D are collinear with exact order P-B-D
              - AB is parallel to CD
              - show segments AC and BD clearly
              - use fixed nondegenerate seed P=(0,0), A=(-1,2), B=(1,2), C=(-2.5,5), D=(2.5,5)
            clean_forbidden: [do not label similar triangles, do not draw answers]
